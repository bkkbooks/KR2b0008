front:
  text: 資治通鑑考異卷第十三臣司馬光奉勑編集
  hash: sha256:2cab2d21276d1fa234a9d0a363013621b91b8b7395f275f5bdf0987e7625f2bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_013-1a}
body:
  text: 唐紀五開元十年八月杖裴景仙流嶺南之李朝隠執奏又下制實錄初云上令集衆殺流嶺南蓋本欲斬之也云集衆決殺朝隠又奏乃楊思勗䚯梅叔焉戌思勗傳云首領梅玄成自稱黒帝與舊紀云八月丙戌按八月庚子朔無丙安南府今從本紀林邑眞臘國通謀䧟十一年五月陸堅欲奏罷麗正供給從集堅注記舊傳作徐堅今十一月戊寅祀南郊戊寅冬至祀南郊按長曆去年閏五實錄癸酉日長至戊寅祀南郊唐曆月唐曆近是月來年閏十二十二月王晙坐黨引疎族貶蘄州刺史祀追晙赴京以舊傳云上親郊勉仍賜衣一副會許州刺史王喬家奴告喬與晙潜謀舊逆會大禮晙以時屬冰壯恐媾騎乗隙入冦表辭不赴手敕慰無反狀乃以違詔追不到罪之今從實録敕侍中源乾曜中書令張説鞫其狀晙既十二年四月壬寅敕宗室旁繼為嗣王者並令歸宗今從實錄舊紀在癸卯岳臺晷長一尺五寸微彊分今從僧一行大衍曆議及舊志新志云浚儀岳臺晷尺五寸三十一月上御馬登泰山山開天傳信記云上將封泰山益實録唐曆統紀皆云備灋駕登泰曰白騾將軍按泰山非灋駕可登白騾近怪今從舊志州進白騾上親乗之不知登降之倦纔下山無疾而殪諡張萬嵗掌國馬隴右人謂馬嵗為齒為張氏諱也按公羊統紀云萬嵗三代典羣牧恩信行隴右故長矣然則謂馬嵗為齒有自來矣傳晉獻公謂荀息曰吾馬之齒亦已十四年正月以東華公主妻李邵固月壬子於此終言之東華出降實録在三二月己酉遣楊思勗討梅大海等朔今從實錄舊紀作庚戌四月上欲以武惠妃爲后或上言諫好禮聞上欲以惠妃唐會要云侍御史潘羊傳曰子不復父讎不子也昔齊襄公復九代之讎丁蘭報為皇后進䟽諫曰臣甞聞禮記曰父母之讎不可共戴天公乎不亦取笑於天下乎又惠妃再從叔三思再從父延秀等木母之怨陛下豈得欲以武氏為國母當何以見天下之人結髮為夫妻者尚相揀擇況陛下是累聖之貴天子之尊乎並干紀亂常遞窺神器豺狼同穴梟獍共林且匹夫匹婦欲神祇之心允億兆之望又見人間盛言尚書右丞相張説自伏願詳察古今鍳戒成敗愼擇華族之女必在禮義之家稱計伏願杜之於將漸不可悔之於己成且太子本非惠妃所被停知政事之後毎諂附惠妃欲取立后之功更圖入相之所以諫其漸者良為是也昔商山四皓雖不食漢庭之祿尚生惠妃復自有子若惠妃一登宸極則儲位實恐不安古人所作且好禮先天元年為侍御史開元十二年為温州刺史能輔翌太子況臣愚昧職忝憲府蘇冕駁曰此表非潘好禮先天元年始年十四王皇后有寵未衰張説又未為右丞相致仕表是十四年獻而云職忝憲府若題年恐錯則武惠妃獻之今去其名也竟未知此表是誰十月庚申上幸汝州廣成湯元十四年十月十三日生時令狐峘代宗實錄云上以開還宫是夜代宗降誕按玄宗實錄此月十六日庚申始幸温玄宗幸汝州之温湯有望氣者云宫中有天子氣玄宗即日舊后妃傳章敬皇后吳氏坐父事没入掖庭開元二十三年湯己巳乃還宫與代宗實錄不同舊紀云十二月十三日生掖庭宫人以賜之而吳后在籍中明年生代宗皇帝十八年玄宗幸忠王邸見王服御蕭然傍無媵侍命將軍髙力士選蓋誤以十三年為二十三年也次栁氏舊聞肅宗在東宫為薨按代宗此年生而云二十三年以吳后賜忠五十八年薨愀然曰汝歸第吾當幸汝及上至顧見宫庭殿宇皆不洒掃李林甫所構勢幾危者數矣無何湏鬢斑白甞早朝上見之庭按籍閱視得三人乃以賜太子而章敬吳皇后在選中生而樂器塵埃左右使令無有妓女上為之動色使力士詔掖二十六年乃立肅宗為太子天寶五年李林甫始構韋堅之代宗按開元二十三年李林甫初為相二十五年廢太子瑛新書后妃傳全取之今皆不取獄舊聞所記事皆虚誕年月不合十五年正月王君㚟勒兵躡吐蕃不敢出今從君㚟傳吐蕃傳云君㚟畏其鋒君㚟破吐蕃後軍帥衆入㓂大斗谷又移攻甘州焚燒市君㚟傳曰十六年冬吐蕃大將悉諾邏吐蕃傳入冦在十四年冬此云十六年冬誤也里而去君㚟襲其後敗之於青海之西據實錄及九月回紇殺王君㚟討逐按知運九年已卒君㚟代鎭涼舊傳云回紇既殺君㚟上命郭知運誤也州舊傳十六年廣州獠馮璘等反命楊思勗發桂州及嶺北近道兵討之今從思勗傳本紀作馮仁智七月張忠亮大破吐蕃亮今從舊本紀吐蕃傳實錄唐曆蕭嵩傳作張志十月己卯幸温泉己丑還宫温泉宫不言其還唐曆丁實錄十二月丁卯又云幸月已幸温泉恐重複不取卯幸温泉丁丑還宫按此十七年八月癸亥上以生日宴百官曆是月己未朔癸亥實錄云癸亥朔按長新昭成太后生聖人實錄誤也五日也顧況歌曰八月五夜佳氣九月宇文融貶汝州刺史禕將下獄禕既申訴得理融坐舊傳曰殿中侍御史李宙驛召今從唐曆阿黨李宙貶十月又貶平樂尉鉅萬計舊傳曰裴光庭時兼御史大夫唐曆云裴光庭等諷有司劾之積其贓曆云十月乙未按長曆十月戊午朔無乙未今從統紀又彈融交遊朋黨又男受贓等事今從實錄統紀又唐十八年正月丙戌朔無癸酉實錄此年事與本紀唐曆統紀實錄云癸酉上御含元殿受朝賀按長曆是月據舊紀全不取此年實錄又云丁巳新迎氣於東郊下制十皆不同正月甲子全差誤疑本書闕亡後人附益之新紀止是月無丁巳諸書及會要皆無十八年親迎氣事唐曆在二八年正月五日以前天下囚徒常赦所不免者咸赦放之按年正月丁丑又載迎氣大赦其制文推恩大略與此年相似十六年正月七日丙子統紀在二十六年正月實錄二十六出於此今不取或者實錄誤重四月月乙夘朔無乙巳丁未舊紀唐曆亦無幸温泉事今不取實錄云乙巳駕幸温泉宫丁未至自温泉宫按長曆是六月庭有吏材力士為之推轂因以入相時彦鄙之宋璟王唐朝年代記云初裴光庭娶武三思女髙力士私焉光缺刺史昇平日久人皆不樂外官請重臣兼外官領刺史以晙酒後舞回波樂以為戯謔光庭患之乃奏天下三十餘州執奏天下務重實賴舊臣宿德訪其得失今盡失之則朝廷雄其望於是擬璟揚州晙魏州陸象先荆州凡十餘人蕭嵩保陸象先兼荆州長史璟晙未甞除外官今不取空矣上乃悟遂止按實錄是嵗閏六月以太子少烏承玼破可突干於捺禄山承洽開元中管平盧先鋒軍韓愈烏氏先廟碑云尚書諱兄承恩皆為平盧先鋒沈勇而決號轅門二龍据此則承玼屢破奚契丹從戰捺祿走可突干新傳云承玼開元中與族今從新書承洽一人也十月吐蕃遣論名悉獵入貢遣其大臣名悉獵來朝請固實錄十九年七月癸巳吐蕃丁未朔無癸巳今從唐曆舊本紀吐蕃傳和好之約且獻書云云按長曆十九年七月十九年正月壬戌王毛仲貶瀼州别駕乙丑王毛仲貶瀼實錄十八年六月皆在十九年正月今從之州按唐曆統紀舊紀毛仲貶辛未遣崔琳使吐蕃金城公主求書壬申敕遣崔琳充實錄十一年七月諌丁亥以崔琳為御史大夫八月辛卯降書與吐蕃按吐蕃入吐蕃使癸未命有司寫毛詩禮記等賜金城公主于休烈辛未乃遣崔琳報使二月甲午以琳為御史大夫三月乙酉傳此年十月論名悉獵至京師本紀唐曆皆同十九年正月錄皆誤在前年七月八月按七月癸丑朔亦無丁亥琳享于吐蕃金城公主因名悉獵請書于休烈乃諫實二十年二月己巳信安王禕等大破奚契丹今從實錄唐曆作庚辰二十一年正月遣大門藝討勃海王武藝傳云可突干新書烏承玼之破於捺禄山又云勃海大武藝引兵至馬都山屠城邑承殺其王邵固降突厥而奚亦亂是嵗奚契丹入寇詔承玼擊而耕嵗省度支運錢按韓愈為烏重胤作廟碑叙重胤父承玼窒要路塹以大石亘四百里於是流民得還土少休脱鎧逃徙失業尚書領所部兵塞其道塹原累石綿四百里深髙洽云屢破契丹從戰捺祿走可突千勃海上至馬都山吏民作承玼傳按新舊帝紀及勃海傳皆無武藝入寇至馬都山皆三丈冦不得進民還其居嵗罷錢三千萬疑新書約此碑勃海上追之至馬都山耳二十一年郭英傑與可突干戰都事或者韓碑云走可突干勃海上至馬都山謂破走司突干寇而然與上止是一事新書承之致誤然未知新書承玼傳山然則都山蓋契丹之地也吏民逃徙失業蓋因可突干入據何書中餘事别二十二年正月己丑至東都都己丑張九齡至自韶州唐紀二十六日戊子至東實錄今從四月李林甫為黄門侍郎三思女詭譎有材略與林甫舊傳云初侍中裴光庭妻武請林甫代其夫位力士未敢言玄宗使中書令蕭嵩擇相嵩私中官髙力士本出三思家及光庭卒武氏銜哀祈於力士乃令林甫白休休既入相甚德林甫與嵩不和乃薦林甫堪久之以右丞韓休對玄宗然之乃令草詔力士遽漏於武氏妻一寡婦耳豈敢遽引所私代其夫為相韓休正直雖得林為宰相惠妃陰助之因拜黄門侍郎玄宗眷遇益深按光庭之為相今不取甫先報必不至薦六月張守珪大破契丹事二十二年守珪大破之蓋實錄實錄守珪大破林胡按會要契丹林胡地故云然以契丹即戰國時七月裴耀卿為江淮河南轉運使造使今從舊食貨志舊紀云充江淮以南回八月耀卿運米省僦車錢三十萬緡今從耀卿傳舊志舊志云四十萬貫今年為侍中始置河陰倉後三年方見成効則非作侍中時又云明年耀卿拜侍中蕭炅代焉按耀卿二十一年建此議職也解此十二月張守珪斬契丹王屈烈及可突干傳首傳屈烈舊守珪正月傳首今從實錄作屈刺契丹傳來年牙官李過折從實錄及守珪傳舊契丹傳作遇折今突厥毗伽可汗卒子伊然立尋卒弟登利可汗立伊然舊傳又立其弟為登利可汗按張九齡集敕登利可汗書云今又立詔宗正卿李詮弔祭冊立伊然為立碑廟無幾伊然病卒紀功然則告䘮時登利己立矣實錄詮亦作佺遣從叔金吾大將軍佺弔祭又云建碑立廟貽範二十三年正月李過折檢校松漠州都督州節度副大實錄云同幽有功唐必未肯使為幽州節度使今從舊傳使舊傳云授特進檢校松漠州都督按過折雖元德秀遣樂工歌于蒍蒍于未詳其義今從雜錄明皇雜錄作于蒍新傳作于閏月壬午朔日有食之十一月壬子朔今從實錄唐曆舊紀作十一月壬申朔按長曆十二月冊楊玄琰女為壽王妃女按陳鴻長恨歌傳云實錄載冊文云玄璬長琰女早孤養於叔父玄璬又云或奏玄琰女容色冠代宜䝉詔髙力士潜搜外宫得楊玄琰女於壽邸舊楊貴妃傳云玄内禁中即為自出妃意者匄籍女官號太眞更為夀王娶韋召見時妃衣道士服號太眞新傳云始為夀王妃云云遂召幸舊史蓋諱之耳昭訓女而太眞得契丹王過折為其臣涅禮所殺餘黨泥裏所殺不云朝舊傳云過折為可突干又有賜張守珪敇云涅礼自擅難以義責而未有名位恐其廷如何處置泥裏今据張九齡集有此賜契丹都督涅礼敇無它也蓋泥裏即涅禮也不安卿可宣示朝旨使知二十四年二月庚申更皇子名景子太子諸王皆改名今舊紀唐曆二十三年七月錄從實四月張九齡請誅安祿山祿山統戎失律挫敗軍威請依玄宗實錄四月辛亥張守珪奏免死是并劾守珪不断於閫外乃更執以諉上之辝也九齡耳上因是欲赦之而九齡執奏云守珪軍令若行祿山不宜云卿更審量本狀隨事處之守珪得此敕即捨之以聞如此因此見之而云面有逆相上終欲赦之故九齡不得已草敕而於人情差似相近則與玄宗實錄相應史窣干與安祿山先後一日生元日生按祿山事迹天寶舊傳云思明除日生祿山妃為祿山作生日今不取十載正月二十日上及貴十月帝欲以牛仙客為尚書張九齡執不可李林甫言九齡不達大體客翌日見上泣讓官爵按時不聞仙客舊林甫傳曰林甫以九齡言告仙客仙從唐曆在京今十一月李林甫日夜短九齡於上上浸疎之林甫請見屢明皇雜錄云扇賜之九齡惶恐作賦以献新傳亦云然按實錄仙客加實陳仙客實封九齡頗懐誹謗于時方秋上命髙力士以白羽奉敇使大將軍髙力士賜宰相白羽扇九齡與焉竊有所感封在十月而九齡集白羽扇賦序云開元二十四年夏盛暑利用與夫弃捐篋笥義不同也然則上以盛夏遍賜宰臣扇立獻賦云云敇報曰朕頃賜羽扇聊以滌暑佳彼勁翮方資齡因此獻賦自寄意耳非以秋日獨賜九齡但九牛仙客同三品遥領朔方節度使自仙客始按蕭嵩已遥唐曆曰宰相遥領節度非始此領河西補闕杜璉今從新書唐曆作柱珽二十五年四月周子諒彈牛仙客杖流瀼州死子諒以舊紀云引妖䜟為證上怒召入禁中責之左右拉者數四氣絶而蘇妄陳休咎於朝堂決殺實錄此月則云子諒彈奏仙客非才才濫登相位大夫國之懿親豈得坐觀其事適之遽奏子諒及仙客傳則云子諒竊言於御史大夫李適之曰牛仙客不至藍田死舊仙客傳亦然今從此月實錄及舊紀栁宗元周之言上大怒廷詰子諒子諒詞窮於朝堂決杖配流瀼州行以諂諛至相位賢臣放退公為御史抗言以白其事得死于君墓碣云有唐貞臣汝南周氏諱某字某又曰在天寶年有事則子諒也云在天寶年誤矣墀下宗元集此碣雖無名字然其楊洄譖太子瑛鄂王瑶光王琚構異謀年洄復構瑛瑶新傳曰二十五賊請介以入太子從之妃白帝曰太子二王謀反甲而來帝琚與妃之兄薛鏽異謀惠妃使人詭召太子二王曰宫中有宜豫帝意決乃廢瑛等按瑛等與惠妃相猜忌已久雖承妃使中人視之如言遽召宰相林甫議答曰陛下家事非臣所二子於不義不言被甲入宫也蓋洄譛瑛等云欲害夀王瑁言豈肯遽被甲入宫又按廢太子制書云䧟元良於不友誤云潜構異謀耳今從舊傳但瑛等皆廢為庻人庻人以罪廢夀王以母寵子愛議者頗獨孤及作裴稹行狀云公為起居郎三上述新城之殷鍳下陳戾園之元龜謂興亡之由在廢立之有奪宗之嫌道路憫黙朝野疑懼公乃從容請間慷慨獻諫諫之路為日固久今臣一言而荷殊寵則言者衆矣何以錫地天子感悟改容以謝因詔以給事中授公公曰陛下絶招稹光庭之子當是時周子諒杖死張九齡逺貶稹若敢為太之上善其敏而多其讓乃止不拜尋除尚書祠部員外郎按諸書皆不言此事蓋出及之虚美耳子直寃則聲振宇宙豈得湮没無聞而七月徐嶠奏鵲巢大理樹從刑灋志通典舊紀作徐岵今賜李林甫爵晉公牛仙客豳公奏囚減少上歸美宰實錄七月戊寅有司政問京城囚徒有司奏有五十人怡然有喜色下制曰日者臣制曰斷獄五十殆至無刑遂封二人又十月丙午上因聽少微等各賜中上考二者未詳其為一事二事今從舊紀叢棘之地烏鵲來巢今結諸刑名纔逾五十其刑部侍郎鄭太常博士王璵孫又新舊傳皆云抗疏請置春壇因遷太舊傳不言璵鄉里世系新傳云方慶六世慶長安二年卒距此才三十六年不應已有五世六世孫能常博士不知其本何官也新表王方慶五世孫璵肅宗按方名實非也今不取上疏恐璵偶與之同二十六年三月以吐蕃新城為威戎軍軍今從實錄舊傳作威武五月髙力士言但推長而立注謂肅宗也大枒語不可曉統紀叙力士語云但從大枒新傳今從六月王昱為劒南節度使從實錄唐曆舊傳作王昊今突騎施莫賀達干都摩度新傳作都摩支今從實錄舊傳會要作莫賀咄達干今從實錄爾微特勒據怛邏斯城斯今從實錄唐曆作恒邏七月己巳冊太子月壬辰行冊禮今從玄宗實錄元載肅宗實録云二十七年七九月王昱為吐蕃所敗死者數千人没于賊今從實錄舊傳將士數萬人皆六詔䝉舍䝉越越析浪穹様備越澹嶲越析浪穹邆新書六詔曰䝉竇滂雲南别錄晱施浪䝉舍今從細奴邏生邏盛邏盛生盛邏皮盛邏皮生皮邏閤傳新后時邏盛炎身入朝妻方娠生盛邏皮喜曰我又有子雖死云䝉氏父子以名相屬細奴邏生邏盛炎邏盛炎生炎閤武封臺登郡王炎閤未有子時以閤羅鳳為嗣及生子還其宗唐地足矣炎閤立死開元時弟盛邏皮立生皮邏閤授特進既有炎閤豈得云我又有子雖死唐地足矣今從舊南詔傳而名承閤遂不改按邏盛炎之子盛邏皮豈得云以名相屬南詔傳閤皆作閣今從新傳及楊國忠傳雲南别錄又舊二十八年三月蓋嘉運請立阿史那昕為十姓可汗從之達干不肯曰討平蘇祿本是我之元謀若立史昕為主舊傳云嘉運欲立懐道之子昕為可汗以鎭撫之莫賀十七年嘉運詣闕獻俘仍令將吐火仙獻于太廟會要二十則國家何以酬賞於我乃不立史昕便令莫賀達干統衆二年昕至碎葉西南俱南城為莫賀咄達干所殺三年安西節九年以斛瑟羅之孫懐道之子昕為可汗遣兵送之天寶元汗按實錄開元二十八年三月甲寅蓋嘉運俘吐火仙來獻度使馬靈詧斬之更立其首長為伊地米里骨咄祿毗伽可月乙卯突騎施可汗莫賀達干率其妻子及纛官首領百餘四月辛未冊十姓可汗阿史那昕妻李氏為交河公主十二嘉運宣恩招諭皆相率而降新傳云達干不肯立昕即誘部人内屬初莫賀達干與烏蘇萬洛扇誘諸蕃叛于我上命蓋昕為可汗遣兵護送昕至俱蘭城為莫賀咄所殺莫賀咄自落叛詔嘉運招諭乃率妻子等降遂命統其衆後數年復以便以莫賀達干為可汗統衆則莫賀不應復叛且立可汗當須朝廷冊命嘉運豈為可汗安西節度使夫䝉靈詧誅斬之若如舊傳所言嘉運干也若如會要所言二十九年始立昕為可汗則實錄二十八年四月不應已謂得擅立於塞外也若未以為可汗則實錄十二月不應謂之突騎施可汗莫賀達而叛明皇乃以莫賀達干為小可汗止統突騎施之衆使嘉運招諭之故來昕為十姓可汗也蓋嘉運既平突騎施即奏立昕為十姓可汗故莫賀達干不服然也但實錄脱略疑不敢質故略采諸書所見存其梗㮣書之降然昕為十姓可汗兼統諸部故明皇遣兵送之而為莫賀達干所殺事或二十九年六月臧希液破吐蕃液今從唐曆舊傳作盛希七月突厥骨咄葉護自立為可汗烏蘇米施可汗唐曆舊傳云左殺自立為米施可汗天寶初立今從之新傳皆云判闕特勒子為烏蘇八月安祿山為營州都督平盧軍使未以幽州節度副實錄此年八月乙節度副使安祿山為營州刺史平盧軍節度副使會要二十大使安祿山為營州刺史充平盧勃海黒水軍使舊以幽州兵馬使為平盧軍使蓋以平盧兵馬使帶幽州節度副使之八年王斛斯為平盧節度使遂為定額按舊傳禄山自平盧始以平盧為節度會要誤也名耳實錄大衍字也天寶元年天寶元年正月州三百三十一志開元二十八年州府三百舊紀云三百六十二按地理三十餘州今從唐曆會要統紀二十八至此才二年不應遽增鎭兵四十九萬結彍騎等揔五十七萬四千七百三十三此此兵數唐曆所載也舊紀是嵗天下健兒團畿諸州彍騎數之耳蓋止言邊兵彼并京四月發兵納阿史那昕至俱蘭城胡語不明耳會要作俱南城八月王忠嗣盛兵磧口伐與奚怒皆戰于桑乾河三敗之新舊書忠嗣傳皆曰是嵗忠嗣北然按朔方不與奚相接不知所云奚怒皆何也今闕之大虜其衆又曰明年再破怒皆及突厥之衆自是塞外晏阿布思葛臘哆等來降啜可汗之孫登利可汗之女與其實錄舊紀皆云突厥阿布思及黙毗伽可汗可敦男西殺葛臘哆率其部千餘帳來降舊王忠黨屬來降唐曆云烏蘇米施可汗遁逃其西葉護阿布思及廂而歸其西葉護及毗伽可敦男西殺葛臘哆率其部落千嗣傳云三部落攻米施可汗走之忠嗣因出兵伐之取其右伽可汗女大洛公主伊然可汗小妻余塞匐登利可汗女余餘帳入朝突厥傳云西殺妻子及黙啜之孫勃德支特勒毗其部衆相次來降今參取用之燭公主及阿布思頡利發等並帥九月辛亥宴突厥降者無辛卯唐曆云九日辛卯亦誤也本紀作辛卯按長曆是月癸卯朔十二月回紇骨力裴羅入貢頡利吐發遣使入朝封奉義舊傳云天寶初其酋長葉護落襲殺之立回紇為主是為骨咄祿毗伽闕可汗遣使立為王唐曆天寶三載突厥拔志蜜可汗又為回紇葛邏祿等部可汗奉回紇骨力裴羅定其國是為國咄祿毗伽闕可汗按奉義王又加懐仁可汗新突厥傳云回紇葛邏祿殺拔悉蜜不同然新傳自吐迷度以來世系皆可譜今從之奉義王懐仁可汗是一人而新突厥回紇傳其名二年十月戊寅幸温泉乙卯還宫宫十一月乙卯還宫與舊紀十月戊寅幸温泉月丙寅朔無戊申丙辰唐曆十一月戊申幸温泉宫丙辰還實錄同十二月戊申又幸温泉宫丙辰還宫實錄無按十二不同今皆不取京又與實錄本紀三載五月夫䝉靈詧斬莫賀達干詧今從實錄會要作馬靈更請立伊里底蜜施骨咄祿毗伽咄祿毗伽今從實錄會要作伊地米里骨四載六月蕭炅引吉温為灋曹附邪以出入人命者凡十唐曆云温聮按大獄倚灋之雖王公大人立可親也初蕭炅以贓下獄温深竟其罪後餘年性巧詆忍而不忌失意眉睫者必引而䧟之其欲膠固為膠漆之交引為灋曹而薦於林甫温之進也反以炅力舊為萬年縣丞炅拜京兆尹温見炅於髙力士第乃與之相結已為京兆尹一唱萬年尉即就其官人為危之今參取二書用之傳云炅為河南尹有事京臺差温推詰堅執不捨及温選炅八月壬寅冊楊太眞為貴妃貴妃本紀甲辰唐曆甲寅今統紀八月冊女道士楊氏為妃在贈官前新本紀亦云八月壬寅立太眞為貴妃今從之據實錄壬寅贈太眞妃父玄琰等官甲辰甲寅皆在後恐冊楊錡尚太華公主從祖兄然則從祖亦再從也推恩之時實錄舊傳皆以銛錡為再從兄國忠為之子借使非子比於國忠必應稍親今但謂之從兄舊傳云何以及銛錡而不及國忠新傳謂之宗兄唐曆以銛為玄琰今從實錄錡為侍御史鮮于仲通為劔南采訪支使卿所作仲通碑見存云為采唐曆云為節度巡官按顔眞今從之訪支使九月罷韋堅諸使以楊愼矜代之水陸運使誤也今從實錄舊食貨志三載以楊釗為褚誗戰死誗今從實錄新傳作諸葛五載正月韋堅下獄李林甫使楊愼矜王鉷吉温鞫之愼矜引身中立以候望鉷恨之林甫亦憾焉二傳自相矛楯舊林甫傳云林甫潜令愼矜伺堅隙奏上愼矜傳云鉷推堅唐曆今從韋堅貶縉雲太守今從實錄及舊傳舊紀貶括蒼太守十二月甲戌杜有鄰栁勣等杖死從實錄實錄云勣與其舊紀唐曆皆作辛未今杖一百杜有鄰栁勣念以微親特寛殊死決一頓貶嶺南新黨並伏灋詔書則云猶寛極刑俾從杖罪其王曾等各決重理寺蓋詔雖與杖其實皆死杖下也興尉吉温傳則云勣等杖死積尸於大六載十月己酉幸温泉戊申今從實錄舊紀唐曆皆作十一月李林甫知王鉷與楊愼矜有隙密誘使圖之者史敬思敬思曰禳之可以免於愼矜後園大陳灋事令貫明皇雜錄曰愼矜父墓封城之内草木流血愼矜大懼問術獵書傳陰陽玄象愼矜與之善毎言天下將亂居於臨汝山桎梏坐於叢林間以厭之唐曆云敬思本胡人出家還俗涉坐談宴怒婢春草將杖殺之敬思曰七郎何須虚殺却十頭中亦勸愼矜於臨汝買得山莊良田數十頃甞於愼矜第夜雅厚敬思曰任公收取明旦至市賣與太眞栁氏姊得錢一壯牛愼矜曰何謂也敬思曰賣却買牛毎年耕田十頃愼矜狀皃壯大應對分明數目之謂栁曰幾錢買得此婢以實對百二十千文買牛以歸栁氏數將春草來往宫中玄宗見其草曰本楊滇矜婢賣與栁家玄宗曰愼矜豈少錢而賣你春遂留之玄宗曽晝寢問春草曰汝本何人何以得至栁家春聞敬思名因詰問春草以實對曰毎夜坐中庭或説天文遥草曰不是要錢本將殺某敬思救得不殺所以賣之玄宗素引愼矜玄宗悖然曰愼矜與卿有親更不須相往來鉷初内指宿曜某亦盡知其言玄宗怒變色良久後王鉷因奏事言鉷鉷心喜數悖慢以侵之愼矜尤怒明皇雜錄又曰愼矜之怨愼矜凌已常忍隠不泄至是覺上意異楊釗先知之以告甚厚以車送之敬思乗馬隨之路經貴妃妹八姨樓下方登侍婢有美者字明珠敬思數目之愼矜則以遺之兼以囊裝以見遺敬思不敢拒姨明日入宫婢從上見而異之問所從僂張樂姨素與敬思相識固邀敬思登樓乃曰車中美人請愼矜輙贈以俾明珠乃具言厭勝之事上大怒曰彼爲妖乎來明珠曰本楊愼矜家人也近贈史敬思上曰敬思何人而温温險害亦有憾於愼矜因構成其事今參取書之遂告林甫林甫素忌愼矜才恐其作相以告中丞告三司按王忠嗣甫雖志欲害太子亦未肯自言之今不取新傳李林甫屢自太子宜有謀上云云按林李林甫屢起大獄太子以仁孝謹靜得免上與李林甫明皇雜錄云推賢德茍非有大勲於社稷則惟元子上黙然曰朕長子琮議立太子息屬忠王林甫從容言於上曰古者建立儲君必乎陛下其圖之上微感其言徐思之林甫亦素知其有疾意往年因獵苑中所傷面目尤甚林甫曰破面不猶愈於破國友聦明中外所屬故姦邪之計莫得行焉按是時忠王若未欲動揺肅宗而託附武惠妃因以夀王瑁為請竟以肅宗孝甫傳云林甫數危太子未得志一日從容曰古者立儲君非為太子上用林甫之言則琮為太子矣安能及瑁新書李林面甚荅曰破面不愈於破國乎帝頗惑曰朕徐思之此則情有大勲於宗稷則莫若元子帝久之曰慶王往年獵為豽傷與林甫議立太子意屬忠王也今雜錄本於所傷字上脱為理似近然新書此事必出於雜錄若太子已立則不當云上有之物或者豹字誤為豽字耳事既可疑今不取豽兩字别本必有之按説文豽獸名無前足此非常十二月李嗣業破吐蕃今從實錄及封常清傳舊嗣業傳云天寶七載資治通鑑考異卷第十三
