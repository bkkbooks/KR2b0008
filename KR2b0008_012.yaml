  text: 資治通鑑考異卷第十二臣司馬光奉勑編集
  hash: sha256:b0521e988ace19fd63ccefa1cbbe0209327840c4eb94539afe75e9247b1bf70f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_012-1a}
body:
  text: 唐紀四中宗神龍元年正月壬午赦改元壬午大赦甲子太子新紀長安五年正月紀唐曆統紀會要皆同紀年通譜亦以神龍為武后年號中監國改元按則天實錄神龍元年正月壬午朔大赦改元舊紀誤也宗因之新張柬之等謀誅張易之遣李多祚李湛王同皎迎太子迎皇太子拒而不時出湛進啓曰逆豎反道乱常將舊李湛傳曰湛與右羽林大將軍李多祚等詣東宫翦伏願殿下暫至玄武門以副衆望太子曰凶豎悖乱誠合圖不軌宗社危敗實在須㬰湛等諸將與南衙執事克期誅弃家族共宰相同心匡輔社稷殿下奈何欲陷之鼎鑊殿下誅夷然聖躬不豫慮有驚動公等且止以俟後圖湛曰諸將紀皆以此為王同皎之言而舊傳以為李湛進説今從實録速出自止遏太子乃上馬就路按劉子玄中宗實録唐曆統取舊傳唐曆等參賞張柬之等有差易之等權寵日盛恐有異圖時敬暉中宗實録初冬官侍郎朱敬則以張易之兄弟兩飛騎之力耳暉等竟用其策及易之昌宗伏誅為左羽林將軍敬則謂之曰公若假皇太子之令舉北軍誅長安四年以老罷知政事累轉冬官侍郎而則天實録誅易暉遂矜功自恃故賞不及於敬則俄出為鄭州刺史按敬則郎朱敬則恐誤之時有庫部員外二月辛亥帝詣上陽宫亥誤也當是辛亥實録唐曆皆云乙薛季昶勸張柬之誅武三思于景運門將收諸武誅之御史臺記曰張柬之勒兵公傳曰袁謂張公曰昔有遺言使先收梁王三思豈可捨諸彦範既以事竟不欲廣誅戮遽解其兵柬之固爭不果狄梁季昶傳敬暉傳唐統紀唐曆狄梁公傳皆以為張柬之敬暉張公曰但大事畢功此是机上之物豈有逃乎按舊唐書薛唐書彦範傳亦云薛季昶勸誅三思會日暮事遽彦範不欲不欲誅武三思唯御史臺記以為柬之固爭而彦範不從新所矣按柬之時為宰相首建此謀當是與桓敬等皆不可不廣殺因曰三思机上肉爾留為天子藉手季昶歎曰吾無死彦範也應獨由柬之等受制於三思之助潜入宫中内行相事反易國舊傳云誅易之明日三思因韋后三思矣事似傷速今微加刪改政居數日五王皆失柄受制於五月封敬暉等為王側不斍其衰老及在上陽宫不復統紀曰太后善自粉飾雖子孫在以天下授汝矣而五賊貪功驚我至此上悲泣不自勝伏地櫛頮形容羸悴上入見大驚太后泣曰我自房陵迎汝來固毁容涕泣未必能感動移其意其所以疎忌五王自用韋后拜謝死罪由是三思等得入其謀按中宗頑鄙不仁太后雖以張柬之為首賜鐵劵以崔玄暐為首封王及謫為司馬長三思之言耳今不取五王尊卑先後不定實録誅張易之時長安四年六月玄暐為鵉臺侍郎平章事十月張柬之自秋流皆以敬暉為首舊傳及開元復官詔並以桓彦範為首按為相神龍元年正月袁恕己自司刑少卿為鳳閣侍郎同平官侍郎同平章事十一月守鳳閣侍郎誅易之時唯此二人納言三月恕己守中書令四月東之爲中書令敬暉爲侍中章事庚戌柬之為夏官尚書玄暐守内史敬暉桓彦範並爲柬之為首暉與彦範同為侍中疑侍中在中書令上故削諸五王遷轉先後如此疑實録但以誅易之時東之首謀故以罷政方加特進而玄暐如舊疑特進雖散階而品秩最髙故武表及罷政事皆以暉為首賜鐵劵時玄暐已加特進暉等詔及史官特以為首未必以當時位次也天后中宗時侍中以玄暐為首彦範與暉同為侍中而彦範被禍最酷疑開元書令上疑在中八月壬戌追立趙后子今從實録舊本紀云甲二年閏正月以敬暉等為刺史不見崔玄暐及暉等出實録新紀新舊列傳皆但不知何時然暉等貶為司馬時乃刺朗亳郢均四州葢於為刺史年月惟舊紀及統紀唐曆有此三人蓋玄暐先已出矣為在王同皎誅後今從之後又經遷徙矣唐曆統紀以三月王同皎為宋之遜等所告坐斬皎與張仲之等御史臺記曰同事連椒宫内敕宰相問對諸宰佯假寐無所聞獨嶠與承嘉謀誅三思為宋談所發御史大夫李承嘉御史姚紹之按問子曇知其謀將發之未果會冉祖雍李恮於路白之雍恮以竊議同皎仲之等遇族又曰張仲之等謀誅武三思宋之遜伺其便未果之遜子曇密發之敕李承嘉與紹之按於新開聞又曰張仲之宋之遜祖延慶謀於衣袖中發銅弩射三思俛佯不聞仲之延慶言諸相中有附會三思者屢與承嘉耳門内初紹之將直其事未定敕宰相對問諸相畏三思但僶則塞口反接送繫所紹之還謂仲之曰張三事不諧矣仲之言復説誘紹之事乃变遂密置人力十餘命引仲之對問至紹之反賊我臂且折矣已輸你當訴尔於天曹乃自誣反而固言三思反狀紹之命撾之而臂折仲之大呼天者六七謂遂亡歸王同皎匿之於小房皎慷慨之士也忿逆韋與武三遇族朝野僉載曰初之遜諂附張易之兄弟出爲兖州司倉姪曇上書告之以希逆韋之旨武三思等果大怒奏誅同皎思乱國與一二所親論之毎至切齒之遜於簾下竊聽之遣天靈駕發引因刼殺三思李悛等知而告三思三思因言同之黨實録同皎與周憬等潜謀誅三思乃招集將士期以則於友人宋人問人問偽應之祖雍之遜亦預其謀既而背之李悛皎等謀反竟坐斬唐曆統紀亦與實録畧同而云仲之誤泄州參軍未幾逃還匿於張仲之家仲之與同皎等謀殺武三之問甥也命以告三思因言同皎謀反舊傳云之問左遷瀧臚主簿按三思得幸於中宗韋后權傾天下同皎等若擅自思之問令兄子發其事以自贖及同皎等獲罪起之問爲鴻中發銅弩此則殆同兒戲蓋忿疾三思或與仲之憬等有欲殺之豈得晏然無事茍無脅君之志豈得輕爲此謀又云袖謀於靈駕發引日刼殺三思因廢皇后謀反耳今從僉載殺之言而之遜等以告三思三思因教曇等誣告同皎云四月韋月將流嶺南平曉斬之有敕捨之而不及統紀朝野僉載曰周仁軌過秋分一日按此年七月殺敬暉等若在後徐堅表不得云朱夏在辰思月將死附於此年本唐紀在二月舊傳唐曆皆在五王死後今約其事附於此月貞不得云發生之月也六月貶敬暉等為司馬云三思令宣州司功鄭愔誣柬唐曆統紀皆於王同皎誅後即若於時已告云謀反則豈應猶得刺史又云告柬之等而柬之等與王同皎謀反又貶玄暐等四人為僻逺州刺史按愔貶今從實録之豈得獨不周仁軌討􅑔承基斬之之後后父韋玄貞與妻女等並流朝野僉載曰韋氏遭則天廢廬陵並奪去及孝和即位皇后當途廣州都督周仁軌將兵誅甯嶺南被首領甯氏大族逼奪其女不伏遂殺貞夫妻七娘等并州長史後阿韋作逆軌以黨與誅今從實録參取諸書氏走入南海軌追之殺掠並盡韋后隔簾拜以父事之用為七月長流敬暉於瓊州作嘉州舊傳作崖州今從統紀新傳實録初云嘉州後云崖州新本紀十二月安樂公主請為皇太女廢皇太子而立己為皇統紀云安樂公主私請既無罪豈得輙有動揺欲以公主為皇太女駙馬復若為名太女帝以問魏元忠元忠曰皇太子國之儲君生人之本今忠山東木強田舍漢豈足與論國家權宜盛事儀注好惡阿母號天下必甚怪愕恐非公主自安之道公主知之乃奏曰元愚豈不知立皇太女為不可何必待元忠之言今從舊傳子尚自為天子況兒是公主作皇太女有何不可按中宗雖景龍元年二月丙戌復武氏崇恩廟遣武攸暨武三思舊本紀正月己巳按長曆正月庚子朔無己巳二月庚午朔無甲午今從實録往乾陵祈雨于則天皇后新本紀甲午襃德榮先陵置令丞七月辛丑太子重俊舉兵叩閤索上官婕好庚子今舊紀作亦云求韋庻人及安樂公主所在今從舊后妃傳從實録實録云斬關而入索韋氏所在舊重俊傳八月相王被譛呉兢上疏疏云陛下登極于今四稔則是實録載此事於今年八月而兢今年而實録因載兢疏耳明年所上也蓋至忠所對在丙戌魏元忠致仕九月今從舊本紀實録元忠致仕在九月韋巨源紀處訥並為侍中行吏部尚書按二年瓌請新表九月辛亥蘇瓌罷為明請皇后亞獻於時皆為侍中表云今年罷誤也察正員官殿負者擇員外官代之三年面折祝欽二年七月安樂公主作定昆池延袤數里九里直抵南新傳云四十之今從舊傳山蓋并土田言十一月突騎施將闕啜忠節節突厥傳止謂之闕啜忠節郭元振傳作阿史那闕啜忠有五啜其一曰胡禄居闕啜或者忠節官為闕啜歟今從突文館記謂之阿史那忠節元振疏皆云忠節乃其名也突厥傳厥娑葛擒忠節殺馮嘉賔吕守素中丞神龍中起復持御史臺記云嘉賔為石請紹封為可汗楚客憾之既用事時議云委嘉賔與侍御節甘涼時郭元振都督涼州奏中書令宗楚客受娑葛金兩函中敕云元振父亡匿不發䘮至是為發之仍按其不臣之史吕守素按元振元振切知之乃諷蕃落害嘉賔于驛中獲敕具以聞今從舊傳狀便誅之元振以為偽己卯安樂公主適武延秀庚辰赦卯大赦今從景龍文實録新舊紀皆云己之明日館記成礼復以郭元振代周以悌振代以悌元振奏稱西土未寧逗元載玄宗實録舊傳皆云復以元留居西邊矣何所逗遛今從新傳遛不敢㱕京師按既代以悌則復三年二月上觀宫女拔河大酺今從實録唐紀云觀宫女崔琬彈宗楚客仗彈大斈士兵部尚書郢國公宗楚客及景龍文館記曰監察御史崔琬具衣冠對結謀臣臣先奏聞計垂天鑒上頷之謂琬曰楚客事朕知且侍中紀處訥時楚客在列奏言臣以庸妄叨居樞密中外朋下奏無狀有進止即令復位初娑葛父子與阿史那忠節代去待仗下來至仗下後琬方續奏敕令於西省對問中書門其奏宗楚客固執言忠節竭誠於國作扞玉䦕若許娑葛除為仇讎娑葛頻乞國家為除忠節安西都護郭元振表請如丞馮嘉賔殿中侍御史吕守素破滅忠節侵擾四鎮時碎葉之恐非威彊拯弱之義上由是不許無何娑葛擅殺御史中及于闐部衆數萬口奏到上大恱拜以悌左屯衛將軍仍以鎮守使中郎周以悌率鎮兵數百人大破之奪其所侵忠節及郭䖍瓘北討仍邀吐蕃及西域諸部計會同擊娑葛右臺元振四鎮經略使授之敕書簿責元振宗議發勁卒令以悌付元振狀稱宗先取忠節金上以問之宗具以前事奏時太御史大夫解琬議稱不可後竟與之和娑葛聞前議大怨乃宰臣皆分為兩時太平尤與宗不善故諷琬以彈之外傳取平安樂二公主以親貴權寵各立黨與陰相傾奪爰自要官今從實録記娑葛金非也三月韋嗣立為中書侍郎同三品尚書今從實録新表云守兵部十一月吐蕃遣尚贊咄來逆金城公主臣尚贊吐等來逆實録乙亥吐蕃大藏以下來迎金城公主譯者云贊咄猶此左僕射欽藏猶此女文館記云吐蕃使其大首領瑟瑟告身贊咄金告身尚欽吐也今從文館記侍中蓋贊咄即贊十二月壬辰唐休璟同三品戌今從實録舊紀誤作壬睿宗景雲元年四月乙未中宗幸隆慶池以為其月十景龍文館記午朔今從實録本紀二日按長曆是月壬六月韋后徴兵五萬使韋灌等分領之諸兵士二千人景龍文館記徴髙嵩分押左右營萬騎韋元巡六街實録兵五萬人韋濯作屯皇城左右衛今韋㨗韋濯押當又令韋錡押羽林軍韋播從之韋灌今宗楚客武延秀等勸韋后遵武后故事革唐命安樂舊傳孫披天裳公神皇之孫也大周之業可以再興勸延秀常衣府倉曹苻鳳説武延秀曰天下之心未忘武氏䜟云黒衣神少卿李􅞥將作少匠李守貞日夜潜圖令延秀速起事太上皂袍以應之中宗實錄云宗楚客與弟將作大匠晉卿太常同三品及三思誅附安樂而韋氏尤信任之楚客嘗謂所親皇實録云楚客神龍初為太僕卿與武三思潜謀簒逆累遷雖附韋氏志窺宸極此所謂天下之惡皆歸焉者也今所不取曰始吾在卑位尤愛宰相及居之又思太極南面一日足矣楚客逃至通化門斬之并斬其弟晉卿斬楚客于春明太上皇實録云按定陵中宗陵也於時未有今不取門外今從僉載太上録殺晉卿于定陵丁未立平王隆基為太子位後又撰睿宗實録終橋陵文劉子玄先撰太上皇實録盡傳丙午立太子今從太上皇録字頗不同睿宗録及舊紀皆云七月譙王重福改元為中元克復宗克復元年今從新傳太上皇實録云改元為中八月庚寅重福死重福反今從太上皇實録睿宗實録舊本紀皆云癸巳十月節度使之名自薛訥始延秀為河西節度使節度之統紀景雲二年四月以賀㧞度始有節度之號又云范陽節度自先天二年始除甄道一名自此始會要云景雲二年賀㧞延嗣為涼州都督充河西節已為節度大使則節度之名不始於延嗣也今從太上皇帝録新表景雲元年置河西諸軍州節度支度營田大使按訥先二年二月崔涖薛昭素請復斜封官構出後見鬼人彭君朝野僉載云宋璟畢何因奪却於是斜封皆復舊職今不取卿受斜封人賄奏云孝和怒曰我與人官五月薛謙光慕容珣奏彈僧慧範容珣奏彈西明寺僧統紀曰監察御史慕以為御史當不避豪貴見公主出居蒲州乃敢彈射在日不惠範以其通宫人張氏張即太平公主乳母也侵奪百姓上密州員外司馬今從舊傳言狀渉離間骨肉遂貶為九月庚辰竇懐貞為侍中竇懐貞為侍中太上皇實録睿宗實録云乙卯御史大夫玉眞公主邑司事舊紀己卯懷貞為侍中新紀新表乙亥懐云庚辰御史大夫同中書門下三品竇懐貞為侍中知金仙故時人語曰竇僕射前為皇后國㸙今為公主邑丞非眞知貞守侍中按是月癸酉朔無乙卯又懐貞以自督修二觀之從舊紀邑司也今十月太平公主引崔湜為相皆得幸於太子時人牓之曰朝野僉載云湜妻美并二女婦於春宫今不取託庸才於主第進豐玄宗先天元年正月三品太上皇睿宗實錄舊紀皆無之新紀表壬辰以陸象先同中書門下出今不取不知新書何二月都督裴懐古節度内發三萬兵赴黒山道并州長史薛太上皇實録云命皇太子送金仙公主往并州令幽州揔管解琬節度内發二萬兵赴單于道太子既親征諸軍一訥節度内發四萬兵於汾州迎皇太子右御史大夫朔方大公主與突厥和親安用九萬兵又豈得謂之親征今不取事以上並取處分按以軍法從事它書皆無此事按太子送蕭至忠自蒲州入為刑部尚書自晉州刺史入為尚書舊傳及劉餗小説皆云皇睿宗録今從太上六月庚申孫佺與李大酺戰全軍覆没今從睿宗録上皇録云甲子太上皇兼省軍國大事録云太子既為太平公主所構或太上皇録全以為上皇之意睿宗刑獄上仍兼省之五日一受朝于太極殿今兩取之􅊨唯遣皇帝知三品以下除授及徒罪其軍國大務并重八月王琚為中書侍郎每戯遊城南韋杜之間因逐狡兎鄭綮開天傳信記云上於藩邸時生延上過其家甚貧止於村妻一驢而已上坐未久書生殺意樂忘返與其徒十數人倦甚休息於封部大樹下適有書姓名乃王琚也自是上毎遊韋杜間必過琚家琚所諮議合驢㧞䔉俻饌酒肉􅗈霈上顧而奇之及與語磊落不凡問其則殺之又何疑也上遂納琚之謀戡定禍難累拜為中書侍上意上益親善焉及韋氏專制上憂甚獨密言於琚琚曰乱焉今從舊傳郎實預配享劉幽求請誅太平公主志求左僕射兼領中書令俄而竇舊傳云幽求自謂功在朝臣之古與張暐請誅之按幽求素盡心於玄宗湜等附太平非幽求懐貞為左僕射崔湜為中書令幽求心甚不平形於言色乃之也今不取因私忿而害九月辛卯立皇子嗣昇為陜王録作甲午今從玄宗實録睿宗實録作甲申太上皇十月沙陁金山入貢姓朱邪氏始祖㧞野貞觀中為墨離薛居正五代史後唐太祖紀曰太祖庭有磧曰沙陁因以名焉永徽中以㧞野為都督其後子孫軍使太宗平薛延陁分同羅僕骨之人置沙陁都督府蓋北史記曰李氏之先蓋出於西突厥本號朱邪至其後世别目五世相承曾祖盡忠貞元中繼為沙陁府都督歐陽脩五代北庭之磧也當唐太宗時破西突厥諸部分同羅僕骨之人號曰沙陁而以朱邪為姓㧞野古為始祖其自序云沙陁者世皆為沙陁都督故其後世因自號沙陁然予考于傳記其於此磧置沙陁府而以其始祖㧞野古為都督其傳子孫數時人非其始祖而唐太宗時未嘗有沙陁府也唐太宗破西説皆非也夷狄無姓氏朱邪部族之號耳㧞野古與朱邪同微都督府㧞野古為幽陵都督府未嘗有沙陁府也當是時突厥分其諸部置十三州以同羅為龜林都督府僕骨為金僕骨㧞野古等以十數蓋其小者也又有處月處密諸部又西突厥有鐵勒薛延陁阿史那之類為最大其別部有同羅野古其明年阿史那賀魯叛至髙宗永徽二年處月朱邪孤其小者也朱邪者處月別部之號耳太宗二十二年已降㧞十年當憲宗時有朱邪盡忠及子執宜見於中國而自號沙注從賀魯戰于牢山為契苾何力所敗遂没不見後百五六之東自處月以來居此磧號沙陁突厥而夷狄無文字傳記陁以朱邪為姓矣蓋沙陁者大磧也在金莎山之陽蒲類海李氏李氏後大而夷狄之人遂以沙陁為貴種云今從之朱邪又微不足録故其後世自失其傳至盡忠孫始賜姓開元元年三月辛巳皇后親蠶月事祀先蚕詔乃三月丁玄宗實録脫此年二月三三月辛巳皇后親蚕自嗣聖光宅以來廢闕此禮至是重行卯也而唐暦承其誤云正月辛巳皇后祀先蚕太上皇録云今月十八日祀先蚕是月甲子朔今從玄宗實録太上皇睿宗實録舊本紀皆云辛卯按制書云以六月辛丑郭元振同三品從睿宗實録舊紀在丙辰今太平公主用事宰相七人五出其門出其門天子孤立而唐暦曰宰相有七四至忠岑羲崔湜與主連謀其不附主者郭元振魏知古陸象無援新舊傳皆云宰相七人五出主門下按是時竇懐貞蕭新舊傳并象先數之唐暦不數象先耳先三人也薛稷太子少保不為宰相或者七月魏知古告公主欲以四日作亂利於上與今上更立上皇録云公主謀不兵誅之按是月壬戌朔玄宗以三日甲子誅之今從玄宗録皇子獨專權期以是月七日作亂今上密知其事勒左右禁甲子誅常元楷蕭至忠岑羲等載七月三日誅常元楷玄宗實録作乙丑按僉薛王業姜皎王毛仲等並預誅逆以鐵騎至承天門時睿宗今從睿宗上皇實録唐暦新舊本紀舊王琚傳琚與岐王範召募數百人於朝堂不得入頃間琚等從玄宗至樓上太上聞鼓譟聲召郭元振升承天樓宣詔下關令侍御史任知古竇懐貞等於南衙舉兵應之今上密知其事登時勒左右禁皇實録公主期以是月七日令常元楷以羽林兵自北門入蕭至忠斬於朝堂舊蕭至忠傳曰至忠遽遁入山寺數日捕兵出北門召常元楷李慈即斬於闕下還至承天門執岑羲僉載曰羽林將軍常元楷三代告密得官至先天二年七月而伏誅蓋誤以太平公主事爲至忠事今從玄宗實録朝野宫中有變御承天門號令南衙兵士以俻非常郭元振率兵三日楷以反逆誅家口配沒玄宗實録云上誅凶逆睿宗恐陛下勿憂睿宗大喜今擇其可信者取之侍衛登樓奏曰皇帝前奉誥誅竇懐貞等惟乙丑上皇誥軍國政刑並取皇帝處分新本紀云乙丑始聽舊本紀云七月三日誅懐貞等睿宗明日下詔宗實録云丙寅今從諸書政唐暦亦無乙丑下誥唯玄太平公主賜死難作遁入山寺數日方出禁錮終身諸子新傳云三日乃出太上皇實録曰公主聞舊傳睿宗實録皆伏誅今從新十月姚元之同三品初拒太平得罪上頗德之既誅太平方世傳升平源以為吳兢所撰云姚元崇不許居無何上將獵於渭濵密召元崇會於行所初元崇聞任元崇以相逢拜同州刺史張説素不叶命趙彦昭驟彈之朝覲元崇必為權臣所擠若何參軍李景初進曰某有兒母上講武於驪山謂所親曰凖式車駕行幸三百里内刺史合公然之輙効燕公説使姜皎入曰陛下久卜十河東揔管重者其父即教坊長入内相公儻致厚賂使其冒法進狀可達曰馮翊太守姚元崇文武全材即其人也上曰此張説意也難其人臣有所得何以見賞上曰誰邪如愜有萬金之賜乃濵公至拜首上言卿頗知獵乎元崇曰臣少孤居廣成澤目卿罔上當誅皎首服萬死即詔中官追赴行在上方獵于渭備位將相無為自棄爾來折節讀書今雖官位過忝至於馳不知書唯以射獵為事四十年方遇張憬藏謂臣當以文學見卿思有顧問卿可於宰相行中行公行猶後上縱轡久之射老而猶能於是呼鷹放犬遲速稱㫖上大恱上曰朕久不陛下致仁政之初是臣千年一遇之日臣敢當弼諧之地天乃潸然良久曰此事眞可為刻肌刻骨者也公再拜曰此誠涕上曰坐公坐於燕公之下燕公讓不敢坐上問對曰元崇下幸甚天下幸甚又再拜蹈舞稱萬嵗者三從官千萬皆出不合首坐上曰可紫微宫使居首坐果如所言則元崇進不是先朝舊臣合首坐公曰張説是紫微宫使今臣是客宰相旦可邀似好事者為之依託兢名難以盡信今不取以正又當時天下之事止此十條須因事啓沃豈一元之序進郎吏官若郎中員外郎則是清要官不得云秩此出李德裕次栁氏舊聞不知郎吏為何敢必故仍用舊文卑恐是郎將又不十一月命王琚按行北邊諸軍詖自進未周年為中書侍朝野僉載曰琚以諂諛險達朝廷側目海内切齒吾嘗恐汝家墳壠無人守之琚慙懼郎其母氏聞之自洛赴京誡之曰汝徒以諂媚取容色交自取舊傳又云使琚按行天兵以北諸軍按五年始置天兵軍表請侍母上初大怒後許之按舊傳琚未甞去官侍母今不傳追言之耳於并州蓋琚十二月張説左遷相州刺史對於便殿舉右足不甚輕利松䆫雜録姚崇為相忽一日張説罪狀數百言上怒曰卿歸中書宜宣與御史中丞共按上曰卿有足疾邪崇奏曰臣有腹心之疾非足疾也因前奏呼御史中丞李林甫以前詔付之林甫語崇曰説多智謀是其事而説未之知會朱衣吏報午後三刻説乗馬先歸崇急不忍即説當無害林甫止將詔付於小御史中路以馬墜告必困之宜以劇地崇曰丞相得罪未宜太逼林甫又曰公必擒得姦狀以聞於説説怒甚將窮獄於京兆尹書生厲聲言説未遭崇奏前旬月家有教授書生通於説侍兒最寵者會靳靳於一婢女邪説奇其言而釋之兼以侍兒與歸書生跳曰覩色不能禁人之常情也公貴為宰相豈無緩急用人胡感公之恩當有謝者久矣今聞公為姚相所構外獄將具公跡去旬餘無所聞知忽一日直訪於説憂色滿面而言曰某能立釋之説因自歷指狀所寶者書生皆云未足解公之難不之知危將至矣某願得公平生所寶者用計於九公主必吾事濟矣因請説手筆數行懇以情言遂急趨出逮夜始及又凝思久之忽曰近有以雞林郡夜明簾為寄信者書生曰上獨不念在東宫時思必始終恩加於張丞相乎而今反用九公主邸第書生具以説言之兼用夜明簾為䞇且謂主曰因急命髙力士就御史臺宣前所按獄事並宜罷之書生迄快不利張丞相者之心邪明早公主上謁具為奏之上感動開元四年罷相林甫十四年始為御史中丞今從新傳亦不再見於張丞相也此説亦似出於好事者又元崇二年二月突厥可汗妹夫火㧞頡利發啜壻今從舊突厥舊郭䖍瓘傳云黙突厥傳作移湼可汗今從唐紀傳及唐曆舊䖍瓘傳作移江可汗閏月劉幽求貶睦州鍾紹京貶澤州忌之乃奏言幽求鬱幽求傳曰姚崇素嫉京之為人因奏紹京發言怨望左遷綿州刺史今從實録怏於散職兼有怨言貶授睦州刺史紹京傳曰姚崇素惡紹三月阿史那獻擒斬都檐降其部落二萬餘帳云献擒賊實録此月録此月又云以西域二萬餘帳内附六月云擒其部落五萬帥都檐六月梟都檐首蓋此月奏擒之六月傳首方至耳實家好虛聲今從其少者餘帳新傳云三萬帳蓋兵趙彦昭貶袁州别駕之為人今從玄宗實録彦昭傳曰姚崇素惡彦昭五月魏知古罷為工部尚書顧問恩意甚厚尋改紫微令舊知古傳二年還京上屢有云由黄門監改紫微令今據實録知古自黄門監罷政事其姚崇深忌憚之陰加讒毁乃除工部尚書罷知政事新傳亦栁氏舊聞所以罷從六月申王成義兼豳州刺史今從唐曆舊紀實録舊傳作幽州七月薛訥將兵六萬八萬人皆没今從唐紀舊傳云兵二萬僉載云乙卯以岐王等為刺史辰朔實録自此以下脱少今取唐實録云八月乙夘據長曆八月丙紀補之曆舊本十月吐蕃請和不許自是連嵗犯邊丑吐蕃以去年之唐曆四年七月丁子忿之按自此至四年非去年也既云以敗請和又何得云敗遣其大臣宋俄因矛𣢾塞請和自恃兵僵求敵國之禮天年八月已許其和今從舊傳自恃兵彊既云天子忿之又當十二月立皇子嗣眞為郯王後作郯王今從舊傳實録於此作鄫王於黙啜虜突騎施可汗守忠娑葛既為十四姓可汗自後無舊傳以為景龍三年事按實録景雲以後守忠猶在又開元二年六月阿史那献奏有龍見娑葛名但屢云突騎施守忠入朝或者守忠即娑葛賜名邪八年後自滅然則娑葛於時尚在也竟不知死於何年故附此于北庭為鎮將妻馮之言曰突騎施娑葛三年後破散黙啜三年正月突厥十姓降者萬餘帳葛邏禄車鼻施失鉢實錄二年九月壬子千三十一人來降十月庚辰胡禄屋二萬帳詣北庭内屬明羅俟斤等十二人詣涼州内屬乙卯胡禄屋闕及首領等一部落左廂五咄陸啜右廂五弩失畢俟斤等相継内屬前後年正月突厥葛邏禄下首領裴邏達千來降二月突厥十姓匐忌四月三姓葛邏禄率衆㱕國五月詔葛邏禄胡屋䑕尼二千餘帳三月突厥支副忌等來朝詔曰胡禄屋大首領之西都護吕休璟與䑕尼施相應又云及新來十姓大首領計施等又云宜令北庭都護湯嘉惠與葛邏禄胡屋等相應安傳前云胡禄屋後云胡屋按十姓有胡祿居闕啜䑕尼施處會掎角唐曆九月云胡禄屋闕啜十月云胡禄屋二萬帳新必矣然胡禄屋以二萬帳而云十姓内屬前後二千餘帳參半啜諸書名號雖各參差要之葛邏胡祿屋䑕尼施為三姓從舊傳差難據今五月姚崇奏遣御史捕蝗奏請捕瘞按本紀三年六月山舊傳開元四年山東蝗大起崇瘞從之是嵗田收有獲人不甚飢四年又云是夏山東河南東諸州大蝗姚崇奏請差御史下諸道促官吏遣人驅撲焚間者河南河北災蝗水潦明年正月辛未以右丞倪若水為河北蝗蟲大起遣使分捕而瘞之又實錄今年十一月制以遏信蟲成長看食田苗不恤人災自為身計向若信其拘忌汴州刺史五月敕曰今年蝗暴乃是孳生所由官司不早除蝗崇令討捕不能盡明年又有蝗也今從本紀不有指麾則山東之苗掃地俱盡然則三年有十二月或上言按察使煩擾知伯何人也今去其名開元宰臣奏云李伯等不四年五月試縣令以理人策盧從愿李朝隐左遷濟韋令一時於殿庭策試考入下第者一切放歸學問唐曆試在傳云問安人策一道今從唐曆盧從愿傳曰上盡召新授縣其人貶今從唐曆又韋濟傳曰時有人密奏上曰今嵗吏部四月從愿李朝隠貶在五月朝隠傳云四年春以授縣令非安人策試者一百餘人獨濟策第一或有不書紙者擢濟為醴選敘大濫縣令非材全不簡擇及縣令謝官日引入殿庭問五人放歸習讀今亦從唐曆泉令二十餘人還舊官四十六月癸亥上皇崩宗一七齋度萬安公主為女道士今從舊睿宗玄宗實錄皆作甲子按下云己巳睿唐紀本紀黙啜破㧞曵固於獨樂水頡質略斬之歸其首於大武軍子將郝靈荃引特勒回紇部落斬默啜于毒樂河今從唐曆作勃曵固今從實錄唐暦又云靈荃癸酉斬黙啜唐暦亦在六月玄宗實録七月戊寅詔書與降舊傳舊傳云入蕃使郝靈儉今從廣暦又新舊紀皆云六月捉獲黙啜者已立賞格蓋未奏到耳附突厥云乗其衰弱早就翦除其能十一月盧懐愼薨部尚書卧病既久宋璟盧從愿相與訪鄭處誨明皇雜録云懐愼為黄門監吏治甚切然享國嵗久近者稍倦于勤必有人乗此而進矣君焉懐愼常器重二人持一人手謂曰公出入為藩輔主上求歸從愿未嘗入相又四年未為享國嵗久今不取其志之按懐愼初為吏部時璟貶睦州及卒璟猶未杖趙誨流嶺南因諸王内宴姚元崇諷之曰倪舍人正直朝野僉載紫微舍人倪若水贓至八百貫無所問主書趙誨受蕃餉一刀子或直六七百錢元崇宣敕百司嫉之欲成事何不為上言之諸王入衆共救之遂釋一趙誨一百不死夜遣給使縊殺之㔡蓋批字也今從舊傳處死後有降崇乃㔡曰别敕處死者決一百配流大理決五年正月幸東都欲免河南尹及知頓使官宋璟諌寧之崤谷馳道隘狹車騎停擁河南尹李朝隠知頓使王怡實錄此年五月乙巳以李朝隠為河南尹宋璟傳云上次永人非朝隠耳又明皇雜錄曰上幸東都至繡嶺宫當時炎酷失於部伍上令黜其官爵二傳相違蓋當時河南尹不知何云六軍填委於其中不可速行上謂髙力士曰姚崇多計弟上以行宫狹隘謂左右曰此有佛寺乎吾將避暑於廣厦或上悅曰吾得之矣遽命小駟而頓銷煩溽乃歎曰小事尚如往覘之力士回奏曰姚崇方縝絺綌乗小駟按轡於木陰下月東幸二月至東都未炎暑也今不取此觸類而長之天下固受其惠矣按正十月蘇獻頲之從祖兄叔今從舊志新表唐曆曰献頲之再從十一月丙申契丹王李失活入朝申十月晦也與實錄差長暦十一月丁酉朔丙亥契丹李失活來朝今從實錄一日舊紀唐曆皆云十一月己十二月桑泉尉韋述從韋述集賢注記舊傳為櫟陽尉今六年二月以㧞曵固等五都督為討擊使皆受天兵軍節度道揔管處木昆執米啜堅昆都督骨篤禄毗伽契實錄壬辰制大舉擊突厥五都督及㧞悉密金山逾輸等夷夏之師凡三十萬並取朔方道行軍大揔管王晙丹都督李失活奚都督李大酺及黙啜之子右賢王黙特勒荅詔而二月伐之恐無此事舊紀及王晙突厥傳皆無此月節度而於後俱不見出師勝敗按此年正月突厥請和帝有俄下詔伐之以王晙統之期以八年並集稽落水上行兵貴出兵事新突厥傳云黙棘連遣使請和帝以不情荅而不許蓋取實錄附會舊傳耳密不應前二年半先下詔三月徵處士盧鴻中岳眞人劉君碑云盧鴻撰今從之舊傳作盧鴻一本紀新傳皆作鴻按七年三月大祚榮卒吳思謙攝鴻臚卿充使弔祭按此月實錄六月丁卯祚榮卒遣左監門率月方遣思謙弔祭耳丙辰巳云祚榮卒蓋六八年正月丙辰禇無量卒元服壬申右散騎常侍禇無量舊本紀正月甲子朔皇太子加也唐曆亦云壬申無量卒今從實錄卒按長曆正月甲寅朔甲子十一日辛巳宋璟蘇頲罷己卯按是月無辛卯今從實錄唐曆云二十八日辛卯舊紀云六月瀍榖漲溢漂溺幾二千人舊紀云漂没九百餘戸溺實錄云漂居人四百餘家一百餘人今從舊紀人數死八百餘人掌閑溺死者千十一月突厥冦甘涼等州厥傳云八年冬御史大夫王晙唐暦突厥冦涼州在九月舊突年秋初引朔方兵數道俱入掩突厥衙帳於稽落河上按王為朔方大揔管奏請西徴㧞悉密東發奚契丹兩蕃期以明督今從實録舊紀晙此月為幽州都九年四月康待賔反陷六胡州命王晙討平之斬于都市實録四月庚寅康待賔反護安慕容以叛七月己酉王晙擒康待賔至京師腰斬之前五月丁巳既誅康待賔下詔云云壬寅叛胡康待賔偽稱葉違今從舊紀後重複交錯相九月張説同三品仲毛仲巡邊説於天兵軍大設酒殽恩朝野僉載曰説為并州刺史諂事王毛謝訖便抱毛仲起舞鳴其靴鼻今不取敇忽降授兵部尚書同中書門下二品十一月元行沖上羣書四録今從唐曆統紀舊紀集賢注記在九年春資治通鑑考異卷第十二
