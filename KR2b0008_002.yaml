body:
  text: 臣司馬光奉勑編集漢紀中哀帝建平元年正月解光奏趙昭儀殺成帝子皆在四月丙辰赦令前位赦天下蓋傳誤也或者即位十日然趙后傳作丙辰按哀帝紀四月丙午即也後赦丁酉傳喜為大司馬丹為大司馬四月徙建平元年四公卿表綏和二年十一月庚午師而拜喜為大司馬荀紀亦在正月按長曆此年四月癸亥朔月丁酉傳喜為大司馬喜傳云明年正月徙師丹為大司空喜傳漢紀無丁酉今從二年四月戊午朱博為御史大夫乙亥丞相孔光免博爲丞相月戊午博爲御史大夫乙亥遷五行志四月乙公卿表四月乙未孔光免朱博為丞相又曰四巳朔無乙未十九日乙亥非朔也表志皆有誤亥朔博爲丞相荀紀乙亥孔光免按長曆是月丁三年正月癸卯桂宫正殿火紀云桂宫正殿火今從哀紀五行志云桂宫鴻寜殿災荀四年二月癸卯封傳商為汝昌矦皆云商以今年二哀紀及恩澤侯表按建平二年巳罷大司空官疑傳誤月封而孫寶傳云制詔丞相大司空元壽元年正月辛丑朔卯朔誤荀紀云辛十二月王閎諌上云欲禪董賢得復侍宴自歸郎署以董賢傳但云遣閎出不之又云閎歸郎署二十日長樂宫深爲閎謝又御史大夫彭下皆漢紀所載也荀紀無漢書外事不知此語荀恱何從得按太皇太后居長信宫云長樂宫誤也宣上封事言國安危繼嗣事上覺寤召閎八月廢孝成皇后孝哀皇后為庶人是日皆自殺春漢未知胡旦所据秋云八月甲寅十月壬寅葬孝哀皇帝於義陵陵按長曆是月辛酉朔哀紀云九月壬寅葬義日按帝以六月戊午崩然則葬在十月審矣蓋本紀月談也無壬寅壬寅乃十月十二日又臣瓉注曰自崩至葬凡百五平帝元始元年二月丙辰襃賞孔光王舜等正月事平紀作云二月丙辰今從之而王子侯表公卿表皆封宣帝耳孫信等三十六人為列矦孝宣曽孫信等三平紀元始元年封皆以元年二月丙辰封莽傳誤也十六人莽傳在五年按王子矦表四年二月丁未立皇后王氏二月丁未立皇后王氏下云王莽傳云四月丁未平紀云后於安漢公第然則言四月者誤也夏皇后見于髙廟外戚傳云明年春迎皇冬置西海郡明年秋今從平紀王莽傳置西海郡在五年閏五月丁酉封劉秀等為列矦十一矦皆云丁酉恩澤矦表劉歆等是年閏五月甲午朔無丁丑表誤獨平晏云丁丑按十二人同功俱封泠襃叚猶等徙合浦功臣表建平四年董宏已死元壽二師丹傳云復免髙昌侯宏為庶人按不得至今丹傳誤也年子武坐父為佞邪免封師丹為義陽矦義陽矦胡旦因此并發傳太后陵徙伶恩澤矦表丹元始三年二月癸巳更為丁姬冡攺葬之馬宫傳莽發傅太后陵追誅前議者宫慙懼襃等事俱著之三年按外戚傳云元始五年莽發共王母及及丹封矦皆在今年明矣按長曆二月丙申朔無癸巳日月乃乞骸骨公卿表宫以今年八月壬午免然則襃等徙合浦誤者必有王莽始初元年宋庠紀年通譜皆作始𥘉今從之莽傳作𥘉始荀紀及韋莊美嘉號録始建國元年正月漢諸矦王皆降爵為公王子矦者降爵為子後皆奪爵年廢王子矦表但云絶或云免皆諸矦王表皆云莽簒位貶為公明五等之差亦不云奪爵也後漢城陽王祉傳云劉氏矦者皆在今年按明年立國將軍建奏諸劉為諸矦者以戸多少就不知奪在幾年降為子後奪爵二年匈奴號良帶曰烏賁都尉域傳云烏賁都尉今從之匈奴傳云烏桓都將軍西率禮侯劉嘉矦劉嘉未知其攺封或别一人也今從莽傳燕王旦傳廣陽王嘉封扶美矦莽傳云率禮四年牂柯大尹周歆傳作周歆今從之西南夷傳作周欽莽天鳳元年攺作貨布在地皇元年蓋以大錢盡之年至地食貨志攺作貨布在天鳯元年莽傳非其年始作貨布也皇元年乃絶不行耳淮陽王更始元年張卬拔劔擊地印袁宏後漢紀作斤司馬彪續漢書卬作曄後漢書皆誤今從范安定大尹王向作太守王向今從范書王莽傳作卒正王旬袁紀前鍾武矦劉望從范書劉玄傳王莽傳作劉聖今國將哀章今從班范書袁紀作襃章二年邳肜曰邯鄲勢成民不肯背成主而千里送公和城民不肯捐棄和城而千里送公漢春秋作邯鄲之民不范書邳彤傳邯鄲成民不肯背成主字皆作城袁紀作邯鄲謂邯鄲勢成也成主謂三郎為已成之主也能捐父母背成主按文意城皆當作成邯鄲成刁子都劉攽曰力當作刁音彫范書作力子都同編修大司馬曰何意二郡良為吾來來今從景丹傳袁紀作良牧為吾宛人朱祜帝諱許愼說文祜字無解云上諱然則祜名當從范書袁紀朱祜皆作祐按東觀記祜皆作福避安當作左右之右也示旁古今之古不拜宼恂河内太守至是又云更始武隂王李軼據洛陽尚袁紀鄧禹𥘉見王於鄴即言欲據河内曰卿言吾之有河内猶高祖之有關中關中非蕭何誰能使書謝躬據鄴各十餘萬衆王患焉將取河内以迫之謂鄧禹蕭何禹曰宼恂才兼文武有御衆才非恂莫可安河内也按一方晏然高祖無西顧之憂吳漢之能卿舉之矣復為言舉中非本心造謀即欲指取河内也今依范書為定丗祖旣貳更始先得河内魏郡因欲守之以比關丗祖建武元年六月己未即皇帝位蘇茂諸將上尊號光武本紀馮異破亂赤眉臨郊王矦搆難大臣乖離綱紀已絶又勸光武稱尊光武還至薊皆在四月前而馮異傳異與李軼書云長安壊月甲子鄧禹破王匡等於安邑王匡張卬等還奔長安乃謀號亦曰三王反叛更始敗亡按是年六月己末光武即位是後夏秋之交馮異安得於四月之前已言之也或者史家潤以立秋貙膢時共劫更始然則三王反叛應在光武即位之此差㸦耳色其言致王匡等奔還長安奔還長安鄧禹傳無張卬名今從之劉玄傳王匡張卬守河東為鄧禹所破張卬等說更始掠長安東歸不從謀劫更始申屠建袁紀云應建等謀劫之今從范書等勸更始讓帝位更始不十月鄧禹引軍至栒邑赤眉爭鋒按丗祖賜禹書責其不袁紀禹曰璽書每至輒曰無與窮禹還乃曰毋與窮宼争鋒袁紀誤也攻長安不容有此語二年十一月詔徵十一月隗囂擊破馮愔在二年盖愔以元年冬末叛延及鄧禹傳愔叛在建武元年隗囂傳在二年也二年囂拜官二年正月起高廟于洛陽甲子朔不應有壬子誤帝紀正月壬子按正月二月鮑永馮衍降帝謂永曰我攻懐三日而兵不下關東鮑永傳稱永等降於河内時攻懷未拔乃說更始河内太守於是開城而降按光武未都洛陽以前畏服卿可且將故人自往城下譬之即拜永諫議大夫至懐亦無攻懐一節按田邑書稱主亡一歳莫知定所則永衍之屢幸懐又祠高祖於懐宫並無更始河内太守據懐事本紀然則永衍實降於脩武脩武亦河内縣也其稱降懐等事當降必在此年而帝紀光武此年不曽幸河内但有幸脩武事皆略之是史誤故九月鄧禹斬李寶嘉相此蓋别一人同姓名更始柱功矦李寳時為劉三年三月朱浮遁走城降彭寵浮敗亂幽州搆成寵罪朱浮傳尚書令矦霸奏霸明年乃為尚書令盖追劾之徒勞軍師不能死節罪當伏誅按四年七月丁亥幸譙譙今從范書袁紀六月幸馮異破李育程焉三年馮異擊鮪育於陳倉大敗之按本公孫述傳使李育程烏與吕鮪徇三輔亦在今年蓋述傳誤以四年為三年焉作烏耳紀四年馮異與述將程焉戰陳倉破之馮異傳五年正月使來歙送馬援歸隴右國遊先俱奉使遊先袁紀曰援與拒蜀矦恨與援俱還長安按囂使被殺者周遊也不在此時至長安為仇家所殺其弟為囂雲旗將軍來歙恐其怨三月龐萌襲破蓋延破之詔書勞延曰龐萌一夜反畔相東觀記續漢書皆云萌攻延延與戰之節吾甚美之延傳言僅而得免與彼不同今從延傳去不逺營壁不堅殆令人齒欲相擊而將軍有不可動楚郡太守孫萌萌今從范書袁紀作楚相孫十月張歩大將軍費邑邑今從耿弇傳袁紀作濟南王費六年春申屠剛自隗囂所來囂巳臣公孫述必不用詔本傳云七年徵剛按明年此年書當在七年八月隗囂侵安定馮異拒之囂别將攻祭遵六年帝紀隴為隗囂所敗乃詔異軍栒邑未及至囂乗勝使王元行廵冬隗囂將行巡㓂扶風馮異拒破之馮異傳六年夏諸將上遵亦破王元於汧隗囂傳侵三輔事亦同按此文勢縁諸將將二萬人下隴分遣廵取栒邑異即先據栒邑破巡又云祭栒邑也然則馮異祭遵之破王元行廵實在六年明矣至十才敗還隗囂即遣二將追之故得云乗勝又云馮異未及至所書秋囂侵安定至隂槃馮異拒之又令别將攻祭遵於汧年八月紀又有隗囂㓂安定馮異祭遵擊却之此即隗囂傳亦云數挫隗囂也而袁紀不載六年事併在七年秋紀之且兵並無利者也據此是囂兩歳各甞攻馮異祭遵矣故遵傳異何縁稽緩爾乆不至栒邑故知袁紀誤矣傳云囂乗勝若事巳一年安可云乗勝又馮八年十二月温序伏劒而死羗校尉檢西羗傳九年方置按序傳及袁紀皆稱序為護則序無縁作護羗今但云校尉此官牛邯爲之又云邯卒職省十一年三月己酉幸南陽還宫上有二月己卯袁紀三帝紀己酉幸南陽庚午車駕酉庚午皆在三月蓋帝紀己酉上脫三月字今從袁紀月己酉幸南陽以長曆考之二月壬申朔己卯八日也己十二年任延曰忠臣不和和臣不忠私臣不忠按髙峻延傳作忠臣不私思爲長又與上語相應今從之小史作忠臣不和和臣不忠意十七年二月乙未晦日有食之長曆三月丙申朔帝紀誤帝紀乙亥晦袁紀乙未據十九年四月馬援擊都陽等嶠南悉平紀作都陽今從援傳作都羊帝因擊都陽等降之援傳十七年拜伏波將軍討側貳十八年紀又帝紀十八年四月遣援擊交趾十九年四月斬側貳等及傳側貳首至雒之時也沈懐逺南越志云徵側奔入金溪春軍至浪泊明年正月斬側貳盖紀之所書者援奏破側貳援傳近是今從之穴中二年乃得之二十一年八月伏波將軍馬援築堡塞擊烏桓昭劉誤也帝紀冬十月遣援出塞擊烏桓援傳十二月出屯襄國注補後漢書志亦謂之續漢志其郡國志注云中郎將馬援紀在八月祭肜事前今從之明年秋將三千騎出髙柳袁二十二年匈奴單于蒲奴求和親遣李茂報命是歳帝紀比遣使詣西河内附然則茂所報者非比也今從南匈奴傳匈奴日逐王比遣使詣漁陽請和親使茂報命按明年又有二十五年烏桓内屬紀是歳烏桓朝貢内屬蓋始獨大帝紀今春旣著烏桓來朝歳末又種族内属耳人來朝後乃率二十六年秋賜南單于璽綬綬置使匈奴中郎將據匈帝紀今年春使叚郴賜璽時或者今春置之至是更為之約束制度耳奴傳賜璽綬在秋其置中郎將亦未知决在何二十七年樊宏薨密今從范書袁紀宏皆作三十年十一月賈復薨年今從袁紀本傳在三十一中元元年四月攺元中元元年紀年通譜云据紀志俱出續漢志云以建武三十二年為建武於精審但見攺元復有建武二字輙以意刪去斯為謬矣梁范氏而所載不同此必傳冩脫誤今官書累經校定學者失是亦憲章於此今從袁紀范書武帝大同大通之號俱有中字顯宗永平二年十月賜桓榮爵關内矦上言李躬而帝紀載詔文詔獨言桓榮不及李躬今闕疑下獨封榮似脫躬字榮傳袁紀十四年春周澤行司徒事復為太常十二年不闕司徒澤傳云十二年按澤行司徒事爾故云數月當是虞延免後邢穆未至間寋㓪袁紀作寋按今有寋姓音件與袁紀合今從之范書作寒陸龜蒙離合詩云𥘉寒㓪詠徘徊立十六年呉棠下獄免常今從范書袁紀棠皆作十七年正月謁原陵降甘露於陵樹陵皇后紀云謁原帝紀云甘露降甘原陵也帝紀誤以原為甘陵甘露降於樹然則實降班超立䟽勒故王兄子忠為王得兄榆勒立之更名忠袁紀云求索故王近屬勒立之更名忠今從超傳續漢書云求得故王兄子榆陳睦為西域都護今從范書袁紀睦作穆柳中城今從范書袁紀作折中十八年酒泉太守叚彭彭今從帝紀耿恭傳云秦肅宗建初三年春馬防大破羌於布橋四月盖春破而帝紀防破羌在也今從防傳京師四月始聞四年四月癸卯封馬廖等為矦願就闗内矦太后聞之皇后紀稱廖等並辭譲而史家文勢反似太后欲令廖等受封今輒移廖等辭讓於云云廖等不得已受封爵按太后之辭皆不欲封廖等之意有序讀者易解太后語下使文勢七年十二月東平獻王今從袁紀范書作憲元和元年襃寵毛義鄭均中今從均傳義傳云建初二年太初曆失天益逺作四分歷用三統歷今云太𥘉按王莽𥘉已廢太𥘉自太初元年始用三統歷按三統歷劉歆所造云太𥘉元年歷失天益逺盖光武中興廢莽歷復用太𥘉也續漢志又云誤也始用三年四月鄭弘上書言竇憲孫王遣子入侍上問弘當袁紀云弘為尚書僕射烏救之尚未賞今如答之小單于不當怨乎上以弘議問侍中荅其使不弘對曰烏孫前為大單于所攻陛下使小單于往單于忿恚攻金城郡殺太守任昌上謂弘曰朕前不從君議竇憲對曰禮有徃來弘章句諸生不逹國體上遂荅烏孫小陛下前何為用其議按肅宗時無小單于宼金城事今不取果如此弘對曰竇憲姦臣也有少正卯之行未𬒳兩觀之誅章和二年正月何敞奏記宋由竇氏專政外戚奢侈賞賜敞傳此事在肅宗崩後云云明公視事出入再朞又言臘賜知在此時過制敞奏記云云袁紀在元和三年按敞記七月南單于請伐北虜求出兵破北成南宗意諌不聴師袁紀章和元年十月南單于上書單于書云孝章皇帝聖思逺慮則范書是也今從之未出而帝寢疾范書南匈奴傳事並在此年七月按都郷矦暢今從范書袁紀作郁郷冬鄧訓破迷唐尉鄧訓傳章和二年紆誘誅羌羌謀報怨西羌傳永元元年張紆坐徴以訓代為校傳下云永元二年則其春者永元元年春也今從訓傳公卿舉訓代紆擊破之其春迷唐復欲歸訓又破之按訓和帝永元二年五月副校尉閻礱槃今從帝紀西域傳作閻三年十二月竇憲請立於除鞬為單于宋由等以為可許袁安獨上封事上竟從憲策鹿蠡王阿佟為北單袁安傳云憲請立左除鞬是二人袁紀作阿脩南匈奴傳止有右谷蠡王於除鞬于安以為不可憲竟立右鹿蠡王於除鞬據此則阿佟與於之子又與烏丸鮮卑為父兄之讎不可立南單于先帝所置無阿佟名今從之袁紀又云宋由丁鴻尹睦以為阿脩誅君書不同又云卒從安議蓋誤今從袁安傳今首破北虜新建大功宜令并領降衆與范六年正月骨都矦喜殺南單于安國今從南匈奴傳帝紀在去年誤七月班超斬尉犂王汎今從超傳袁紀汎作況九年閏八月樊調妻嫕從皇后紀梁竦傳袁紀嫕皆作憑今越騎校尉趙丗代今從帝紀西羗傳作趙十四年八月班超至洛陽九月卒十四年至洛陽而妺昭本傳稱超十二年上䟽雀師子超遣子勇隨入塞按帝紀十三年安息國入貢袁紀上書曰延頸踰望三年於今注引東觀記曰安息遣使獻大此袁紀又云超到數月薨今從本傳載超書亦在十三年今并置其書於安帝永初元年三月甲申葬淸河孝王司空宗正護喪事軍護葬今從傳帝紀書車騎將封鄧閶為列矦後作闓盖誤袁紀前作閶十二月詔鄧騭任尚屯漢陽今從西羌傳帝紀在六月三年六月烏桓宼代郡上谷無之今從傳紀有涿郡傳四年鄧騭欲弃凉州虞詡言於張禹以為不可虞詡龐參未以喪罷以前明矣而虞詡傳中言詡辟太尉李脩府為郎傳皆云四年羌轉盛故有弃涼州之畫又于說鄧騭則是騭春匈奴宼常山下載騭欲弃凉州詡說太尉張禹又其語言中說李脩脩以五年正月方自光禄勲拜太尉按袁紀四年近得實今從之小異於范書此五年三月詔隴西徙襄武徙襄武紀傳皆然或者二郡皆上云金城徙襄武此又云隴西襄武歟寄治於元𥘉元年二月乙卯日南地坼三月癸亥日食二月帝紀日南地坼按長曆是年二月壬辰朔無己卯三月壬戌朔癸己卯日南地坼三月癸酉日食本志及袁紀皆云三月己卯當是乙卯三月當是癸亥酉十二日不應日食二月十月涼州刺史皮楊從西羌傳紀作皮陽今二年八月詔班雄屯三輔西羌傳司馬鈞龐參抵罪後尚帝紀冬十月遣任尚屯三輔按三輔耳乃代雄屯右扶風仲光守种暠今從范書袁紀作右扶風太十月龐參梁慬下獄馬融上書明年安定北地上郡皆慬傳曰慬為度遼將軍遣南單于兄子優孤塗奴將兵迎之旣還慬以塗奴接其家𬒳羌宼不能自立詔慬發邊兵迎三郡吏民徙扶風界慬即馬融上書訟慬與參按慬為度遼將軍在永𥘉四年徙三郡屬有勞輒授以羌矦印綬坐專擅徴下獄抵罪明年校書郎得云明年融訟之也疑傳誤民在五年參下獄在今年不以虞詡爲武都太守之略遷武都太守又曰賊敗散南入詡傳曰羌㓂武都太后以詡有將帥為武都太守也然按西羗傳龐參抵罪後任尚屯三輔時詡益州本紀元𥘉元年羌宼武都漢中據此似詡以元𥘉元年言又云上問何從發此計尚表之受於懐令虞詡由是知名猶爲懐令說尚用騎兵袁紀亦云懐令虞詡說尚如范書所當在龐參抵罪後也遷武都太守以此驗之四年四月己巳鮮卑連休等入宼休下作休連今從上文范書鮮卑傳上作連十二月大牛種封離等反年叛今從帝紀西南夷傳云五五年八月代郡鮮卑入宼殺長吏卑數百餘騎宼漁陽獨行傳云元𥘉中鮮授慮有伏兵苦諌止不聽顯䠞令進授不獲巳前戰伏兵發太守張顯率吏士追出塞遥望虜營烟火急趣之兵馬掾嚴衞福功曹徐咸遽趣之顯遂墮馬福以身擁蔽虜并殺之朝授身𬒳十創殁於陣顯拔刄追散兵不能制虜射中顯主簿犯漁陽殺長吏惟是入代郡曾殺長吏今疑此漁陽本是代廷愍授等節詔書襃歎厚加賞賜按元𥘉凡六年鮮卑不曽誤也郡史之永寜元年春北匈奴車師共攻殺後部司馬元𥘉六班勇傳班按本紀永寜元年車師後王叛殺部司馬車師傳亦曰永年曹宗遣索班屯伊吾後數月北單于與車師後部共攻沒事盖班以去年末屯伊吾今春見殺或今春奏事方到也寜元年後王軍就及母沙麻反畔殺後部司馬及敦煌行建光元年憚其威彊退還數百里禪不加兵但使吏卒往陳禪傳曰北匈奴入遼東追拜禪遼東太守胡于懐服遺以胡中珍貨而去當在此年矣又按北單于漢朝曉慰之單于隨使還郡禪於學行禮為說道義以感化之單見遼東太守此事可疑今不取所不能臣未甞入朝天子安肯七月壬寅馬英薨誤今從紀傳作䇿罷九月戊子幸衞尉馮石府留飲十許日月丙申乃還袁紀曰十二石傳宫今從延光元年四月龐奮斬姚光収馮煥月甲戍龐奮承偽帝紀建光元年四驪圍玄莬而髙驪傳有姚光上言盖光實以延光元年𬒳殺璽書殺姚光馮緄傳亦云建光元年按帝紀去年十二月髙今年四月無甲戍紀傳誤以延為建又三年三月楊震上䟽曰去年十二月四日京師地動十一月丙申朔戊辰乃十三月四日也震傳作十一月四日按下文其日戊辰四年三月立北郷矦懿矦犢今從袁紀范書東觀記續漢書作北郷十月閻崇屯平朔門門今從袁紀宦者傳作朔平順帝永建元年八月三公劾奏虞詡詡上書自訟傳詡敦免在十月蓋帝由此知敦不直因事免之不然何三府共云帝省其章乃為免司空陶敦按袁紀孫程就國在九月而免敦也奏而獨孫程等就國賢為司隷校尉虞詡訶叱左右謗訕大臣妄袁紀秋七月有司奏浮陽矦孫程祝阿矦張程等徙為都梁矦程怨恨封還印綬更封為宜城矦范書孫造不祥于亂悖逆王國等皆與程黨乆留京都益其驕溢詔免見用上不以為怒周舉傳云程坐爭功就國今從之程傳亦云坐訟虞詡呵叱左右就國按虞詡傳程言二年帝設壇見樊英瓊傳李固勸書已云樊英設壇席及英傳云四年三月乃設壇埸見英黄之而為光禄大夫矣至三年旱瓊復上䟽若四年方設壇埸瓊至上䟽薦英稱光禄大夫則是瓊至之時英已甞設壇見知其必不在四年也見英則都與瓊傳異永和二年三月丁丑郭䖍為司空今從范書袁紀作乾五月黃龍等九矦與宋娥更相賂遺發覺並遣就國商傳誣罔騰賁者張逵等非龍等也孫程傳云龍等誣罔曹騰孟賁按梁三年八月丙戍令公卿舉武猛武猛良賀獨無所薦按宦者傳云陽嘉中詔舉和為陽嘉也此詔蓋誤以永六年三月武都太守趙冲擊鞏唐羌太守今從帝紀西羌傳作武威西羌傳沖時尚為太守規傳誤也皇甫規傳云與護羌校尉趙沖按夏鞏唐羌宼北地羌今從帝紀西羌傳作罕種漢安元年八月張嬰詣張綱降又云是歳嬰詣綱降按帝紀九月張嬰㓂郡縣縣也袁紀置嬰降事於八月下十月上今從之張綱傳云宼亂十餘年則非今年九月始宼郡三年六月丙寅立兠樓儲為南單于兠樓儲為單于今袁紀去年六月立書從范建康元年八月遣馮緄督州郡討賊紀作馮放皆誤帝紀作馮赦袁緄傳今據九月皇甫規對策梁冀忿之遂廢於家積十餘年賢良事或者此時規舉賢良其至對䇿時已在質帝世也故云規傳云沖質之間規對策免歸積十四年檢帝紀此後别無舉梁冀誅亦整十四年也沖質之間自明年數至十一月馬勉稱皇帝稱黃帝今據滕撫傳帝紀永嘉元年三月勉永嘉元年元嘉誤袁紀作十一月丁未趙序坐畏懦不進詐増首級棄市記曰東觀五萬今從滕撫傳取錢縑三百七十金蛇輸司農敢按之今從杜喬傳种暠傳云二府畏懦不桓帝建和元年六月光禄勲杜喬為太尉司農杜喬喬帝紀云大紀亦然荀淑傳云光禄勲杜喬舉淑方正今從之傳喬自司農累遷為大鴻臚光禄勲乃為太尉袁七月杜喬諫封梁冀等紀在為太尉後今從袁紀喬傳此章在為太尉前袁八月乙未立皇后梁氏帝紀云七月乙未以長暦考之皇后紀袁紀皆云八月而無日十八日也盖帝紀脫八月字七月戊申朔無乙未乙未八月十一月梁冀誣杜喬請按罪太后不許已喬前已免官喬傳云䇿免而也傳誤元嘉元年四月己丑上微行私幸河南尹梁胤府舎府今從范書袁紀作梁不疑二年正月敦煌太守馬逹逹今從于闐傳車師傳作司馬永壽元年秋南匈奴左薁鞬臺耆且渠伯徳等反紀帝等叛今從張奐傳作左臺且渠伯徳二年七月李膺為度遼將軍宼遼東度遼將軍李膺擊袁紀延熹二年六月鮮卑從范書破之今十二月封梁不疑子馬梁胤子桃為矦建和元馬作焉袁紀馬桃封在從范書桃作祧今三年十一月司徒尹頌薨今從范書袁紀在六月延熹元年五月梁冀殺陳授帝由此發怒私憾專殺議袁紀曰冀以之今從范書郎邴尊上益怒十二月陳龜為度遼將軍書之此陳龜及前李膺後种按匈奴傳每除度遼將軍輒兩官今約其事分著前後暠皆不記一時旣不當有詔遣南單于車兒還庭以車兒不能治國事上言更立左袁紀元康元年四月中郎將張奐書匈奴傳在延熹元年今從之鹿蠡王都紺為單于詔不許范二年七月黃門令具瑗侍今從梁冀傳宦者傳作中常八月陳蕃薦徐穉等陳蕃僕射胡廣等上䟽薦穉袁紀范書徐穉傳云延熹二年尚書令年蕃已為光禄勲今置在二年從范書去廣名從袁紀五年尚書令陳蕃薦五處士按二年胡廣已為太尉五楊秉按單超兄子匡坐論作左校叔孫無忌宼暴徐兖第五種坐徙朔方第五種傳范書李雲死在延熹三年楊秉傳作超弟宦者傳作弟子今從復徴拜河南尹坐單匡使客任方刺衞羽繫獄亡走論作左春袁紀在二年秋按楊秉傳三年坐救雲免歸田里其年冬死時單超已卒何得更能䧟種又雲書所論者立鄧后與封校第五種傳匡遣客刺羽超積忿以事䧟種若如范書則雲無忌無忌率其黨與三千餘人降按帝紀延熹三年十一月五矦事皆在二年袁紀似近之種傳又云衞羽爲種說叔孫公負筋力未就然則種必不能降無忌此說妄也無忌攻殺都尉矦章又臧旻訟種書稱種所坐盗賊三年正月左回天具獨坐徐卧虎唐雨墮范書雨墮太子賢注按雨墮者謂其性急暴如雨之墮無有常處也作兩墮云謂隨意所爲不定也諸本兩或作雨四年二月种暠爲司徒允免暠爲司徒相去半年袁紀誤袁紀在去年按祝恬薨後有盛允范書也今從五年十月度尚爲荆州刺史馮緄討武陵蠻年十二帝紀三度尚討長沙蠻平之此事當在今年三年重出誤也月武陵蠻宼江陵車騎將軍馮緄討皆降散荆州刺史七年二月丙戍黃瓊薨紀七年瓊以太尉薨范書楊秉五范書四年瓊免司空至七年卒袁瓊卒秉乃爲太尉今從范書年代劉矩爲太尉袁紀此年十二月誅宼榮延熹中𬒳罪榮書又云遇罰以來三赦再袁紀置此事於延熹元年按范書榮傳云上書皆言梁孫宼鄧之誅今置於此贖不知榮死果在何年按襄楷竇武八年正月楊秉劾奏宦官覽則是在此年矣宦者傳韓楊秉傳南廵之明年秉劾矦一時事明矣而袁紀載在去年春與范不同今從范書演奏具瑗瑗坐奪國為郷矦與秉傳所云削瑗國共是五月張磐㑹赦不肯出獄後未有赦不知㑹何赦也六按張磐㑹赦得原檢帝紀此六月赦後此二年今從帝紀年三月赦前此二年永康元年九年七月富賈張汎作張子禁今從岑眰傳陳蕃傳作張汜謝承書張儉舉奏矦覧何等女子干督郵此非賊邪使吏卒收覧袁紀儉行部至平陵逢覧母儉按劔怒曰宅井堙木刋雞犬器物悉無餘類苑康傳亦云張儉殺矦覧母殺之追擒覧家屬賔客死者百餘人皆僵尸道路伐其園大怨之徴詣廷尉坐徙日南按矦覧傳云覧喪母還家陳蕃母按其宗黨或有迸匿大山界者康窮相収掩無得遺脫緊之則苑康不止徙日南也矦覧傳又云建寜二年喪母蓋以傳云翟超没入矦覧財産坐髠鉗皆不云儉殺其母若果殺年致此誤耳誅黨人在其成瑨等下獄陳蕃劉茂共諌請之矩按時胡廣為同徒陳蕃傳又有司徒劉也非矩襄楷上䟽曰前年冬竹栢傷枯城傍竹栢枯傷誤也帝紀此年十二月書洛司隷李膺促捕張成按膺此事非作尹時也黨錮傳云膺為何南尹牢脩上書誣告李膺等今從范書袁紀作牢順陳蕃上書極諌帝策免之蕃免在七月蕃傳上書極諌袁紀李膺下獄在九月范書六月再下獄死徙在建寜二年十月蕃旣以此年七月免則曰膺等或禁錮閉隔或死徙非所云云按膺等赦出在明年太尉陳蕃為太傅按蕃免後有太尉周景蓋袁紀誤也蕃傳所云疑非蕃書也又袁紀無陳蕃免事靈帝即位以永康元年五月竇武上䟽曰今臺閣近臣尚書朱㝢等胡廣尚書朱㝢等按蕃廣時不為令僕故去之武傳武上䟽曰今臺閣近臣尚書今陳蕃僕射六月黨人書名三府受誣為黨人並坐下獄書名三府按帝紀於去年冬書李膺等二百餘人府則帝紀所紀為兩無所用故去之又故書三府為王府劉陳蕃以訟李膺免即膺等下獄已在前後遇赦方得書名三為三府攽曰當十二月迎解瀆亭矦宏時年十二二袁紀𥘉立為嗣詔范書云即帝位年十黨人時云年十四袁紀是也書云年十有二建寜二年誅靈帝建寜元年正月壬午竇武為大將軍九年四月袁紀延喜在今年正月壬午武傳為大將軍亦在迎立靈帝後今從之戊寅特進竇武為大將軍武移病固讓至于數十不許范書陳蕃為太傳有蕃責尚書等語故知從傳是也帝紀拜蕃太傳在即位後傳在前縁九月辛亥朱瑀盗發竇武奏辛亥按長曆是年九月乙范書帝紀作丁亥袁紀作今從袁紀巳朔無丁亥陳蕃聞難將官屬諸生拔刄突入承明門承明門使袁紀蕃到以逐君側之惡春秋義之有使者出開門蕃到尚書門正色者不内曰公未𬒳詔召何得勒兵入宫蕃曰趙鞅專兵向宫從范書云云今王甫使劒士収蕃送北寺獄甫兵不敢近乃益人圍之范書蕃傳曰蕃拔劒叱甫送獄今據袁紀數十重遂執蕃二年四月壬辰靑蛇見御坐癸巳大風雨雹寜二年帝紀建熹平元年四月甲午青虵見御坐袁紀建寜二年四月壬辰四月癸巳大風雨雹楊賜傳熹平元年靑虵見御坐續漢志竇薦王李與袁紀相應今從之靑虵見癸巳大風按張奐傳論陳九月郭泰聞黨人死私爲之慟曰漢室滅矣泰此語范書以哭三君八俊今從之爲哭陳竇袁紀以爲中常侍袁赦從范書袁隗傳袁紀作袁㓪今熹平元年五月曹節等欲别葬竇太后陳球下議太尉李咸上䟽幽閉母后感茅焦之言立駕迎母供養如𥘉袁紀云何南尹李咸執藥上書曰昔秦始皇光和元年九月司空來豔薨病罷今從范書袁紀云豔以乆二年三月袁滂免劉郃為司徒郃作劉邵今從范書袁紀二月丁巳滂免劉四月辛巳陽球奏収王甫下獄死曹節見磔甫屍道次抆淚曰我曹自可相食夏城門曹節見謁於道旁球袁紀云球㑹虞貴人葬還入車中而有是語今從范書大罵曰賊臣曹節節収淚於三年十二月己巳立何皇后月今從范書袁紀在十一帝問侍中任芝樂松必非中常侍袁紀云侍中今從之范書云中常侍樂松松本鴻都文學四年九月劉寛免許􅖢為太尉錯繆免楊賜為太尉今袁紀十月許郁坐辟召書從范閏月楊賜免十月陳耽為司徒病罷十月陳耽為司徒袁紀三年閏月楊賜乆之閏九月為是恐長曆差一月今從范書帝紀蓋誤置閏於去年按長曆此年閏十月以袁紀考五年正月陳耽上言耽與議郎曹操上言按耽巳爲司徒劉陶傳光和五年以謡言舉二千石太祖因此上書切諌不云與耽同上言也今但云陳耽不應與議郎同上言王沈魏書曰是歳以災異傳問得失六年冬秋成亦不得爲大有年今不取本紀云大有年按今夏大旱縱使張角置三十六方今從范書袁紀作坊中平元年春濟南唐周告張角反唐客今從范書袁紀云濟隂人車裂馬元義於哀都謀反伏誅今從范書袁紀曰五月乙卯馬元義等二月角自稱天公將軍角弟寶稱地公將軍寶弟梁稱人公將軍寶袁紀云角弟良寳今從范書司馬彪九州春秋云角弟梁梁弟張鈞上書請斬十常侍人名而下云十常侍未詳范書宦者傳上列常侍十二七月巴郡張脩反傳有劉焉司馬張脩劉艾典略有漢中范書靈帝紀有此張脩陳壽魏志張魯按魯傳云祖父陵父衡皆為五斗米道衡死曾復行之劉焉張脩裴松之以為張脩應是張衡非典略之失則傳冩之誤殺脩非其父也今此据范書司馬張脩與魯同擊漢中魯襲十二月王允下獄袁隗楊賜上䟽請之司徒楊賜按隗賜允傳云太尉袁隗此官恐誤時皆不為三年二月趙忠為車騎將軍傳爕出為漢陽太守紀袁今從范書在明年九月四年四月傳爕戰殁月今從范書袁紀在明年五十月長沙賊區星從陳壽吳志范書作觀鵠今五年三月益州刺史郤儉從陳壽蜀志范書作郗儉今南匈奴右部䤈落攻殺單于羗渠并州刺史張懿遂與帝紀休屠各胡攻殺其單于今從匈奴傳南匈奴左部胡合殺八月置西園八校尉停于瓊為佐軍校尉今從樂資山陽范書袁紹傳紹為佐軍校尉何進傳記公載十月甲子帝講武問蓋勲軍校尉袁紹同典禁兵勲謂勲傳云勲時與宗正劉虞佐幽州牧又宗正非典兵之官今除之􅊨虞紹云云按虞於匈奴未叛之前已為六年四月劉虞為太尉司馬領幽州牧今從范書袁紀三月己丑光禄劉虞為戊午皇子辯即位年十四紀曰帝年十四今從之帝紀云年十七張璠漢中常侍郭勝作郎勝今從柯進傳袁紀作郭脉九州春秋六月辛亥董后暴崩懼自殺今從皇后紀九州春秋曰太后憂七月皇甫嵩從子酈邐今從范書袁紀作從子何進召董卓東若屯上林則更為西去非所以脅太后也進傳曰召卓屯關中上林苑按時卓已駐河卓傳今從袁術燒南宫靑瑣門門今從袁紀何進傳作九龍十月白波賊宼河東宼河東按匈奴傳帝崩之後於扶羅帝紀五年九月南單于叛與白波賊宼紀誤今從傳乃與白波賊為十二月尚書武威周毖城門校尉汝南伍瓊吏部尚范書云作侍中周毖今從魏志及英雄記書漢陽周珌侍中汝南伍瓊袁紀孔伷為豫州刺史胄今從董卓傳九州春秋作孔韓馥聽袁紹舉兵魏志在舉兵之前若在舉兵後時紹已范書魏志俱有此事范書在舉兵之後舉兵前則近是也今從魏志為盟主馥何敢禁其發兵若在資治通鑑考異卷第二
