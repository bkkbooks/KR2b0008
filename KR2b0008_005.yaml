  text: 資治通鑑考異卷第五
  hash: sha256:87a5c88197ae3f11e090fe6ec807b499a03b6d5ad4320a62d060e7b8d7a8e49d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_005-1a}
body:
  text: 臣司馬光奉勑編集晉紀下康帝建元元年七月桓温率衆入臨淮淮下云庾翼帝紀温入臨上表云九月十九日發武昌二十四日逹夏口始請徙鎭襄為征討大都督遷鎭襄陽按翼傳翼先表移鎭安陸至夏口軍事故知不在此月陽始詔加都督征討諸八月燕王皝遣丗子雋等擊代元眞遣使請薦女無後魏宇紀八月慕容從燕書用兵事今二年正月宇文涉夜干弈千今從燕書慕容記載記作涉燕王皝殺慕容翰燕書翰傳翰甞臨陳為流矢所中病三十國春秋云永和二年九月殺翰自建元二年正月至永和二年九月已踰年矣三十國春秋卧嵗時不出入後漸差試馬按自討宇文後翰未甞預攻戰載記翰傳恐誤今從孝宗永和三年七月趙王虎遣將擊張重華遂城長最今從重華傳晉春秋作上最五年四月拜慕容雋幽平二州牧四州牧今從帝紀雋載記云幽冀并平五月石遵封丗為譙王廢劉氏為太妃國春秋鈔皆晉春秋及十六丗立三十三日按四月己巳至五月庚寅凡二十二日云廢太后為昭儀今從載記十六國春秋及載記又云燕王儁講武戒嚴諸子未爭十六國春秋在五月故從燕景昭紀集兵在四月時石虎方死是時閔未簒趙蓋撰史者附會耳故削云之而燕書載封奕慕輿根言俱指冉閔按八月禇裒退還河北遺民二十餘萬死亡略盡云為裒傳永和六年慕容雋始率衆南征石鍳即位後蒲洪始有衆十慕容皝及符健所掠死亡咸盡按是時慕容皝卒已踰年矣位皆與裒不相接今不取萬永和六年洪死健始嗣六年閏月月按長曆閏二月帝紀閏月有丁丑己丑按是帝紀正月後云閏月三十國晉春秋皆云閏正無丁丑己丑今以長曆為据歳正月癸酉朔若閏正月即三月趙新興王祗即帝位國晉春秋皆在三月按十六晉帝紀祗即位在閏月三十言苻洪洪三月死故疑祗以三月即位國春秋祗稱帝拜姚弋仲苻健官而不七年十一月樂陵太守賈堅以受新命始及三載烈祖恱燕書賈堅傳烈祖問堅年對若未為樂陵太守豈能安集諸縣告諭逢釣故知堅先已為其言拜樂陵太守按堅以去年九月獲於燕至明年始三年因問年而授樂陵太守非八年正月冉閔殺劉顯春秋鈔在二月燕書在三月己閔殺顯晉帝紀在正月十六國今從帝紀酉未知孰是升平二年八月郗曇為荀羡軍司下云郗曇為北中帝紀謝萬為豫州軍司頃之羡徴還除曇北中郎將都督刺史按帝紀十二月郎將督五州軍事徐兖二州刺史曇傳云荀羡有疾以曇為荀羡宼泰山殺太守賈堅載記荀羡殺賈堅下云敗羡復䧟北中郎將荀羡及慕容雋戰于山茌王師敗績燕書十二月兖二州恐始為軍司耳山茌故知八月曇未為徐哀帝興寧元年閏八月張天錫弑玄靚靚自立在七月帝紀天錫殺玄春秋今從晉十月朱斌克許昌今從晉帝紀燕書作朱黎二年八月慕容恪將取洛陽苻堅别帥侵河南按明年帝紀慕容暐宼洛陽上云南也十六國春秋堅傳亦無此舉帝紀恐誤恪抜洛陽堅親將以備潼關是未敢與燕争河三年二月桓沖監江州及荆豫江左唯荆州領南蠻沖傳帝紀云沖領南蠻校尉按豁重出今不取亦無蓋紀因桓海西公太和二年正月庾希免官入海按本傳海西廢帝紀是月希有罪走此時才坐免官耳後希始逃于海陵五月秦使曹轂發使如燕朝貢郭辯副之年皇甫眞燕建熙八春秋在建熙十年八月恐皆非是故附於曹轂降秦下為太尉燕書及載記眞傳郭辯至燕皆在眞為太尉下晉四年十二月王猛攻洛陽洛明年正月拔落十六國秦春燕少帝紀此年十二月王猛攻㱕今按獻莊紀云慕容令之奔還鄴建熙元年二月也時王秋十一月王猛伐燕遺慕容紀書紀請降十二月猛受降而去年桓温起師故從燕書猛猶在洛又猛遺紀書云五年八月慕容評將兵三十萬拒秦今從晉春秋載紀云四十萬太宗咸安元年十一月桓温使劉亨収東海王璽綬後魏書僭晉傳作亨今從之帝紀三十國春秋亨皆作享十二月庚寅東海王封海西公月降封今從簡文帝紀海西公紀云咸安二年正孝武帝太元元年五月苻堅伐張天錫周虓曰戎狄以來未之有也萬旌旗數百里問虓曰朕衆力何如虓曰虓傳曰吕光征西域堅出餞之戎士二十九年正月吕光發長安故知在伐涼州時今從十六國春秋戎夷以來未之有也按建元十八年二月虓謀反徙朔方十四年二月秦彭超據彭城又云於是罷彭城下邳二戍謝玄傳云何謙進解彭城圍彭城又云超分兵下邳留徐襃守彭城至七月以毛當爲徐帝紀及諸傳皆不言此年彭城䧟没而十六國秦春秋云超據州戍下邳是二城俱陷也州刺史鎭彭城王顯爲楊安帝隆安五年九月吕隆降秦姚碩徳伐吕隆同時魏姚興載記姚平伐魏與晉帝紀晉春秋皆云隆安五年降秦十六國西秦春秋云太書天興五年五月姚平未來侵晉元興元年秦弘始四年也月姚碩徳伐吕隆孤攝廣武守軍以避之皆隆安五年也按初十四年五月㱕隨姚碩徳伐涼南涼春秋云建和二年七也今以晉帝紀晉春秋十六國西秦南涼春秋爲據秦小國旣與魏相持豈暇更興兵伐涼蓋載記之誤義熈十二年二月姚興卒熈十一年二月姚興卒魏本紀晉本紀三十國晉春秋皆云義祖天興二年姚興攺號鴻以爲元年故晉本紀三十國晉春北史本紀姚興姚泓載記皆云十二年按後魏書崔鴻傳太前一年由鴻之誤也秋凡弘始後事皆在宋紀上髙祖永𥘉元年正月乞伏熾盤立其子暮末為太子茂蔓今從十六國春秋晉書作慕末宋書作乞佛二年九月殺零陵王九月丁丑據長曆九月丙午朔無己宋本紀九月己丑零陵王薨晉本紀不書日丑丁丑今營陽王廓傳作營陽營陽南方郡名也今從之來本紀髙氏小史皆作滎陽臧后謝晦蔡景平元年正月魏叔孫建入臨淄兵將軍徐州刺史安索虜傳云虜又遣楚將軍淮州刺史壽張子張模東擊青州所向城邑皆奔走本平公涉㱕幡能健越兵將軍青州刺史臨淄侯薛道千陳兵埽等姓名蓋皆胡中舊名即叔孫建等也紀亦云安平公涉㱕宼靑州按後魏書無涉四月己巳檀道濟軍于臨朐曆是月丁卯朔無乙巳必裴子野宋略作乙巳按長也己巳五月魏主還平城車駕至自南廵必一誤今皆不取後魏帝紀五月庚寅還次鴈門庚寅太祖元嘉元年正月二月己巳宋略二月癸巳李延壽南宋本紀正月癸巳朔日有食之宋紀二月丁亥朔後魏書紀志是年無食今從之史二月己卯朔皆誤也按長曆是年正月丁巳六月癸丑徐羡之等殺廬陵王義眞月廢義眞徙新宋南史本紀二未羡之等遣使殺義眞於徙所羡之傳亦云廢帝後殺義眞安之下即云執政使使者誅義眞于新安宋義眞傳六月癸月庚寅朔無癸未蓋癸丑也於新安殺帝於吴縣按長曆六八月魏丗祖自將輕騎討柔然文率輕騎討之虜乃退走後魏本紀云赭陽子尉普虜乃退走今據蠕蠕傳從北史李延壽北史紀云帝帥輕騎討之二年十月魏長孫翰等出黒漠長川今從蠕蠕傳翰傳云與娥淸出蛾淸出栗園長川今從蠕蠕傳淸傳云與長孫翰出十一月以楊玄為北秦州刺史按十一月壬午朔無癸宋本紀癸酉南史庚午今不書日酉及庚午三年十一月夏東平公乙斗升今從帝紀奚斤傳作乙五年二月魏安頡擒赫連昌年五月戰于黒渠為魏所十六國春秋鈔云承光三平徙諸城民七萬户于安定以都之四年二月魏軍至安敗昌與數千騎奔還魏追騎亦至昌河内公費連烏提守髙之送于魏與後魏紀傳不同今從後魏書定三城潰昌奔秦州魏東平公娥淸追擒三月赫連定擒奚斤等伐斤西伐長安生擒赫連昌于宋索虜傳元嘉五年使大將吐三萬討之定設伏於隴山彈箏谷破之斬吐伐斤盡坑其衆安定封昌為公以妹妻之昌弟定在隴上吐伐斤乗勝以騎克乃分軍戍大城而還今從後魏書定率衆東還復克長安燾又自攻不十月徐州刺史王仲德伐魏仲徳時為安北將軍徐州刺後魏紀云淮北鎮將按南史列傳魏劉裕傳宋索虜傳皆無是年王仲徳等伐魏事唯後史宋書仲徳傳闕又宋書南史本紀北史本紀及宋魏諸臣之今從之魏本紀有七年十月崔模降魏魏書模仕魏爲武城男宋書誤也宋書云模抗節不降投塹死按後乞伏暮末東如上邽遣烏訥等求迎宋氐胡傳云茂蔓聞後魏乞伏國仁傳云爲赫連定所逼欲移居上邽今從十六國春秋赫連定敗將家户及興國東征八年六月益州刺史慕利延寧州刺史拾䖍春秋作十六國今從宋書沒利延拾虎十一月北部敇勒皆作髙車按髙車即敇勒别名也後魏書北史本紀皆作敇勒鄧淵傳九年十二月魏李順使涼爲涼州牧即有蒙遜不拜及順後魏書順𥘉奉冊拜沮渠蒙遜大將開府徴爲四部尚書加常侍延和𥘉使涼始有不拜等使還論牧犍事南史順冊拜蒙遜還拜都督四川長安鎭都帝曰卿言蒙遜死驗矣故從南史事今據順云不復周矣明年蒙遜死十年三月蕭思話爲梁南秦二州刺史難當宼漢中思話傳云楊難當宼漢中皆在十一月乃用思話按本紀及氐胡傳涼王蒙遜立牧犍為丗子魏書紀傳作牧犍今從之宋書十六國春秋作茂䖍後十一年三月魏于什門還平城在燕歷二十四年按後後魏書節義傳云什門年矣若二十四年乃在太延三年而太延二年馮氏亡矣魏本紀神瑞元年八月遣于什門招諭馮跋至此年二十一十二年五月焉耆入貢于魏舊國也按漢書作焉耆今後魏書皆作烏耆云漢時之從十一月楊難當使楊保宗鎭童亭書作童今從之後魏書作薫亭宋十三年四月燕尚書令郭生泥今從十六國春秋鈔後魏古弼傳作大臣古十六年九月沮渠牧犍兄子萬年降魏茂虎兄子萬年宋書氐胡傳曰執今從後魏書為虜内應茂䖍見牧犍弟宜得安周從子豐周今從後魏書宋書宜得作儀徳安周作十月魏徙涼州吏民三萬户于平城萬户今從後魏書十六國春秋鈔云十十七年四月劉湛言天下艱難詎是幼主所御以為南史此言湛常欲推崇義康豈肯聞而不荅今從宋書及宋略義康有此言湛景仁並不荅按義康雖不識大體豈敢自為五月湛以母憂去職謀又泄竟弗之幸宋書無此事按南史云湛伏甲於室以俟上臨弔得尚延半歳今從宋書湛若謀泄當即伏誅豈十八年十二月詔裴方明等討楊難當年正月遣方明氐胡傳作十九帝紀等今從十九年七月以劉眞道爲雍州裴方明為梁南秦二州方明不拜崇之殁在明年二月即眞道傳誤眞道傳此事在胡崇之殁後氐胡傳魏安西將軍古弼吐奚弼蓋其舊姓今從後魏書宋索虜傳作吐奚爱弼氐胡傳作唐契攻闞爽爽今從後魏書宋氐胡傳作闕九月沮渠無諱將衞興奴尞今從後魏書宋書衞興奴作衞封無諱為西河王傳在九月末今從傳宋本紀封爵在六月二十年四月魏河間公齊殺楊保宗符逹等立楊文徳為主據白崖按後魏河間公齊傳云文徳求援於宋宋宋氐胡傳云拓跋齊聞兵起遁走逹追擊斬齊因之氐遂平以功拜内都大官卒然則宋書誤也遣房亮之符昭啖龍等率衆助文徳斬龍禽亮文徳自稱秦河梁三州牧在四月今從之宋書在三月魏書十一月魏主令太子副理萬機氏宼氏不睦崔宼譛之宋索虜傳晃與大臣崔手刃向之曰汝何故信讒欲害太子佛狸驚斍下偽詔曰王玄髙道人有道術晃使祈福七日七夜佛狸夢其祖父並怒無巨細必經太子然後上聞事節小異今從後魏書者大業纂承為重儲宫嗣紹百王舊例自今已往事二十一年正月己亥藉田大赦有戊午又有辛酉誤也宋略辛酉藉田大赦下宋書今從二十二年八月鄯善王眞逹降魏今從西域傳本紀作眞逹興二十三年二月魏人宼兖靑冀三州虜宼兖豫靑冀刺宋文帝紀三月索王章略金郷方與遷其民五千家於河北髙涼王那至濟南史申恬破之魏太武紀二月永昌王仁至髙平禽劉義隆將之耳宋索虜傳又云虜破掠太原得四千餘口蓋魏人夸張東平陵遷其民六千餘家於河北蓋宋魏各據奏到之月書不同耳其數故五月檀和之等破林邑六月賞檀和之等今從傳本紀在六月傳在五月當是八月魏破蓋吳傳首平城之為流矢所中死吳弟吾生宋索虜傳云屠各反吳自攻皆破散今從魏書率衆入木面山尋二十四年十二月魏晉王伏羅卒屠蘇為疾雷所擊屠宋索虜傳曰燾所住悲燾怒賜死此出於傳聞今從後魏書蘇倒見壓殆死左右皆號泣晉王獨不二十七年二月辛亥魏主至南頓王鑠進號西平辛巳宋書是月辛丑南平十月辛丑二十日辛亥巳當作亥索虜宼汝南按長暦二月壬辰朔三月參軍劉泰之之今從宋書後魏紀作劉坦七月乙亥魏王買徳弃城走敗走虜支解王淮傳示列宋略云虜濟州刺史王淮宋書戍今從王玄謨圍滑臺州刺史歌舒跋戰破之玄謨進攻滑臺今宋略九月庚申玄謨前軍次白馬與虜兖書從宋南平王鑠遣梁坦出上蔡之今從宋略鑠傳作到坦十一月辛卯魏主至鄒山山今從後魏書宋略云戊子至鄒魏洛州刺史張是連提提今從宋書宋略作張是連魏永昌王仁追及劉康祖於尉武皆作尉氏按康祖傳宋略及南平王鑠傳也今從康祖及索虜傳作尉武􅊨云去夀陽裁數十里然則非尉氏康祖衆潰云虜死者太半今從宋略康祖傳云大戰一日一夜又十二月己未魏兵至淮上己未虜至淮西宋本紀乙丑魏本紀云丁卯至淮按宋略敗今從之胡崇之等臧質使臧澄之營東山帝紀質傳作澄之序傳作臧證之今從質營於城南眙北今從宋書宋略云質屯盱魏主設氊屋於瓜歩山於瓜歩山蓋謂此也今從宋書魏帝紀云癸未車駕臨江起行宫魏主求㛰不成又請進女於皇孫以求和好帝以師昬非魏帝紀云甲申義隆使獻百牢貢其方物孫為書致馬通問焉此皆魏史誇辭今從宋書禮許和而不許昬使散騎侍郎夏侯野報之詔皇二十八年二月魏主赦盧度丗祖弟光丗先留鄉里宋柳元景傳元景從崔浩虜之相也元嘉二十七年虜主拓跋燾南宼汝潁浩密索虜以為折衝將軍河北太守封西陵男光丗姊夫為司徒連謀夷滅者甚衆光丗南奔得免太祖以為振武將軍與魏有異圖光丗要河北義士與浩應接謀泄𬒳誅河東大姓坐從從魏書事不同今四月以魯秀為潁川太守守今從宋書宋略云滎陽太六月魏太子晃以憂卒私遣取諸營鹵獲甚衆燾歸聞宋索虜傳云燾至汝南瓜歩晃道執之及國罩以鐵籠尋殺之蕭子顯齊書亦云晃謀殺佛知大加搜撿晃懼謀殺燾燾乃詐死使其近習召晃迎喪於死召晃迎䘮晃至執之罩以鐵籠捶之三百曳於叢棘以殺狸見殺宋略曰燾旣南侵晃滛于内謀欲殺燾燾知之歸而詐其貪暴燾鞭之二百遣鎭抱罕此皆江南傳聞之語今從後焉又索虜傳云晃弟秦王烏奕旰與晃對掌國事晃疾之訴書魏二十九年二月甲寅魏主𬒳弑今從魏書宋書作庚申五月詔蕭思話等北伐亦北伐玄謨傳中不曽行蓋脫索虜徐爰張永傳並云王玄謨于京索龐萌薛安都宼恒農都不言蕭思話等而宋紀亦無誤魏紀載六月劉義隆將檀和之宼濟州梁坦及魯安生軍言思話之歸宋略有臧質遣柳元景徇蒲阪元景傳亦有之此數人者至七月云韓元興討之和之退梁坦安生亦走不書宋略今從宋七月張永等至碻磝乙酉壬辰按長曆此月丁丑朔四日宋略七月壬辰永師及碻磝下又有以庚辰或壬午至碻磝非壬辰也庚辰六日壬午十六日壬辰疑永潘淑妃生始興王濬濬傳及文九王傳皆云濬實潘子南太子劭傳云濬母卒使潘淑妃養之濬濬心不附今從濬本傳史亦云淑妃養爲子淑妃愛十月魏皇孫濬即位攺元興安有武略用以爲太子會宋索虜傳燾以烏弈旰矯殺之而自立號年承平博眞懦弱不爲國人所附晃子濬燾死使人嬖宗愛立可博眞爲後宗愛博眞恐爲弈旰所危直懃嫡孫應立耳乃殺博眞及宗愛而立濬爲主號年正平字烏雷直懃素爲燾所愛燕王謂國人曰博眞非正不宐立十八年皆宋書之誤也與後魏書不同又云在二十二月戊午魏陸俟進爵東平王丁巳下有癸亥不當魏紀云戊申按上有戊午字誤耳中有戊申蓋三十年正月東宫實甲萬人彗星入太㣲掃帝座二十宋元凶劭傳云二十八年憂有竊發輙加劭兵衆東宫實甲萬人按二十九年劭濬巫九年十一月霖雨連雪太陽罕曜三十年正月風霰且雷上正月災異而更加劭兵今從宋略蠱事已發豈有因十二月及明年癸亥夜劭為逆朔宋略云癸亥夜乃二十日也今從之劭傳云二十一日夜按長曆是月甲辰三月劭殺新渝懐侯玠長沙王道憐傳劭傳作球今從辛卯臧質子敦等逃亡敷逃按長曆是月甲戌朔無庚宋略庚申武陵王戒嚴辛亥臧庚寅辛卯字誤也宋書敷作敦今從之申辛亥又宋略上有甲申下有癸巳此必庚子武陵王移檄四方曰奉三月二十七日檄然則發檄宋略移檄亦在庚申日按謝莊傳日也在庚子四月癸亥柳元景至新亭山為壘按本紀癸亥元景至宋略云壬戌元景次新林依日劭乃水陸出軍今從之新亭元景傳元景至新亭經五月甲戌魯秀等攻大航宋略甲戌乃二日也元凶傳云其月三日按七月南海太守鄧琬玩今從本紀蕭簡傳作劉世祖孝建元年正月魯爽舉兵質南郡王義宣徐遺寶宋本紀二月庚午爽臧爽之反帝猶遣質收魯弘則非同日反明矣又按長曆是月舉兵反義宣慱云其年正月便反宋略云二月義宣等反按月二十六日但不知爽反在正月與二月耳戊辰朔然則庚午二日也義宣傳起兵在二三月己亥内外戒嚴長曆是月戊戌朔癸亥二十六日辛宋本紀宋略皆作癸亥下有辛丑按當作己亥丑乃四日也四月薛安都等斬楊胡興今從宗越傳安都傳作胡與李延夀誅魯爽延夀取之以約施用失所故絀其名此語本出沈約宋書吴喜黃回傳賛而柳元景進屯姑熟葢南州即姑熟也垣護之傳作南州五月胡子反等守梁山西壘西南風急月十九日西義宣傳曰五是月丁酉朔三日己亥八日甲辰十八日甲寅宋略於己亥南風猛宋略曰己亥質遣尹周之攻梁山西壘陷之按長曆亥或者是己酉與辛亥也今不書日闕疑上有甲辰下有甲寅然則決非十九日與己六月義宣至江陵魯秀北走及江陵聞敗北走今從宋書宋略云秀自襄陽敗退將大明二年十月遣龐孟虬救淸口水公捨賁敇文宼清口宋顧師伯傳云魏遣清修兩城於清水東詔封敇文擊之今從之丗祖遣孟虬及殷孝祖赴討魏本紀孝祖三年四月劉道龍就今從宋書宋略南史作道竟陵王誕殺垣閬紀乙卯貶誕爵今從之宋略云己亥殺閬按本内外纂嚴戊戌朔無乙亥蓋己亥也宋略乙亥纂嚴按長曆是月四年三月魏人宼北隂平朱提太守楊歸子破之帝宋壯降平朱太守楊歸子擊破之按郡縣名無壯降平及孔提紀索虜宼北隂平孔提太守楊歸子擊破之宋略云索虜宼書當為朱提北隂平參酌二五年九月詔沈慶之位次司空曆是月甲寅朔無戍戌宋略此事在戊戍按長以歷陽王子顓為臨海王今從宋書宋略作子瑱六年四月殷淑儀卒義宣敗後帝密取之假姓殷氏左南史云殷淑儀南郡王義宣女也人入義宣家義宣敗入宫今從宋書右宣泄者多死或云貴妃是殷琰家七年正月江智淵以憂卒自是詆之無度智淵不堪其宋略曰帝旣以僧安辱智淵今從宋書恥退而自殺太宗泰始元年七月華願兒言於廢帝曰官為鴈天子也韓愈詩曰居然見眞贗書或作鴈今從宋略宋書作應天子宋略作鴈天子按字書贗偽物十月少府劉曚妾孕臨月王休仁傳作廷尉劉曚宋畧宋書帝紀作少府劉勝始安仁傳作廷尉劉蒙今從其多者及南史帝紀皆作少府劉曚休廢帝使朱景雲賜晉安王子勛死謝道邁等告鄧琬請計遇齎敇至潯陽琬謂道遇云云今從琬傳子勛傳云景雲遣信使告琬宋略云帝使道姜産之南史皆作産今從之産或作彦宋書宋略二年正月辛亥以山陽王休祐督諸軍西討庚申以休宋略二月今從宋書祐都督西討壬子路太后殂上飲酒置毒以進侍者引上衣上寤起以宋略南史皆曰義嘉之難太后心幸之延事如禮宋書無之今不取其巵上壽是日太后崩䘮三月以鄭黒為司州今從宋本紀宋略宋殷琰傳作鄭墨六月始安内史王識之之今從宋略宋書作王職蕭頥據郡起兵郡起義宋略亦云沈肅之以郡招義按頥宋鄧琬傳云丗子與南康相沈用之等據便與之同今從蕭子顯南齊書紀始自獄中劫出琬所署南康相不容七月劉胡攻錢溪慶以三百舸逼錢溪今從宋書宋略曰胡進軍鵲頭遣其將陳十月梁州刺史柳元怙今從宋書宋略作元哲兖州刺史畢衆敬云小名捺今從本傳宋略作畢榛後魏書命張永等迎薛安都月而宋本紀宋略遣張永等北出後魏紀安都與常珍竒降皆在九今從之皆在十月常珍竒降魏郡叛蓋於時宋朝始聞之耳宋略十二月甲寅珍竒復以畢衆敬子元賔先坐誅獨不捨之宋略云榛息在都已誅後魏書衆敬傳云元賔有它罪或從之矣今三年正月張永等弃城夜遁敗遂失淮北四州及豫州宋本紀去年冬永攸之大穆之于武原薛安都開彭城以納虜永等引退虜追之王師淮西地宋略今年正月永攸之師次彭城虜掩其輜重敗王常珍竒薛安都内屬張永沈攸之擊安都詔尉元救彭城西敗績畢捺亦舉兖州歸虜遂失淮北之地魏帝紀去年九月凱張永沈攸之相繼退走今年正月癸巳尉元破永攸之於河公石救懸瓠十一月畢衆敬内屬十二月己未次干秺周去年豈得已失淮北安都為永攸之所逼故降魏豈得今年吕梁東閏月沈文秀崔道固舉州内屬按靑冀今歳始叛宋之等已敗退今春永大敗耳今從後魏帝紀永攸之始次彭城安都始納魏兵乎蓋去冬穆失淮北四州及豫州淮西之地崔道固舉州内屬宋索後魏帝紀閏月沈文秀淮北三州民自天安二年正月三十日壬寅昧爽已前罪一虜傳曰永攸之敗退虜攻靑冀二州執文秀道固又下書曰謂徐司豫壬寅二十日壬子三十日也切原免按青州破在五年淮北三州蓋二月魏西河公石攻張超景逺擊破之景逺即超也宋略宋帝紀云索虜宼汝隂太守張又陷亦誤也今從後魏書七月張景逺先卒汝隂城三月申纂為魏所殺贈官之月今從魏帝紀宋略云七月纂戰死蓋四月魏尉元上表沈攸之欲援下邳遣孔道恭擊破之按尉元傳先上表論取四城利害後乃云寒暑又云今雖向熱猶可行師則似上表時在四年春末夏元以泰始二年九月受詔敕薛安都此表云受命出疆再離攸之敗後今此表但言陳顯逹循宿豫不言攸之救下邳又𥘉也又按沈攸之以三年八月出師尋即敗退則上表當在師先定東南之地則此表不在其年春末夏𥘉決矣蓋再當慕容白曜以四年二月十七日抜歷城而此表欲釋靑冀之兩經寒暑也故置於此作載是語助之辭非謂七月遣沈攸之等擊彭城攸之云卿若不行便可使吴宋沈攸之傳宋略皆云帝怒魏書作吳僖公不知即吳喜為别一人也喜獨去按喜傳乃無與攸之討彭城事後八月魏長孫陵等入東陽西郭暴掠沈文秀擊破之式入西郭今從慕容白曜傳文秀傳云八月虜蜀郡公拔十月徙義陽王昶為晉熈王月今從宋略宋帝紀在十一四年正月魏以髙閭張讜對為東徐州刺史沈攸之尉元傳以髙閭與張讜對為東徐州刺史按三年十一月乙卯始以旣走元以書諭王玄載玄載與魯僧遵崔武仲相繼皆走遂時未降魏也故置於此讜為東徐州刺史則於二月庚寅魏慕容白曜拔歷城東郭癸巳崔道固降以今月十四日臣東郭失守以十七日面縛請罪長曆是月宋略云丙申索虜䧟歴城執崔道固按後魏列傳道固表云今從之丁丑朔六年四月吐谷渾王拾寅今從後魏書宋本紀作拾䖍十月立皇子智隨為武陵王傳作智隨按太宗生子皆筮宋本紀作智賛宋略作賛列字今從列傳之以卦為其七年二月内外百官並斷俸禄禄俸今從南史宋本紀云日給料帝密取諸主姬有孕者内宫中生男則殺其母云閉宋書今從宋略其母於幽房七月或譛蕭道成有貳心於魏嫌太祖非人臣相而民南齊書太祖紀云帝常帝愈以為疑今從宋略間流言蕭諱當為天子帝使吳喜賜道成酒飲之喜還帝意乃解宋畧云道成南齊紀云太祖戎服出門迎即酌道成𬒳徴蓋南齊書欲成太祖之美故云爾今從宋略懼弗肯飲將出奔喜語以誠先為之酌於是喜得罪而八月魏顯祖傳位太子太子按馮太后若迫顯祖傳位當後魏天象志云上迫於太后傳位惣萬機今從帝紀奪其大政安得猶泰豫元年二月王景文飲藥而卒曰朕不謂卿有罪然南史云帝使謂景文碁局又曰景文酌酒謂客曰此酒不可相勸自仰而飲之按吾不能獨死請子先之若使者有此語則坐客不容不知更終得死時客猶在坐也今從宋書焦度勸拒命必不對坐客言之何六月乙巳蒼梧王尊皇太后未今從宋本紀宋略本紀作癸資治通鑑考異卷第五
