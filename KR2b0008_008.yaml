front:
  text: 資治通鑑考異卷第八
  hash: sha256:ef906cea8210ad7a5964d36973b24edcdfae0f0db268739598fdae061fa63822
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_008-1a}
body:
  text: 司馬光奉勑編集陳紀下髙宗太建元年二月齊和士開殺趙郡王叡天統三年北齊帝紀殺趙郡王叡三月以并省尚書令婁定逺爲司空蓋定逺旣六月以并省尚書左僕射婁定逺爲尚書左僕射五年二月叡叡死必在定逺作司空後帝紀誤也但不知果在何時耳爲僕射復爲并省尚書令也按和士開傳先岀定逺然後殺瀛州蓋先出爲青州後乃除瀛州也又士開傳云出爲青州定逺傳云㝷除七月太子納沈妃年拜皇太子妃誤也今從帝紀陳書北史沈后傳皆云太建三三年三月周齊公憲自龍門渡河月周師來宼周書帝北齊書叚韶傳云二渡河今從之紀云三月憲四月周陳公純等取齊宜陽等九城周柱國紇于廣略北齊斛律光傳云從周帝紀圍宜陽今六月齊段韶圍定陽城帝紀皆云六月陷汾州今從之韶傳七月屠其外城周書北齊叚韶擒楊敷盡俘其衆斛律光叚韶傳屢破周師要之周周書齊王憲傳屢破齊師北齊書師勝耳失汾州齊四年二月齊以衛菩薩爲太尉菩薩何人亦不言何官北齊書北史並同不知十二月周阿史那后無寵甚敬焉案房玄齡唐髙祖實録周書云后有姿皃善容止周帝太穆皇后勸帝強撫慰之今從之云武帝納突厥女爲后陋而無寵五年四月齊遣軍救歷陽歷陽黃法氍傳云歩騎五萬陳書帝紀云齊遣兵十萬援來援案源文宗之語恐無此數今不取援歷陽蕭摩訶傳云尉破胡等率衆十萬齊軍大敗尉破胡走五月今從陳書北齊書破胡敗在五月齊蘭陵王長恭以邙山之捷威名大盛長恭與北齊書親切不覺遂然帝嫌其稱家事遂忌之案邙山之戰在河淸周戰於邙山後主謂曰入陳太深失利悔無所及對曰家事此問且稱家事亦何足致忌今不取三年後主時年九歳尚未即位何得有十月以魯廣逹爲北徐州剌史云北徐州案北齊書祖陳書帝紀及廣逹傳皆徐州故謂此爲北徐州其實乃北齊之南徐州也珽傳珽保全北徐州城不䧟蓋南人謂京口爲南六年三月周叱奴太后殂帝居倚廬帝居憂與左右出隋書張衡傳云武居喪有禮疑衡自叙之妄獵衡露髮輿襯切諫案帝七年三月周伊婁謙元衞聘於齊今從周書帝紀謙傳作拓跋偉九月齊髙阿那肱將兵拒周師是月癸丑朔無己丑又北齊書云閏月己丑案蓋誤也下有庚辰八年三月王瑒卒月己酉朔無庚寅陳書誤陳書庚寅瑒卒案長曆是十月齊主與馮淑妃獵於天池堆今從髙阿那肱傳馮淑妃傳云獵於三十二月己未周主至晉陽又云己未軍次并州蓋丁巳前周書武帝紀丁巳大軍次并州帝乃至也軍至己未周賀拔伏恩作佛恩今從周齊帝紀北齊書安德王延宗傳九年正月周尉遲勤追齊主剛今從周書北齊書勤作二月周平齊得州五十郡一百六十二縣三百八十書隋十縣一百六十五今從周書地理志云州九十七郡一百六十年二月馬主裴子烈主今從陳書南史作馬明十一年正月周主行刑經聖制八月案隋元巖傳樂運周帝紀行刑經聖制在運書巳有更嚴前制之語然則行經在軌死前也之諌因巖納說得免及王軌之死巖遂廢于家今十二月九郡民自拔還江南九州蓋字誤陳紀九郡作十二年五月乙未周宣帝殂劉昉鄭譯矯詔以楊堅揔知中外兵馬事未追五王入朝已酉大漸昉譯矯制以堅周帝紀乙未帝不豫還宫詔堅入侍疾丁若自乙未至已酉凡十五日事安得不泄今從隋帝紀受遺輔政是日帝崩按堅以變起倉猝故得矯命當國出顔之儀爲西邊郡守將軍宇文仲輔政仲巳至御坐譯北史鄭譯傳之儀與宦者謀引大譯等愕然逡廵欲出隋文因執之於是矯詔復以譯爲内史知之遽率開府楊惠及劉昉皇甫績柳裘俱入仲與之儀見史按之儀若爾豈復得全今從之儀傳上大夫明日隋文爲丞相拜譯柱國府長七月尉遲迥所統相衞等州滅後隋髙祖始置毛州迥周書迥傳又有毛州按迥也傳誤尉遲惇縱火栰髙熲爲土狗以禦之狗今從北史隋書作木栰木宇文忻先射觀戰者先犯觀者今從北史隋書云髙熲與李詢十三年三月隋賀若弼爲呉州揔管州今從弼傳隋書帝紀云楚十二月突厥沙鉢略可汗攝圖立位二十年卒佗鉢在隋突厥傳云木杆在建徳二年佗鉢獻馬然則木扞以承聖二年立太建四年卒位十年卒按周傳魏廢帝二年三月科羅獻馬木杆猶未立十三年卒也佗鉢以其年立長城公至德元年二月以毛喜爲永嘉内史云右僕射司馬申傳時又毛喜傳云時山陵𥘉畢未及踰年按髙宗殂過朞乃葬沈君理卒朝議以毛喜代之按君理卒在太建五年非後主年恐誤也而云未及踰三月隋遷于新都入新宫今從帝紀隋食貨志云正月帝八月丁卯朔日食丁卯蓋曆差隋紀作七月十二月長沙王叔堅坐厭媚免官其厭媚又令人告之南史云上隂令人造陳書今從二年正月隋頒新曆成奏上今從帝紀隋律曆志云二月撰二月突厥逹頭可汗請降于隋玷厥帥其屬來降按時隋帝紀云突厥阿史那蓋文降耳玷厥方彊帝使女學士與狎客賦詩互相贈荅等八人夾坐江揔平陳記云張貴妃十客一時継和稽緩則罰酒今從陳書南史等十人預宴先令八婦人襞采牋製五言詩三年七月突厥可汗遣子庫合眞入朝于隋傳作窟隋突厥從帝紀含眞今禎明元年四月突厥莫何可汗生擒阿波云沙鉢略西隋突厥傳前矦因晟奏曰阿波爲天所滅与五六千騎在山谷間伏聽詔擊阿波破擒之後又云處羅矦生擒阿波長孫晟傳曰處羅以献則是得否未可必隋安得豫議其死生乎今從突厥傳後旨當取之以献按前云沙鉢略破擒之擒衍字耳處羅矦云當取隋紀上髙祖開皇九年正月陳吕忠肅屯岐亭南史作吕肅今隋書作吕仲肅年坐巫蠱廢昉以六年坐謀反誅賁傳誤也昉爲大逆於前譯爲巫蠱於後案譯以開皇元十五年三月帝怒楊素爲離宮壯麗封德彞言皇后至必有恩詔傷綺䴡大損人丁帝不恱素懼即於北門啓隋書北史皆曰宫成上令髙頻前視奏稱頗一宫何足損費后以此理諭上上乃解今從唐書獨孤皇后曰帝王法有離宫别館今天下太平造十二月敇盗邊糧一升以上皆斬六年今從帝紀刑法志事在十十六年八月詔決死罪者三奏然後行刑年今從帝紀刑法志在十五十七年三月行旅晏起早宿必早字誤耳刑法志作晚宿二十年四月長孫晟追突厥斬千餘級武無虜而還突煬帝紀曰出靈抗蓋逹頭聞王來而遁晟將兵從別道与逹頭相遇耳厥傳曰晉王出靈州逹頭遁逃而去晟傳曰逹頭与王相史萬歳破突厥賊據本傳在今年紀誤也帝紀十九年六月史万歳破九月壬子上至自仁壽宫宫今從太子勇傳帝紀丁未至自仁壽仁壽四年七月丁未上崩中外頗有異論記曰髙祖在趙毅大業略而巳帝乃召蔡於别室旣還靣傷而髮乱髙祖問之蔡泣曰仁壽宫病甚追帝侍疾而髙祖美人尤嬖幸者唯陳蔡二人侍郎元岩等令發詔追庶人勇即令廢立帝事迫召左僕射皇太子爲非礼髙祖大怒齧指出血召兵部尚書柳述黄門之服衣下置仗立於門巷之間以爲之衞素等旣入而髙祖楊素左庶子張衡進毒藥帝簡驍健官奴三十人皆服婦人欷是時唯太子及陳宣華夫人侍疾太子旡礼宣華訴之帝暴崩馬揔通曆曰上有疾於仁壽殿与百寮辝訣並握手歔令張衡入拉帝血濺屏風冤痛之聲聞于外崩今從隋書怒曰死狗那可付後事遽令召勇楊素祕不宣乃屏左右乙卯發喪戍文帝崩辛巳發喪壬午煬帝即位按長曆是大業略記曰十八日發喪社寳大業雜記曰甲甲戍辛巳壬午日今從隋書月乙未朔乙卯二十一日也无追封庶人勇爲房陵王不爲置嗣八男亦隂加酖害恐大業略記云庶人勇於道寔酖之也諸弟分徙嶺表仍㩽在所皆殺焉今從之其爲厲皆倒埋之按隋書北史皆云煬帝踐極儼常從行卒八月漢王諒反裴文安請直入蒲津參軍裴文安說諒大業略記云司兵騎令文安督領不淹十五日徑據長安其在京𬒳黜停私之曰今梓宫尚在仁壽宫比其徴兵動移旬月今若簡驍勇萬然後大王揔兵皷行而西聲勢一接天下可指揮而定也諒徒並擢授髙位付以心膂共守京城則以東府縣非彼之有騎一萬徑往京師奔喪曉夜兼行誰敢止約至京徑掩仁壽不從大業雜記云文安又說曰先人有奪人之心殿下選精北彼率天下之兵百道攻我則難爲主人此下計也今從隋書宫彼縱徴召未暇禦我大軍駱驛隨王而至此則次計王直資河豆盧毓圖諒諒將往介州令毓留守將至諒屯清源以皇甫誕傳云楊素迫何暇自還襲毓今從毓傳拒之按諒屯清源時素軍巳煬帝大業元年三月命皇甫議發民百餘萬開通濟渠兵夫五十餘萬今從略記雜記作皇甫公儀又云發八月行幸江都隋帝紀及略記雜記作九月今從御龍舟曆是月戊子朔无甲子略記云甲子進龍舟按龍舟髙四十五尺其制度尤詳今從之略記云髙五丈雜記言二年二月詔吏部尚書牛弘等定輿服制度尚書令帝紀云令善心於帝即位之𥘉巳左遷蓋紀誤也牛弘礼部侍郎許善心按弘未甞爲尚書七月元德太子昭薨同在侍宴帝旣深忌於素並起二巵雜記云𥘉太子之遘疾也時与楊素二斗餘宫人聞素平常始知毒酒誤飲太子祕不敢言太子同至傳酒者不悟是藥酒錯進太子旣飲三日而毒發下血斃按它書皆无此說蓋時人見太子与素相繼薨妄有此論耳知之歎曰豈意代楊素死乎命也數日而薨後素亦竟以毒四年正月穿永濟渠入河於汾水東北開渠合渠水至于雜記三年六月㩽開永濟渠引汾水即今御河未甞通汾水雜記誤也涿郡二千餘里通龍舟按永済渠二月遣崔君肅使西突厥今從西突厥傳隋帝紀作崔毅三月幸五原行宫設六合板城造行城周二千歩髙二雜記云帝幸啓民帳時隋礼儀志十餘丈今從八月帝祠恒岳裴矩所致西域十餘國皆來助祭矩裴也今從帝紀傳云三年誤十月遣薛丗雄擊伊吾從帝征吐谷渾後云歳餘以丗雄丗雄擊伊吾帝紀無之本傳前有年也按是時啓民巳卒伐吐谷渾之歳伊吾吐屯設献地數爲玉門大將与突厥啓民可汗擊伊吾然則似在大業六七伐之今移置獻地之前千里恩寵甚厚隋何故五年五月大獵長圍亘二十里疑二十里字誤隋帝紀作二千里帝至浩舋川以橋未成斬黃亘度而橋壞今從略記隋帝紀云梁浩舋御馬六月丙辰宴髙昌王麴伯雅伊吾吐屯設寅今從隋帝紀略記在六月壬七月帝東還經大斗拔谷士卒凍死按西邊地雖寒不帝紀在六月癸卯記略記作逹十拔谷今從帝紀容六月大雪凍死人畜今從略六年正月有盗數十人入建國門云三百人今從隋書雜記在五年正月又三月初帝欲大營汾陽宫汾陽宮又云明年復幸汾陽宫張衡傳云帝幸衡宅之明年幸其事恐傳誤按本紀皆無七年四月庚午車駕至涿郡之臨朔宫涿郡之新宫按略記中丙午幸无丙午今從帝紀長曆是月丙辰朔十二月孫安祖殺縣令亡抵竇建德記云安祖以盗羊杜儒童隋季革命舊唐書建德傳爲縣令所考今從八年正月癸丑略記甲子多差誤今不取皆從隋書略記云癸丑帝御前殿按長曆是月辛巳朔無西突厥闕逹度設關設今從裴矩傳隋西突厥傳作逹度賜處羅號娑那可汗那可汗今從隋書唐李軌傳作曷娑三月錢士雄孟金义戰死釵今從隋帝紀雜記作錢英孟金車駕度遼杖死甲午車駕度遼乙未大頓丙申大赦按長隋帝紀癸巳上御師甲子臨遼水橋戊戍麥鐵容有甲午乙未丙申此必誤也今並除之曆是月庚辰朔不容有甲子又戊戍之下不六月來護兒破髙麗復爲所敗還屯海浦髙麗斬髙兀北史云護破待諸軍今從隋書及革命記弟建武因破其郛營於城外以髙麗遣乙支文德詐降今從隋書及北史革命記作尉支文徳文德復詐降宇文述等遂還城頭即樹降幡約至五日革命記云許公即至平壌報荅又十数日乃云船糧敗却廻公今更欲何待然始抗旌檢録簿籍圗書開門待命期過五日無一言許公頻催竟无而行四靣俱時受敵傷殺旣衆糧食又盡過遼水者什無二拒守分兵以捉險要許公知𬒳欺即卷甲㱕每日常設方陳降述等必不敢還今從隋書三按煬帝驕暴髙麗若明言不七月癸卯帝引還文述等糧尽遁㱕髙麗出兵邀截亡失雜記七月帝自涿郡還東都十一月宇劉士龍等於軍市特赦述今從隋書蕩盡帝怒敕所司鎻將隨行無幾斬九月車駕至東都馬將遂度遼之功蓋誤今不取雜記十月車駕幸涿郡徴召兵十一月于仲文卒斬于市今從隋書略記于仲文以下九年正月靈武賊帥白瑜娑妄今從略記隋書作白榆二月復宇文述官爵一月今從隋書雜記在去年十六月楊玄感以河内主簿唐禕爲懷州剌史州司功書雜記作懷隋書佐今從玄感屯上春門按劉仁軌河洛記東都羅郭東靣北頭第玄感傳云屯兵上春門又云屯兵尚書省書省在宣仁門内玄感不容至此一曰上春門唐攺曰上東門又尚衞文昇率兵四萬救東都十萬而下云衆寡不敵今從雜記隋書云歩騎七萬按玄感衆不過丈昇衆寡不敵死傷太半坐地弃甲以白布裹頭聽賊雜記曰毎戰刄纔按官軍皆不利今從文昇傳所掠前後十二戰皆八月令骨儀等推玄感黨與記推玄感黨在十月疑太雜記作滑儀今從隋書雜元淑言之晚今因誅趙十一月李密亡命爲人所獲送東都行入関與玄感從隋書密傳云密聞京兆獄又云及出関外防禁漸㢮又云至邯鄲密等七人皆叔詢相隨匿於馮翊詢妻之舎㝷爲鄰人所告遂捕獲囚於中送髙陽不當与韋福嗣同行今從賈閏甫蒲山公傳及劉穿牆而遁唐書雖不云囚於京兆獄亦云出關按密若自關行年記仁軌河洛密至石梁驛穿牆而逸今從蒲山公傳河洛記在左梁驛十二月吐萬緒魚俱羅討劉元進請待來春俱羅連年帝紀云緒敗止在今年冬春之交矣元進退據建安而得拒丗充於江不能克按緒請待來春而王丗充十年又擊孟譲然則元進復來也上者盖王丗充阬降賊三萬餘人澗澗長數里深闊數丈積屍与略記阬其衆二十餘万於黄亭阬所首八千餘人於黄山之下今從隋書之平雜記丗充貪而无信利在子女資財並十年春六万刻到鴨緑水乙支文德遣行人僞請降以緩雜記是年正月又以許公宇文述爲元帥將兵十停五日王師食尽燒甲札食之病不能興文德乃縱兵大戰我師又求与述相見以觀我軍形勢述与之歡飲良乆乃去序八年事誤在此耳敗績死者十餘万此盖二月唐弼立李弘之爲天子從唐書薛㪯傳隋帝紀作李弘今五月延安賊劉迦論反去上郡太逺今從隋書唐書作安定人按安定十二月盧明軍祝阿下邳今從隋書唐秦叔寳傳作十一年三月髙德儒見孔雀奏以爲鸞二月馬徳儒雜記云五年略記并温大雅創業起居注奏孔雀爲鵉今年月及姓皆從四月以李淵爲山西河東慰撫大使尉少卿轉右驍衞創業注云帝自衞時也按十二年帝未甞幸楼煩今從髙祖實録在幸汾陽宫時將軍奉詔爲太原道安撫大使即隋大業十二年煬帝幸楼煩八月帝廵北塞貴討擊之王師敗績安貴死百司震懼七雜記六月突厥賊入嵐城鎮抄掠遣范安多不至一夜並露坐雨中至曉多死宫人无食貸糒於衞士月帝幸鴈門先至天池值雨山谷泥深二尺從官狠狽帳幕隋書今從十月壬戍帝至東都東都今從隋帝紀略記九月辛未入十二年五月帝於景華宫求螢火得數斛夜放之貞觀呉兢甘泉宫怪元螢火敷云捉取少多於宫照夜所司遽遣数千政要貞觀八年上謂侍臣曰人君之言不可容易隋埸帝幸事尚尓况其大乎今從隋書人採拾送五百轝於宫側小十月李密之亡抵郝孝德正月歷亭鎮將王該認形狀韓昱壷関録曰大業十一年忽至一澗水深岸險密跛足寅縁佯足蹶返撲而墜乃至良獲李密送宇文述密佯患足疾防守者一日不行一二十里以手援㦸佯作失勢推㦸向水守者以危岸手探不往遂即乆狀若未蘇防守者又无計下取之遂以手中槍㦸引之密楊玄感之黨前巳詐亡防者豈得不加械繫怠慢如此今不取放却密即得鏘擉守者二人俱斃遂投郝孝德於平原按密韋城翟讓同郡單雄信人今從河洛記唐書云雄信曹州李密因王伯當見翟讓密是玄感亡將潜勸譲害之密懼隋唐書皆云密歸翟譲其中有知姓名誰不知是玄感亡將譲得之當用以敵隋何惡於密而因王伯當以䇿千譲譲始敬焉按密旣亡歸羣盗必不隱其之䇿河朔可指揮而定孝德曰本縁飢荒求活性命何敢別害之今不取革命記云密投賊帥郝孝德說之曰若能用密兵送公於彼是日孝德以馬一匹自送至河執袂飲酒而別圖囯家若知公在此孝德死亡无日翟譲等徒衆絶多請將馬將送密於翟譲今從隋書軍中慕從者亦数十人仍遣兵密說讓先取滎陽休兵館榖米逾巨億請公發一札之革命記密說讓曰洛口倉公然後稱帝號以定中原云云譲曰就倉食米實是上計自今使密奉之告諸道英雄就倉喫米必當雲合響應受命於而拜譲亦拜於是言宴尽歡各恨相知之晩即日譲作書与顧庸賤寕敢別創餘心必如此謀願奉公爲主密懐懼攺容令揔㑹洛口倉食米今從隋書密散告諸處賊頭並尅期定日操師乞自稱元興王建元始興髙祖實録林士弘傳大隋帝紀作操天成按唐陷豫章郡入據之唐書士弘傳云操乞師自號元興王皆无業末与其郷人操師乞起爲羣盗師乞僣號建元爲天成攻二史各有名號年紀今參取之操天成名此賊本一人而隋唐十二月林士弘稱帝國號楚建元太平弘自稱南越王唐髙祖實録士之以士弘爲大將軍乞師旣死士弘代董其衆復与劉子翊㝷僣號建元延康唐書林士弘傳操乞師攻陷豫章郡而據万十三年徙據䖍州稱帝其國號年名与此同今從隋書大戦於彭蠡湖隋師敗績子翊死之士弘大振兵至十餘李淵爲太原留守討甄翟兒破之十三年拜太原留守新舊唐書本紀皆云翟兒於西河破之今從隋帝紀新書仍云擊髙陽歷山飛賊甄楊義臣破髙士逹斬之竇建德収散兵軍復大振記曰革命樹入髙雞泊中德政自號東海公以建德爲長史俄而德政髙士逹髙德政与宗侯鳩集離散得五万人捺渦於四根柳劫抄至晏城府爲城中兵所射而死賊之異姓皆欲建德爲病死即有髙攩脫継立爲東海公建德仍依舊任攩脫領兵兵精強建德恐𬒳屠乃詐分爲官軍告髙氏併力共擊之髙主髙氏一族不欲更立別人遂分爲兩軍各相猜貳然髙氏建德兩軍擁掠遣坐簡其驍勇及頭首千餘人殺之遂揔統氏无疑即合軍共闘兵刄纔交建德自後擊之髙氏兵大乱大業十二年二月也今從隋唐書其衆建德自號長樂王宼抄州縣即恭帝義寧元年正月杜伏威大破陳稜往克捷唐杜伏隋陳稜傳云往通等後爲伏威所敗也今從唐書威傳云稜僅以身免盖稜先破李子竇建德稱長樂王攺元丁丑紀皆云武德元年二月建德許敬宗唐太宗實録舊唐帝是今歳今從隋帝紀及建德傳稱長樂王按建德攺元丁丑即二月劉武周殺王仁恭自稱太守馬邑軍人劉武周殺創業注云二月己丑按唐書武周據汾陽宫乃僣號於時未也太守王仁恭據其郡自稱天子囯號定楊越王侗討李密約十一日㑹倉城南二十一日㑹戦河蒲山公傳云尅取庚子則非二十一日也當是十一月佫記云取其月十二日㑹戦按下有李密號魏公稱元年書王字於堋上如錢約中者爲主其壷関録云王伯當令宻於西垣校射遂奉以爲主其說鄙陋今不取河洛記云攺大業十三年爲次以近逺爲拜官髙下使賈雄執箭仰天而誓宻正中字心山公傳及隋唐書永平元年今從蒲密拜翟讓爲上柱國司徒封東郡公後來進封耳今從河洛記云鄧公盖及隋唐書蒲山公傳羣盜皆歸密衆至數十萬夜襲倉城二府兵擊退之己略記云二月丙辰宻遣其將倉城二十餘日不下旣而外救不至食又尽城乃陷没死者未又悉衆來攻而府兵敗遂入據倉然二府將士猶各固小倉招納降者日数百千人於是趙魏以南江淮以北莫不㱕太半於是鞏縣長柴孝和監察御史鄭頲等㪯縣降賊宻開戊午還都王慰撫不責也於是發教募士庶商旅奴等分置附自是賊徒滋蔓矣壬子使劉長恭房崱等統兵東討大敗於省寺府舎安置焉又使宋遵貴將兵鎮陜縣太原倉雜記營壁各立將帥統領而固守其諸里居民皆移入三城之内倉城官軍擊退之明日又引衆攻倉連戦三日陷外城官軍宻稱魏公攺年于時倉猶自固守旣而宻遣翟譲將兵夜襲六七按二月壬午朔无丙辰等日今從隋書猶捉子城月餘外援不至城尽陷没死者十密築洛口城周四十里八里今從隋書壷関録云周四十三月突厥立劉武周爲定楊可汗囯號唯創業起居注新舊唐書武周皆无定楊云囯號四月薛舉與其子仁果劫郝瑗發兵仁果後作仁杲新唐髙祖實録先作實録呉兢太宗勲史革命記焦璐唐朝年代記陳嶽唐統紀舊髙祖太宗紀薛㪯傳柳芳唐曆柳宗元集皆作仁杲太宗曰白蹄烏平薛仁果時所乗此最可據今從之皆作仁果今醴泉昭陵前有石馬六匹其一銘李密以孟讓爲揔管逹今從隋書河洛記作孟癸巳密襲回洛東倉破之攻偃師金墉不克乙未還洛口市北曉而去癸未密襲據都倉乙亥密部衆入自上春門略記三月辛未密遣孟譲將二千餘人夜入都郭墝豐都火接宣仁門因逼門爲陳与城上弓矢相接而退還倉雜記於宣仁門東街立柵而住丙寅燒上春門及街南北里門楼官賞有差撤天津等諸橋運回洛倉米入城四月密攻偃師密遣革謙將兵燒豐都市三月越王侗教募力捉宫城守固陽以東至陳譙下邳彭城梁郡皆屬密賊衆逾盛并家口百圍金墉東都兵出密還洛口五月裴仁基翻虎牢入賊自滎丙寅燒上東門而退此三書月日交錯皆不可憑今從隋唐書万蒲山公傳三月乙亥密率衆入自上東門攻宣仁門不克趙陁降密從蒲山公傳隋書作趙佗今煬帝以李淵王仁恭不能禦宼遣使執詣江都繼遣使馳驛赦之恭帝自以姓名著於圖籙太原王氣所在恐𬒳創業注曰隋主遣司直姓名馳驛繫帝而斬仁耳語謂王曰隋曆將盡吾家継膺符命不早起兵者顧爾兄猜忌因而禍及頗有所悔時皇太子在河東獨有秦王侍側同受孥戮家破身亡爲英雄笑王泣而啓帝曰芒碭山澤是弟未集耳今遭姜里之厄爾昆季湏㑹盟津之師不可從吾機變何能爲也然天命有在吾應㑹昌未必不以此相啓今處容人請同漢祖以觀時變帝曰今遇時來逢兹錮繫雖覩亡我何所逃刑乃後數日果有詔使馳驛而至釋淵而免仁吾激勵謹當敬天之誠以卜興亡自天祐吾彼焉能害天必仁恭巳死矣又髙祖身爲留守且𬒳禁繫亡去何之恐此亦恭各依舊檢校所部案焬帝若有詔斬仁恭則比後使之至也今皆不取非太宗之謀五月丁丑李密與隋軍戰大敗奔洛口月戊申叚略記云四固倉五月丁丑逹等又出兵陳於倉西倉北密又來拒大破逹等帥關内兵陳於倉西倉南密出軍拒戰大破凶醜密還營中東都出兵擊之密衆大潰弃回洛倉奔洛口俱無月日之密奔洛口按隋書北史新舊唐書皆云密爲流矢所中卧云五月二十八日越王掖出師使叚逹等大戰於倉西北密河洛記云密軍失利歸於鞏縣東都復得回洛倉蒲山公傳日丁丑五月二十八日蓋趙毅承蒲山公傳誤以密一敗分軍敗績歸於鞏縣亦不云密連月再敗也戊申四月二十八事也爲二楊德方死仁今從河洛記壷關録作王德密以鄭乾象爲右司馬乾象云宻殺其兄乾覆乾覆之隋唐書皆作䖍象唯壺關録作師殺宻今從之子㑹通後從盛彦六月劉文靜勸李淵結突厥來報文武入賀帝曰且創業注云突厥去覘人蓋温大雅欲歸功髙祖耳今從唐書劉文靜傳勿相賀當爲諸君召而使之即自手與突厥書淵自爲手啓卑辭厚禮遺可汗署云名啓所司請攺創業注云仍命封題於突厥蓋謂此時但温大雅諱之耳啓爲書帝不許按太宗云太上皇稱臣李淵使建成丗民將兵擊西河衆討西河髙祖太宗實録創業注云命大郎二郎率唐殷嶠傳從隱太子攻西河今從創業注但云命太宗徇西河蓋史官没建成之名耳七月煬帝遣王丗充等赴東都討李密充率淮南兵雜記四月丗間行自黎陽濟河而至七月丗充率留守兵二萬擊密無功萬人援東都丗充行至彭城懼密衆之盛自以兵少不敵乃蒲山公傳今從略記劉文靜至突厥與可汗爲約起事今欲何爲文靜曰皇帝唐劉文靜傳曰始畢曰唐公故起義軍欲黜不當立者創業起居注先巳再遣使至突厥廢冡嫡傳位後主致斯禍亂唐公國之懿戚不忍坐觀成敗有此問今不取不容今日始畢方淵以書招李密則齎書招李密蒲山公傳密荅書曰使至壷關録云髙祖屯壽陽遣右衞將軍張仁應巳巳還至霍邑又發書日不應猶在壽陽今皆不取辱今月十九日書按長曆是月已酉朔十九日丁卯不淵將北還丗民諌而止乃與建成分道追軍集文武官創業注帝事見機而發無有不爲借遣吾當突厥武周之地何有不來人及大郎二郎等而謂之曰以天賛我而言應無此勢以人姦謀難測突厥見利而行武周事胡者也太原一都之㑹義之理諸公謂云何議者以老生屈突通相去不遥李密譎誑輩何如對曰武周位極而志滿突厥少信而貪利外雖相附兵家屬在焉愚夫所慮伏聽敎旨唐公顧謂大郎二郎曰爾勢未必同謀同志老生突厥奔競來拒進闕圖南退窮自北内實相猜突厥必欲求利太原寧肯近忘馬邑武周悉其此無憂坐即有糧行即得衆李密戀於倉粟未遑逺畧老生輕還無所入往無所之畏溺先沈近於斯矣今木菽𬒳野人馬兩罷進軍若不殺老生而取霍邑兒等敢以死謝唐公喜曰躁破之不疑定業取威在兹一決諸人保家愛命言不可聽公事耳太宗實録盡以爲太宗之策無建成名蓋没之耳據爾謀得之吾其決矣三占從二何藉輿言懦夫之徒幾敗乃亦不欲還也今從創業注建成同追左軍則是建成意薛舉稱秦帝按今冬舉敗問禇亮天子有降事否是則巳唐髙祖實録武德元年四月辛卯舉稱尊號從唐書舉傳稱尊號也今竇建德破丗雄翊衞將軍薛丗雄於留鎮兵内簡練精銳革命記帝以李密在洛口征遼回日令右等諸軍並取丗雄處分丗雄乃自領精兵六萬四月末至河反幽易驍勇討密經過之處若有草竊隨便誅翦仍令王充無粮食兵士先皆分散餘軍不滿千人在武強縣境収麥充間郡城下作營州縣皆備牛酒軍粮以待薛將軍時建德以云不免問欲首如何巫云亦不吉問欲掩其不備擊之如何食聞丗雄兵至河間惶懼無計問一女巫欲走避之如何巫十里建德簡精兵二百八十人先行餘勒續發建德與衆決巫云今夜天未明到大吉卜時日巳午卜處去河閒一百四二里天巳屬明又聞吹角聲擬發建德惶惑欲降須臾大霧云夜到即打明即降之吉凶之事在北舉耳遂行去丗雄營左右先巳裝束擬發丗雄遂得上馬奔走仍中數槍僅而獲忽起建德曰此天助我也遂引兵入營攻之兵遂大亂出雄弃甲奔亡遂使山東賊勢轉盛李密先招慰河北州縣多悉免幽易之士並不欲作留鎮兵先無闘意旣不知賊多少悉敢死士千人襲之丗雄以數百騎遁去今從隋薛丗雄傳以從之丗雄慙憤而卒唐竇建德傳云七月丗雄討之建德帥命記參之建德傳革九月李密使徐丗勣襲取黎陽倉祖君彦檄云又得河洛記今年四月方勸取黎陽倉蓋君彦爲檄欲虚張聲勢非事實也回洛復取黎陽天下之倉盡非隋有而九月魏徴啓開倉恣民就食得勝兵二十餘萬黎陽倉就倉者數唐李勣傳勣初得人中即加禮敬引之卧内談謔忘倦按徴爲元寳藏作啓方十萬人魏徴髙季輔杜正倫郭孝恪皆客㳺其所一見於衆尉郭孝恪先在密所足知此事爲虚今所不取謀取黎陽倉髙季輔兄爲汲令杜正倫爲羽騎都屈突通使桑顯和襲王長諧營長諧等戰不利業創及孫華等奉敎備預故並覺之伺和赴營設伏分擊應時摧注云桑顯和率驍果精兵數千人夜馳掩襲長諧等軍營諧潰散按太宗時未過河西今從髙祖實録及唐史大柰傳散唐髙祖本紀云義師不利太宗以遊騎數百掩其後顯和李淵圍河東通不敢出閉門自守城甚髙峻不易可攻唐創業注戊午唐公親率諸軍圍河東郡屈突公命旋師軍人時速上城遂不時速下公曰屈突宿衞舊人公觀義士等志試遣登之南面千餘人應時而上時值雨甚之驍銳先登恐無還路今且示威而巳未是攻城之時殺人解安陣隊野戰非其所長嬰城善爲捍禦我師常勝入必輕南城髙祖在東原不之見㑹暴雨髙祖鳴角収衆由是不克得城如何所用乃命還唐髙祖實録云驍勇千餘人巳登其美耳今不取温大雅因爲虚己未越王侗使劉長恭等合王丗充兵擊李密作乙略記按長曆是月己酉朔乙丑十七日也今從蒲山公傳丑河洛記作十二日蒲止公傳九月十一日師出東都煬帝詔諸軍皆受丗充節度破露布相續而來百姓忻略記云丗充擊密罔不摧敗績河洛記云四十餘戰丗充無功三書相違莫知孰是今忻歡詠於道蒲山公傳云自秋徂冬凡經三十餘戰丗充多有顯狀者存之皆不取唯勝負張季珣爲李密所殺所陷又云密壯而釋之翟讓從求金隋書季珣傳云密攻之經三年遂爲乃𬒳摧陷生獲珣於牙門遣人宣之以降爲度珣更張目極不得遂殺之河洛記曰自三月至九月不下後爲糧盡水竭攻守箕山之事今參取二書去其抵捂者而巳罵不肯低屈遂殺之按密明年巳降唐安得三年屈突通引兵趣長安赴長安疑其太迂今但云趣長安唐書通傳云將自武關趨藍田叚綸娶李淵女之劉子玄唐髙宗實録及新唐書皆云髙唐太宗實録云隱太子以琅邪長公主妻叚綸蓋攺封密大長公主適房玄齡謁李丗民於軍門焉按彦博時在羅藝所今不取舊唐書玄齡傳云温彦博又薦李淵命劉弘基殷開山西略扶風屯長安故城云敦煌創業注屯長安故城今從唐書弘基公自涇陽趨司竹留弘基山十一月雷永吉先登紹今從創業注唐髙祖實録作雷衞文昇巳卒李淵斬隂丗師等城陷歸于家義寧中卒隋書北史衞玄傳皆曰官不容獨免今從唐本紀按文昇與二人俱爲留守李靖素與淵有隙於塞外靖察髙祖知有四方之志因自柳芳唐曆及唐書靖傳云髙祖擊突厥祖尚未知知之猶不從當擊突厥之時未有異志靖何從察鎻上變將詣江都至長安道塞不通而止按太宗謀起兵髙隋朝曽經忤旨及兹城陷髙祖追責舊言公忼慨直論特蒙知之又上變當乗驛取疾何爲自鎻也今依靖行狀云昔在十三年乃卒蓋後人爲之託徴名又叙靖事極怪誕無取唯宥釋但行狀題云魏徴撰非也按徴以貞觀十七年卒靖二據耳此可爲丙辰王丗充戰敗戊午李密殺翟讓午欲各叙西京前巳有丙辰戊相亂故重出東都事使不翟讓兄弘從蒲山公傳河洛記作洪今密與讓弘等共坐單雄信等立侍兄子摩侯王儒信河洛記云密讓讓從蒲山公傳同榻而坐今丙寅置丞相府官屬癸未今從創業注唐帝紀在十二月十二月屈突通降潼關仍令通子壽隨軍喚父至稠革命記髙祖令諸將擊通通走出禍亂大人須轉禍爲福以自保全單馬輕身將欲何往桑追及之壽告通云天下今旣喪亡相王舉義兵平定悉放仗來降壽乃馳走抱通請大人屈節歸義通遂回通叱壽云此賊何由可耐引弓射之壽招喚通兵士並虧名節違背國恩然始収淚赴軍以見唐王今從唐書首東南兩淚號哭口稱至尊臣力屈以至於此非臣敢原有變京畿不靜遥爲處分恐失事機唯鑾輿早還方唐裴矩傳屈突通敗問至江都煬帝問矩方略矩曰太矩經事唐朝其子孫及史官附益此語欲蓋其悪耳今所不取可平定按隋失天下皆因矩諂䛕所致豈敢輒勸帝西還蓋王丗充屢與李密戰不勝七十餘戰河洛記云四十餘蒲山公傳云自洛北敗至此但云屢與宻戰戰再三失利今李淵遣詹俊李仲衮徇巴蜀使慰諭巴蜀實録在十二創業注云十一月甲子遣所云者即俊等邪爲别使也今從實録月甲辰唐曆在十二月丙午未知創業注資治通鑑考異卷第八
