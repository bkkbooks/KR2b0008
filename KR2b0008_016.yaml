body:
  text: 司馬光奉勑編集唐紀八上元二年正月壬子斬劉展使田神功生擒逆賊劉實録云乙卯平盧兵馬今從劉展亂紀展舊神功傳亦然平盧軍大掠江淮在二月今因展敗終言之劉展亂紀孫待封降以下事二月李光弼與史思明戰於邙山官軍大敗曰史實録魚朝恩以為然乃告光弼及僕固懷恩衛伯玉等曰可速出思明潛遣間諜反説官軍曰洛中將士久戍思歸士多不睦光弼懷恩敗績步兵死者數萬今從舊思明傳軍以掃殘寇光弼等然之今從舊光弼傳實録曰三月甲午衛伯玉破史朝義月丙戍朔下有戊戍當實録作甲子按長曆此午作甲朝義殺思明愛所鍾即為繼嗣欲殺朝義追朝淸為偽太河洛春秋曰思明混諸嫡庶以少者為尊唯下陜城使朝義率鋭卒北路先往已自宜陽引衆繼之今從子左右泄之父子之隙自此始􅌟邠志曰三月思明乘勝欲舊傳實録又殺朝清等太子朝英及偽皇后辛氏并不附己者數十實録朝義既殺思明密遣使馳至范陽殺偽利死者數千人通儒被斬於亂兵中薊門紀亂曰思明既王人偽范陽留守張通儒知有變遂引兵戰於城中數日戰不為思明所愛嗜酒好色凶獷頑戾招集幽薊惡少與其年齒有數十州之地年餘朝興遂為皇太子朝興辛氏之長男特鏤金銀控弦揮刃常如見敵以南行大將子弟統之每與其相類者百人為左右皆彎弓利劒飾以丹雘珠玉帶佩印雕流至地無楚痛之色則賞巵酒少似頻蹙乃鞭之從脛至踵黨飲宴酒酣爇燎其鬚髮或以銅彈丸擊之以頥顙為的血死者姬妾皆思明所掠良家子有不稱命則殺之亦有以湯或至數千困絶將殞方捨之候稍愈復鞭之有杖六七千不肉糜爛旁人皆毛豎股栗朝興笑臨而觀之以所策毬杖於鑊死者既火盛湯沸令壯士抱而投之𥘉宛轉呌呼須臾骨敗績于洛北斬首萬餘級勒其六宫及朝興備車馬為赴洛鑊中撞擊顔色自若上元二年三月甲寅使使告捷云王師人傳思明偽敕云兵陜虢以朝興為周京留守仍勒馳驛速之計賊庭之黨相慶踊躍呌喚聲振天地十餘日又宦者二也時朝義已殺思明僣位潛勒偽左散騎常侍張通儒戶部發并辛氏已下續行朝興大喜其宦者朝義偽遣之人莫知朝興速召工匠與其母妻造寶鈿鞍勒搜索庫藏修乘騎之尚書康孝忠與朝興衙將髙鞫仁髙如震等謀誅朝興其日在其廄中朝興出入馳驟每日則於桑乾河飲之通儒將入具并命左右各備行裝唯數十人侍衛思明留駿馬百餘匹沙門神之院通儒與鞫仁領步兵十餘人入其日華門偽皇潛今康孝忠從數十人持兵詣飲處馳取其馬閉於城南毗腹心衛鳴鶴又問亦斬之子城擾亂朝興惶怖猶能擐甲持城留守劉象昌逢之驚問其故通儒顧左右斬之俄而朝興一匹朝興乘而䇿之不前遂步戰通儒立白旗招朝興之黨兵與親信二三十人出拒奔走於廄中取馬馬盡矣唯病馬捶降者太半朝興猶從十餘人接戰弓矢所發無不中者中降者捨罪復官爵惡少等雖沐朝興之錫賚亦怨其無道鞭人不知甲兵之故皆惶恐潛匿通儒於城門拒戰良久日已者皆應弦沒羽通儒軍披靡所傷者數十百人退出子城外入禁中劫掠金帛思明朝興妻衣服皆盡夜半蕃將曹閔之云暮朝興衆寡不敵走匿城上之逍遙樓遂失其所通儒兵髙如雲對曰以殿下殘酷人各有怨心朝興曰乞放此一度於樓上擒獲之朝興曰我兄弟六七人朝興一身斬之何益謹奉將軍閔之曰殿下但死腰帶閔之自解取左右益笑縊後更不敢執者皆笑又謂閔之曰此腰帶三十兩黃金新造興亦甚敬憚至是惶怖走入私弟不自安匍匐待罪通儒領以弓弦斷其首函送洛陽偽侍中向閏客特受思明委託朝特有寵於朝興又與鞫仁如震等友善為兄弟當誅朝興之之勒馳驛赴洛通儒收朝興黨與悉誅之思明驍將辛萬年斬萬年首送鞫仁置酒與萬年同飲謂曰張尚書令殺弟故黨也通儒有意於萬年及令行刑遂忘之至是敕鞫仁如震終不肯殺弟於是如震萬年領其部曲百餘人入子城斬通相報萬年稽苜但乞快死鞫仁抗聲曰只可兄弟謀取通儒推偽中書令阿史那承慶為留守函通儒等首使萬年送洛儒於子城南廊下城中擾亂又殺其素不快者軍將數人共為留守鞫仁如震等各從數百人𬒳甲巡城城中人心彌懼陽誣其欲以薊城歸順朝義聞之使使令向閏客所在却回騎出子城至如震宅門立令屈將軍暫要相見如震不虞有承慶為留守一兩日又不自安遞相疑阻於是領蕃兵數十孝忠招集蕃羯鞫仁聞如震遇害驚而且怒統麾下軍討之難馳至馬前承慶斬之應聲而殞承慶入東軍與偽尚書康徑捷馳射如飛承慶兵雖多不敵大敗殺傷甚衆積尸成立相逢於宴設樓下接戰自午至酉鞫仁兵皆城旁少年驍勇詣洛陽自陳其事城中蕃軍家口盡踰城相繼而去鞫仁令承慶孝忠出城收散卒東保潞縣又南掠屬縣野營月餘徑承之髙鼻類胡而濫死者甚衆時鞫仁在城中最尊使使奏城中殺胡者皆重賞於是羯胡俱殪小兒皆擲於空中以戈迎之鞫仁嚴兵不出閏客甚懼戒其子弟從者無帶軍器從朝義以承慶等反向閏客行至貝州承朝義命回將至衆官仁亦抗禮還營閏客但專守子城端坐餘不敢輒有所問奏數人而入鞫仁待之於日華門閏客望見下馬執手相慰鞫義以偽太常卿李懷仙為御史大大范陽節度使燕州頗有承慶等使回朝義以鞫仁為燕京都知兵馬使五月甲戍朝千自薊城南門入鞫仁不出迎之於日華門懷仙至卑身過兵田故委腹心鞫仁聞之意不快也無何懷仙至從羸馬數小解懷仙以薊縣為節度院雖任節制鞫仁兵五千餘人皆禮立談約為兄弟結盟相固期同保燕邦以奬其主鞫仁意為之屈既而懷仙命饗軍士中宴鞫仁疑有變兵皆驚走還不受命十數日懷仙待之彌厚每衙皆降階交接鞫仁亦不罪其夜鞫仁將襲懷仙遇大雨持疑未決徹明遂止單騎至營𬒳甲懷仙憂懼無計遂囚其衙將朱希彩責以驚軍中之與坐良久乃問驚軍之罪門已關顧左右拉殺之立捨希彩莭度門懷仙已潛備壯士待之鞫仁趍入懷仙亦不攺常禮皆在坊市閭巷閭但兩敵相向不入人家剽劫一物蓋家家自暮春至夏中兩月間城中相攻殺凡四五死者數千戰鬪虞六月丙申宣思明遺誥發喪將相百寮縞素哭於其聽政自有軍人之故又百姓至於婦人小童皆間習弓矢以此無赴洛陽加懷仙燕京留守河洛春秋𥘉朝義令人以書與向樓前卑幼相視而笑笑聲與哭聲參半焉朝義又追向閏客毬獵為務車下勇敢之士僅三千人每日教習然其殘酷頗貢并阿史那王殺朝清朝淸既受父命常有君臨之心惟以諸將之書又聞思明已死因説朝淸曰昨有密旨令大王主有父風而加淫亂幽州士庶無不吁嗟向貢髙久仁等既見恐日貽窘迫朝清然之是日顧左右各令辭訣便自飾裝髙器承祧其事尤重今敵國猶在上人未還儻更移恩於人誠那王向貢等共率三百人繼至朝清時在卧內僕妾侍側忽久仁髙如震等及其無備率壯士數百人潛入子城門阿史髙如震乃於樓下佯戰朝清自援弓射之凡斃數人阿史那聞兵士問是何人門人曰三軍叛乃擐甲登樓責讓向貢等十日阿史那又殺向貢阿史那自稱長史三日後斬髙久仁軍佯北朝清下樓向貢等令人擒殺之向貢攝知軍事經四中分兩軍經五日以燕州街為界各自禦備遞相捉搦不得以其首梟之殺朝清故也髙如震還固守與阿史那相持城樓前與如震會戰如震不利乃使輕兵二千人於子城東出往來阿史那從經略軍領諸蕃部落及漢兵三萬人至宴設敗走於武淸縣界野營後朝義使招之盡歸東都應是胡面直至經略軍南街腹背而擊之并招漢軍萬餘人阿史那軍旅拒之中承阿史那遁逸之後野行草次人各持兵糗糧芻不擇少長盡誅之於是朝義偽授李懷仙幽州節度髙如震捉為圍練懷仙方自統五千餘騎直寇薊門髙如震將欲出茭非戮不應朝義令兵士悉為商賈白衣先行至幽州盡𬒳宥大行誘募咸捨厥愆於是士衆帖然競皆欣戴乃大賞設師以抗其命慮其卒叛因出迎之懷仙實內圖之且外示寬人殺偽太子朝英新傳作朝淸今從河洛春秋及新傳餘從經三日因衆前却乃斬髙如震幽州遂平舊傳亦云朝義令紀亂薊門五月李光弼為河南副元帥都統河南等八道録實為河南淮南東西山南東荆南五道劉展亂紀又有江西浙舊紀皆云光弼都統河南淮南山南東江東五道唐曆會要平之則是浙東亦其統內也今從之東浙西凡八道按袁朝亂浙東光弼討十月崔圓署李藏用楚州剌史既平諸將爭功疇賞劉展亂紀曰初劉展眙按實録七月藏用已除浙西節度副使蓋恩命未到耳未及李藏用崔圓乃署藏用為楚州刺史領二城而居盱建丑月祀圓丘太一壇昊天上帝己亥詔以來月一日實録建子月戊戍冬至其日祀宗紀乙丑皇后矯詔召太子輔國元振衛從太子入飛龍廄后是日俱為輔國所害舊肅宗紀丁卯宣遺詔是日上崩代宗崩新本紀丙寅間廄使李輔國飛龍廄副使程元振遷皇以俟變是夕勒兵於三殿收係及朱光輝馬英俊等丁卯肅係傳皆以假恆俊為馬英俊按張后以乙丑日召太子逮夜后于别殿殺越王係兖王僴是夜皇帝崩代宗録唐曆統紀等乎蓋收係等在乙丑之夜也今從代宗實録舊代宗紀新不至則必知有變矣輔國等安能待至來夜然後勒兵收係僴之罪云二王同惡共扇姦謀蓋僴亦預謀也今從之舊傳皆云兖王僴寶應元年薨而代宗實録羣臣議係五月庚辰郭子儀收王元振及其同謀四十人皆殺之王元禮等四十人為首者斬餘並決殺邠志曰七月實録曰子儀至軍撫循士衆潛問罪人得害國貞者辰月十一日發上都二十七日至絳州五月二日斬元振等郭公到朔方行營舊傳曰三月子儀辭赴鎮汾陽家傳曰建月日從家傳人數從實録三十人今元振名從諸書尚衡殷仲卿相攻於兖鄆此年五月田神功自淄青移衡上元元年為淄青節度使光祿卿而得相攻於兖鄆者蓋衡猶未離淄青仲卿亦在彼兖鄆六月衡自賔客為常侍七月仲卿自左羽林大將軍為未肯入朝也雖有新除官皆田神功等憚李光弼威名申光等十三州自領精騎圍舊傳曰朝義乘北邙之勝寇遺田神功擊敗之又曰𥘉光弼將赴臨淮在道升疾而行監李岑於宋州將士皆懼請南保揚州光弼徑赴徐州以鎮之不從徑往泗州光弼未至河南也田神功平劉展後逗留於軍使以袁朝方擾江淮光弼兵少請保潤州以避其鋒光弼騎至徐州史朝義退走田神功遽歸河南尚衡殷仲卿來瑱楊府尚衡殷仲卿相攻於兖鄆來瑱旅拒於襄陽及光弼輕神功已還也實録今年八月袁朝始陷台州借使當時已擾皆懼其威名相繼赴關按光弼既使田神功擊敗朝義則是謂之避其鋒也今從新傳江淮則自泗州往潤州不得六月罷李輔國中書令吏止之曰尚父罷相不應復入舊傳輔國欲入中書作謝表閽先帝上猶優詔答之按此乃對上之語非對閽吏之語也今此門輔國氣憤而言曰老奴死罪事郎君不了請歸地下事紀從唐來瑱擒裴茙言假道入朝及見瑱即云奉代且欲視事舊茙傳曰瑱設具於江津以俟之茙𥘉聲遂引射瑱軍因與瑱兵交戰茙軍大敗按瑱若設具相見則瑱報曰瑱已奉恩命復任此茙惶惑喻其麾下曰此言必妄而交戰今從瑱傳茂豈得遽射瑱軍八月袁朝攺元寶勝譜皆攺元升國今從新書柳璨正閏位曆宋庠紀年通裴冕貶施州刺史烜善候星曆乾元中待詔翰林頗承代宗實録祕書監韓頴中書舍人劉精慎妄有否臧因是得罪配流嶺南既行賜死于路初冕為恩顧又與李輔國昵狎時上軫憂山陵廣詢十兆頴等不能恩乃奏輔國所親信劉烜為判官潛結輔國烜得罪乃連坐僕射數論時政遂兼御史大夫充山陵使以李輔國權重有程元振傳焉今從舊十月盜竊李輔國之首去統紀曰輔國悖於明皇上在舊傳曰盜殺李輔國携首臂而斷其首棄之溷中又斷右臂馳祭秦陵中外莫測後杭州刺東宫聞而頗怒及踐阼輔國又立功難於顯戮密令人刺之門將曰某即害尚父者今從舊傳史杜濟話於人曰嘗識一武人為牙回紇鞭魏琚韋少華等遣雍王適歸營曰雍王恭代宗實録誅無禮王以東略之故止之又曰會中數万人駭愕失色雍行詔命辭色不屈虜亦不敢失禮時人難之時官軍合圍將立不屈此蓋史官虛美耳今從舊回紇傳王正色叱之可汗遂退建中實録曰上堅雍王留陜州軍及回紇兵馬進發陜州東討留英又朝恩代宗實録戊辰元帥雍王帥僕固懷恩等諸澤州路入今從唐曆及舊朝義傳為後殿是日又詔河東道節度使自十一月薛嵩以四州張忠志以五州降嵩以相衛洺舊懷恩傳曰宗實録曰張忠志以趙定深恆易五州歸順又曰史思明授邢趙州降于李抱玉李寶臣以深恆定易四州降于雲京代今從舊王武俊傳忠志恆趙節度使僕固瑒敗賊于下博史朝義奔莫州義戰敗走歸范河洛春秋曰朝之是夏涉秋苦雨陂湖流注河東兵馬使李竭誠成德軍將陽途經衡水僕固瑒領蕃漢兵一十五萬趂及朝義接戰敗船悉是虜獲朝義遣人致命竟不應續令散雇舟船並皆掠李令崇咸統精兵亦革面來王競為掎角其漳河及諸津渡朝義曰臣聞兵勢兩均成敗由將衆寡不敵全滅在權昔劉盡四路俱絶諸將或請戰或請降朝義不恱田承嗣上疏與統之師皆自疲頓主客勢倍勞逸力殊若驅而令戰未見其主敗於白帝曹公破於赤壁陸遜黃盂皆以灌道取之今部棚排倒戈為禦每車甲士二人持兵而伏隨軍子丈羅於帳利請用車五十乘於古夏康王城北作三箇車營車上皆設寡則設此陳左右有險亦設此陳左右竒軍亦設此陳各令中每營輜重分列其次營後選二萬人布偃月陳凡敵衆我選精卒五千人鴈行陳使之接戰不勝則退於偃月陳後前猛將主之左者東南行右者西南行令去車營十里餘營前分然後桴鼓齊鳴前後俱至貔虎奮踊鹵楯爭先左軍足行軍既却敵必至車營愛其珍玩必將攻取候其兵縱陳勢匕後軍之來自然斷絶前後既不相救中軍又遇精兵服色相右軍東邁皆取古城之南令首尾相屬伏兵之發料敵必驚中軍若其不捷老臣請以弱卒五千為足下吞之朝義覽疏亂不敗何待令文景義主左軍逹于義感主右軍足下自主數十里由是朝義得逹莫州朝義既敗官軍威聲復振凡欣大恱因用其計官軍敗績喪師三千餘級僕固瑒大振退師以軍南行若有攻擊僕固瑒令吏士各顧所部以抗其鋒朝追集人莫已違鳩集舟航并連牌㭖先濟輜重兼及老弱方連船艦宵濟趨之今從舊懷恩傳義乃整師徒一時北濟僕固瑒亦代宗廣德元年正月甲辰朝義首至京師秋曰朝河洛春仙使使招迥却至漁陽過從潞縣至幽州城東阿婆門外於義東投廣陽郡不受北取潞縣漁陽擬投兩蕃至榆關李懷諸軍方知歸莫州城下舊僕固懷恩傳曰寶應二年三月朝巫閭神廟中兄弟同𬒳絞縊而死乃授首與駱奉仙經一日徐有濟傳其首以獻史朝義傳二年正月李懷仙於莫州生義至平州石城縣溫泉柵窮蹙走入長林自縊懷仙使妻弟固懷恩上言幽州平河北州縣盡平史朝義為亂兵所戮傳擒之送𣢾來降梟首至闕下實録寶應元年十一月己亥僕降田承嗣以魏州降沈既濟建中實録二年正月賊將李懷首上都舊紀寶應二年十月河北州郡悉平李懷仙以幽州首獻至闕下盡以所管來降年代記寶應元年十二月己亥仙擒朝義以降山東平唐曆正月甲辰李懷仙擒史朝義梟申朝義梟首至闕新紀廣德元年正月甲申朝義自殺其將僕固懷恩上言史朝義為亂兵所殺傳首上都二年正月甲末而河洛春秋云圍城四十日懷恩舊傳亦云攻守月餘日李懷仙以幽州降按諸軍圍朝義於莫州已在去年十一月月𬒳殺而實録在元年十一月舊紀因之又脫十一月字懷然則朝義之死必在今年正月明矣諸書皆云朝義此年正紀蓋據年代記但年代記元年冬十一月己亥朝義死亦與恩傳誤以正月為三月甲申正月十日甲辰三十日也新本甲辰傳首至闕新紀止用年代記甲申至闕為自殺日未知實録同若正月𬒳殺不應十日首級已至長安疑田申自殺甲辰傳首至京師何所據今從唐曆以七月張維嶽等屯沁州今從實録唐曆邠志作張如嶽八月駱奉仙奏僕固懷恩謀反次于汾州逗留不進實録癸未懷恩旋師恩頓軍汾上監軍使駱奉仙因公宴言有所指懷恩已萌二監軍使駱奉仙以聞上以功髙不之罪優詔慰勞之又曰懷仙出待懷恩如舊懷恩憚奉仙益不自安邠志曰寶應二年心肆口酬對奉仙不告而出乘傳上聞上以功髙容之叱奉紇還蕃既出晉關辛公率其輕兵先入太原懷恩匆其不告河朔既平詔太原節度辛雲京及僕固懷恩各以其軍送回懷恩欲因回紇規其城壁隂導回紇請觀佛寺辛公許之既曰辛君有虞於我也回紇至辛公館于城外致牛酒以犒之驚辟易而去今從舊懷恩傳入城見羅兵於諸街蕃人大十月髙暉降吐蕃激軍使髙暉禦之戰敗執暉九月至汾陽家傳八月吐蕃次涇寧州遣感州東去邠州三程邠州南去奉天二程不應庚午寇邠州辛便橋實録十月庚午吐蕃寇涇州辛未犯奉天武功按今涇日吐蕃寇涇原節度使髙暉降之十一月一日陷邠州節度未已至奉天蓋史官據奏到日書之耳假公家傳九月二十以城降因為吐蕃鄉導十月辛未犯京畿新本紀九月乙丑使張藴琦棄城遁舊本紀九月己丑吐蕃寇涇州刺史髙暉州辛未寇奉天武功今月從實録而不取其日涇州刺史髙暉叛附于吐蕃十月庚午吐蕃陷邠庚寅吐蕃悉衆遁去及其妻子僕從南入牛心谷駝馬舊吐蕃傳曰子儀帥部曲數百人昌監察御史李萼謂子儀曰令公身為元帥主上蒙塵于外車牛數百兩子儀遲留未知所適行軍判官中書舍人王延在子儀遽從之延昌曰吐蕃知令公南行必分兵來逼若當令吐蕃之勢日逼豈可懷安于谷中何不南趍商州漸赴行子儀之隊千餘人山路朿隘連延百餘里人不得馳延昌與大路事即危矣不如取玉山路而去出其不意子儀又從之澗登七盤趍于商州先是六軍將張知節與麾下數百人自萼恐狹徑𬒳追前後不相救至倒回口遂與子儀别行踰絶日矣延昌與萼既至説知節曰將軍身掌禁兵軍敗而不赴京城奔于商州大掠避難朝官士庶及居人資財鞍馬已有南將軍若整頓士卒喻以禍福請令公來撫之圖收長安此行在又恣其下虜掠何所㷌乎今郭令公元帥也已欲至洛體盈李推詵等數人各有部曲家兵數十騎相次而至又從則將軍非常之功也知節大挩其時諸軍將臧希讓髙升彭往迎子儀去洛南十餘里及之遂與子儀回至商州諸將大其計皆相率為軍約不侵暴延昌留于軍中主約蕚以數騎出至藍田紏合敗兵及諸驍勇願從者百餘人南保藍田以喜皆遵其約束吐蕃將入京師也前光祿卿殷仲卿逃難而羽林將軍長孫全緒請行全緒至韓公堆仲卿得官軍其勢拒吐蕃其衆漸振至于千人子儀既至商州募人往探賊勢百姓百姓皆紿之曰郭令公大軍不知其數賊以為也遂抽益壯遂相為表裏仲卿二百餘騎逰奕直渡滻水吐蕃懼問望國門涕不自勝謂延昌曰為舍人計何以復國延昌戲殺軍而還汾陽家傳曰公以三十騎循御宿川略山而東公西武關兵數日之內却出藍田設疑兵為斾屯於韓公堆吐蕃不能對公謂曰料諸將散卒必逃商於若速行收合散卒兼商州必宫吏不守則兵亂而人潰使延昌間道中宿至商州必懼我而退乃相與速驅之過藍田公與延昌議曰散兵至撫之亂乃止潰乃復今從之果如所議延昌以公之言巡李日越殺髙暉德信討斬之今從實録新魚朝恩傳曰朝恩遣劉郭子儀斬王甫百人集六街鼓於朱雀街大鼓之吐蕃實録曰有武將王甫等誘長安惡少數補御史大夫領五百騎二千步卒兼輔官屬以謀作亂甲午聞之震懾乘夜而遁汾陽家傳曰射生將王撫猛而多力自於城中堅列行陳戈矛若林指揮其間按甲不出人勸公必公發商州冬十一月壬寅公次滻水之右王撫知公之來也烏合之徒一時而潰邠志曰郭公屯商州十二月一日率諸不可入公以三十騎徐進曽不少懼令傳呼王撫撫應聲伏西戎懼焉三日馬家小兒張小君李酒盞射生官王甫等五軍五萬餘人出藍田去城百里而軍城中相傳言大軍將至建旗諸門吐蕃以為大軍夜至相率遁去小君使報郭公七百餘人夜半聚六街鼓入于子城雷擊天門街中仍分其衆至汝設詐以畏吐蕃吐蕃知之怒汝焚爇宫闕從容而去豈日郭公全師入于京師繫小君酒盞王甫等責之曰吾軍未軍舊將王甫入長安隂結豪俠為內應一日齊擊鼓於朱雀不由汝乎命斬之遂以破賊收城聞舊子儀傳曰全緒遣禁千人擾亂京城子儀召撫殺之詔子儀歡京城留守吐蕃傳街蕃軍惶駭而去又曰射生將王撫自署為京兆尹聚兵二苑中入椎鼓大呼仲卿之兵又入城吐蕃皆奔走若如邠志曰吐蕃餘衆尚在城軍將王撫及御史大夫王仲升頓兵自古推髙凌凖作書多攻其短疑有宿嫌不可盡信今從汾陽所言是子儀殺撫而攘其功計子儀必不為也子儀勳業今儀舊傳家傳及子十二月程元振私入長安京兆擒之以聞仍云將圖實録如此史大夫王仲升飲酒為御史所彈今從實録參以舊傳進取舊傳元振服縗麻於車中入京城以規任用與御二年正月合劒南東西川為一道以嚴武為節度使史遷東川節度使上皇誥兩川合為一道拜武劒南節度舊傳武為京兆少尹以史思明阻兵不之官出為綿州刺思明阻兵河洛京兆少尹何妨之官此年始合東西川為一使新傳武為少尹坐房琯貶巴州久之遷東川餘同舊傳按合新舊傳皆誤道豈上皇誥所二月焦暉白玉攻僕固瑒殺之張維嶽殺焦暉白玉而竊其功還惡不比於己者好賂於己者公捶殺之邠份陽家傳曰開府盧昴公先使汾州慰諭及嶽殺瑒聞詔優之諸將云云郭公乃理諒罪棒殺之今參取志曰郭公使牙官盧諒之軍如嶽貶諒使信其言郭公以如名從邠志二書昴職戊寅郭子儀如汾州瑒為帳下張維嶽所殺以其衆歸實録廣德元年十二月丁酉僕固僕固氏者以子儀為之帥也縱不在子儀領朔方節度使之郭子儀懷恩聞之棄營脫身遁走北蕃按朔方兵所以不附儀為朔方節度使汾陽家傳二年正月子儀充河東副元帥後亦當在領河東副元帥之後也而實録二年正月丁卯子河中兼朔方節度大使戊寅往汾州甲申還至河中邠志二河中節度使癸亥代宗三殿宴送二十六日發上都二月至加朔方節度二月僕固瑒率軍攻榆次逾旬不拔云云然則年正月二十日詔郭公加河中節度河東副元帥二十九日今因子儀如汾州并言之瑒死決不在去年十二月八月僕固懷恩引回紇吐蕃十萬衆入寇傳云數舊子儀衆按汾陽家傳實不過十萬十萬衆懷恩傳云誘吐蕃十萬河中節度副使崔宇有副使者蓋言其前官也五月已罷河中節度今猶九月白孝德敗吐蕃于宜祿一千餘衆於宜祿生擒實録癸巳孝德敗吐蕃則前八日孝德豈得已敗吐蕃於宜祿乎實録誤蕃將數人按汾陽家傳二十六日賊先軍次宜祿然十月懷恩引回紇吐蕃至邠州白孝德郭晞閉門拒守邠州子儀在涇陽子儀令長男朔方兵馬使曜率師汾陽家傳晞屢破吐蕃今從實録舊子儀傳曰虜寇皆云晞拒懷恩破之子儀傳云曜誤也拒之與白孝德閉城拒守按實録及晞傳虜攻邠州不克涉涇而遁馬步三千人於邠州西斬實録十月辛未夜郭晞遣恩及吐蕃等自潰京師解嚴汾陽家傳曰十月七日公誓師賊營殺千餘人生擒八十三人俘大將四人十一月乙未懷旗幟如十萬軍未曙懷恩吐蕃回紇吐渾等已陳于乾陵北曰明日有寇爾其備之及夜出兵數萬陳于西門之外廣布戰而懷恩頃為公所馭懾公之威又遁初軍中偶語夜中出辰二十里懷恩等初謂無備欲襲之既見陳兩蕃大駭不敢至于邠州營于北原十三日攻其東門不剋十四日橫陳于兵與鬼闍耳及未曙寇已至矣軍中所以服公之先知也賊涇而還邠志懷恩寇邠涇十七日衆渡涇水郭晞率衆禦之南原請戰晞等與之連戰大破之追奔數十里二十一日涉其射反為他人致死於我惜哉明日引軍南出舊郭晞傳曰戰于邠郛我師敗績懷恩覆其陳泣曰此等昔為我兒我教虜斬首五千級連戰皆捷吐蕃傳曰郭鋒於邠州西三十里懷恩誘虜再寇邠州陳于涇北晞乘其半濟而擊之大破獯其人將四人諸書載邠寧戰守勝敗事各不同今從汾陽家令精騎斫懷恩營破五千衆斬首千餘級生擒八十五人降録參之傳以實十一月假秀實殺暴卒假公家傳曰廣德二年正月此出柳宗元假太尉逸事狀經寇未暇耕耘乃謀頓軍奉天取給畿內時倉廩匱竭吏人白孝德授邠寧節度使七月大軍西還頗有俘掠又以邠土之力不能制公戲謂賔朋曰若使余為軍候不令至是行軍潛竄軍士公行發掘兼施捶訊閭里怨苦逺近彰聞孝德知奉天縣事浹旬而軍不犯禁逾月而路不拾遺永泰元年孝司馬王稷以其言啓於白孝德即日以公為都虞候兼權知據實録時晞官為左常侍宗元云尚書誤也又按實録廣德德奉詔歸邠州表公進封張掖郡王北庭行軍邠寧都虞候月公使陳回光與孝德議邊事於汾州則孝德不以永泰元三年十月吐蕃寇邠州孝德晞閉城拒守汾陽家傳其年九田官涇大將焦令諶取人田自占數十頃給與農曰且熟歸年始歸邠州陳翃誤也逸事狀又云先是太尉在涇州為營也督責益急且飢死無以償即告太尉太尉判狀辭甚巽使我半是歲大旱野無草農以告諶曰我知入數而已不知旱皆上以大杖擊二十垂死輿來庭中太尉大泣曰乃我困汝人求諭諶諶盛怒召農者曰我畏假某耶何敢言我取判鋪食取騎馬賣市榖代賞使勿知淮西寓軍帥尹少榮剛直士即自取水洗去血裂裳衣瘡手注善藥旦夕自哺農者然後榖又用大杖擊無罪者假公仁信大人也而汝不知敬今假也入見諶大罵曰汝誠人耶涇州野如赭人且飢死而必得擊無罪者又取仁者穀使主人出無馬汝將何以視天地尚公唯一馬賤賣市穀入汝又取不恥凡為人傲天災犯大人不可以見假公一夕自恨死按假公别傳大曆八年焦令諶不愧奴隸耶諶雖暴抗然聞言則大愧流汗不能食曰吾終聞其實令諶不死也猶存蓋宗元得於傳資治通鑑考異卷第十六
