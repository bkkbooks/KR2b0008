front:
  text: 資治通鑑考異卷第三
  hash: sha256:9c5baaaa4b40bdeaa784e259c0d079f7546f945f3fa1fa168a12a109ada875be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_003-1a}
body:
  text: 臣司馬光奉勑編集漢紀下獻帝𥘉平元年三月乙巳車駕入長安今從范書袁紀作己巳袁術據南陽術阻兵屯魯陽表不得至荆州魏志術傳孫范書術傳云劉表上術爲南陽太守表傳云盖術𥘉奔魯陽此春孫堅取南陽術乃據之猶以魯陽爲治堅殺張咨術得據南陽魏武帝紀此年二月已云術屯南陽也所六月王匡殺胡母班等班與匡書云僕與太傳馬公太僕謝承後傳漢書曰班王匡之妹夫命不敢玷辱而足下獨囚僕於獄欲以釁鼔此悖暴無道之趙岐少府隂脩俱受詔命關東諸郡雖實嫉卓猶以銜奉王執而殺之三年八月遣馬日磾及趙岐慰撫天下袁紀遣馬甚者也按范書此年六月遣韓融等安集關東袁術王匡各受詔又云恚卓遷怒自相乖迕疑非班書今不取趙亦在三年八月時董卓已死而此書云與馬趙俱冬蔡邕議省廟號今從范書袁紀在明年二年四月皇甫嵩荅董卓嵩語與此不同今從張璠漢紀范書嵩傳及山陽公載記記韓馥以冀州讓袁紹長史耿武治中李歷諫秋作耿九州春尉沮授諫無李歷今從魏志袁紀彧今從范書魏志袁紀又范書騎都十月帝遣劉和詣父虞時和為侍中因遣從武關出按范書劉虞傳虞使田疇使長安與疇俱還不應出武關又疇未還劉虞已死虞死在𥘉平四魏志公孫瓉傳但云天子思歸不云因疇至也若爾當令和年春范書誤也年冬界橋戰在三孫堅戰死三年英雄記曰𥘉平四年正月七日死袁紀𥘉范書𥘉平三年春堅死吳志孫堅傳亦云𥘉平松之按䇿以建安五年卒時年二十六計堅之亡䇿應十八平三年五月山陽公載記載䇿表曰臣年十七䘮失所怙裴並以堅𥘉平二年死此為是而本傳誤也今從之而此表云十七則為不符張璠漢紀及胡沖吳歷三年袁紹斬嚴綱今從范書魏志九州春秋作劉綱四月騎都尉李肅從范書魏志袁紀作李順今荀攸與鄭泰种輯謀殺董卓謀按顒瓊死已乆恐誤魏志云攸與何顒伍瓊同五月及李傕求赦王允曰一歳不再赦然則五月必無赦也范書丁酉大赦袁紀丁未大赦按是年正月丁丑大赦李催等圍長安守之八日今從范書魏志云十日楊州刺史陳温卒袁術以陳瑀為刺史月袁術殺陳温獻帝紀四年三病死不為術所殺九州春秋曰𥘉平三年楊州剌史陳禕死據淮南魏志術傳云術殺温領其州裴松之按英雄記温自陳温實以三年卒今從之術以瑀領楊州盖陳禕當為四年正月丁卯赦赦今從范書袁紀五月丁卯六月闕宣稱天子陶謙擊殺之魏志武紀及謙傳魏武范書謙傳作閻宣今從與合從後遂殺之并其衆按謙據有徐州託義勤王何藉宣紀又曰謙與宣共舉兵取㤗山華費掠任城謙傳亦云謙始襲曹嵩故曹操以此為謙罪而代之耳數千之衆而與之合從盖謙别將與宣共興平二年正月癸丑赦癸卯朔無癸酉今從范書袁紀作癸酉按長曆是月拜袁紹為右將軍軍今從范書袁紀作後將閏月己卯帝使皇甫酈和傕汜今從范書袁紀酈作麗沮授說袁紹迎天子使焉圖還說紀迎天子都鄴紹不從魏志紹傳曰天子在河東紹遣郭圖范書今從孫策渡江獻帝紀吳志孫䇿傳皆云興平元年虞傳江表魏志袁紀皆云𥘉平四年策受袁術使渡江漢欲攻徐州從陸康求米事必在劉備得徐州後也劉繇傳稱傳云策興平二年渡江按術𥘉平四年始得壽春策傳云術在興平元年已前今依江表傳為定吳景攻繇歳餘不克則策渡江不應劉繇敗走元年今從江表傳帝紀繇敗走在興平繇使朱皓攻諸葛玄太守范書陶謙傳亦云劉表所用而袁暐獻帝春秋云劉表上玄領豫章繇依表必不攻其所用也今從亮傳陳志諸葛亮傳云術所用按許劭勸建安元年六月劉備戰敗屯於海西場奉韓暹宼徐楊蜀志備傳於此云同破袁術於時未死也備傳為誤間備邀擊盡斬之按暹奉後與吕布備屯小沛此在布敗後備傳誤也備傳云遣關羽守下邳八月董承等拒曹洪迎天子在都雒後今從傳魏志此事在正月而荀彧傳曹操為鎭東將軍傳在都雒後今從傳魏志在六月而董昭十月郭嘉諫操圖劉備勸操殺備今從魏書傳子以為程昱郭嘉二年孫䇿襲烏程侯辰詔書賜䇿不知其何月也江表傳曰建安二年夏王誧奉戊九月操擊斬橋蕤橋蕤此又一橋蕤將蕤𬒳獲又還也然范書吕布傳云布破張勲於下邳生擒蕤事當是范書誤魏志吕布傳無橋操攻吕布灌城月餘曰圍之三月按操以十月至下邳及范書布傳云灌其城三月魏志傳亦三月今從魏志武紀殺布共在一季不可言劉備諫操緩吕布主簿王必趨進曰布勍虜也其衆近在獻帝春秋曰太祖意欲活布命使寛縛簿復不聽如之何今從范書陳志外不可寛也太祖曰本欲相緩主十二月桓階說張羡附曹操渡而階說羡按范書劉表魏志桓階傳袁曹相拒官表在官渡前也傳建安三年羡孫䇿遣張紘獻方物拜討逆封吳侯按策貢獻在二年非江表傳曰倍於元年所獻其年制書述䇿材略忠𣢾曹公乃優文襃崇攺號加封然則紘來在策元年也又陳志紘傳曰建安四年遣紘奉章詣許按吳書紘本傳誤也封吳侯前四年四月袁術部曲奔劉勲楊弘大將張勲等將其衆吳志孫䇿傳曰術死長史歸與諸書不同今從范書陳志術傳及江表傳欲就䇿廬江太守劉勲邀擊悉虜之収其珍寳以十二月華歆迎孫策豫章一郡大恐官屬請出郊迎歆曰華嶠譜敘曰孫䇿略有揚州盛兵徇之乃笑曰今將自來何遽避之有頃門下白曰孫將軍至請無然策稍進復白發兵又不聽及䇿至一府皆造閤請出避皆長歎而心自服也此說太不近人情今不取見乃前與歆共坐談議良乆夜乃别去義士聞之劉備殺車胄備殺車胄後明年董承乃死袁紀備據下邳蜀志先敘董承謀洩誅死備乃殺車胄魏志蜀志誤也亦在承死前五年正月曹操破備候騎卒至言曹公來備大驚然猶未魏書曰備謂操與大敵連不得東而棄衆而走計備必不至此魏書多妄信自將數十騎出望公軍見麾旌便四月孫策擊陳登到丹徒謀襲許未發而死陳矯傳云此事出江表傳據策傳云䇿軍旣退登設伏追奔大破之先賢行狀云登有吞滅江南之登為孫權所圍於匡竒登令矯求救於太祖太祖遣赴救吳軍尋復大興兵向登登使功曹陳矯求救於太祖此數者參志孫策遣軍攻登於匡竒城登大破之斬虜以萬數賊忿喪月遇害而志云策聞曹公與紹相拒於官渡謬矣伐登之言差不同孫盛異同評云按袁紹以建安五年至黎陽策以四今從之為有證也策殺許貢京邑若放於外必作丗患候吏得表以示策策江表傳曰𥘉貢上表於漢帝言策驍雄宜召還追巳去郡依嚴曰虎安能復爾蓋䇿破白虎時殺貢耳以讓貢貢辭無表策令武士絞殺之按貢先為朱治所丙午䇿卒傳䇿隂欲襲許迎漢帝密治兵部署未發為許虞喜志林云策以四月四日死故置此陳志策輕而無僃必死於匹夫之手果為貢客所殺嘉雖先見安能貢客所殺郭嘉傳曰策渡江北襲許衆聞皆懼嘉料之曰䇿臨江治兵疑其襲許嘉料其不能為耳知策死於未襲許之前乎蓋時人見䇿十月許攸奔曹操能足來奔今從范書紹傳魏志武紀曰攸貪財袁紹不操破紹殺七萬餘人居注曹公上言凡斬首七萬餘級范書紹傳曰所殺八萬人按獻帝起周瑜止魯肅以權可輔止肅按劉曄殺鄭寶以其衆與劉肅傳曰劉子揚招肅往依鄭寶肅將從之瑜安得及權時也勲勲爲策所滅寶七年五月南單于降及單于皆降非也魏志張旣傳曰髙幹八年二月曹操攻黎陽傳又魏志紹傳云譚尚與太祖相魏志武紀作三月今從范書袁紹當云自九月至二月拒黎陽自二月至九月操追袁譚袁尚至鄴操軍今從魏志紹傳范書紹傳曰尚逆擊破九年七月袁尚保祁山書作藍口今從魏武紀魏志紹傳云還走濫口范十三年正月趙温免十三年按是年罷三公官温不至十獻帝起居注在十五年范書帝紀在也五年甘寜奔孫權凌統傳父操死時統年十五攝父兵後擊麻吴志孫權傳建安八年十二年皆甞討黃祖似在八年然後五年寜乃奔權似晩今無年月可据追言之保屯刺殺陳勤按周瑜孫瑜傳以十一年擊麻保屯則操死六月曹操表馬騰為衞尉衞尉按張旣傳曹公將征荆典略曰建安十五年徴騰為蓋三字誤為五耳州令旣說騰入朝八月蒯越等說劉琮降琮降按嵩時𬒳囚必不預謀范書陳志表傳皆云韓嵩亦說九月操以王粲為掾屬賀云云按操恐劉備據江陵至粲傳曰太祖置酒漢濵粲奉觴江陵後所為不得更置酒漢濵恐誤襄陽即過日行三百里引用名士皆至十二月孫權圍合肥自江陵征備至巴丘遣張喜救合肥魏志武紀十二月權為備攻合肥公志備先破公軍然後權攻合肥而比紀云先攻合肥後有赤權聞憙至乃走公至赤壁與備戰不利孫盛異同評曰按吴匡竒令矯求救於曹操而先賢行狀云登為策所圍按䇿始壁之事二者不同吴志為是又陳矯傳云陳登為權所圍於别討匡竒於時陳矯已為曹仁長史又陳登年三十六而卒欲攻登未濟江已為許貢客所殺吴書云權征合肥命張昭𬒳圍果在何時也必已不在不知登之十四年三月權燒圍走馥傳云攻圍百餘日孫權傳云魏志武紀十二月權圍合肥劉權退必在今年明矣踰月不能下由此言之張遼討斬陳蘭梅成安十四年十二月甲辰丞相武平遼傳無年按繁欽征天山賦云建將軍張遼治兵南岳之陽又云陟天柱而南徂故置於此侯曹公東征臨川未濟羣舒蠢動割有潛六乃俾上將盪宼十五年十二月周瑜卒五年死年二十六瑜死時年三十按江表傳瑜與䇿同年策以建安今年也六故知在魯肅勸權以荆州借備方作書落筆於地恐操不至於肅傳曰曹公聞權以土地業備不取是今十六年八月操遣徐晃等渡蒲阪津潼關恐不得渡晃傳曰太祖至今假臣精兵渡蒲阪津為軍先置以截其裏賊可禽也太祖召問晃晃曰公盛兵於此而賊不復别守蒲阪知其無謀也傳云皆晃之策蓋陳氏各欲稱其功美不相顧耳曰善按武帝紀潜遣二將渡蒲阪皆太祖之謀而晃操與韓遂語不得從唯將褚超負其力隂欲前突太祖素許褚傳曰太祖與韓遂馬超等㑹語左右皆褚瞋目眄之超不敢動按時超不與遂同在彼故疑遂此說聞禇勇疑從騎是褚乃問曰公有虎侯者安在太祖顧指禇也妄十二月法正說劉備取益州得法正皆厚以恩徳接納盡韋曜吳書曰備前見張松後道里逺近松等具言之按劉璋劉備傳松未甞先見備吳書其殷勤之歡因問蜀中闊狹兵器府庫人馬衆寡及諸要害也誤十七年十月荀彧飲藥而卒彧傳曰操饋之食發視乃陳志彧傳曰以憂薨范書其誅陳壽云以憂卒蓋闕疑也今不正言其飲藥恐後丗為空器也於是飲藥而卒孫盛魏氏春秋亦同按彧之死操隱可得而行也人上者謂隱誅十八年九月馬超奔張魯十八年超在漢陽復因羗胡為楊阜傳云十七年九月武帝紀即應出討超出衢等即應閉門不應至來年正月蓋魏史書害十九年正月趙衢等討超超奔漢中按羌敘九月起兵超耳楊阜傳誤也捷音到鄴之月十九年七月操留少子植守鄴昔為頓丘令年二十三植傳云太祖戒之曰吾年薨年三十一按植今年年二十三則死時當年四十一矣思此時所行無悔於今今汝年亦二十三矣又云植大和六誤也本傳二十年五月吕蒙留孫河委以後事它人同姓名耳按孫河已死或劉備聞操將攻漢中中按操以七月入漢中備未應即聞備傳云曹公定漢中孫權傳云入漢公兵始欲向漢中即引兵還耳之而八月權已攻合肥蓋聞曹七月張衞等夜遁關攻之不拔乃引還賊守備解散公乃武帝紀曰公至陽平張魯使弟衞等據後諸軍曄策魯可克馳白太祖不如致攻遂進兵魯乃奔走密遣解剽等乗險夜襲大破之劉曄傳曰太祖欲還令曄督糧盡太祖將還西曹掾郭諶曰魯已降留使旣未反衞雖不郭頒丗語魯遣五官掾降弟衞拒王師不得進魯走巴中軍野麋數千突壊衞營軍大驚髙祚等誤與衞衆遇衞以為大同偏携可攻縣軍深入以進必克退必不免太祖疑之夜有之衆身親臨履張衛之守蓋不足言地險守易華有精兵虎軍見掩遂降魏名臣奏載楊暨表曰武皇帝征張魯以十萬定之又載董昭表其承涼州以下皆昭表所述必得實今從之將勢不能施對兵三日欲抽軍還天祚大魏魯守自壊因以守將雖斬之曹公定漢中乃還如此則備時猶在公安也劉曄傳云備雖斬之按備傳云備下公安聞二十二年正月操軍居巢須並在去冬今從魏武紀孫權傳曹公次居巢攻濡二十四年正月劉備營於定軍山作營法正傳作定軍備傳云於定軍山勢黃忠傳興勢今從斬夏侯淵輕兵護南圍備挑郃戰郃軍不利淵分兵半助淵傳曰備夜燒圍鹿角淵使張郃護東圍自將他道與備相遇交戰短兵接刄淵遂没今從劉備黄忠法正傳郃為備所襲戰死張郃傳曰備於走馬谷燒都圍淵救火從魏紀髙祖黃初元年十月辛未升壇受禪曲蠡漢帝禪位庚陳志云丙午行至禪冊二十九日登壇受命又文帝受禪碑至今尚在亦云辛午升壇即阼袁紀亦云庚午魏王即位按獻帝紀乙卯始發如此數輩后乃呼使者以璽抵軒下因涕泣横流曰天不祚未受禪陳志袁紀誤也范書云魏遣使求璽綬曹皇后不與事且璽綬無容在曹后之所此說妄也爾左右皆莫能仰視按此乃前漢元后二年為朝日在二月按二月辛丑朔無乙亥陳志正月乙亥朝日于東郊裴松之以烈祖太和二年正月姜維降漢亮與母相失後得母書孫盛雜語曰維詣諸葛不在當歸也按維粗知學術恐不至此今不取令求當歸維曰良田百頃不在一畝但有逺志靑龍二年居上將之重諸子並有雄才大略后知帝非魏之唐太宗晉書景懐夏侯后傳后以此年死云宣帝方信任於明帝未有不臣之迹况其諸子乎徒以魏甥之故純臣而后旣魏氏之甥帝深思之遂以鴆崩按是時司馬懿不然師自以他故鴆之也今不取猥鴆其妻都非事實蓋甚之之辭景𥘉二年六月公孫淵圍塹二十餘里七十里今從淵傳晉宣紀云南北六十二月劉放執帝手作詔免燕王宇等官性恭良陳放傳曰宇王實自知不堪大任故耳帝曰曹爽可代宇否放資因賛成誠固辭帝引見放資入卧内問曰燕王正爾為放資對曰燕復變詔止宣王勿來尋更見放資曰我自召太尉而曹肇等之又深陳宜速召太尉司馬宣王帝納其言放資旣出帝意獻肇朗官按陳壽當晉丗作魏志若言放資本情則於時非反使吾止之命更為詔帝獨召爽與放資俱受詔命遂免宇齒漢晉春秋郭頒丗語似得其實美故遷就而為之諱也今依習鑿邵陵厲公正始四年十二月陸遜諫吳主不分嫡庶英姿冝為嫡嗣於是權乃許立焉旣而遜上表極諌權疑笁吳録曰權時見楊笁辟左右而論霸之才笁深述霸有文武子廢後吳録所述妄也泄之乃斬笁按笁死在大嘉平元年正月曹爽何晏等族誅晏典治爽等獄晏窮魏氏春秋曰宣王使曰未也晏窮急乃曰豈謂晏乎宣王曰是也乃収晏按宣王治黨與冀以獲宥宣王曰凡有八族晏䟽丁鄧等七姓宣王與爽最親而冀獨免乎此殆孫盛承說者之妄耳方治爽黨安肯使晏典其獄就令有之晏豈不自知五年十月吳孫峻殺諸葛恪去未出路門逢太常滕胤恪傳曰恪省張約等書而上今上置酒請君君已至門宜當力進恪躊躇而還孫盛以恪曰卒腹痛不任入胤不知峻隂計謂恪曰君自行旋未見從吳歷為不然今髙貴郷公正元二年十二月吳作太廟正月立太祖廟吳歴太平元年正月立權廟今從吳志沈約宋書孫亮立明年元帝景元元年正月髙貴郷公出懐中黃素詔王沈王業奔走告司馬昭王經不從意今從晉諸公賛丗語曰經因沈業申陳泰請斬賈充右僕射陳泰枕帝尸於股號哭盡哀大將魏氏春秋曰帝之崩也太傅司馬孚尚書何泰曰獨有斬賈充少可以謝天下耳大將軍乆之曰卿更軍入禁中泰見之悲慟大將軍亦對之泣謂曰玄伯其如我血薨裴松之以為違實今從干寶晉紀思其他泰曰豈可使泰復發後言遂歐四年九月護軍荀愷易愷今從魏志晉書文紀作部將咸熈元年正月衆殺姜維鍾㑹乃書板云欲殺胡烈等衞瓘傳曰㑹留瓘謀議三軍言㑹反㑹逼瓘定議經宿不眠各横刀膝上在外諸軍舉以示瓘瓘不許因相疑貳瓘如厠見胡烈故給使使宣語殿㑹悔遣之使呼瓘瓘辭眩疾動詐仆地比出閤數十信追巳潜欲攻㑹瓘旣不出未敢先發㑹使瓘慰勞諸軍瓘便下㑹由是無所憚及暮門閉瓘作檄宣告諸軍並巳唱義陵旦之瓘至外解服鹽湯大吐㑹遣所親人及醫視之皆言不起將半入而南安大守胡烈等知其謀燒成都東門以襲殺會共攻會殺之常璩華陽國志曰㑹命諸將發喪因欲誅之諸膽如斗大如斗非身所能容恐當作升及維今從魏志又丗語曰維死時見剖晉紀丗祖泰始元年九月乙亥葬文王今從魏陳留王紀晉書文紀作癸酉二年八月陸凱上䟽諌吳主凱所諌皓二十事博問吳人陳壽曰予連從荆楊來者得忍也或以為凱藏之篋笥未敢宣行病困皓遣董朝省問欲多云不聞凱有此表又按其文殊甚切直恐非皓之所能容擿皓事足為後戒故鈔列于凱傳左今不取言因以付之虚實難明故不著于篇然愛其指十月丙午朔日食食今從晉書宋書志無此十二月吳主還都建業月凱與丁奉丁固謀因皓謁廟欲吳志陸凱傳或曰寳鼎元年十二不許誓以不泄是以不果按凱盡忠執義必不為此事况皓廢皓立孫休子時左將軍留平領兵先驅故密語平平拒而必不能不泄殆虚語耳今不取殘酷猜忌留平庸人若聞凱謀四年正月丙戍賈充等上律令帝令裴楷執讀志云刑法文帝時詔楷於御前執讀今從刑法志㤗始三年事畢表上今從武紀裴楷傳云九月石苞免官等三十國春秋杜延業晉春秋置在此今晉書武紀及苞傳皆無苞免官年月蕭方春按武紀伷明年二月乃鎭下邳恐傳誤從之苞傳又云敕琅邪王伷自下邳㑹壽十月吳萬彧宼襄陽今從吳志晉帝紀作郁五年二月文立言蜀名臣子孫宜敘用遷太子中庶子立傳載此表在也若諸葛京署吏不因立表則京先已署吏一不當更云宜後按㤗始七年立舉郤詵時猶為濟隂太守於今未為庶子用也量材敘六年正月吳丁奉入渦口陽晉帝紀不載奉傳不言入渦吳志丁奉傳建衡元年攻晉榖一事口疑是七年四月吳陶璜襲殺董元趾按元乃九眞太守非交璜傳云出其不意徑至交月九眞太守董元為吳將虞汜所攻軍敗死之則元非病亡趾也華陽國志云元病亡楊稷更以王素代之按武帝紀四未至郡而元死也蓋稷雖以素代元衆胡内叛與樹機能圍牽弘弘死之秃髪烏孤傳云其崔鴻十六國春秋史牽弘晉帝紀叛虜殺胡烈北地胡殺牽弘皆不言鮮卑盖先樹機能本河西鮮卑㤗始中殺秦州刺史胡烈斬涼州刺中矣或北地胡即樹機能也言羣虜内叛則鮮卑亦在其七月癸酉賈充都督秦涼在八年二月按武帝紀充出三十國春秋晉春秋充出並妃在八年二月致此誤也在此月蓋二春秋以太子納陶璜陷交趾殺毛炅戊交趾與之誓曰若賊圍城未百日漢晉春秋曰𥘉霍弋遣楊稷毛炅等等守未百日糧盡乞降於璜不許而給糧使守諸將並諫璜而降者家屬誅若過百日救兵不至而城沒者吾受其罪稷得無罪而我取有義内訓吾民外懐鄰國不亦可乎稷等期曰霍弋已死不能救稷等必矣可須其日滿然後受降使彼歐血死炅罵賊死二者相戾不可得合而晉陶璜傳兼載之訖糧盡救兵不至乃納之華陽國志則云稷等城破𬒳囚稷糧資敵今從華陽國志按孫皓猜暴恐璜不敢以十月丁丑朔日食丑食晉書紀及天文志有十月丁丑食宋書五行志有五月庚辰食無十月丁食今從晉書無五月庚辰十二月安樂思公劉禪卒公今從王隱蜀記晉春秋云禪謚惠八年夏張弘殺皇甫晏王濬討斬之在十年五月武帝華陽國志弘殺晏濬再為益州刺史方受詔作船咸寜五年下詔伐吳借使濬紀在今年六月按王濬請伐吳表云臣作船七年日有朽敗始九年之前矣今從晉紀為定以其年上表則再為益州亦在泰祜表留濬復為益州加龍驤將軍按濬傳祜宻表留濬羊祜傳曰表留濬監益州諸軍事然則作刺史與監軍自是二事也華陽國志又云咸寜四年重拜益州刺史又曰尋以謡言拜龍驤將軍監梁益諸軍事一州按時羊祐已卒尤不可據濬遷大司農五年拜龍驤監梁益濬造舟艦接濬表云作舡七年則國志不可據也華陽國志云咸寜二年三月濬受詔作船十月尹璩卒宋質廢梁澄表令狐豐為敦煌太守春晉豐廢澄自領郡事今從晉春秋秋璩作據今從武紀武紀云令狐賈充宴朝士十月己巳恐皆非實故附于冬末三十國春秋在十一月晉春秋在吳萬彧自殺譴憂死今從江表傳吳志孫皓傳云彧𬒳九年正月辛酉鄭袤卒許以侯就第拜儀同三司而帝按本傳袤為司空固辭乆之見袤薨誤也紀云司空鄭七月丁酉朔日食今從晉書宋志無此食十年四月吳主誅章安侯奮皓而死皓厚葬之國人見江表傳曰張布女有寵於故民間訛言都代立臨海太守奚熈信訛言舉兵欲還秣陵葬太奢麗皆謂皓已死所葬者是也皓舅子何都顔狀似皓奮本在章安徙還吳城禁錮使男女不得通婚或年三十四誅都都叔父植時為備海督擊殺熈夷三族訛言乃息又云遣察戰齎藥賜奮父子皆飲藥死裴松之按建衡二年至奮十不得嫁娶奮上表乞自比禽獸使男女自相配偶皓大怒至奮死時不得年三十四十也若先已長大自失時未婚娶之死孫皓即位尚未乆若奮未𬒳疑之前兒女年二十左右傳鳯凰三年㑹稽妖言奮為天子遂誅奚熈不言誅奮孫奮不由皓之禁錮矣此雖欲増皓之惡然非實理又吳志孫皓國晉春秋自皓納張布女至殺奮皆在天冊元年按奮若以傳建衡二年左夫人王氏卒民間訛言遂誅奮及五子三十不知奮死果在何年今因奚熈之死終言之建衡二年死不容至鳯凰三年㑹稽方有訛言咸寜三年五月吳將邵顗今從羊祐傳武紀作邵凱七月楊珧議封建望懼太守有後難故建此議使諸王之職官志以為珧與荀朂以齊王攸有時異議又時齊王不之國疑此說非實今不取國帝𥘉未之察於是下詔議其制按朂傳有十二月衞瓘離間二虜務桓降力微死弗劉虎匈奴去魏收後魏書鐵康七年也務桓不應與瓘同時盖二人皆名務桓耳卑之孫昭成四年死子務桓立按昭成四年晉成帝咸四年七月司冀等州大水螟傷稼杜預上䟽云咸寜食貨志年大水無蟲災四年螟今從預傳三年杜預傳云四年按五行志三九月張尚忤吳主徙建安尋殺之昬等泥頭請代尚三十國春秋云岑從尚傳參取環氏吳紀死尚得免死徙廣州今十月衞瓘撫牀帝令太子決尚書疑事在泰始八年三十國春秋在遷司空後按帝紀太康三年賈充卒十二月瓘為司空故按瓘傳㤗始𥘉為青州刺史徙幽州八年不得在京師瓘傳尚書令下移在入為傳玄卒罵尚書免尋卒按景獻后崩在四年玄傳誤也玄傳曰五年遷太僕轉司隷景獻皇后崩坐争位五年十一月馬隆轉戰而前𬒳鐵鎧行不得前隆卒悉隆傳曰或夾道累磁石賊神按此說太誕恐不可信𬒳犀甲無所留礙賊以為太康元年二月乙丑王濬擊殺吳陸景克夷道樂郷武紀壬戍濬壬戍克夷道獲晏乙丑克樂郷獲景今從濬傳城殺陸景陸抗傳壬戌殺晏癸亥殺景王濬傳或曰方春水生難於乆駐疾疫將起按時未暑今依三杜預傳曰今向暑水源方降春秋十國五月丁亥朔孫皓至昬戊辰陶濬從武昌還壬申王濬到吳志皓傳天紀四年三月丙寅殺岑康元年二月王濬等破武昌王渾斬張悌三月壬申濬下石受皓降五月丁亥集于宗邑四月甲申封歸命侯晉武紀太命侯丙寅引皓升殿庚午詔士卒六十歸家庚辰以濬為輔頭皓降乙酉大赦攺元四月遺朱震等慰撫五月辛亥封歸月又上書曰臣十四日至牛渚十五日至秣陵亦無月又曰國將軍王濬傳二月庚申克西陵又云壬寅濬入石頭而無子王渾斬張俤丙寅殺岑昬與何楨書庚午送降書壬申濬去二月武昌失守皓左右皆得寶散走三十國春秋四月甲按長曆去年閏七月今年二月戊午朔三月戊子朔四月丁入石頭甲申封歸命侯五月丁亥至洛陽晉春秋略與之同五月無庚午庚辰與吳志晉書不合若依三十國春秋月日巳朔五月丁亥朔六月丙辰朔然則三月無戊辰丙寅壬申乃至秣陵而皓降又皓以四月十六日降舉家西上至五月雖合然二月武昌失守皓左右離散不容四月十六日王濬志晉書但削去其日之不與曆合者一日未能至洛今事之先後並依吳遷王濬鎭軍大將軍此營自濬始也按職官志屯騎歩濬傳云領歩兵校尉舊校唯五置非自濬始武帝紀是年六月丁丑𥘉置翊軍校尉官疑濬所兵長水越騎射聲校尉是為五校並漢官也然則歩兵之名軍也領者翊是歳凡州十九六州後又分雍梁為秦分荆揚為江分益宋書州郡志云太康元年天下一統凡十六年正月劉毅卒十月今從本傳晉春秋在七年七年正月魏舒遜位異遜位帝不聽後因正旦朝罷還第舒遜位記傳皆無年月本傳曰以災食遜位至他年正旦乃送章綬不得云人無知者蓋止因今表送章綬按本傳又曰遜位之際莫有知者若今年正旦日異遜位不復起耳者正旦朝罷遂以災資治通鑑考異卷第三
