  text: 資治通鑑考異卷第九
  hash: sha256:a3a81abef94996d853719c52346710e419111f64685a273d4e3456195e451d7a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_009-1a}
body:
  text: 司馬光奉勑編集唐紀一髙祖武德元年正月王世充與李密戰大敗史李密隋書北衆以擊密密出擊之官軍稍却自相陷溺者數萬人丗充僅傳曰丗充復移營洛北南對鞏縣其後遂於洛水造浮橋悉亡殆盡王丗充傳曰充敗績赴水溺死者萬餘人時天寒大而獲免不敢還東都遂走河陽其夜雨雪尺餘衆隨之者死曰丗充移營就洛水之北與密隔洛水以相望密乃築長城雪兵士旣度水衣皆霑濕在道凍死者又數萬人蒲山公傳東密軍退敗丗充度洛水以乗之逼倉城爲營塹密縱兵疾掘深塹周廻七十里以自固十五日丗充與密戰於石窟寺府曰丗充以今月十一日平旦屯兵洛北偷入月城其月十戰丗充兵馬弃仗奔亡沉溺死者不可勝數密又令露布上洛記曰十六日充與密戰於石窟寺東又曰其夜遇風寒疾五日丗充及王辯才等又於倉城北偷度水南敢逼城堞河竇建德等奉表於密勸進密按祖尚本起兵爲隋事恐河洛記云盧祖尚亦通表於不取不爾今三月以齊公元吉爲鎮北將軍鎭北府在去年十二月創業注攺太原留守爲公言之耳今從實録已巳蓋因元吉進封齊隋煬帝欲都丹楊廵㑹稽今從隋書大業記云帝欲南宇文化及智及等謀弑煬帝覽以司馬德戡謀告化及蒲山公傳曰趙行樞楊士下等因百姓之心謀非常之事直欲走逃故非長䇿德戡曰化及兄弟聞之大喜因引德戡等相見士及說德戡等曰足必急相追捕竇賢之事殷鑒在近不如嚴勒士馬攻其宫闕爲之柰何士及曰官家雖言無道臣下尚畏服之聞公叛亡徒無患矣勲庸一集公等坐延榮禄縱事不成威聲大振足因人之欲稱廢昬凶事必克成然後詳立明哲天下可安吾公等行亦巳逺如此即去住之計俱保萬全不亦可乎德戡得官家膽懾不敢輕相追討遲疑之閒自延數日比其議定契士及佯驚曰此非意所及但與公等思救命耳革命記曰等大恱曰明哲之望豈惟楊家衆心實在許公故是人天恊乃將毒藥醖酒二十石擬三月十六日爲宴㑹而酖殺百官帝知歷數將窮意欲南渡江水咸言不可帝知朝士不欲渡禍並是兇逆之旅妄搆此詞于時上下離心人懷異志帝深南陽公主恐其夫死乃隂告之而事泄爲此始謀害帝以免石藥酒必其酒有酖毒一石堪殺千人審欲擬殺羣寮謀之猜忌情不與人醖若不虚藥須分付有處遣何人併醖二十有殺害之名推過惡於人主耳隋書化及傳云化及弑逆士者必有三五衆謀自然早泄豈得獨在南陽只是䖍通等恥不忍執詣智及乆之乃見釋南陽公主傳責士及云但謀逆及在公主第弗之知也智及遣家僮莊桃樹就第殺之桃樹深忌之而不告按士及仕唐爲宰相隋書亦唐𥘉所修或者之日察君不預知耳舊唐書士及傳云化及謀逆以其王壻醖藥酒爲虚則南陽隂告之事亦非其實如賈潤甫之說則史官爲士及隱惡賈杜二書之言亦似可信但杜儒童自知書而刪莊去桃樹事及南陽之語庶幾疑以傳疑弑君之謀皆出士及而智及爲良人矣今且從隋獨孤盛拒戰爲亂兵所殺前遇將軍獨孤盛時内直宿蒲山公傳裴䖍通於成象殿兵皆倒戈䖍通謂盛曰公何暗於幾㑹恐佗人以公爲勲耳陳兵廊下以拒之詬曰天子在此爾等何敢兇逆叱兵接戦以死注弦不動俄爲亂兵所擊斃於階下略記曰詰旦諸門盛叱之曰國家榮寵盛者止擬今日且宿衞天居唯當効之殿内執仗者出莫不投仗亂走屯衞大將軍獨孤盛揮刀叱已開而外傳叫有賊䖍通乃還閉諸門唯開正東一門而驅萃俄而斃於階下今從隋書亦釆畧記之曰天子在此爾等走欲何之然亂兵交令狐行逹縊殺煬帝逹縊帝今從隋書及畧記蒲山公傳河洛記皆云于洪沈法興舉兵以討宇文化及爲名紀二月法興據丹太宗實録舊唐帝討化及當在弑逆後楊起兵按法興起兵四月丗子建成等還長安今從太宗實録創業注在三月王君廓降君愕往投之因爲君廓陳井陘之險勸先往太宗實録曰王君愕邯鄲人君廓宼畧邯鄲與君廓率所部萬餘人歸順拜大將軍與君廓事皆出據之君廓從其言屯井陘山歳餘㑹義師入定關中乃録稱李密將王君廓降從君廓傳太宗實録而不同如此今據髙祖實五月戊午隋恭帝禪位四月今從實録創業注此詔在七月隋元文都等謀誅王丗充爲御史盧楚巳爲宣詔河洛記𥘉元文都欲自丗充是外軍一將非留守逹官比者領軍屢爲奔徙吾方䘏王丗充固執以爲不可乃止文都大悵盧楚私謂文都曰王患文都曰未可即殺且欲當朝上奏御前縛之鏁繫於獄楚外姦且從捨過翻更宰制人事跋扈縱橫此而不除恐爲國嘉以作亂是將宫中亦遣使傳報丗充爲皇姨故也𥘉丗充曰善文都懷奏入殿臨欲施行趙季卿私告之丗充遂奔舎至是爭權遂起兵馬文都等令趙方海前後追丗充丗充乃託疾妻蕭氏早亡後有胡氏者復在江都皇泰主乃以皇姨嫁之密事相誅耳恐事不因此今不取不受召按丗充正爲與文都事李九月王丗充與李密戰牽貌類密者過陳前曰丗充革命記偃師城下與李密未大相接遽令數十騎馳將所畜人頭来云先於衆中覔得一人眉目狀似李密者隂畜之而不令出師至擲頭與城中人城中人亦言是密頭也遂以城降今從壷關録殺得李密充佯不信遣衆共看咸言是密頭也遂於城下勒兵乙卯薛仁果遣髙墌僞以城降墌城下之今從劉感傳實録云乙卯宇文歆攻髙仵士政劫常逹降薛仁果政僞降達士政劫達以見舉新舊唐書皆云薛舉遣仵士果及士政劫達皆有日月今從實録據實録薛舉前巳死此月達再擊仁李育德以武陟來降按以武陟來降乃育德非厚德也舊唐書髙季輔傳云與李厚德來降劉蘭成破臧君相性多兇狡見隋末將亂交通不逞于時舊書作劉蘭云頗渉經史善言成敗然中淮安王神通爲山東道安撫大使蘭率宗黨歸之革命記北海完富蘭利其子女玉帛與羣盜相應破其郷城邑武德詳今從之序其事頗十一月李軌稱帝攺元安樂改王安樂今據實録按軌傳云軌稱涼王即遣李密詣山東密収集餘衆以圖洛陽密言於髙祖曰臣髙祖實録未幾聞其下兵皆不附王充令左右與臣同去髙祖曰朕推赤心於人終無疑阻但有益國入朝日淺不願違離又在朝公卿未甚委信願得陛下腹心今從蒲山公傳利人即當專決王須拔中流矢死厥以爲南面可汗今從唐書革命記云須拔衆散奔突厥突十二月堯君素守河東帝遣龐玉等詣城下爲陳利害竇建德所擒士及乃自歸於唐實録誤也今從隋書髙祖實録云令宇文士及爲陳利害按宇丈化及爲君素射其妻應弦而倒而去今從隋書實録云妻號慟以羅藝爲幽州揔管三年新書云二年皆誤也今從實録創業注藝以武德元年二月降舊云李密叛盛彦師斬之林詐縣官翻據縣城中驚悸莫敢當河洛記密因執驛使者斬之曉入桃在熊州旣聞密叛遣將劉善武領兵追躡善武兄善績往在者驅掠畜産趨南山時右翊衞將軍上柱國太平公史萬寳行百方羅捕無暫休息追至陸渾縣南七十里與密相及連洛口爲密所屠善武因此發憤志在取密十日十夜倍道兼與王伯當死之今從實録及舊書戰轉闘一歩一前驅密於邢公山髙開道自稱燕王攺元始興栁璨注正閏位歷云年號實録唐書皆無開道年號道年號始興云出歷代紀要録此號未知孰是今從紀要天成李昉歷代年號亦如之宋庠紀年通譜武德元年開二年正月隋張鎮周今從隋書陳稜傳髙祖實録作鎮州閏月竇建德斬宇文化及之河洛記云建德將化及并蕭后南陽公主隋書云載之河間斬之唐書云至大陸斬遣大理官引化及出營東南二里許宣令數其罪并二子一隨軍于時襄國郡尚爲隋守建德因其廻兵欲攻之營於城下按蜀王乃士及所封今不取號魏王一號蜀王同時受戮建德以崔君肅爲侍中今從舊建德傳革命記作君秀許紹來降篡在四月實録紹降在此今從之舊書傳云丗充篡位乃來降按丗充王丗充與唐兵戰於九曲程知節來降充將兵圍新安河洛記二月王道志九曲在壽安壽安乃熊州也或者丗充亦宼熊州乎將軍程咬金帥其徒以歸義按新安乃榖州也而梁載言十突厥始畢可汗卒使告喪月日也今從舊書本紀列傳髙祖實録六月己酉始畢可汗卒疑遣六月姜寶誼李仲文爲劉武周所虜仲文相次陷没按舊裴寂傳云寶誼誘之遇伏而没事迹並同必一時共戰偕𬒳擒耳實録二人敗處皆在雀䑕谷賊將黃子英陽不勝以八月丁未竇建德陷洺州之日今從革命記實録作甲子蓋奏到九月已巳建德陷相州到之日今從革命記實録作庚辰蓋亦奏裴寂言劉文靜於裴寂今據實録裴寂此年六月爲晉州髙祖實録唐書唐曆等皆以文静之死由靜死才七日此時不當在京師實録曰髙祖抵回者乆之蓋道行軍揔管討劉武周此月丁丑與宋金剛敗於介州去文未忍殺至是乃決意耳寂未行時先有此言髙祖庚寅竇建德陷趙州陷趙州蓋重複或三月是貝州唐統實録今年三月建德陷趙州此又云趙州今從之紀唯有九月陷乙未梁師都復㓂延州按丙寅九月朔宼延州乙未九月太宗實録云經數月師都又來宼髙祖實録晦也今從十月竇建德克黎陽蓋亦奏到之日今從革命記實録黎陽陷在十一月丙子建德使李丗勣守黎陽新鄉按是時新郷猶屬王丗充革命記云使與其將髙雅賢守建德攻下新郷虜黒闥耳今從唐書使劉黒闥守之丗勣旣事建德乃爲十二月宋金剛遣尉遲敬德等至夏縣永安王孝基軍大敗去夏縣殊逺實録之誤也今從舊書孝基傳髙祖實録云戰于下邽縣按下邽乃在關中竇建德遣曹旦等濟河月今從革命記實録在來年正三年正月賊帥李文相號商胡今從河洛記革命記作傷胡商胡母霍氏自稱霍揔管號女將軍今從河洛記革命記云商胡母張氏三月趙郡公孝恭擊斬蕭闍提之拔其開通二州斬其舊書蕭銑傳云孝恭討開通二州若二州本屬銑不當云我與復蓋肈則先據開州僞東平王蕭闍提按實録云冉肈則陷我通州又云孝恭復銑使闍提助之耳又陷通州以地附銑五月秦王丗民屠夏縣奴賊致生叛亂若不盡誅必爲後髙祖實録帝曰平薛舉之𥘉不殺者歸太宗之過於髙祖今不取患詔勝兵者悉斬之疑作實録七月壬午丗民至新安据奏到之日今從河洛記髙祖實録丙戍至新安蓋丗民爲王丗充所圍三萬來拒戰太宗率輕騎挑之衆寡太宗實録云師次榖州王充以精兵賊乃退舊書太宗紀云太宗命左右先歸獨留後殿丗充驍不敵𬒳圍數重太宗引弓馳射皆應弦而倒獲其大將燕頎左右射之無不應弦而倒獲其大將燕頎單雄信傳云太宗將單雄信數百騎夾道來逼交槍競進太宗幾爲所敗太宗之曰此秦王也雄信惶懼遂退太宗由是獲免按劉餗小說圍逼東都雄信出軍拒戰援搶而至幾及太宗徐丗勣呵止充召雄信告之酌以金椀雄信盡飲馳馬而出槍不及海陵英公勣與海陵王元吉圍洛陽元吉恃膂力毎親行圍王丗笑曰胡兒不縁你且竟舊書蓋承此致誤耳雄信若知是秦者一尺勣惶遽連呼曰阿兄此是勣王雄信乃攬轡而止顧充之命指取元吉亦安肯以勣故而捨之況元吉之圍東都王則取之尤切安肯惶懼而退借如小說所云雄信旣受丗武牢今皆不取勣乃從太宗在獲燕琪􅐓舊太宗紀作燕頎今從河洛記髙祖實録作燕湏太宗實録作燕八月丗充使楊公卿等攻廻洛唐書作公卿今從之革命記作公鄉河洛記九月辛巳丗民登魏宣武陵尉遲敬德救丗民擒陳智略之斬數千級獲陳智略舊書敬德傳太宗旣釋之實録丙戍太宗與丗充相遇於魏宣武陵擊大破敬德剌雄信墜馬翼太宗出圍更帥騎兵交戰擒陳智略据是日從獵於榆窠丗充領歩騎數万來戰單雄信直趨太宗録据奏到日河洛記在二十一日今從之擒智略則宣武榆窠之戰共是一事也實十月羅士信拔硤石堡堡今從實録河洛記作峽石十一月郭子和南徙處羅可汗以今年卒故置此子和傳云四年抜戸口南徙按突厥謀使突利可汗入宼歳始畢遣領其東牙之兵號舊突厥傳大業中突利年數泥歩設又有突利可汗然則突利處羅時巳爲小可汗泥歩設頡利嗣位以爲突利可汗按梁師都傳此際有於懷戎鴈門霊武涼州四道俱入今從舊書梁師都傳非頡利嗣位後也髙祖實録云處羅欲分兵大掠中國竇建德擊孟海公遣劉丗讓攻洺州之日也今從革命記實録在十二月丙午蓋於時唐始聞之王丗充遣使求救於竇建德遣使求救於建德云夏王隋季革命記曰丗充亦自楊越充乃取京師蒲絳以西通蜀荆襄之境並據山河之險或率領軍師來相救援王取東都河洛之地北収并汾南盡賂建德借有是言建德亦何由肯信今從河洛記長爲弟兄之國按丗充止有河洛之地豈肯遽以四年正月杜伏威遣兵㑹秦王丗民擊王丗充伏威傳舊書杜道行臺尚書令江淮以南安撫大使上杜國封呉王賜姓李太宗之圍王丗充遣使招之伏威請降髙祖遣使就拜東南丗充前今從髙祖太宗實録氏按伏威封呉王在太宗討王丗民敗王丗充獲葛彦璋金堡太宗令屈突通守之王太宗實録云𥘉羅士信取千驕丗充通舉三烽以告急太宗方出援之左右未獲從以兩充自來攻堡通懼舉烽請救太宗度通力堪自守且緩救以継至通軍復振表裏奮擊王充大敗俘斬六千餘人幾獲丗騎而進遇賊騎將葛彦璋射之應弦而墜擒之於陳後軍亦河洛記充今從二月李靖說趙郡王孝恭以取蕭銑十䇿恭獻平銑之髙祖實録孝之計獻以十䇿髙祖以孝恭未更戎旅三軍之任一以委靖䇿帝嘉納之太宗實録李靖傳靖說趙郡王孝恭陳伐蕭銑南以䇿干孝恭孝恭善之委以軍事蓋靖畫䇿使孝恭上之耳授靖行軍揔管兼攝孝恭長史事孝恭傳時李靖亦奉使江三月太子建成殺降胡六千餘人云六千餘計蓋前言户實録前言四千餘户後口也後言四月處羅可汗羅可汗今從實録舊書鄭元璹傳作叱竇建德留屯累月案二月戊午沈恱始以武牢降唐至舊書停留七十餘日新書六十餘日至亦不能自固又呉兢太宗勲史三月已卯建德率兵十二五月己未建德敗纔六十二日若沈恱今日降唐明建德即一日故但云留屯累月萬次于酸棗去敗纔四十五月丗充諸將曰雖得出必無成皆不荅今從河洛記舊書丗充傳云諸將李勣請贖單雄信丗民不許得洛城即誅雄信何甞禀舊傳云髙祖不許按太宗者皆稱髙祖之命以掩太宗之失如屠夏縣之類皆是也命於髙祖蓋太宗時史臣叙髙祖時事有誅殺不厭衆心壬申齊善行以洺相魏等州降行等至洺州實録云壬革命記云五月七日善末又云裴矩等以八璽降盖璽到之日也申洺相魏等州降者蓋降使到之日也月七月以蘇丗長爲諫議大夫要皆云五年六月置諫議大舊本紀及唐曆年代記唐㑹月巳預十八學士据舊職官志四年置諌議大夫今從之夫按丗長自諌議歷陜州長史天䇿府軍諮祭酒四年十一秦王丗民獻俘于太廟將與太宗俱服金甲乗戎輅告李勣傳云太宗爲上將勣爲下今從唐曆捷于太廟丁卯大赦孫伏伽諌徙丗充餘黨發雲雨之制而赦書伏伽表云今月二日赦除之今赦無此文豈實録録赦不盡欤乃十二日或脫十字也又云常赦不免咸獨孤修德殺丗充今從河洛記舊傳作獨孤修行開元通寶錢一甲故錢上有甲痕焉凌璠唐録政要云薛璫唐聖運圖云初進蠟様文德皇后搯文德后未立今皆不取竇皇后按時竇后巳崩甲戍劉黒闥襲據漳南縣黒闥爲漢東王建元天造即革命記七月二十七日衆立王爲夏王起義兵於漳南請軍㑹戰今據實録甲戍七月十入漳南城鏁縣官於獄發使告貝州及諸鎮戍等云今漢東攺元在五年正月今不取九日又黒闥陷相州乃稱王九月以盧祖尚爲光州揔管祖尚爲光州揔管按舊傳實録丙子以光州豪右盧見之蓋當時止爲刺史至此乃遷揔管耳丗充自立祖尚遂舉州歸欵虚實録至此始十月秦王丗民開文學館置學士許敬宗下今從太宗舊書參軍薛元敬承府户曹許敬宗舊書禇亮傳作著作佐郎攝記室敬宗傳擬實録諮議曲籖蘇勉舊書作軍諮典籖今從實録宋州揔管今從實録漣州别駕李靖攻蕭銑散舟艦將文士弘相遇於清江合口擊之獲髙祖實録癸巳趙郡王孝恭與蕭銑其水城克之所得舡散於江中諸將皆曰虜得賊舡當藉其其戰艦千餘艘下宜昌當陽枝江松滋四縣舊書孝恭傳攻東至洞庭若攻城未拔援兵復到我則内外受敵進退不可用何爲弃之無乃資賊邪孝恭曰不然蕭銑僞境南極嶺外敗未敢進兵來去覘伺動淹旬月用緩其救吾克之必矣銑雖有舟楫何所用之今銑縁江州鎮忽見舡舸亂下必知銑恭傳進師至清江銑遣其將文士弘以兵拒戰擊走之追奔救兵至巴陵見舡𬒳江而下果狐疑不敢輕進太宗實録孝之孝恭將戰李靖止之曰楚人輕銳難與爭鋒今新失荆門至于百里洲士弘収兵復戰又敗之追入北江銑悉兵以拒必兩分留輕兵抗我退羸師以自守北即勢攜力弱擊之必盡兵出戰此救敗之師也非其本圖勢不能乆一日不戰賊賊委舟大掠人皆負重靖見其軍亂進兵擊之賊大敗乗勝捷孝恭不從遣靖撫營自以銳師水戰孝恭果敗奔于南岸兵見之謂城巳陷莫敢輕進銑内外阻絶城中攜貳由是懼進軍入其郛郭攻其水城尅之悉取其舟檝散於江中賊救散於江中諸將曰弃之無乃資敵靖曰不然云云如舊書所而出降唐曆孝恭靖乗勝進兵攻其水城尅之悉取其舡艦而出降按十道志荆門在峽州宜都縣界夷陵峽州縣名清載孝恭語旣而銑救兵見之謂城巳陷莫敢輕進銑由是懼别去江陵巳近故銑悉兵死戰太宗實録近爲得實今從之江在峽州巴山縣界百里州在荆州枝江縣界江自此洲派蓋靖畫䇿而孝恭爲諸將言之今從唐曆其餘則參取四書之語孝恭以李靖爲謀主十一月李子通降按子通因杜伏威入朝始謀叛伏誅於實録是月景申會稽賊帥李子通伏誅通降丙申謀反相去纔七日亦不寤伏威未入朝也時未也舊紀是月子通以其地來降新紀庚寅李子十二月劉黒闥攻抜相州酉蓋奏到之日也今從革命記實録黒闥陷相州在來年正月乙李丗勣走保洺州革命記李勣爲大揔管張仕貴爲副領實録丗勣與黒闥戰於宋州我帥敗績宋州不入城而西過至洺州騎馬於南門外喚陳君賔党仁兵二萬人入宋州績以五百騎自探聞劉黒闥到南宫馳至馳馬向縣取家口入城城人恐相劫掠即閉城門自守名振弘秦武通等弃城西拔永年縣令程名振見武通狼狽走出里母妻䓁佊劫散失名振脫身而免黒闥攻宋城破之仕貴乃於城北門上以繩懸下將母妻男女歩走西去不踰四五里志武德四年置宗州於宗城縣宋字皆當作宗丗勣名將等以輕騎突圍而走投相州數日黒闥大軍至洺州按舊地拒而弃城耳今從舊書黒闥傳必不至如革命記所云但力不能劉黒闥陷莘州州必莘州也十道志開皇十六年於莘縣實録作華州新書作業州按地里志無業武德五年置置莘州舊志五年正月秦王丗民復取相州孤徹以城應黒闥按地里實録云禄州人殺剌史獨新書作相州尤誤也志無禄州蓋字誤耳二月丗民使秦叔寶破黒闥於列人劉黒闥於列人大實録癸亥秦王擊拒王師置營於鄴縣東三十里毎日兩軍皆挑戰而大兵皆破之革命記十一月太宗度河入相州劉黒闥從洺州勒兵驃騎領兵在劉黒闥營去惑等背賊營來入洺州城誑人云不出經十餘日洺水縣人李去惑李潘買李開弼等爲車騎遣使間道以告太宗太宗遣彭國公王君廓領馬軍一千五劉黒闥巳敗先走得歸乃喚得宗室子弟二百餘人守城定秦叔寶等以五千騎擊之叔寶等爲闥所敗又以伏兵從河百騎入洺州經十許日黒闥引兵攻洺州行至故列人城西城東營即於城兩門掘壕堅柵防王廓之走洺州城四面有下起橫擊劉闥敗之㑹日暮収軍其夜三更賊兵揔至洺州土作甬道以撞車攻城太宗三度將兵擊之賊置陣拒官軍水闊五十歩巳上深皆三四尺劉闥於東北角兩處填柴運闥今年正月始至河北無十一月度河之事太宗實録亦無攻城愈急按髙祖太宗實録皆以去年十二月命太宗討黒屬縣去惑君廓所據者洺水縣城水字誤作州耳列人戰事蓋叔寳破賊秦王奏之耳又按洺水洺州馮伯讓以井州降是時於井陘縣置井州字之誤也實録作并州按并州未甞失城蓋李藝取定欒㢘趙四州北無率隋二州今從唐統紀實録作定率廉隋四州按河黒闥陷洺水羅士信死之圍而出秦王謂諸將曰誰能代髙祖實録王君廓知不可守潰圍守益固士信何以復得入城革命記曰太宗知賊勢盛恐者士信曰願以死守因遣之按君廓若巳突圍而出則黒闥之太宗登叚王墓以旗招王君廓從南門突圍不得即向北王君廓不能固以問諸將士信以爲無慮太宗使士信入守八日晝夜𬒳攻木石俱盡士信𬒳左右執之以降賊五年五門併兵攻捉門人少退得出士信亦以左右二百人入城經督李潘買拜檀州剌史李開弼城陷而沒贈上柱國以公札月城陷李去惑以數十人突圍出歸太宗去惑復授秦州都士信始從張須陁擊王薄等時年十四若死時年二十八則葬今從之髙祖實録士信死時年二十八舊傳云年二十按則在大業十年是歳須陁死今從之在大業四年於時王薄未爲盗年二十三月劉丗讓屯鴈門突厥攻之不克臚卿鄭元璹先使舊丗讓傳云時鴻說客邪經月餘虜乃退及元璹還述丗讓忠貞勇幹髙祖下在蕃可汗令元璹來說之丗讓厲聲曰大丈夫乃爲夷狄作或果爾則元璹唯恐帝知之安肯稱丗讓忠貞說之不下邪製襃美之按髙祖稱元璹蘇武弗之過安肯爲可汗遊說脫無此事今不取據實録丗讓傳四月或說徐圎㓪使不迎劉丗徹徹有虚名於徐兖恐一革命記云盛彦師以丗薄共殺李義滿三月戊戍王薄死丁未黒闥乃敗彦師在圎人相得爲患益深因說圎㓪使不納按實録彦師奔王薄与今稱或說以闕疑㓪所時黒闥未敗也辝今不盡取抑揚誣諱之劉黒闥攻魏州黒闥奏到之日也按革命記黒闥攻魏州實録十二月甲子黒闥攻魏州蓋留安破今從之在十一月十二月壬申黒闥衆潰於魏州城下破之闥抽軍北遁髙祖實録壬申太子与黒闥載三月太子破黒闥于館陶革命記闥遁至館陶二十五日官甲戍追闥於毛州賊背永濟渠而陣接戰又破之舊傳六年甲戍一十七日蓋實録据奏到之日也舊傳尤踈今從革命軍至闥敗走按館陶即毛州也長歷十二月戊申二十五日殺其黨使空山東不用吾言致有今日及隱太子征闥平之記太宗實録云黒闥重反髙祖謂太宗曰前破黒闥欲令尽入閞以實京邑太宗誎曰臣聞唯德動天唯恩容衆山東人將遣唐儉往使男子年十五已上悉坑之小弱及婦女揔驅反覆盡戮無辜流離寡弱恐以殺不能止乱非行弔伐之道物之所河北蠶綿之郷而天府委輸待以成績今一旦見其洗馬魏徴曰山東其定乎對曰黒闥雖敗殺傷太甚其魁黨其事遂寢新書隱太子傳云黒闥敗於洺水太子建成問於蕩宥恐殘賊嘯結民未可安旣而黒闥復振廬江王瑗弃洺皆縣名處死妻子係虜欲降無繇雖有赦令獲者必戮不大獲俘皆撫遣之百姓欣恱賊懼夜奔兵追戰黒闥衆猶盛乃州山東乱命齊王元吉討之有詔降者赦罪衆不信建成至散或縛其渠長降遂禽黒闥按髙祖雖不仁亦不至有欲空縱囚使相告曰褫而甲還鄉里若妻子獲者旣已釋矣衆乃髙祖亦太誣矣今采革命記及新書山東之理史臣專欲歸美太宗其於六年正月斬劉黒闥深州揔管劉闥欲至城中陳列三千革命記劉闥走至深州崔元愻爲僞領當城之兵有張善護者先任鄕長來就軍中語三五少年餘兵擬納劉闥據城拒守比勾突厥城人諸葛德威爲車騎等作生活諸少年咸云非諸葛車騎不可善護知德威非得曰可捉劉闥以取冨貴今若不捉在後終是擾乱山東廢我德威許諾劉闥至元愻乃請之入城而不許唯就市中遣鋪酒食不肯出語乃於家宰一肥猪出酒一石延德威而語之食而許之元愻乃召兵以呈之德威以前領健卒出即就市設而坐食元愻請以城中兵呈閱言並精銳必堪拒守劉闥闥於洺州城西臨刑乃嘆云云今從實録亦兼采革命記中擒劉闥送於洺州皇太子所元愻與男野义奔突厥斬黒四月立皇子元軌等爲王爲豳王新本紀封元璹爲蜀實録以皇子元真爲邵王鶴及封邵王者今從舊傳及唐曆王按髙祖子無名元真鶴元璹七月張護殺賀若懷廣云髙護今從上實録上云張護此八月輔公祏反興武德三年巳爲李子通所滅舊傳誤也舊傳云沈法興據毗陵公祏擊破之按法詔趙郡王孝恭趣江州兵趣江州至九月戊子又云蓋實録八月乙丑巳云遣孝恭率邊而言之也因徐紹宗等侵九月竇伏明以沙州降降按五年五月實録瓜州人王實録云伏明斬賀拔威以城來威死乆矣此誤也幹殺賀拔威以降則七年三月陳當丗屯博望山時舊李靖傳云屯當塗今舊趙郡王孝恭傳作陳當祖實録皆從髙四月定四家爲鄰四鄰爲保按通典四鄰爲保唐曆誤也唐曆云四家爲鄰五家爲保六月齊王元吉欲殺秦王丗民太子建成擅募兵傳舊甲分屯左右長林號爲長林兵實録云元吉見秦王有大功云建成私召四方驍勇并募長安惡少年二千餘人畜爲宫之建成性頗仁厚𥘉止之元吉數言不巳建成後亦許之元毎懷妬害言論醜惡譛害日甚毎謂建成曰當爲大哥手刄軌其記室榮九思爲詩以剌之曰丹青飾成慶玉帛擅專諸吉因令速發遂與建成各募壯士多匿罪人賞賜之圖行不自殺斯人巳後人皆振恐知其事莫有敢言後乃連結宫闈而弗悟也典籖裴宣儼因免官攺事秦府謂泄其事又鴆之倫以爲黨助由是髙祖頗踈太宗而加愛元吉今但擇取其與建成俱通德妃尹氏以爲内援舊傳又云厚賂中書令封書之可信者爾朱煥等告楊文幹反尉橋公山齎甲以賜文幹令起統紀云建成遣郎將爾朱煥校小說云人妄告東宫今從實録兵煥等行至豳州懼罪告之劉餗徐帥謩勸建成舉兵今從實録統紀作師譽帝夜帥宿衞南出山外明日復還仁智宫祖之出山實録云髙右亦有斯請今上並拒而不納唐統紀云太宗之從内出夜也建成憂憤卧於幕下天䇿兵曹杜淹請因亂襲之建成左云今日之事一聽王旨若遣屏除今其時也太宗叱而止之經建成幕度建成侍衞左右唯有十人並來跪捧太宗足皆天下共知假手宫臣正合天意太宗曰寡人始奉恩旨何忍旣而還向府僚說其事衆僚文武並進曰文幹爲儲君作逆聽按是時髙祖無誅建成意左右何敢輒殺之今不取旋踵即有所違卿與之言必無此理府僚又請終拒而不八年四月西突厥可汗請昬裴矩謂宜許之皆云封新舊傳今從實録德彞之謀七月秦王丗民出屯蒲州以備突厥突厥宼定州命皇舊本紀八月六日月秦王出蒲州八月无太子往幽州秦王往并州事太子往幽州秦王往并州以備突厥唐曆亦同今據實録七八月突厥㓂靈武武下云靈州都督敗之蓋靈武字誤耳實録統紀並云宼廣武按北邊地名無廣九年三月歐陽胤在突厥帥其徒五十人謀襲可汗五千人蓋十字誤作千字耳實録云五千人按奉使安得六月秦王丗民謀誅建成元吉問於李靖李丗勣皆辭疑靖等請申犬馬之力劉餗小說太宗將誅蕭墻之惡以統紀云秦王懼不知所爲李靖李勣數言大王以功髙𬒳此二人二說未知誰得其實然劉說近厚有益風化故從之主社稷謀於衞公靖靖辭謀於英公徐勣勣亦辭帝由是珍言於上曰秦王旣有大功終不爲太子之下若不立之願早舊建成傳又云封德彞密勸太宗誅建成丗民不從德彞更此之謂矣按許敬宗傳云敬宗父善心及虞丗南兄丗基皆爲之所又說建成作乱曰夫爲四海者不顧其親漢髙乞羮曰丗基𬒳誅丗南匍匐而請代善心之死敬宗舞蹈以求生爲字文化及所殺封德彝時爲内史舎人備見其事甞謂人傳盛加其惡疑此亦近誣今不取人以爲口實敬宗銜之及爲德彝立王晊密告丗民以太子語齊王欲使壯士殺秦王以爲舊傳今若明使壯士拉殺而欺云暴卒髙祖豈有肯信之理此說建成實有此言而晊告之按建成等前酖秦王髙祖巳知之之虚實皆未可知所謂疑以傳疑也殆同兒戲今但云晊告建成等則事張公謹取龜投地曰夫事不可疑而疑者其禍立至今假唐曆云布卦未畢張公謹適自外至諫蓍秦王曰善今從舊唐書使卜之不吉其可巳乎遂折七月己丑以秦叔寶程知節尉遲敬德爲將軍三人唐曆巳今從實録除官皆在癸丙申太子下令事連東宫及李瑗者不得相告實録太宗月無丙申丙申七月十日也今從唐曆六月丙申唐曆脫七月而在壬辰下按六八月太宗與突厥頡利可汗盟厥至渭水橋控弦四十劉餗小說武德末年突人勝兵者不過數萬胡人精騎騰突挑戰日數合帝怒欲擊萬太宗𥘉親庶政驛召衛公問䇿時發諸州軍未到長安居退於是據險邀之虜弃老弱而遁獲馬數萬匹金帛一無遺之靖請傾府庫賂以求和潜軍邀其歸路帝從其言胡兵遂未甞掩襲小說所載爲誤焉今據實録紀傳結盟而退十月葬息隱王建成海陵刺王元吉魏徴表請陪送至墓所實録及本紀皆不書葬月日唯唐曆在此年十月髙祖實録建成元吉傳太宗踐阼攺葬加謚太宗山東王珪亦未爲黃門侍郎葬建成元吉恐在後但别無年貞觀政要此表在二年據此年七月魏徴爲諫議大夫宣慰且從唐曆月日可附今蕭瑀陳叔達免官廢于家俄拜少師復爲左僕射坐与舊傳太宗以玄齡等功髙由是忤旨爭在作少師前今從之叔逹忿爭免按實録忿資治通鑑考異卷第九
