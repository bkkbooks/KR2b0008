body:
  text: 臣司馬光奉勑編集後梁紀下貞明元年二月王殷自焚年十一月拔徐州殷自燔死五莊宗列傳朱友貞傳云乾化四皆云貞明元年春今從之代通録薛史紀及王殷傳三月趙巖等請分魏博六州為兩鎮敬翔租庸使趙莊宗列傳宰相六州為兩鎮薛史旡敬翔名今從之巖判官邵贊等為友貞畫策分魏博己丑魏軍亂將王彥章以五百騎入魏州是夜三鼓魏軍莊宗列傳二十七日劉鄩屯南樂遣龍驤都作亂蓋莊宗列傳九字誤為七字耳亂是月辛酉朔薛史紀云己丑魏博軍四月李保衡殺李彥魯作彥康今從薛史蜀書劉知俊傳保衡五月牛存節屯楊劉今從唐裴度傳及薛史諸人傳牛存節傳楊劉作陽留或陽劉六月晉王以李存進為天雄都巡按使軍城使存進傳莊宗實録云為傳皆云天雄軍都巡按使今從之云都部署莊宗列傳及薛史存進七月晉王以李巖為澶州刺史嚴今從薛史莊宗實録作李周德威擒斥候者斷腕縱之使言已據臨清威聞劉薛史德者數十人皆倳刃於背縶而遣之既至謂鄩曰周侍中已據􅬸東還急趍南宫知鄩軍在宗城遣十餘騎迫其營擒斥候宗實録及薛史莊宗紀又鄩見在宗城而云周侍中據宗城宗城矣鄩軍大駭按倳刃於背其人豈能復活而言今從莊字誤耳蓋臨清髙行周言代州養壯士亦為大王人啖之利祿行周辭曰周太祖實録晉王密令承揔管之厚恩安忍背之按明宗實録此年猶為代州刺史揔𬋩用人亦為國家事揔𬋩猶事王也豫家昆仲脫難再生言揔𬋩蓋周太祖實録之誤天祐十八年始為副揔𬋩此十一月乙丑改元元大赦今從薛史末帝紀吳越備史云二月壬辰朔改庚辰劉知俊奔蜀軍按上有甲戌下有癸未必庚辰也十國紀年知俊奔秦州庚戌來降二年八月張筠棄相州走晉以李嗣源為刺史廣本劉恕除昭德軍額仍舊隸魏州徙洺州刺史袁建豐為相州刺史云筠奔東都授左衛上將軍莊宗實録命李存審入城招撫為晉兵所迫故走耳筠既降晉今還猶得將軍者蓋潛通𣢾按上四月筠已遣人納款于晉此復云走者蓋始者文降今史九月為安國軍節度而莊宗實録云袁建豐為相州刺史於晉梁朝不知耳明宗實録云八月張筠走移帝為相州刺祐十五年十二月蓋明宗初為相州移邢州後方除建豐莊按明宗實録建豐傳云戰胡桞陂時建豐猶為相州乃是天張筠走下耳宗録誤書在李存審為安國節度使史寰宇記皆云梁建保義軍唐王溥五代會要薛史地理志樂皆云此年授安國節度使恐是才屬晉即改軍額會要等書同光元年改為安國軍而莊宗明宗實録列傳薛史存審傳光元年誤云同契丹陷晉蔚州虜振武節度使李嗣本軍在朔州西開元中振武置振武節度使領鎮北大都護麟勝二州後唐振武節度亦北三百五十里單于都護府城內隸朔方節度使乾元元年帶朔州刺史據此乃治尉州不知遷徙年月帶安北都護麟勝等州觀察等使石晉以後皆九月貝人殺張源德嬰城固守固守貝州既聞河北皆莊宗實録賊將張源德因殺源德噉人為糧固守其城王歸厯年攻圍賊既食竭呼平而有翻然之志詢謀於衆羣賊皆河南人懼其歸罪不從即解之如何報曰旡便於此者賊衆三千襟甲出降我將甘我大將曰今欲請罪懼晉王不我赦我將襟甲持兵而見已曰晉王入魏河北六鎮數十州之地皆歸晉獨貝一州圍之言喻之俱釋兵解甲既而四靣陳兵皆殺之歐陽史死事傳殺按源德若以不降而死其衆當即降於晉豈得猶拒守與踰年不可下城中食且盡貝人勸源德出降源德不從遂見死不降耳今從莊宗實録晉邀約而後出哉明是衆懼十月鄭珏同平章事年十月丁酉以中書侍郎平章事鄭薛史梁末帝紀無珏初拜相年月此侍郎平章事鄭珏兼刑部尚書疑貞明二年拜相四年轉刑珏兼刑部尚書平章事至貞明四年四月己酉又云以中書均帝紀貞明二年十月丁酉禮部侍郎鄭珏為中書侍郎平部尚書也本傳云纍遷禮部侍郎貞明中拜平章事唐餘録為第十九人第行亦同自登第凡十九年為宰相今按珏光章事今從之又髙若拙後史補云珏應一十九舉方捷姓名此年才十七年矣又不可合化三年及第自光化三年至十二月慶州叛賀瓌討之叛為李繼陟所據帝命左龍薛史賀瓌傳貞明二年慶州與張筠破涇鳯之衆三万下寧衍二州此非小事而末帝紀虎統軍賀瓌為西靣行營馬步軍都指揮使兼諸軍都虞候傳有之今以為據李茂貞傳皆旡惟瓌契丹阿保機稱帝改元神册機建元事今契丹中有曆紀年通譜云舊史不記保次以乙亥為首次年始著神策之元其後復有天贊按五代日通紀百二十年月景祐三年冬北使幽薊得其曆因閲年虜人恥保機無號追為之耳保機虜中又號天皇王虜庭雜契丹傳自邪律德光乃記天顯之名疑當時未得其傳不然督兵甲又滅勃海虜其王大諲撰立長子為勃海東丹王號記曰太祖一舉併吞奚國仍立奚人依舊為奚王命契丹監於所居大部落置樓謂之西樓今謂之上京又於其南木葉人皇王自號天皇王始立年號曰天贊又曰神册國稱大遼三百里置樓謂之北樓太祖四季常遊獵於四樓之間又曰山置樓謂之南樓又於其東千里置樓謂之東樓又於其北漢語譯之謂之耶律氏賜后族姓曰蕭氏王族惟與后族通阿保基變家為國之後始以王族號為橫帳姓世里沒里以阿保機用其妻述律䇿使人告諸部大人曰我有鹽池諸部昏其諸部若不奉北主之命不得與二部落通昏歐陽史曰諸部以為然共以酒會鹽池阿保機伏兵其旁酒酣伏發盡所食然諸部知食鹽之利而不知鹽有主人可乎當來犒我宗列傳契丹傳在莊宗即帝位李存審守范陽後漢髙祖實殺諸部大人遂立不復代阿保機稱皇帝前史不見年月莊恭鎮幽州前薛史在莊宗天祐末按紀年通譜阿保機神策録唐餘録皆云阿保機設䇿併諸族遂稱帝在乾寧中劉仁祐末及莊宗即位後編遺録開平二年五月太祖賜阿保機元年嵗在丙子乃莊宗天祐十三年梁貞明二年似不在天帝安得在劉仁恭鎮幽州前唐餘録全取漢髙祖實録契丹記事猶呼之為卿及言臣事我朝望國家降使册立必未稱在向年今因其改年號置於此事作傳最為差錯不知其稱帝實韓延徽入契丹光攻中山不利欲結北戎遣延徽將命入漢髙祖實録延徽傳云天祐中連帥劉守汴將張存敬拔嬴莫攻定州劉仁恭遣守光救定州為存敬虜劉恕以為劉守光乃幽州後未嘗攻定州惟唐光化三年盛之時常陵暴契丹豈肯遣使與之相結乾化元年守光攻所敗恐是此時仁恭方為幽帥非守光也按劉仁恭父子強徽結契丹蓋在此時然事無顯據故但云衰困附於此易定王處直求救於晉故晉王遣周德威伐之其遣延四年六月蜀主殂建疑信王暴卒唐文扆與徐妃張格隂北夢瑣言云余聞公弼親吏曹處琪言扆建曰太子好酒色若不克負荷幸旡殺之徐氏兄弟勿與謀使尚食進雞燒餅因置毒建疾困大臣魏弘夫等請誅文七日蜀主始殂疑曹處琪之妄孫光憲從而記之兵權言訖長吁而逝劉恕按舊史貶文扆後二十吳朱瑾殺徐知訓知誥即日引兵濟江鉉江南録知訓吳録九國志徐至廣陵會瑾自殺因撫定其衆十國紀年吳史六月乙卯瑾死知誥過江皆旡日江南録曰先主聞亂即日以州兵度江黨與廣本戊午知誥親吏馬仁裕聞知訓死自蒜山渡白知設知訓踰城自殺戊午知誥入揚州代知訓執政己未誅瑾去至近知誥豈得四日然後聞之今從江南録誥知誥即日帥兵入揚州撫定吏民按楊潤相七月戊戌吳以徐知誥為淮南節度行軍副使內外馬步都軍副使通判府事殺至此四十四日吳之政事必按十國紀年六月乙邜知訓被皆有歸心但以精騎撓之無今夕食晡後追擊破之必矣我濮州也李嗣昭傳嗣昭云賊無營壘去臨濮地逺日已晡晚濮陽即為臨濮也按薛史梁紀貞明五年四月制書於濮州若收軍拔寨賊入臨濮俟彼整齊復來則勝負未決是又以濮陽下教告諭曹濮百姓勸令歸附是濮州未屬晉也又賀稅課是濮州猶屬梁也莊宗實録天祐十六年十二月攻下臨濮疑寶傳濮州嗣昭傳臨濮皆當為濮陽史氏文飾之誤瓌屯土山西晉軍在其東彥章已西入濮陽瓌豈得更東歸陽按薛史梁紀去年十二月晉人攻濮陽陷之今年十二月也又莊宗實録去年十二月晉已拔濮陽至此又云攻下濮濮陽十二月無攻下濮陽事賀瓌傳貞明四年領大軍營於又云晉人陷濮陽唐紀去冬拔濮陽今年四月追襲賀瓌至重復則是去冬唐雖得濮陽棄而不守今年冬復攻拔之也行臺村十二月戰敗四月退軍行臺尋卒若非實録及梁紀六年四月李琪罷為太子少保無罷相年月故終言之薛史止有琪作相月日朱友謙取同州晉正以朱令德為節度使令幕客王正莊宗列傳上德為帥請節鉞不許薛史末帝紀貞明六年云陷同州以令言送節旄賜之莊宗實録列傳薛史友謙傳皆云友謙以令歙州刺史朱令德為忠武留後恐是四年已陷同州德為留後表求節旄不允而貞明四年六月甲辰以五月徐溫言使楊氏無男有女亦當立有女當立之吳録九國志議亡嗣君門下侍郎嚴可求言王諸子皆不才引蜀先主顧語在誅張皓時今從薛史十國紀年王疾病大丞相溫來朝順大人意爾溫曰吾若自取非止今日張皓之亂嗣王幼弱命諸葛亮事溫以告知誥知誥曰可求多知言未必誠不過力爭太祖垂泣以後事託我安可忘也乃與內樞密使王令政在吾手取之易於反掌然思太祖大漸欲傳位劉威吾獨月戊申溥即王位恐可求亦不應有此言今從薛史謀定䇿稱隆演命迎丹陽公溥監國己丑隆演卒六龍德元年正月張承業諫晉王稱帝遂得疾不復起趣謁上曰殿下父子血戰三十餘年蓋緣報國復仇為唐宗莊宗實録上初獲王璽諸將勸上復唐正朔承業自太原急養兵之事力困凋弊之生靈臣以此為一未可也殿下既化社今元凶未殄軍賦不充河朔數州弊於供億遽先大號費其人儻失舊章為人輕笑二未可也因泣下沾襟上曰余非家為國新創廟朝典禮制度須取太常凖的方今禮院未見上受諸道勸進將篡帝位承業以為晉王三代有功於國先所願奈諸將意何承業自是多病日加危篤卒官莊宗列傳肩輿之鄴宫見上力諫大指皆如實録薛史唐餘録皆與莊王怒賊臣篡逆匡復舊邦賊既未平不宜輕受推戴方疾作忠孝自貞觀以來王室有難未嘗不從所以老奴三十餘年宗列傳同五代史闕文承業謂莊宗曰吾王世奉唐家最為耳今河朔甫定朱氏尚存吾王遽即大位可乎莊宗曰奈諸為吾王捃拾財賦召補軍馬者誓滅逆賊朱溫復本朝宗社吾正自取之誤老奴矣即歸太原不食而死秦再思洛中紀將意何承業知不可諫止乃慟哭曰諸侯血戰本為李家今家且先求唐氏子孫立之復更以天下讓有功者何人輒敢異承業諫帝曰大王何不待誅克梁孽更平吳蜀俾天下一宗復出又胡為哉今大王一旦自立頓失從前仗義征伐之當之讓一月即一月牢讓一年即一年牢設使髙祖再生太付囑之重欲為先王立万年之基爾莊宗不能從乃謝病歸旨人情怠矣老夫是閹官不愛大王官職富貴直以受先王惜費多及儀物不備太似淺陋如闕文所言承業事莊宗父太原而卒歐陽史兼采闕文紀異之意按實録等書承業止業亦恐太過又按傳真以天祐十八年正月獻寶承業以十子數十年唐室近親已盡豈不知其欲自取之意乎褒美承如紀異之語承業為莊宗忠謀近得其實今取之九年十一月卒云即歸太原不食而死亦非實也五月劉鄩飲鴆而卒宗奭承朝廷密旨逼令飲鴆而卒今莊宗實録云憂恚發病卒薛史云張之從二年四月晉王以李繼韜為安義留後昭義軍今以按潞州本號梁梁亦以為匡義節度使今人猶謂澤州為安義云繼韜為安義留後蓋晉王避其父諱改之耳及繼韜降後唐紀上莊宗同光元年二月以盧程為相從實録莊宗列傳薛史唐紀作盧澄今吳越王鏐始建國置百官皆署而後請命居室服御窮極十國紀年鏐功臣諸子領節制奢僣地狹民衆賦斂苛暴雞魚卵菜纎悉收取斗升之逋罪侈靡末年荒恣尤甚錢氏據兩浙逾八十年外厚貢獻內事所負多少為笞己次吏復唱而笞之盡諸簿乃止少者猶笞至鞭背每笞一人則諸桉吏各持其簿列于庭先唱一簿以儉衣衾用紬布常膳惟瓷漆器寢帳壞恭穆夫人欲易以青數十多者至五百餘訖于國除人苦其政吳越備史稱鏐節為長夜之飲遂罷錢易家話稱鏐公燕不二羔胾衣必三幹繪鏐不許嘗歲除夜會子孫鼓琴未數曲止之曰聞者以我王勳業志戊申英政録弘倧子易撰家話俶子惟演撰錢氏然後易劉恕以為錢元瓘子信撰吳越備史備史遺事忠懿尤多虛美隱惡甚於他國按錢鏐起於貧賤知民疾苦必不慶系圖譜家王故事秦國王貢奉録故吳越五王行事失實蓋其子孫所為也今從家話至窮極侈靡其奢汰暴斂之事七月梁主徴王彥章還大梁段凝為招討使彥章馳至歐陽史云末帝罷彥章以諷有司劾彥章不恭勒還第今從實録京師入見以笏畫地自陳勝敗之迹巖等八月梁敬翔李振請罷段凝人取魏博然後與梁以河為歐陽史以為太祖時事按晉未繫社稷之安危也况太祖時振言聼計從均王時始踈斥境故常以大軍守之太祖時未也就使當時曽屯軍河上亦何時故因凝任招討使而見之此必均王時事也既不知其的在蜀內皇城使潘在迎北巡為馬步使今不知何官故且在迎先為內皇城使貶雅州蜀主舊官稱其九月李從珂敗王彥章前鋒於遞坊鎮鎮今從實録薛史作遞公十月梁主殺邵王友誨等汴同日遇害按中都既敗均王薛史云友諒友能友誨莊宗入為亂者豈得獨存故附於此親弟猶疑而殺之况其從弟嘗皇甫麟從莊宗列傳及薛史莊宗實録麟作鏻今帝命訪求梁主或以其首獻不在後嗣朕與梁上十年實録帝慘然曰敵惠敵怨之太社豈有欲全之之理此特虛言耳戰爭恨不生識其面按莊宗漆均王首藏漆朱友貞首藏太社張全義收葬之今從實録薛史末帝紀云詔河南尹十一月張全義請帝遷都洛陽廟按梁以汴州為東京實録甲辰議修洛陽太及滅梁廢東京復為汴州以永平軍為西京而不云以洛陽洛京為西京莊宗以魏州為東京太原為西京真定為北都未嘗有詔改梁西京為洛京也至同光三年始詔依舊以洛為何京若以為東京則與魏州無以異諸書但謂之洛京亦洛京而史脫其文也今無可質正故但謂之洛陽京為東都或者以永平為西京時即改梁西京為十二月髙季興過襄州斬關而去已浹旬莊宗且悔五代史補季興行館而心動謂親吏曰梁先輩之言中矣與其住而生不若去遽以急詔命襄州節度劉訓伺便圖之無何季興至襄州就斬關而出是夜三更向之急詔果至劉訓度其去逺不可逐而死遂棄輜重與部曲數百人南走至鳯林關已昏黑於是興自疑故斬關夜遁耳未必莊宗追之也今從薛史而止王舉天下大定録亦云莊宗遣使追之不及按季二年正月岐王上表稱臣年月實録同光元年十一月茂貞改封秦王薛史無的確月辛巳制秦王李茂貞可封秦王豈有秦王封秦王之理必壬寅巳稱秦王茂貞遣使賀收復自後皆稱秦王至二年二王封秦王也是至時始自岐五月戊申蜀主遣李嚴還朝貢十月癸巳遣客省使李實録七月戊午蜀遣歐陽彬巳朔唐使李嚴來聘五月戊申遣嚴歸本國十一月己未朔嚴充蜀川回信使三年八月戊辰嚴自西川回蜀書四月己京莊宗遣李嚴來修好笏記云豈謂大蜀皇帝特遣蘇張之遣彬為唐國通好使按錦里耆舊傳是歲遣歐陽彬通聘洛嚴為回信使也或者歐陽彬之前蜀已有入洛之使乎若如士來追唐蜀之歡吾皇回感於蜀皇復禮逺酬於厚禮然則之久乎十國紀年蜀史又云九月己亥唐帝遣李彥稠夾使實録年月則李嚴以二年十月奉使至三年八月方歸何留以備東師似用宋光葆之言十一月以後以唐國通好召諸十一月辛丑遣彥稠東還又八月以後遣王宗鍔等戍洋利之今並從蜀書年月軍還似因彥稠來而罷十一月蜀主遣歐陽彬來聘侍郎歐陽彬來使致書用敵實録七月戊午蜀主遣戶部兵部侍郎歐陽彬為唐國通好使今從之國禮蜀書後主紀十一月乙未命翰林學士三年十月丁丑蜀威武城降至鳯州王承捷以鳯興文實録十月戊寅魏王繼岌按今故鎮在鳯州西四程延孝未下鳯州何能先至故鎮又成四州降前一日康延孝李嚴至故鎮威武城唐景思等降東别有威武城亦名故鎮非今之故鎮歟蜀之于禦必在鳯州之東或者當時鳯州之辛巳興州刺史王承鑒棄城走康延孝收興州十國紀實録甲申魏王至故鎮郭崇韜至威武城今從之年辛巳承鑒出奔甲申繼岌十一月自出師至克蜀凡七十日定蜀城計七十五日實録自興師出洛至丁巳入成都止七十日耳實録薛史之誤也薛史因之按唐軍九月戊申離洛城十一月十二月郭崇韜表董璋為東川節度使十二月丙莊宗實録郭崇韜除董璋為東川節度使延孝與華州節度使毛璋見寅以靜難節度使董璋為東川節度副大使又康延孝傳云吾節度不及二旬崇韜為繼岌所害按大軍以十一月二十崇韜請以工部任尚書為東川帥崇韜怒曰紹琛反耶敢違明年正月八日殺崇韜至此凡六十日而云不及二旬崇韜八日丁巳入西州至十二月八日丙寅除董璋東川凡十日鎮東川之日耳非降制日也云不及二旬亦恐誤遇害日月殊不相合蓋十二月丙寅崇韜始表璋王宗弼求西川崇韜陽許之帥許之按崇韜有識略豈實録薛史皆云崇韜以蜀宗弼尚據成都崇韜恐其悔而違拒故陽許之以安其意耳可興大兵取西川反以與宗弼乎此庸人所不為也蓋於時明宗天成元年二月己亥魏王繼岌至利州遣任圜等討李紹琛圜追討按延孝丁酉叛於劎州豈得己莊宗實録己亥繼岌奏康延孝叛遣任岌言李紹琛令斷浮梁繼岌署任圜為副招討使令率七千亥奏報已至洛廣本己亥魏王至利州桔柏津使夜來告繼監軍李廷安討之今從之人騎與都指揮使梁漢顒三月甲子夜張破敗作亂癸亥夜張破敗作亂明日入莊宗實録壬戌今上至鄴都莊宗紀壬子嗣源至鄴都甲寅夜破敗作亂明宗紀與實録鄴都明宗實録三月六日帝至鄴都八日夜破敗作亂薛史甲寅今從實録及明宗本紀同按長曆此月丁巳朔旡壬子四月李嗣源至罌子谷聞莊宗殂鄭州聞變今從明宗莊宗實録云今上至録實李存沼者莊宗之近屬存沼薛史歐陽史彥超傳作存唐愍帝實録符彥超傳云皇弟者存霸自河中衣僧服而往非今日傳莊宗之命者也或者霸莊宗列傳薛史張憲傳但云李存沼按莊宗弟無名存沼據不敢決定故但云近屬武皇之姪莊宗之弟别無所百宫請嗣源監國唐明宗潞王周太祖皆嘗監國漢太監國本太子之事非官非爵然五代即皇帝位是時直以監國為稱號也今從之后令曰中外事取監國處分又誥曰監國可李從襲勸魏王繼岌亟東行監後勸繼岌殺郭崇韜莊宗實録征蜀初為都令自殺又云任圜監軍李廷襲欲存康延孝及至華州為李者李從襲也明宗實録云宦官都監李繼襲勸繼岌東還及誤為繼襲廷襲今從莊宗實録沖所殺者復云李從襲蓋從襲六月髙季興求夔忠萬三州置鎮江軍節度以夔忠莊宗實録王建於夔州詔季興自收元管屬郡荆南軍未進夔州連帥以州降繼岌万施為屬郡雲安監有榷鹽之利建升為安州上舉章平蜀安監隸本道莊宗許之詔命未下莊宗遇弒六月王表求三十國紀年荆南史天成元年二月王表請夔忠万三州及雲月庚戌荆南髙季興奏收復夔忠等州曾顔勃海行年記云州明宗許之劉恕按莊宗實録及薛史帝紀同光三年十一攻峽內先朝許之如能得三州俾為屬郡三川既定季興無得夔忠万等州明宗實録及薛史韋説傳云討西蜀季興請忠万等州割歸當道明宗實録天成元年六月甲寅髙季興尺寸之功莊宗實録同光四年三月丙寅髙季興請峽內夔率先歸投忠万夔三州旦夕期於收復被郭崇韜專將文字奏去冬先朝詔命攻取峽力屬郡尋有施州官吏知臣上峽十月夔忠万三州降於繼岌十一月庚戌季興奏請三州為約臣回歸方欲陳論便值更變此説類近實故從之蓋三年夔州雖自降於繼岌季興表云收復三州攘為己功亦無足屬郡舊史誤云奏收復也行年記差鏐最多不可為據或者宗實録怪今從明七月姚坤告哀於契丹紳今從莊宗列傳漢髙祖實録作苖丙子葬莊宗按莊宗實録哀册文云丙子今從之實録乙亥梓宫發引是日遷幸雍陵九月契丹阿思沒骨餒來今從明宗實録及會要漢髙祖實録作沒姑餒是嵗吳越王鏐改元寶正四年京師亂朝命斷絶鏐遂閻自若唐末泛聞録云同光年通譜云鏐雖外勤貢奉而隂為僣切私改年號于其國其僣大號改元保正明年明宗錫命至乃去號復用唐正朔紀石刻偽號者悉使人交午鑿滅之惟今杭州西湖落星山塔後子孫奉中朝正朔漸諱改元事及錢俶納土凡其境內有其文尚可讀後題云寶正六年歲在辛卯明宗長興二年也院中有鏐封此山為壽星寶石山偽詔刻之于石雖經鑱毁王事迹云同光元年春梁䇿錢鏐為尚父來年改寶正元年其元年即天成元年也好事者或傳曰保正非也余公綽閩元年梁封浙東尚父為吳越國王尋自改元寶正長興三年永隆三年吳越世宗文穆王薨林仁志王氏啓運圖云同光公綽仁志所記年歲差繆然可見錢氏改元及廟號故兼載吳越武肅王崩子世皇嗣永隆二年吳越世皇崩子成宗嗣為錢太祖今參取諸書為據焉至今兩浙民間猶謂錢鏐二年二月討髙季興東川董璋充東南面招討使夔州刺史西方鄴副之南面者蓋據夔梓所向言之耳按梓夔皆在荆南之西南而云東十月孫晟勸朱守殷反王溥周世宗實録江南録作孫忌今從三年十二月髙季興卒午房知溫奏髙季興卒烈祖實録唐明宗實録天成三年十一月壬神道碑及勃海行年記皆云十二月十五日卒今從之亦云乾貞二年十一月季興卒蓋傳聞之誤按陶榖季興四年九月供奉官烏昭遇使吳越皆云監門衛上將軍吳越備史十國紀年實録等諸書蓋借官耳今從十二月吳徐知誥鴆弟知詢宴便殿引鴆觥賜周本本鄭文寶南唐近事烈祖曲歲陛下若不飲此非君臣同心同德之義也臣不敢奉詔上疑而不飲佯醉别引一巵均酒之半跪捧而進曰陛下千萬機智者竊諭其旨乃乘談諧盡併兩盞以飲之內杯於懷中色變無言久之左右皆相顧流汗莫知所從伶倫申漸髙有潰而卒江表志烈祖曲宴引金鍾賜知詢酒曰願我弟百千亟趨而出上密使親信持藥詣私苐解之已不及矣漸髙腦飲久之樂工申漸髙乘詼諧併而飲之至家腦潰而卒二書長壽知詢疑懼引他器均之曰願與兄各享五百歲知誥不本自應多方不須如此云鴆知詢近是今從之皆出文寶而不同乃爾按知誥既即位欲除周長興元年十一月甲戌王弘贄等破劎州前奏今月十實録辛巳軍把關兵士約三千人獲都指揮使清彥溫大軍進攻入劎門三日王弘贄馮暉自利州入山路出劒門關外倒下殺董璋揮使劉太李昊蜀髙祖實録己卯東川告急今月十八日北次又丙戌軍前奏今月十七日收下劎州破賊千餘人獲指門打破關寨掩捉彥溫及將士五百餘人遂相次搆喚大軍軍自白衛嶺人頭山後過從小劎路至漢源驛出頭倒入劎隔一日大軍會下至劒州而乃般運糧食燒舍自驚還奔關寨據關下營又龎福誠謝鍠相謂曰北軍昨來既得關寨之後糧還屯劎門己卯東川告急使至成都知祥命衙內都指揮十國紀年後蜀史壬申弘贄暉襲陷劎門癸酉攻焚劎州取是龎福誠謝鍠屯閬州北來蘇寨聞劎門陷懼北軍據劎州使李肇帥兵五千赴援董璋自閬州帥兩川兵屯木馬寨先食北軍萬餘人自北山馳下福誠等趨河橋迎擊之北軍小帥部兵千餘人由間道先董璋至劎州壁于衙城後士卒方將士以弓弩短兵前急擊之北軍驚擾棄戈甲而遁鍠追襲却福誠帥數百人夜升北山顚轉至北軍壁外大呼譟鍠命程若十八日劎門失守何得二十日知祥已聞之邪今從實之北軍退保劎門十餘日不窺劎州按劎門至成都尚十許十七日也蓋思同等以大軍未至故收糧燒舍還保劒門故録十三日壬申為定若隔一日下至劒州則十五日甲戌非之晉髙祖實録云甲申平劒州破賊千餘人尤誤也福誠等得復入劔州李昊敘事甚詳無執劉太事今刪契丹東丹王突欲來奔海代慕華歸西樓欲立為契丹王實録阿保機妻令元帥太子往渤慕華其母不能止慕華懼遂航海內附按天皇王入汴猶求而元帥太子既典兵柄不欲之渤海遂自立為契丹王謀害國欲殺之理今不取害東丹者誅之豈有在二年閏五月殺安重誨于地重誨曰重誨死無恨但不與五代史闕文李從璋奮檛擊重誨私憾欲殺從珂當是時從珂未有跋扈之迹重誨何以知其官家誅得潞王他日必為朝廷之患言終而絶按重誨自以後人譽重誨者造此語未可信也為朝廷之患此恐是清泰篡立之資治通鑑考異卷第二十九
