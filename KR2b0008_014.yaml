body:
  text: 臣司馬光奉勑編集唐紀六九載二月髙仙芝破朅師虜其王勃特沒一月吐火羅實録去載十册朅師國王勃特沒兄素迦為王册曰頃勃特沒於卿不孝葉護請使安西兵討朅師上許之不見出師今載三月庚子仙芝擒朅師王來獻然則朅師為仙芝所破也於國不忠不言朅師為誰所破按十載正月髙十月王玄翼言妙寶真符仙洞中遣鉷與張均王倕王濟舊志王鉷奏玄翼見玄元於寶護國經寶劵紀籙等獻之今從實録王翼王嶽靈於洞中得玉石函上清楊釗張易之之甥子天授中易之恩幸莫比每歸私弟詔鄭審天寶故事云楊國忠本張易之之珠上樓遂有娠而生國忠其説曖昧無稽今不取令居樓上仍去其梯母恐張氏絶嗣乃密令女奴蠙庚辰復易之兄弟官爵五日今從實録唐曆在七月二十十載正月為安祿山起弟祿山出入宫掖二十日祿山生祿山事迹正月入內貴妃以錦繡繃縳祿山令內人以綵輿升之宫中歡呼日玄宗及太真賜祿山器血衣服件目甚多後三日召祿山觀之大悅因賜貴妃洗兒金銀錢物極歡而罷自是宫中皆動地玄宗使人問之報云貴妃與祿兒作三日洗兒玄宗就約楊妃誓為子母自虢國已下次及諸王皆戲祿兒與之促呼祿山為祿兒不禁其出入溫畬天寶亂離西幸記祿山諂貴戚猱雜未之前聞凡曰叉鬟皆啖厚利或通宵禁掖昵狎膝娛宴上時聞後宫三千合處喧笑密偵則祿山果在其內奚足尚王仁裕天寶遺事云祿山常與妃子同食無所不至嬪嬙和士開之出入卧內方此為疏葪城侯之獲厠刑餘又欲沃以巨觥即祿山以金牌示之云準敕戒酒今略取之帝恐外人以酒毒之遂賜金牌子繫於臂上每有王公召宴二月祿山養曵落河八千餘人養子必無八千之數今不取祿山事迹云養為己子按四月鮮于仲通大敗於瀘南亡歸不獲帝怒欲討之國忠楊國忠傳南蠻質子閣羅鳳南詔傳七年蒙歸義死詔閣羅鳳襲雲南王不云嘗為質子薦閬州人鮮于仲通為益州長史令率精兵八萬討南蠻按為益州長史國忠傳與南詔傳相違新舊書皆如此恐誤亡歸也九年姚州自以張虔陀侵之故反時鮮于仲通已楊國忠掩其敗狀仍敘其戰功度事舊傳無之按既掩敗唐曆云令仲通白衣領節白衣領職敘功豈得復髙仙芝將蕃漢三萬衆擊大食漢六萬衆今從唐曆馬宇假秀實别傳云蕃八月武庫火燒兵器三十七萬萬事今從實録唐曆云四十七十一載二月庚午命有司易惡錢癸酉今從實録舊紀唐曆皆作六月楊國忠奏劒南破吐蕃劒南節度使楊國忠破吐蕃實録兵部侍郎兼御史中丞于雲南拔故洪州等三城按國忠時在長安蓋劒南破吐蕃于雲南拔故隰州等三城獻俘于朝唐曆國忠上言破吐蕃忠已為大夫云中丞誤也隰州從實録以國忠領節制故使之上表獻俘耳時國十二月國忠建議選深者注官日統紀在七月舊紀十二唐曆此敕在七月二十七按國忠作相始兼文部尚書七月末也今從舊紀月甲戌國忠奏請兩京選人銓日便定留放無長名丁亥還宫亥還京今從實録本紀唐曆皆云己十二載十月戊寅幸華清宫是月無戊申今從實録然實舊紀唐曆皆作戊申按長曆後蓋誤録在辛巳十三載正月安祿山入朝祿山潛圖悖逆五月玄宗使輔肅宗實録十二載楊國忠屢言自此不復見矣玄宗手詔追祿山祿山來朝舊傳亦同按玄璆琳伺之祿山厚賂璆琳盛言祿山忠於國國忠又言祿山十四載五月而肅宗實録及舊傳云十二載誤也今從唐曆宗實録并祿山事迹遣璆琳送甘子于范陽覘祿山反狀在三月貶張均張垍張埱上心悅之翌日謂垍曰朕罷希烈唐曆云垍嘗贊相禮儀雍容有度中玄宗嘗幸垍內宅謂垍曰希烈纍辭機務朕擇其代者孰相以卿代之垍曰不敢貴妃在坐告國忠斥之舊垍傳天寶聞而惡之及希烈罷相舉韋見素代垍垍深觖望按本紀三可垍錯愕未對帝即曰無踰吾愛壻矣垍降階陳謝楊國忠誤也明皇雜録云上幸張垍宅謂垍曰中外大臣才堪宰輔月丁酉垍貶官韋見素八月乃知政事而云垍深觖望舊傳壻垍降眥拜舞上曰即舉成命既逾月垍頗懷怏怏意其為者與我悉數吾當舉而用之垍逡巡不對上曰固無如愛子事上不許垍因私弟備言上前時行幸內弟面許相垍與明李林甫所排會祿山自范陽入覲祿山潛賂貴妃求帶平章日謁見因流涕請罪上慰勉久之因問其故祿山具以垍所公同制八輔今既中變當必為姦臣所排祿山大懷恚怒明由是上怒按李林甫時已死亦誤也陳對上命髙力士送歸焉亦以怏怏聞八月陳希烈罷相韋見素同平章事國忠用事左相陳舊見素傳曰時楊三年秋霖雨六十餘日天子以宰相或未稱職見此咎徴命希烈畏其權寵凡事唯諾無敢發明玄宗知之不悅天寶十忠以溫祿山賔佐懼其威權奏寢其事國忠訪於中書舍人楊國忠精求端士時兵部侍郎吉溫方承寵遇上意用之國府有舊恩可之希烈傳曰國忠同事素忌疾之乃引韋見素竇華宋昱等華昱言見素方雅柔而易制上亦以經事相王更自擇剛直之士豈得尚十相於國忠今從希烈傳同列罷希烈知政事按明皇若惡希烈阿徇國忠當十四載二月安祿山請以蕃將代漢將山表請以蕃將三實録正月辛巳祿告身楊國忠韋見素相謂曰流言傳祿山有不臣之心今又十人代漢將上遣中使袁思藝宣付中書令即日進畫便寫之意邪國忠等遽走下階垂涕具陳祿山反狀因以祿山表請代漢將其反明矣乃請陳事既見上先曰卿等有疑祿山徐為圖之國忠奉詔自後國忠每對未嘗不懇陳其事國忠留上前而出俄頃上又令袁思藝宣曰此之一奏姑容之朕追赴朝廷以賈循等分帥三道上許之草制訖留之未行上曰臣有一策可銷其難伏望下制以祿山帶左僕射平章事上引宰相對見常置白麻於座前及璆琳還上乃謂宰臣曰潛令輔璆琳送甘子私候其狀還固稱無事其制遂寢先是祭龍堂遣備儲供責以不虔乃命左右撲殺之始有疑祿山祿山必無二心其制朕已焚矣後璆琳受祿山賄事泄上因山赴闕並是韋見素之意旨國忠曽無預焉仍語見素曰祿意祿山事迹云請不以蕃將代漢將論祿山反狀及請追祿為此見社稷危矣將至上前懇論見素約以事如未諧公繼山出自寒微位居衆上時所忌嫉成疑似耳見素曰公若實他也國忠要祿山速反以明己之先見耳宋巨玄宗幸蜀記之國忠都無一言俯僂而退見素却到中書嗚咽流涕此非三十二人代漢將掌兵其日宰相韋見素楊國忠在省受旨云是嵗春二月二十二日辛亥祿山使何千年表請以蕃將路共知今以蕃酋代漢是亂將作矣與公位當此地能無戚見素慘然國忠問曰堂老何色之戚也見素曰祿山逆狀行所能是非邪見素曰知禍之萌而不能防亦將焉用彼相矣乎國忠於是亦惘然久之乃曰與奪之間在於宸斷豈我輩脫不諧恐虛犯龍顔自貽伊戚見素曰如正其言而獲死猶明日對見僕必懇論冀其萬一若不允子必繼之國忠曰事圖迹已昭彰因叩頭流涕久之國忠但俯僂逡巡更無所補愈於阿從而偷生翌日壬子二相入對見素言祿山潛貯異計將安出國忠曰祿山未必有反意但時所誹嫉便成疑似上不悅遂以他事議之既退還省見素謂國忠曰聖意未回丑上又使思藝宣旨令且依此發遣卿等所議後别籌之自耳見素曰公若為此見社稷危矣遂憫然不言二十四日癸下平章事追赴闕庭及輔璆琳送甘子祿山紿璆琳曰主上是見素數奏其凶狀三月己未朔見素請以祿山同中書門之藥以吾之心事將無益今欲耀兵強諌以迹鬻拳此意決耄年信任非次國忠之輩茍徇榮班今若進逆耳之言若口國必無二心特望官家不以東北為慮上然之謂宰臣曰祿矣祿山以物贈璆琳璆琳既受金帛及還奏曰祿山盡忠奉合萬死然愚者千慮或有一中願陛下審察之自餘與實録山朕自保之卿勿憂也見素起曰臣忤拂聖旨僣黷大臣罪出悖語又國忠平日數言祿山欲反此際安得不與見素同及事迹所述略同按祿山方賂璆琳泯其反迹安肯對之遽焉者也今取其可信者心蓋所謂天下之惡皆歸四月楊國忠使京兆尹圍安祿山第伺求祿山反狀或矯肅宗實録國忠日夜令侍御史鄭昂之陰推劾潛捶殺之慶宗尚郡主又供奉在詔以兵圍其宅或令府縣捕其門客李起安岱李方來等皆是楊國忠使門客蹇昂何盈求祿山陰事命京兆尹圍捕其京密報其父祿山轉懼唐曆是夏京兆尹李峴貶零陵太守先祿山怒使嚴莊上表自理具陳國忠罪狀二十餘事上懼其宅得安岱李方來等與祿山反狀使侍御史鄭昂之縊殺之兆尹李峴於其宅得李起安岱李方來等又貶吉溫為澧陽生變遂歸過於峴以安之安祿山事迹與唐曆同外有命京迹同按李峴傳十三載連雨六十餘日國忠歸咎京兆尹貶長史以激怒祿山幸其速反上竟不之悟玄宗幸蜀記與事陰事諷京兆捕其弟得安岱李方來等與祿山反狀縊殺之長沙太守新宗室宰相傳楊國忠使客騫昂何盈摘安祿山峴為零陵太守今從實録祿山怒上書自言帝懼變出七月遣馮神威齎手詔諭祿山今從玄宗幸蜀記祿山事迹作承威十月庚寅幸華清宫從實録新紀舊紀壬辰今十一月甲子安祿山反後慰諭兵士磨厲戈矛頗異於常平致美薊門紀亂曰自其年八月官胡逸自京回奉密旨遣祿山將隨身兵馬入朝來莫令郡識者竊怪矣至是祿山勒兵夜發將出命屬官等謂曰奏事軍那人意楊國忠也人知羣公勿怪便請隨祿山遣何千年劫楊光劌數千人詐稱獻俘以車千乘包肅宗實録云先令千年領壯士詣太原執楊光劌未暇向河陽也今不取薊門紀亂云是月旌旗戈甲器械先俟于河陽橋不見後來所用又千年時方甲子安得甲午亦不取甲午縳光劌按是月有甲戌祿山斬光劌光劌按唐曆祿山遣驍騎何千年等劫幸蜀記云十九日甲戌至真定南逢楊山事迹曰其年九月甲午傳太原尹楊光翽首至按祿山十光翽歸遇於博陵郡殺崔蓋幸蜀記誤以定州為真定耳祿九月取光翽誤也一月始反而事迹云張介然為河南節度使介然為陳留太守按是時無刺史實録以介然為汴州刺史舊紀以然直為節度使耳郭納見為太守介十二月庚寅祿山陷陳留斬介然祿山事迹庚午陷陳舊紀辛卯陷陳留郡喻等首至今從實録留郡傳張介然荔非守癸巳陷滎陽殺崔無詖午今從實録唐曆舊紀作甲丁酉陷東京封常清戰敗西走交兵至十三日不已按常清表云自今月七日陽蓋與賊前鋒戰耳七日祿山猶未至榮常清説仙芝守潼關方欲進師會常清軍敗至欲廣其肅宗實録云仙芝領大軍初至陜言即日夜走保潼關朝廷大駭今從本傳賊勢以雪己罪勸仙芝班師仙芝素信常清辛丑制太子監國辛丑十七日也實録又作己丑尤誤肅唐曆幸蜀記皆云十六日辛丑按長曆今親總六師率衆百萬鋪敦元惡巡撫洛陽則是上親征使宗實録云詔以上監國仍令揔統六軍親征寇逆按制書云從玄宗實録太子留守也今顔真卿斬假子光賈載穆寧等斬劉道玄傳首平原首傳檄郡邑多有應者賊將史思明來冦郡寧以攝東光令舊穆寧傳祿山偽署劉道玄為景城守寧唱義起兵斬道玄奪寧兵及攝縣初寧佐採訪使巡按嘗過平原與太守顔真將兵禦之思明遣使説誘寧立斬之郡懼賊怨深後大兵至使持書遺真卿曰夫子為衛君乎更無他詞真卿得書大喜卿密揣祿山必叛至是真卿亦唱義舉郡兵以拒祿山會間即族嚴莊家豈有懼賊怨深而奪寧兵乎真卿既殺假子光因奏署大理評事河北采訪支使按寧以道玄首謁李暉暉卿已召寧計事豈待得此書然後用之況真卿領采訪使乃帥諸郡以討祿山寧書中何必尚為隱語道玄首至平原真後今皆不取在明年常山陷饒陽太守盧全誠今從殷仲容顔氏行狀包諝河洛春秋作盧皓封常清草遺表附邊令誠上之迹皆曰常清配隸仙芝明皇幸蜀記安祿山事以為敕令却赴潼關自草表待罪是日臨刑託令誠上之蓋軍感憤頗深遂作遺表飲藥而死令誠至常清已死而舊傳尸諫之臣死作聖朝之鬼故云然今從舊傳二書見常清表有仰天飲鴆向日封章即為河西隴右節度使哥舒翰舒翰入京師裴冕為河西留後舊金梁鳳傳云天寶十三載哥猶領河西隴右兩鎮也在武威是翰雖病在京師翰將兵八萬號二十萬軍于潼關太子先鋒兵馬使元帥肅宗實録云以翰為皇十二月十七日大軍發唐曆亦云先鋒兵馬使元帥舊傳云領河隴朔方募兵十萬并仙芝舊卒號二十萬拒戰於潼關奴刺頡跌朱邪契苾渾蹛林奚沙陀蓬子處密吐谷渾思先鋒兵馬元帥祿山事迹云翰為副元帥領河隴諸蕃部落云丙午命翰守潼關按玄宗實録癸卯斬常清仙芝命翰為結等十三部落督蕃漢兵二十一萬八千人鎮于潼關舊紀蓋誅仙芝之日即命翰代仙芝舊紀丙午肅宗實録十七日兵馬副元帥統兵八萬鎮潼關時榮王為元帥故以翰副之征者耳并諸蕃部落及仙芝舊兵則及十餘萬因號二十萬也軍發皆太早也玄宗實録所云八萬者蓋止謂漢兵隨翰東薛忠義寇靜邊軍郭子儀敗之在十二月十二日嫌其陳翃汾陽王家傳此戰相亂故并置此與祿山陷東都丙午顔杲卿殺李欽湊擒髙邈何千年河北十七郡皆歸朝廷誅之狀且曰鉞下才不世出天寶縱之所向輒平無河洛春秋曰祿山至藁城杲卿上書陳國忠罪惡宜符亦用荀彧之策又曰今河北殷實百姓富饒衣冠禮樂天思不服昔漢髙仗赤帝之運猶納食其之言魏武應黃星之或結聚豈非後患者乎伏惟精彼前軍嚴其後殿所過持重下莫敵孔子曰十室之邑必有忠信萬家之邦非無豪傑如已東且為己有廣挽芻栗繕理甲兵傳檄西都望風自振若且詳觀地圖凡有隘狹必加防遏慎擇良吏委之腹心自洛敖倉南臨白馬之津北守飛狐之塞自當抗衡上國割據一唐祚未改王命尚行君相協謀士庶奔命則盛兵鞏洛東據命孰有出鉞下之右者祿山大悅加杲卿章服仍舊常山太方若景命已移謳歌所繫即當長驅岐雍飲馬渭河黔首歸各一人其趙邢洺相衛等州並皆替换及滄瀛深不從祿山守并五軍團練使鎮井陘口留同羅及曵落河一百人首領通幽藁城縣尉崔安晟恆州長史袁履謙等同上書説杲卿張獻誠圍深州月餘不下前趙州司戶包處遂前原氏尉張途取適於目前忘纍於身後竊為明公不取今若拒祿山之曰明公身荷寵光位居牧守乃棄萬全之良計履必死之畏井陘之路與東都合勢如此則洪勳盛烈何可勝言者哉輕命招十萬之兵峙乃芻茭積其食粟分守要害大振威聲通忠貞之節杲卿覽書大悅於是僉議偽以祿山命追井陘鎮進瞽言萬無一用魂銷東岱先懷屠裂之憂心拱北辰願立美人各一其餘通賜物一萬假設於州南焦同驛自曉至暮兵就恆州宴設酋長各賜帛三百假馬一匹金銀器各一牀所覺乃盡收其器械一一縛之明日盡斬棄尸於滹沱河中并以歌妓數百人悅其意密於酒中致毒與飲令盡醉悉無謁于藁城縣祿山以杲卿嘗為己判官矯制賜紫金魚袋使殷亮顔杲卿傳曰祿山起杲卿計無所出乃與長史袁履謙趙郡甲卒七千人守土門約杲卿將見欽湊以私號召之杲自守常山郡以其孫誕弟子詢為質俾崇郡刺史蔣欽湊以以誅君側為名其實反矣我與公世為唐臣忝居藩翰寧可卿罷歸途中指其衣服而謂履謙曰此害身之物也祿山雖命不敢違杲卿乃使人告太原尹王承業以殺欽湊俟其緩從之作逆邪履謙愀然變色感歎良久曰為之奈何唯公所履謙終日不相謁唯使男泉明往來通其言召前真定令賈急相應承業亦使報命杲卿恐漏泄示已不事事多委政於據平原殺假子光使杲卿妹子盧逖并以購祿山所行敕牒深處士權渙郭仲雍就履謙以謀之適會杲卿從父弟真卿欽湊至杲卿辭之曰日暮夜恐有它盜城門閉矣請俟詰朝潛告杲卿大悅匿逖于家逖之未至杲卿先使人以私號召等即于驛亭偶欽湊夜久醉熟以斧斫殺之悉散土門兵先相見因遣參軍馮虔宗室李峻靈夀尉李栖默郡人翟萬德杲卿候知之其日邈至于滿城驛杲卿令崔安石馮虔殺之是祿山使其腹心偽金吾將軍髙邈徴兵于范陽路出常山安石於路絶行人之南者馳至醴泉驛候千年亦斬其人而邈前驅數人先至遽殺之遂生擒邈送于郡遇何千年狎至於范陽杲卿召長史袁履謙前真定令賈深內丘丞張通幽擒之如邈日未午二凶偕致肅宗實録杲卿初聞祿山起兵天子在長安方欲徴天下兵東向問罪事不及矣如賊軍暴謂之曰今祿山一朝以幽并騎過常山趨洛陽有問鼎之志朔待海內之救上以安國家下以全臣節此策之上者遂即至吾屬為虜必矣不若因其未萌招義徒西據土門比通河守郡城賊將李歸仁令弟欽湊領步騎五千人先鎮土門仍日購士得千餘人命履謙將兵鎮土門命賈深防東路通幽覘者知其謀而白杲卿杲卿召履謙告之履謙曰事將亟矣若不令以兵隸於杲卿又使麾下騎將髙邈馳報祿山令促其行吏以待之欽湊夜至郡杲卿令憩於驛乃使參軍李循馮虔早誅欽湊謀不集也遂詐追欽湊令赴郡計事命履謙署人于杲卿杲卿與履謙且喜事之捷又懼賊之來相對泣杲卿縣尉李栖默等享欽湊於驛醉而夜殺之履謙持欽湊首謁事唐豈偷安於胡羯但使死而不朽亦何恨也有頃藁城尉收淚勵履謙曰大丈夫名不挂青史安用生為吾與公纍世翟萬德并命安石其方略詰朝邈騎數人先至驛虔盡坑之崔安石報髙邈自祿山所至已宿上谷郡界又使馮虔縣吏石等指揮人吏以棒亂擊邈仆生縛之無何南界又報何千邈繼至虔紿之曰太守將音樂迎候邈無疑至廳下馬虔安知邈被擒令麾下騎與安石戰敗又生擒千年並送于郡舊年自東京宿趙郡安石萬德先於郡南醴泉驛候之千年至從弟真卿為平原太守遣信告杲卿相與起義兵犄角斷賊傳曰祿山陷東都杲卿忠誠感發懼賊冦潼關即危宗社時前內丘丞張通幽等謀閉土門以背之祿山遣蔣欽湊髙邈歸路以紓西冦之勢杲卿乃與長史袁履謙前真定令賈深常山郡屬欽湊遣高邈往幽州未還杲卿遣吏召欽湊至郡帥衆五千守土門杲卿欲誅欽湊開土門之路時欽湊軍隸履謙與參軍馮虔縣尉李栖默手力翟萬德等殺欽湊中夜計事是月二十二日夜欽湊至舍之於傳舍會飲既醉令袁崔安石報髙邈還至滿城即令馮虔翟萬德與安石往圖之履謙攜欽湊首見杲卿相與垂泣喜事之濟也是夜藁城尉給之曰太守備酒樂於傳舍邈方據廳下馬馮虔等擒而縶詰朝邈之騎從數人至藁城驛安石皆殺之俄而邈至安石泉驛千年至又擒之即日縛二賊將還郡按祿山初自漁陽之是日賊將何千年自東都來趙郡馮虔翟萬德伏兵於醴千餘人拒之則應時韲粉安得復守故郡乎況時祿山猶以擁數十萬衆南下常山當其所出之塗若杲卿不從命遽以免矣肅宗實録所云者蓋欲全忠臣之節耳然杲卿忠直剛誅楊國忠為名未僣位號杲卿迎於藁城受其金紫殆不能之漢髙魏武為之畫割據併吞之策此則粗有知識者必知烈糜軀徇國捨生取義自古罕儔豈肯更上書媚悅祿山比意由己父上書勸成之以大其父功耳觀所載杲卿上祿山其不然也蓋包諝乃處遂之子欲言杲卿初無討賊立節之皆諝所撰也又張通幽兄為逆黨又教王承業奪杲卿之功書處遂等上杲卿書田承嗣上史朝義疏其文體如一足知杲卿為忠義尤難信也舊傳云欽湊髙邈同守土門欽湊遣終以反覆被誅其行事如此而包諝云初與處遂同上書勸今從殷亮杲卿傳祿山自遣邈徴兵是也河洛春秋云留同邈往幽州二將既握兵同鎮士門欽湊豈得擅遣邈往幽州能守乎殷傳云七千人守土門此七千人又非履謙一夕所羅及曵落河百人彼鎮井陘遏山西之軍重任也豈百人所練民兵脅從者耳故履謙得醉之以酒誅欽湊及百人而散能縛也蓋祿山留精兵百人以為欽湊腹心爪牙其餘皆團得偏置毒於客酒中乎今不取舊傳及殷傳皆云欽湊姓蔣其餘耳河洛春秋云酒中置毒按時履謙等與欽湊同飲豈殺賊將李欽湊執向千年髙邈送京師按己亥十五日也而今從玄宗肅宗實録唐曆姓李玄宗實録十二月己亥杲卿杲卿同舉義兵今從舊傳為二十二日丙午殺欽湊肅宗實真卿以壬寅斬假子光壬寅十八日也真卿既殺子光乃報帥哥舒翰為副徴天下兵四十萬東向討逆按實録癸卯始録又云杲卿之斬欽湊等因使徇諸郡曰今上使榮王為元三郡悉舉義兵歸朝廷殷亮顔氏行狀舊顔真卿傳唐曆皆命翰為副元帥計丙午常山亦未知今不取河洛春秋云十者耳顔氏行狀云不𣢾者六郡而已時魏郡亦未下蓋舉其云十七郡歸順蓋河洛春秋不數平原景城河間饒陽先定耳終數祿山將攻潼關聞河北有變而還壬戌祿山將犯潼關次玄宗實録十五年正月二十六日非乘虛掩襲也豈得至新安然後知其有備乎蓋于新安聞有備而還按祿山以此月丁酉陷東都至壬戌凡懼而歸耳今從肅宗本紀常山有變則幽薊路絶故肅宗至德元載正月祿山以達奚珣為侍中張通儒為中書令通儒為右相今從實録幸蜀記云以珣為左相顔杲卿起兵才八日史思明蔡希德引兵至城下春秋河洛丙午始殺李欽湊云乙未誤也今從諸書云十二月乙未思明希德齊至城下杲卿壬戌城陷傳正月六日圍常山九日拔之今從玄宗實録唐實録癸亥城陷河洛春秋正月一日城陷舊思明杲卿傳曆舊紀郭子儀薦李光弼為河東節度使祿山亂朔方節度使杜牧張保臯傳曰安淮持節分朔方半兵東出趙魏當思順時汾陽臨淮俱為牙安思順以祿山從弟賜死詔郭分陽代之後旬日復詔李臨陽代思順臨淮欲亡去計未決詔至分汾陽兵東討臨淮入門都將二人不相能雖同盤飲食常睇相視不交一言及汾亂主遷非公不能東伐豈懷私忿時邪悉召軍吏出詔書讀請曰一死固甘乞免妻子汾陽趨下持手上堂偶坐曰今國蜀唐之號令猶行於天下若制書除光弼為節度使子儀安之如詔約束及别執手泣涕相勉以忠義按於時玄宗未幸誤也今從汾陽家傳及舊傳敢擅殺之杜或得於傳聞之二月光弼將步騎萬餘弩手三千出井陘亥光弼以朔玄宗實録己城下領蕃漢兵馬步一萬餘人并太原弩手三千人救真定方馬步五千東出土門收常山郡河洛春秋云光弼從大同河洛言到真定之數耳蓋實録言朔方元領之兵令狐潮走賈賁得入雍丘以應祿山百姓有違令者百餘肅宗實録曰雍丘令狐潮據城守之遽出軍以禦官軍縛者忽一人幸脫殺守者互解其縳人將殺之覘者報官軍至潮不及行刑遂反縛仆于地令人子以堅人志舊張巡傳潮欲以城降賊民吏百餘人不從命閉城門以拒朝相持纍日賁聞之入其城領衆殺潮母妻及者自解其縳閉城門拒潮召賁賁與巡引衆入雍丘新傳潮潮皆反接仆之于地將斬之會賊來攻城潮遽出鬪而反接出行部淮陽囚更解縛起殺守者迎賁等入潮不得歸巡乃舉縣附賊遂自將東敗淮陽兵虜其衆反接在廷將殺之暫出迎豈有更出鬪者今從李翰張中丞傳及新傳屠其妻子磔城上按潮既欲以城降賊賊來即當三月壬午李光弼為河北節度使趙郡按壬午三月二實録云乙丑光弼收春秋收趙郡在四月今從之十九日乙丑十二日也河洛李蕚乞師於顔真卿華今從舊傳顔氏行狀作李賀蘭進明克信都抵罪公從之使赴行在進明之全乃公顔氏行狀云進明失律於信都城下有詔使時進明起義兵北度河與真卿同經略六月真卿破袁知之護也今從舊傳又唐曆三月四日乙酉真卿充河北采訪都皆在六月按三月無乙酉乙酉四月二日也今從統紀泰於堂邑進明再拔信都統紀皆在三月舊紀破知泰拔信五月魯炅衆潰走保南陽千人奔順陽川今從舊傳玄宗實録云炅攜百姓數子儀光弼議曰賊倦矣可以出戰語汾陽家傳作子儀語河洛春秋以此為光弼共議耳蓋二人壬午戰于嘉山大破史思明月癸未朔壬午五月二十九實録云六月壬午按長曆六六月二十五日光弼破賊於嘉山今從實録而改其月日也汾陽家傳舊祿山傳亦云六月戰嘉山河洛春秋云河北十餘郡降祿山又與馬步二萬人至邢州取堯山招河洛春秋云五月蔡希德從東都見祿山介從幽州占歸擅幽易兼大同紇蠟共萬餘人帖思明思明慶射趙州東界效曲鼓鹿城間渡汙池水入無極至定州牛馳突光弼以十五萬衆頓軍恆陽樵採往來人有難色召有軍既壯共五萬餘人其中精騎萬人悉是司羅曵落河精於曰思明用軍唯將徑悍觀其布措實謂無謀昔秦趙爭山先䇿者試之時趙州司戶參軍先臣亡父包處遂上書與光弼者五萬被甲兩重陌刀各二東有髙山甚大先令五千甲士居者勝豈不為勞逸勢倍髙下相懸今宜重出軍人有膂力伏兵馬與一百面鼓應山上避賊百姓壯者亦與器械令隨於山上設伏後出二千人山東取糧賊見必追之則奔山上五萬人擇將二人統之各領二萬一將於南面一將於城北大軍老弱者令居險固守遙為聲援賊必圍山攻之城內出翼以天曉合圍其軍每二十五為隊每隊置旗兩口鼕鼕鼓門出賊營悉在山東其軍夜出長去賊三十里行廣張左右門出軍一萬人布掌底陳山上亦擊鼓而下齊攻之必克勝子一具圍落才合則動鼓子賊必不測人之多少然於城東山上至六月二十五日依前計大破賊於嘉山陳斬首數萬光弼尤然此計乃出朔方計會出人取糧賊果然來襲即奔索押衙劉旻斫斷而走生擒得旻至二十六日覆陳二十七餘級生擒數千思明落馬步遁至夜柱折槍歸營希德中槍諝專欲歸功其父而它書皆無之今不取日有詔至恆陽云潼關失守駕幸劒南包阿浩田乾真小字也從唐曆統紀舊傳祿山事迹作阿法今王思禮説哥舒翰誅楊國忠二萬守關悉以精鋭回誅玄宗實録云或勸翰留兵客泄其謀於國忠國忠大懼按翰若回兵誅國忠則正與祿楊國忠此漢挫七國之計也公以為何如翰心許之未發有不然且翰雖心計它人安得知之正由翰按兵不進故國忠山無異思禮勸翰抗表言國忠罪猶不敢況敢舉兵乎事必忠則安肯慟哭出關乎幸蜀記云翰使王思禮至陜郡見賊及其黨疑懼恐翰回兵誅之其實翰無此心也若果欲誅國其干紀亂常背天逆理且曰若面縛而來束身歸死赦爾九偽御史中丞無敵將軍平西大使崔乾祐令傳檄與祿山數爾審思之悔無及矣按翰與乾祐方對壘相攻思禮軍中大族罪爾一身如更屈強王師遲疑未決大軍一鼓玉石俱焚乾祐乎必無此理今不取將豈可使齎罵祿山之檄詣六月翰斬杜乾運引兵出關郡西潛鋒蓄鋭卧鼓偃旗而幸蜀記曰賊將崔乾祐於陜既被國忠眩惑中使相繼督責於公不得已撫膺慟哭久之偵者奏云賊全無備上然之又曰玄宗久處太平不練軍事哥舒公公曰今軍出關執十全矣更置乾運於側以為疑軍乃引師出關國忠又令杜乾運領所募兵於馮翊境上潛備衙前揔管叱萬進追軍誡之曰若不受追即便斬頭來乾運人心憂疑即不俟見賊吾軍潰矣必當併之以除內憂遂令語進忽抽佩刀曰奉處分取公頭乾運驚懼其左右悉新招果不肯赴進詐詞如欲叛哥舒切請見乾運遂喜遽見之與統其軍赴關按翰若擅殺乾運而奪其軍則是已反也朝廷募者悉投仗散走進遂斬乾運携首至於軍門衆皆攝氣乃乾運受處分或有所違拒因託軍法以斬之耳凌準邠志云安能趣之出關乎蓋奏乞以其軍隸潼關朝廷已許之翰召曰哥舒公老疾昏耄賊素知諸軍烏合不足以戰今祿山悉郭子儀李光弼將進軍聞朝廷議出僮關圖復陜洛二公議徒之族取祿山之首其執必矣若潼關出師有戰必敗關城鋭南馳宛洛賊之餘衆盡委思明我且破之便覆其巢質叛關無出唐曆會偵人自陜至云崔乾祐所將衆不滿四千不不守京室有變天下之亂何可平之乃陳利害以聞且請固至是頗甚軍中之務不復躬親委政於行軍司馬田良丘良足圖也上大悅舊翰傳翰既斬乾運心不自安又素有風疾禮李承光又爭長不叶人無鬪志今兼采之丘復不敢專斷教令不一頗無部伍其將王思己丑遇賊庚寅會戰四百次靈寶西原八日與賊交戰新肅宗實録乙酉翰與乾祐會戰舊傳四日然後戰玄宗實録丙戌翰出關己丑遇賊庚寅戰此近傳丙戌次靈寶西原庚寅與乾祐戰按翰軍既遇賊必不留蜀記亦然是今從之幸崔乾祐以草車焚前驅數十堆因風焚之今從舊傳幸蜀記曰野中先有官草積楊國忠首唱幸蜀之策甲午移仗北內使曹仙領千人幸蜀記上遣中國忠諫以為當謹守宗祧不可輕動韋見素力爭以為賊勢擊鼓於春明門外又令燒間廄草積煙熖燎天上將乘馬楊可聽往返數四上乃從見素議加魏方進御史大夫充前路逼近人心不固陛下不可不出避狄國忠暗與賊通其言不以驚之國忠久蓄幸蜀之謀見素乃其所引豈得上前有此知頓使按賊陷潼關鑾輿將出人心已危豈有更擊鼓燒草見素事乃近誣今不取爭論此蓋宋臣欲歸功乙未上出延秋門朝此乙未日事宋臣誤也幸蜀記云丙申百官尚赴食時至望賢宫宫舍木煮食之衆不忍食幸蜀記至望賢唐曆至望賢頓御馬病上曰殺此馬拆行士覺之遂抱上足嗚咽開諭上乃止肅宗實録楊國忠自入宫行從皆飢上入宫憩於樹下拂然若有棄海內之意髙力蜀至望賢宫官吏奔竄殆曛黑聞百姓有稍稍來者上親問市衣袖中盛糊餅獻上皇天寶亂離記六月十一日大駕幸雜之以麥子飯送至上前先給兵士六宫及皇孫已下咸以之卿家有飯否不擇精粗但且將來老幼於是競擔挈壺漿枕籍寢止長幼莫之分别賴月入戶庭上與六宫皇孫等差手掬而食頃時又盡猶不能飽既乏器用又無釭燭從駕者十一日非也餘則兼采之異焉按上九日幸蜀溫畬云上意在入蜀韋諤請且至扶風有中使常清奏曰國忠久幸蜀記曰上意將幸西蜀節奏曰太原城池固莫之比可以久處請幸北京中官郭希在劒南又諸將吏或有連謀慮逺防微須深詳議中官陳全及朔方中使駱承休奏曰姑臧一郡嘗霸五原秦隴河蘭皆奏曰朔方地近被帶山河鎮遏之雄莫之與比以臣愚見不其意見者十餘輩髙力士在側而無言上顧之曰以卿之意足徴取且巡隴右駐蹕涼州翦彼鯨鯢事將取易左右各陳朔方近塞半是蕃戎不達朝章卒難教馭西涼懸逺沙漠蕭何道堪行力士曰太原雖固地與賊鄰本屬祿山人心難測狼狽劔南雖窄土冨人繁表裏江山內外險固以臣所料蜀條大駕順動人馬非少先無備擬必有闕供賊騎起來恐見史中丞充置頓使今從唐曆道可行上然之即除韋諤御父老留太子建寧王倓李輔國勸之太子請留張良娣贊舊宦者傳李靖忠啓今不取天寶亂離記云大駕至歧州上取褒斜路幸蜀儲皇成之按太子獨還宣慰百姓良娣不在旁何以得贊成留計靈武此誤也取彭原路抵壬寅上至散關使潁王璬先行入劒門幸普安郡命潁王肅宗實録七月景寅上皇逺嗚咽流涕謂髙力士曰吾昔若取九齡語不到此命中使璬先入蜀今從玄宗實録康駢劇談録上至駱谷山登髙望曰上皇在蜀思九齡之先覺下詔贈司徒仍遣就韶州致祭往韶州祭之按玄宗入蜀不自駱谷康軿誤也舊張九齡傳齡事迹云建中元年七月詔舊傳案其詔乃德宗贈九齡司徒詔也張九以周泌為河西彭元耀為隴右節度使日以泌為河西耀肅宗實録即位之見肅宗又加新命乎唐曆作周泌今從玄宗實録為隴右節度使或者玄宗已命以二鎮二人至靈武祿山遣孫孝哲將兵入長安月丁卯己巳祿山害諸妃主肅宗實録祿山事迹惟載七哲等攻陷長安害諸妃主皇孫七月一日祿山遣殿中御史諸書皆無賊入長安之日惟亂離記云六月二十三日孫孝賊以六月八日破潼關其入長安必在此月內矣新傳云賊張通儒為西京留守此書多抵捂不足為據然以日月計之宗十六日至扶風縣十七日至扶風郡若賊駐潼關十日則不謂天子能遽去駐兵潼關十日乃西行時已至扶風按玄京兆尹又云祿山未至長安士人皆逃入山谷羣不逞剽左於時未能至長安也又云祿山使張通儒守東京田乾真為舊傳通儒為西京留守遍檢諸書祿山自反後未嘗至長安藏大盈庫百司帑藏竭乃火其餘祿山至怒乃大索三日按誤也新傳資治通鑑考異卷第十四
