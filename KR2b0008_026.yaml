  text: 資治通鑑考異卷第二十六
  hash: sha256:4ef524323a8eb0ded792930909290989bb50d2e080310563fa2a8496f043c409
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_026-1a}
body:
  text: 司馬光奉勑編集唐紀十八昭宗龍紀元年正月癸巳朔赦改元癸巳改文德二年唐年補録曰正月舊紀實録明年正月乃上尊號補録誤也舊紀又云以劔南為龍紀元年百寮上帝徽號曰聖文睿德光武弘孝皇帝新昭度大順二年乃為留守舊紀誤也今皆從實録西川節度兩川招撫制置使韋昭度為東都留守按郭璠殺申叢送秦宗權於汴權為帥汴將李璘知之斬實録申叢裴涉欲復立宗囚之雖納𣢾於太祖欲自獻於長安以邀旄鉞及姦謀不就叢涉以宗權送汴州薛居正五代史初申叢縛宗權折足而太祖即以璠為留後太祖遣都統判官韋震奏事且疏時溥乃欲復奉宗權以接取其柄為其將郭璠所殺繫宗權送于滄兖二鎮則明年朝廷命兼領滑州全忠猶辝不受今豈敢之罪願委討伐仍請降滄兖二帥之命按全忠若自求兼領時不知全忠欲以何人為滄帥諸書皆無其名薛史實録皆遽求滄兖邪若為滄兖二帥求之則兖帥朱瑾乃仇讎也當之理蓋郭璠殺申叢而實録云李璠誤也李璠乃檻送宗權云申叢欲復立宗權按叢折宗權足而囚之豈有復奉為帥者二月斬宗權宗權并妻趙氏以獻斬於獨柳實録三月全舊紀二月己丑汴州行軍司馬李璠監送秦丑宗權伏誅按宗權正月離汴不應三月始至長安戊辰獻忠獻宗權斬於獨柳新紀二月戊辰朱全忠俘宗權以獻己伏誅故但云二月俘不應至己丑始三月朱全忠兼中書令正五代史在三月亦云封東平舊紀在四月封東平郡王薛居加中書令今從實録止趙昶為忠武節度使年蔡州平朝廷議勳犨檢校司徒薛居正五代史趙犨傳曰文德元龍紀元年三月又以平巢蔡功就加平章事充忠武軍節度充泰寧軍節度使又改授浙西節度使不離宛丘兼領二鎮軍州事付於昶遂上表乞骸後數日寢疾卒昶傳曰犨遙領使仍以陳州為理所犨一日念弟昶共立軍功乃下令盡以付於昶詔授兵馬留後旋遷忠武軍節度使亦以陳州為理泰寧軍節度使以昶為本州刺史俄而犨有疾遂以軍州盡雖衆終不能抗以至宗權敗焉上云蔡州平以犨為忠武節所時宗權未滅陳蔡封疆相接昶每選精鋭深入蔡境蔡賊權未滅自相違今從犨傳度使下云昶為節度使時宗六月李克用攻邢州孟方立飲藥死弟遷為留後克用實録救援其將奚忠信攻遼州克用復遣李罕之等急攻方立將以弟克修守潞遣澤州刺史安金俊討方立方立因結諸鎮師圍磁州方立與奚忠信率兵大戰軍敗陷磁州而方立單馬溉出戰為罕之所擒溉謂曰欲圖邢州當先取磁州及并援汴州朱全忠遣王虔裕赴之鎮州王鎔遺克用書和解而騎還邢州忠信死焉方立􆄏之乃自圖死三軍立其弟遷求元佐請攻磁州破奚忠信金俊乃殺之方立果與忠信引兵退唐年補録方立有謀將石元佐為安金俊所獲金俊問之遂自裁薛居正五代史方立傳六月李存孝下洺磁兩郡方入磁金俊與之戰大敗忠信死方立單騎入邢州愧見父老生獲馬溉奉韜初方立性苛急恩不逮下攻圍纍旬夜自巡立遣馬溉袁奉韜盡率其衆逆戰於琉璃陂存孝擊之盡殪州刺史遷素得士心衆乃推為留後求援于汴時梁祖方攻城慰諭守陴者皆倨方立知其不可乃飲鴆而卒其從弟洺録云溉為罕之謀取磁州蓋誤以石元佐為溉也又奚忠信時溥援兵不出按李罕之攻下磁州進攻洺州乃擒馬溉實六月邢洺節度使孟方立卒三軍推其弟洺州刺史遷為留去年已為李克修所擒乃云與方立率兵大戰亦誤也舊紀使孟方立卒其弟遷自稱留後按唐年補録載王鎔奏得邢後李克用出軍攻之新紀六月李克用寇邢州昭義軍節度州刺史遷權知兵馬留後事及新舊紀實録薛史方立傳皆洺大將等狀以孟方立奄辝昭代三軍百姓同以親弟攝洺武皇紀云立其姪遷恐誤今從諸書云立其弟遷唯太祖紀年録及薛史十一月宦官始服劔佩侍祠主官不過金吾衛上將軍則按田令孜楊復恭雖威權震宦官所欲衣者何品秩之法服也其餘宦官必卑矣但諸書不見當時大順元年正月李克用取邢州軍守破邢州城孟遷投來唐末見聞録龍紀元年大紀年録及薛居正五代史太祖紀皆曰大順元年李存孝攻拜李存孝為邢州刺史十一月四日孟遷補充教練使太祖裕等三百人以獻而無月太祖紀年録又曰太祖徙孟遷於邢州急邢帥孟遷以邢洺磁三州歸于我執朱溫之將王虔年二月遷執王虔裕等乞降武皇令安金俊代之今從實録太原以大將安金俊為邢洺團練使薛史孟遷傳曰大順元携二遷乃縶虔裕送于太原尋為所殺按是時全忠方攻時薛史虔裕傳曰時太祖大軍方討兖鄆未及救拔邢人困而也虔裕傳誤溥未討兖鄆二月克用攻雲州安金俊死安金俊率師攻雲州赫連鐸實録四月丙辰朔李克用遣敗燕師執金俊獻于朝據太祖紀年録攻雲州在三月舊紀求援於幽州李匡威匡威出師赴之戰于蔚州太原府軍大也今從唐末見聞録又紀年録唐末見聞録皆云金俊戰死實録皆在四月恐是約奏到然紀年録不言克用敗蓋諱之獻之亦誤實録云執克用巡潞州笞李克修存孝攻邢州十月且命班師由太祖紀年録太祖遣李罕之李十萬尚以為供張不豐掎其事笞克修而歸太原俄而克修上黨而歸克修性吝嗇太祖左右徴賂於克修旬日間費數班師因撫封於上黨按太祖紀但遣罕之存孝攻邢州不云憤恥寢􅔂薛史克修傳曰龍紀元年武皇大舉以伐邢洺及援去十月先還罕之存孝猶圍邢州故正月孟遷降也親行蓋罕之存孝圍邢州克用但以大軍屯境上為之聲四月時溥掠碭山朱友裕擊之四月丙辰後云乙卯溥郗象梁太祖實録前云安居受殺李克恭附于朱全忠殺李克恭來降上請河編遺録八月甲寅馮霸從周率驍勇夜銜枚斫圍突入上黨以壯潞人之心薛居正陽帥朱崇節領兵入潞兼充留後戊辰李克用圍之上遣葛審戰傷收軍於潞五月十五日克恭視元審於孔目吏劉崇五代史梁太祖紀亦同按克用未嘗自圍潞也克恭傳李元民推居受為留後居受遣人召馮霸於沁水霸不受命居受之第是日州縣將安居受引兵攻克恭克恭元審並遇害州據潞州自稱留後求援於汴武皇令康君立討之汴將葛從懼將奔歸朝廷至長子為野人所殺傳首馮霸軍霸乃引衆使當日點分州五縣士團將士赴昭義二十三日昭義僕射周來援霸唐末見聞録曰五月十七日昭義狀申軍變殺節乃報到太原日也今從太祖紀年録薛史克恭傳舊紀五月家纍入府新紀五月壬寅安居受殺李克恭按壬寅十七日朝濬方起兵朝廷稱賀此蓋克恭首到日也舊紀又曰七月丙午潞州軍亂殺李克恭監軍使薛繢本函克恭首獻之于葛從周入潞太早蓋因克恭死終言之紀遺録薛史梁紀八全忠遣從周帥千騎入潞用唐太祖妃年録薛史唐紀五月請孫揆赴鎮當在揆被執前也今克用死從紀年録從周入月克恭死太晚蓋因從周入潞推本之又從周入潞全忠始舊紀潞從七月官軍至陰地關原大將康君立以兵拒戰按君立時舊紀七月乙酉朔王師屯於陰地太又不言勝負今不取圍潞州何暇至陰地關葛從周入潞州澤州呼李罕之云葛司空已入潞府李存舊紀實録皆云從周權知留後又汴人圍也然薛居正五代史梁太祖紀云帝請河陽節度使朱崇節孝圍潞州呼城上人云葛僕射可歸大梁似從周實為留後陽節度使按河陽自解朱全義圍以來常附屬於汴朱全忠為潞州留後實録明年五月以前昭義節度使朱崇節為河河陽留後全忠使權昭義留後既不能守復歸河陽耳諸書以部將不會張宗厚等為之留後非一人崇節蓋亦汴將為州以其名著故外人但稱從周不數崇節也因謂之節度使蓋誤也從周但與崇節共守潞朱全忠遣兵攻李罕之援葛從周入上黨九月壬寅上編遺録八月遣從周山於澤州北應接取崇節從周以歸薛居正五代史梁太祖往河陽令李讜救應朱崇節又命朱友裕張全義簡精鋭過又遣朱友裕張全義率精兵至澤州北以為應援既而崇節紀九月壬寅上至河陽遣李讜引軍趨澤潞為晉人所敗帝時語城上人云張相公圍太原葛司空已入潞府是當時南從周棄潞來歸戊申帝斬李重裔遂班師按讜等初圍澤州棄潞州之後也故置於此兵方盛非孫揆就擒從周九月全忠斬李讜李重胤而還崇節葛從周據潞州李唐太祖紀年録六月朱援初汴軍攻城門呼罕之云云李存孝憤其言引鐵騎五百重胤鄧季筠張全義將兵七萬攻澤州李存孝將三千騎赴遁存孝罕之追擊至馬牢山斬首萬級追襲掩擊至於懷州追擊入季筠營門生獲其都將十數是夜汴將李讜收軍而唐末見聞録閏九月昭義軍前狀申昭義軍人拔滅逃遁收而還存孝復引軍攻潞州九月二日葛從周率衆棄城而遁揮使李存孝回戈歸府薛居正五代史梁太祖紀九月壬寅下城池擒獲到餘黨五十人巾縛送上至二十日行營都指又遣朱友裕張全義率精兵至澤州北以為應援既而崇節帝至河陽遣李讜引軍趨澤潞行至馬年川為晉人所敗帝遂班師焉實録九月甲申朔康君立急攻潞州朱全忠駐河從周棄潞來歸戊申帝延責諸將敗軍之罪斬李重胤以徇筠被執復遣朱友裕張全義至澤州北應援葛從周朱崇節陽遣李讜引軍趨澤潞至馬牢山川與并師大戰不利鄧季去河陽止一程豈得九月方到河陽讜之敗必在九月戊申率衆棄路州歸按六月李存孝若已破李讜追至懷州懷州朔十九日壬寅二十五日戊申若全忠至河陽始遣讜等趣前一兩日也蓋紀年録因從周據潞州事終言之九月甲申因讜敗追本前事耳若九月二日從周已棄潞州何得十九澤潞既敗而從周等棄潞來歸七日之間豈容許事蓋薛史録而誤也今全忠往來月日從薛史事則兼采諸書日後攻澤州者猶云葛司空入潞府乎蓋實録承紀年李克用敗李厈威赫連鐸會赫連鐸引吐蕃黠戞斯之衆太祖紀年録是月幽帥李匡威田村李存孝引前鋒與賊戰於樂安鎮賊軍大敗遁走舊紀十萬寇我北鄙攻遮虜軍太祖御親軍出塞營於渾河川之擅擊敗之實録閏月甲寅朔幽州李匡威下蔚州克用援兵九月幽州雲州蕃漢兵三萬攻鴈門太原府將李存信薛阿渾河川戰於樂安鎮破之鐸乃退軍此蓋約奏到日唐末見至匡威大敗赫連鐸引吐蕃黠戞斯之衆攻遮虜軍克用營收却蔚州十六日至十八日旋發諸州兵士至軍前二十九聞録十一月十五日發往向北打鹿有使報稱幽州李匡威周齎榜到殺得退渾一千帳二十九日下復云十九日亦誤日大捷有榜曉告殺燕軍三萬餘人十九日知客押衙苗仲月不書日今但繫此閏月孫儒圍蘇州屯遂至蘇州今從吳越備史在閏月吳録十一月孫儒攻破望亭無錫諸十一月李存孝取晉絳克用上表訟寃師入隂地關至實録十一月王趙城韓軍以華州兵戰存信設伏擊破之邠鳯之師未戰而汾隰李克用遣將薛阿擅李承嗣拒之李存信以兵五千營二月壬午朔晉州刺史張行恭棄城而遁韓建以諸軍保晉走禁軍皇潰由是大敗存信直壓晉州西門引軍攻絳州十信攻之三日濬建拔晉絳遁還存信收二州舊紀克用遣李州李存信追擊戰敗退保絳州張濬以汴卒禁軍屯晉州存之軍度河西歸韓建以諸軍保平陽存信追之建軍又敗建存信薛阿檀拒王師于陰地三戰三捷由是河西鄜夏邠岐五十里十二月壬午朔濬建拔晉絳遁去存信收晉絳大掠退保絳州張濬在晉州存信攻之三日相與謀云云遂退舍平陽李存孝擊之一戰而敗進攻晉州薛居正五代史武皇河中四郡張濬傳曰十月濬軍至隂地邠岐華三鎮之師營嗣將騎三千出隂地關營於洪洞遣李存孝將兵五十營於紀曰十月張濬之師入晉州遊軍至汾隰武皇薛鐵山李承壓晉州西門張濬之師出戰為存孝所敗自是閉壁不出存趙城華州韓建以壯士三百人冒犯存孝之營存孝追擊直于平陽云云存孝引軍攻絳州十一月刺史張行恭棄城而孝引軍攻絳州李存孝傳曰十月存孝引收潞之師圍張濬張濬之師入陰地關犯汾隰令薛鐵山李承嗣將騎三千出去張濬韓建亦由含口而遁存孝收晉絳太祖紀年録十月州西門自是閉壁不出存孝攻絳州十二月晉州刺史張行陰地繼發李存孝將兵五千進擊營於趙城敗韓建直壓晉州邠鳯之師望風遁歸蓋楊復恭陰沮之也唐末見聞録曰恭棄城遁建濬由含山路逃遁遂收晉絳初濬部禁軍至晉曰臣某乙言今月二十六日臣所部南界晉州長寧關使張八月五日相公差晉州捉到天使閭大夫入京奏事兼貢表兼録到詔白云陛下削臣屬籍奪臣本官仍欲會兵討問云承暉等投臣當道齎到宰臣張濬榜一道內稱招討處置使同立襄王以為大逆其朱玫以下並已誅鋤克用時最為魁云唐補紀曰朱全忠自攻破徐州頻貢章表克用與朱玫等臣張濬為都統授崔胤為河中府節度應援使大軍行到同首據其罪狀請舉天兵臣率師關東掎角相應朝廷遂以宰全忠兵馬並不來相應乃於昭義西與太原交戰不利而回州克用領蕃漢馬步稱三十萬入河北界其張濬使人探朱濬於雲夢除崔胤於嶺外薛史李承嗣傳初大軍入隂地薛朝廷知為全忠所賣便差使至克用與賞給令回貶都統張以功授欣州刺史時鳯翔軍營霍邑承嗣帥一軍收之岐人志勤與承嗣率騎三千抗之敗韓建之軍於蒙坑進收晉絳傳無攻晉絳事蓋舊紀十月存孝已背太原故此戰皆云存夜遁追擊至趙城合大軍攻平陽旬有三日而拔按李存信州隸河中節度所云入隂地關犯汾隰者蓋謂汾水之旁下信實録因之而誤據五代紀傳太祖紀年録當是存孝又隰從薛史晉州刺史若已走則濬建安能保城實録誤也今從濕曰隰耳又紀年録實録以張行恭為晉州刺史亦誤也今節度尤為踈繆自餘諸書參取之李存孝傳唐補紀云崔胤為河中張濬韓建至河陽為克用騎將李存信所追至是方自舍實録明年二月云時張濬韓建兵敗後木罌數百渡河人多覆溺似太晚今因濬建走終言之山踰王屋出河清達于河陽河溢無舟楫建壞民廬舍為十二月孫儒拔蘇州本州秦宗權遣孫儒及行密同攻陷莊宗列傳楊行密壽州壽春人初據留後北通時溥儒引軍攻之大順元年行密禦備力竭率衆揚州儒專據之龍紀元年儒出軍攻宣州行密襲據揚州稱代史江南未平不見本國舊史據昭逺所記及唐年祖録作夜遁出據宣州此説最為差誤國朝開寶中薛居正修五命與孫儒同陷楊州餘皆旡次序今按吳録大祖紀及又逺行密傳但知行密非壽春人改為廬州又知行密非受宗權密入楊州十一月孫儒圍揚州文德元年四月儒陷揚州行唐烈祖實録行密傳云光啓三年十月秦彥畢師鐸社今行殺趙鍠大順二年七月孫儒南渡江攻宣州景福元年六日密奔廬州八月自廬州帥兵攻宣州龍紀元年六月陷宣州能襲據揚州踰年哉近修唐書行密傳全用吳録事迹乃云執斬儒復歸楊州且龍紀元年孫儒方強行密新傳宣州安古助行密敗於髙郵行密懼退還宣州蓋承莊宗列傳五代孺進攻行密行密復入揚州比通時溥扞儒朱全忠遣龎師不考正也史之誤而置升州以張雄為剌史縣置升州張雄傳大順初以上元新地理志光啓三年以上元等四元為升州命弘鐸為刺史按是時雄尚存今從雉傳為升州授雄刺史吳録馮弘鐸傳大順元年復以上二年正月李克用復上表詔復其官爵晉州克用遣中舊紀太原軍屯臣朝廷欲令釋憾下羣臣議其可否左僕射韋昭度等議云使韓歸範還朝因上表訴寃言賊臣張濬依倚全忠離間功陳敬瑄舊紀誤今從實録云在十二月按是時昭度討三月乙亥復陳敬瑄官爵未詔王建罷兵不受命十國新紀二月乙巳赦陳敬瑄已月辛巳朔無己未新紀誤也今從實録紀年亦曰二月乙巳復敬瑄官爵按二四月王建表陳敬瑄田令孜不可赦建不奉詔而不能十國紀年朝議以按此命蓋在昭度還朝之後也制更授西川行營招討制置使韋昭度除東都留守留守實録大順二年三月乙亥復舊紀龍紀元年正月昭度為東都不領西川節度及招討使則便應釋兵東歸不應更留在彼陳敬瑄官爵丙子以昭度為東都留守按昭度若已除留守早歸廟堂與天子籌之舊傳建脅説昭度奏請還都建以重縱使強留諸軍亦安肯稟服王建亦何必更説之云相公宜亦同蓋今年三月既復敬瑄官爵祖召昭度還朝王建不肯兵守劔門急攻成都昭度還以檢校司空充東都留守新傳所脅授兵東歸朝廷責其進退失據故左遷留守如新舊傳罷兵昭度為所牽率亦同執奏以為敬瑄不可赦既而為建顧彥朗為行軍司馬王建為都指揮使同在成都城下及昭所云者是也今從之又昭度初圍成都楊守亮為招討副使書但云令彥朗名歸本鎮則是守亮先已歸也彥朗得此詔度東歸時獨建在彼以兵授之不見二人者按三月乙亥詔友通食駱保是彥朗身歸而留兵共攻成都也必亦歸獨昭度與建留在彼耳然建出東川將唐七月李克用攻雲州常山鎮大掠深趙盧龍李匡威自率舊紀實録皆云克用率兵出井陘屯既平雲州乃討王鎔實録蓋因舊紀之誤又紀年録曰七月步騎萬餘授王鎔按唐太祖紀年録是時克用方攻赫連鐸録云克用遣將急攻雲州蓋以前云克用親討王鎔故也按太祖進軍至於柳城會赫連鐸力屈食盡奔入吐渾云云實在後實録誤紀年録討王鎔十月克用攻元氏柏鄉級進拔雹水攻柏鄉按雹水屬易唐太祖紀年録曰攻元氏斬首千定必不取其地恐誤也州克用方攻鎮州以救易十二月戊子斬李順節見掃星長十丈餘承旨陳匡用奏唐補紀景福二年四月十七日夜呼白婆左神策軍天威都軍使胡弘立先是軍中馬騎官巧當有亂臣將入宫內昭宗乳母名曰芥子自即位加夫人衆節主上每出畋遊經天威軍內其楊守節以憸巧趨附乞與佞取容朝廷達官多重之楊復恭為軍主與改姓名為楊守對於庭簷或入內中經旬不出致主有撫楹之咎為臣懷通主上為兒既而允從頗生驕縱於是引聖人入堂室令妻妾慰平生其白婆在側曰此寶非凡人得見不用發言於是奏室之非承醉奏云玉印金箱兒未曽識望阿郎略將宣示以以其事漸乖必為大禍與諸王商議須急去除於重陽節向云除此老嫗方應太平從此白婆得罪不見蹤由兩神䇿軍揮之諸王相次倳刃以為醯醢按胡弘立即順節也新舊紀樞密院中排宴喚入謝恩却出宣化門供奉官似先知袖劔傳聞之誤今日從實録事則參取諸書及諸書景福二年皆無此事蓋程匡柔馮行襲為昭信防禦詔升金州節鎮以戎昭為軍額即薛居正五代史行襲破楊守亮兵馮行襲為昭信節度使新方鎮表光啓元年升金商都防禦以行襲為節度使按實録光化元年正月始以昭信防禦使年始升昭信軍防禦為節度使天祐二年賜號戎昭軍薛史使為節度使是年罷節度置昭信軍防禦使治金州光化元也誤更名涇原曰彰義軍年今從實録新表在乾寧元陳巖卒妻弟范暉為留後巖薨十國紀年在大順二年蔣文還閩中實録云大順中薛史閩中録閩書皆云范暉巖壻餘書皆云妻弟林仁志王昭宗實録在明年三月恐約奏到今從閩中録十國紀年又云妻弟此最得實今從之氏啓運圖載監軍程克諭表景福元年正月李克用大破幽鎮兵今從唐太祖紀年録實録在二月恐約奏到二月朱全忠為朱瑄所敗張歸厚力戰誤也今從梁紀歸厚傳云十一月全忠奏貶趙克裕乃奏克裕有誣謗之言而貶新紀云己實録在正月末云全忠欲全義得河陽度使趙克裕今從編遺録未朱全忠陷孟州逐河陽節張訓取常州自宣歸楊過常州已歎張訓之功新紀誤也新紀景福二年二月楊行密陷常州按行密國紀年今從十趙德諲薨官不言德諲卒在何時新傳薛史但云匡凝為實録此月以前忠義軍節度使趙匡凝起復某留後朝廷即以旄鉞授之亦不言年月今附於此唐州刺史兼七州馬步軍都校及德諲卒自為襄州三月顧彥暉斬竇行實以竇行實為內應事泄行實死實録明年正月楊守厚攻東川川追敘今年事耳今從十國紀年守厚遁去因李茂貞與王建爭東四月楊行密取楚州執劉瓉楚州執刺史劉瓉十國紀新紀三月乙巳楊行密陷李德誠敗徐兵於壽河俘斬三千級取楚州執瓉今從之年三月時溥遣兵三萬南侵至楚州四月楊行密將張訓六月行密歸楊州州大城也張訓以一劔下之不亦壯十國紀年行密過常州謂左右曰常行密所殺初行密楊州失守據宣州孫儒以兵攻圍三年是哉舊紀大順二年三月淮南節度使孫儒為宣州觀察使楊行密乃併孫儒之衆復據廣陵薛居正五代史行密傳曰伏春淮南大飢軍中疫癘是月孫儒亦病為帳下新執降行密江淮疾疫師人多死儒亦卧病為部下所執送於行密殺之順元年行密危蹙出據宣州儒復入揚州二年儒攻行密屬敗於宛陵城下楊行密進首級於西京吳録曰景福元年六行密自宣城長驅入于廣陵唐補紀大順二年六月孫儒兵於市傳首京師新紀實録十國紀年皆據此舊紀薛史唐補月六日太祖盡率諸將晨出擊儒田頵臨陳擒儒以獻斬儒誤紀皆七月王建圍彭州王先成白七事十日諸軍馬步兵士到張􅒷耆舊傳曰五月二糧至七月初麥盡並無顆粒兵士但託求糧食乃每日逺去彭州城下至七月初已經五十餘日諸軍兵士始到刈麥充統帥云云十國紀年王先成謂王宗侃云云先成上招擕七入山虜劫逃避百姓有一軍士本是儒生乃往北面寨説於丑遣王宗裕等擊楊晟遂圍彭州又晟遺楊守忠書云弊邑事建皆納之先成蜀州新津人按十國紀年王建自二月辛圍之不克而再往與􅒷但云有一軍士而十國紀年姓王名雖小圍守三年矣而張􅒷云五月二十日方圍彭州或者先本出何書也先成不知其李茂貞取鳳興洋復恭得罪奔山南與楊守亮據興元叛薛居正五代史茂貞傳曰大順二年楊假子繼徽為留後堅請旄鉞昭宗不得已而授之自是茂貞茂貞與王行瑜討平之詔以徐彥若鎮興元茂貞違詔表其忠鳯州刺史滿存皆奪據其地云大順二年誤也今從新紀始萌問鼎之志既而逐涇原節度使張球洋州節度使楊守八月茂貞拔興元之衆攻興元陷之節度使楊守亮前中舊紀景福元年十一月辛丑鳯翔邠寧建奏於乾元縣遇興元散兵擊敗之斬楊守亮楊復恭傳首尉楊復恭判官李巨川突圍而遁十二月辛未華州刺史韓復恭突圍而遁新紀景福元年八月茂貞寇興元守亮滿存實録乾寧元年七月鳯翔邠寧之衆攻興元陷之楊守亮楊傳景福元年茂貞攻興元破其城復恭守亮守信奔閬州十奔閬州乾寧元年七月茂貞陷閬州八月守亮伏誅新復恭討之感義節度使滿存救守亮為茂貞所敗奔興元十一月國紀年蜀史景福元年十月行瑜茂貞表守亮招納叛臣請二月壬午華洪敗守亮等於州按實録景福二年正月移茂邠岐攻陷興元楊復恭帥守亮守貞守忠滿存同奔閬州十今年月從新紀事則參取諸書貞山南於時守亮不應猶在山南十月李存孝以三州歸朝廷將邢州刺史李存孝自晉實録大順元年十月太原李存孝自恃擒孫揆功合為昭義帥怨克用授康君立存孝州率行營兵據邢州舊紀十一月癸丑朔太原將邢州刺史鎔求援唐末見聞録十月二十四日李存孝領兵打晉州遁自晉州率行營兵歸邢州據城上表歸明仍致書與張濬王常思安知建在此之日歸順朝廷之時四鄰不有保持一家歸邢州背叛與宰臣張濬狀曰某自主三郡已近二年又曰之清願蓋因李某之指揮又曰自今春戰爭之後實願休罷俄受塗炭以比猶豫莫敢申明遂至去年遽絶鄰好豈是某軍至趙州牽脅李某即土門路入直屇鎮州今月十四日昭戈涎自九月十五日已來日有李某之人使促令某南面進孝致逆大震雄威令下先差大將進軍速至邢州仍候指揮義軍人百姓等衆請某權知兵馬留後歸順朝廷大王聞存正五代史紀傳實録新紀皆云景福元年十月存孝叛太原不得輒有鬬敵但圍小壘專俟大軍據唐太祖紀年録薛吾言以後事按二年三月安知建方叛太原而此書中已説知歸朝廷而舊紀唐末見聞録在大順元年十月舊紀恐是連度至景福元年乃二年也然則實録云邢州刺史據邢州亦建又云自主三郡已近二年存孝大順二年方為邢洺磁節書蓋與王鎔誤云與張濬也因舊紀之誤聞録所載存孝二年正月移李茂貞於興元徐彥若鎮鳳翔月癸未今舊紀在七新紀從實録二月朱友恭本李彥威恭為休之賈人李七郎十國紀薛居正五代史高季興傳以友彥威丱角事太祖今從之年以為壽州賈人友恭傳云三月以渝州刺史柳玭為盧州刺史州刺史卒北夢瑣言新傳云玭坐事貶瀘渝為瀘州刺史當是初貶渝州後移瀘州新傳北夢瑣言誤也亦云謫授瀘州新舊書玭貶官無年月今據實録比月玭自四月時溥自焚王重師牛存節陷徐州舊傳溥求援於兖實録五月汴州奏拔徐州舊紀四月汴將乘梯而入溥與妻子登樓自焚而卒景福二年也新紀四月州朱瑾出兵救之值大雪糧盡而還汴將王重師牛存節夜古下彭門梟溥首以獻唐太祖紀年録四月澤州李罕之上戊子朱全忠陷徐州時溥死之薛居正五代史梁紀丁亥師溥舉族皆沒溫既下徐方詐請朝廷命帥昭宗乃以兵部尚言懷孟降人報汴將龎師古於今月八日攻陷徐州徐帥時之四月八日蓋河東傳聞之誤今從編遺録新紀書孫儲為徐帥既而溫以他詞斥去自以其將鎮鎮人殺李匡威乙卯幽州李匡威謀害王鎔恆州三軍攻實録殺匡威在五月恐約奏到舊紀六月匡籌奏云四月十九日是月己巳朔十九日丁亥也今從之匡威殺之舊傳唐太祖紀年録皆云五月新紀四月丁亥按六月曹誠等四人赴鎮東道節度使曹誠為黔中節度舊紀三月庚子以陳珮為嶺南貞傲侮王命武臣難制故罷五將之權今從實録止是四將使李鋋為鎮海節度使孫惟晟為荆南節度使時朝議以茂七月張雄卒到之日今從十國紀年新紀八月庚子蓋約奏八月嗣覃王嗣周後會昌後避武宗諱改郯作覃按順宗子經封郯王嗣周當是其九月錢鏐為鎮海節度使度使令赴鎮今復除鏐者按今年五月以李鋋為鎮海節二人安得赴鎮蓋但欲罷其軍權其實不至鎮而反耳實録是時安仁義已據潤州又孫惟晟除荆南時成汭已據荆南度使猶鎮潤州刺史至光化元年始移鎮海軍於杭州實録云仍徙鎮海軍額於杭州按吳越備史是歲鏐初除鎮海節也誤覃王嗣周帥禁軍三萬送徐彥若赴鎮扈駕五十四舊紀覃王率今從實録軍進攻岐陽崔安潛言門户終為緇郎所壞潛有此言按安潛去年舊傳胤初拜平章事安有此言也卒必先時嘗十月杜讓能賜死緯值上京頻嬰離亂朝綱紊墜是時徇續寶運録曰大順二年相國杜讓能孔便自統軍至如岐陽李茂貞先朝封為太子本姓宋洋州牧意諸道扈駕兵五十四都坊坊皆滿兼近藩連帥要行征討禮部侍郎薛廷圭持璽書具禮册為岐王茂貞先中和年中先祖討昭義劉從諫有功子孫爵賞不絶洎夀王登位後遣朱溫先朝册東平王至今上又遣薛廷圭為禮儀使延王為投判軍容使田令孜作養男姓田名彥賔蓋趍其勢也汴州纍表章云臣今駐節咸陽未敢入中書問罪杜讓能等請置册命使封為梁王且岐王與北司人情方洽宰相甚不和睦到咸陽見岐王戰不能言岐王大怒却令歸中書省過才到極法表奏上不悅遂詔孔杜二相國令往咸陽謝過及二相相見臣並不措一言如此曠官有辱聖代請行朝典别選英中書上又發遣令祈謝岐王如是往來三度岐王又奏曰二河中節三日後貶于嶺表出國門三十里並賜自盡時岐王賢上不樂敕罷知政事不得已除孔緯荆南節度杜讓能除乃退此皆誤謬之説今從實録率驍果五千人住咸陽及貶二相十二月朱瑄救齊州從薛居正五代史梁紀編遺録云十月乙未今乾寧元年二月鄭綮同平章事誤北夢瑣言曰綮雖有舊傳云光化初為相恐因有遺闕而笞責之然其儒懦清慎弘農常重之昭宗時吳詩名本無廊廟之望嘗典廬州吳王楊行密為本州步奏官外驚駭太原兵至渭北天子震恐愓於攘却相國奏對請於王雄據淮海朝廷務行姑息因盛言鄭公之德由是登庸中明年李克用舉兵至渭北綮已罷相今從實録新紀文宣王諡號中加一哲字其不究時病率此類也按三月李克用誅李存孝康八軍吏劉藕子路州所俘供太祖紀年録先獲汴將鄧筠安按舊紀克用擒歸範尋遣歸因附表訴寃不聞復往晉陽也奉官韓歸範皆與存孝連坐同目誅之騎將薛阿擅權自刺存孝傳曰武皇出井陘將逼真定存孝面見王鎔陳軍機武薛居正五代史鄧季筠傳後復自邢州逃歸汴紀年録誤也汴將安康八耳皇暴怒誅先獲六月克用殺赫連鐸赫連鐸以薛志勤守雲中按唐太舊紀六月壬辰克用攻陷雲州執武皇拔雲州鐸奔吐谷渾誤也新紀六月赫連鐸及李克用祖紀年録莊宗死傳薛居正五代史武皇紀皆云大順二年願從者衆赫連鐸白義誠數敗至是窮蹙無歸自縶膝行詣戰于雲州死之太祖紀年録十月討李匡籌師次新城邊兵云鐸等來歸命笞而釋之薛志勤傳云王暉據雲州叛討平於軍門太祖微數其罪笞而脫之薛史武皇紀吐谷渾傳亦赫連鐸活擒白義誠進軍幽州界巡檢回府新紀蓋據此今從之之以志勤為大同防禦使與舊紀異唐末見聞録六月收雲州處置九月克用殺康君立惜之怒諸將無解溫者君立以一言薛居正五代史李存孝既死武皇深街宅夜飲行劔斫損昭義節度使康君立把送馬步司收禁忤旨武皇賜鴆而殂唐末見聞録曰八月三十日相公於左薛史賜鴆恐是文飾其事至九月一日放出尋已身薨十一月克用圍新州截寇進收揚門九子戊戌下武州甲唐太祖紀年録十一月壬辰大軍拔無壬辰戊戌甲寅紀年録誤今從實録寅攻新州營於西北隅按十一月己未朔十二月盧彥威殺李匡籌今從新舊紀傳實録唐太祖紀年録作匡儔二年二月辛卯董昌即帝位按會稽録昌自云應兔子吳越備史云癸卯昌僣號二月己丑朔非當時厯誤即今日厯誤要之昌必以二月辛之讖欲以二月二日僣號取卯月卯日也而實録長厯皆云間號卯日昌改元順天號羅平年號或云天册或云天聖皆非也羅吳越備史曰癸卯昌替稱皇帝建元順天國又曰將軍門稱天册之樓以會府為宣室之地明告我其所隱撰吳越行營露布曰羅平者啓國之名順天者建元之始紀年亦云年號順天會稽録云天册蓋誤今從備史稱曰權即羅平國位昌狀印文曰順天治國之印十國八月克用釋華州移兵營渭橋攻華州俄而郤廷昱唐太祖紀年録王師迎駕乃解華圍進營渭橋按實録八月延王戒丕至河中克至且言茂貞領兵三萬至盩厔行瑜領軍至興平欲往石門省表已部領大軍前月二十七日離河中蓋克用不親圍華用已發前鋒至渭北己丑克用進營渭橋又紀年録載詔曰所謂前鋒者也克用既以七月二十七日離河中則戒丕至州但遣别將將兵往及聞邠岐謀迎駕乃遣華兵詣渭橋即至河中誤也今從紀年録彼必在其前實録云八月克用遣李存信等攻梨園李存信從太祖入關以前莊宗列傳曰三鎮亂長安小或勸太祖入朝自握兵柄太祖亦以全忠圖已朝廷不能軍先自夏陽渡河攻同華屬邑下之時太祖在渭北伶官羣世效忠此行討逆上為邠鳯不臣但令臣節為天下所知即斷心微有望月餘不進軍存信與蓋寓乘間密啓曰大王家台情雖俳優之言不宜縱其如此京師咫尺天聽非遙實無三賊不足平也而悠悠之徒不達大體或以弗詢之畫茍悅祖曰公言是也即日出師下梨園寨按克用謀大事固非伶益於英德也今三凶正蹙須速圖之事留變生無宜猶豫太耳無月餘不進事且既云羣小勸入朝即當詣行在不當留官所豫又實録己丑克用進營渭橋癸巳克梨園中間四日歸功於存信耳今不取渭北此特李存信之人欲克用遣子存朂詣行在正五代史莊宗未嘗名存貞實實録作存貞據後唐實録薛居誤録蓋十一月朱瓊降於朱全忠皆在十月按編遺録十一月下薛居正五代史梁紀瓊降及死壬申瓊自來辛巳死今從之巳瓊遣軍將三自新奉檄歸義三年六月汴人檎李克用子落落正五代史武皇紀實唐太祖紀年録薛居存信傳在五月今從梁太祖紀録擒落落皆在七月葛從周李李茂貞表請勒兵入朝東川節度使仍命通王覃王治薛居正五代史五月制授茂貞平夜自驚潰茂貞因出乘之官軍大敗唐補紀曰五月朝廷禁軍於闕下如茂貞違詔即封之茂貞懼將赴鎮王師至興發亦無向闕之心自是京國人心驚憂出投郊埛京城為之除覃王為鳯翔節度使除茂貞為興元節度使茂貞拒命不薛史誤移鎮興元乃景福二年事唐補紀誤今從實録一空上潛謀行幸按實録新舊紀諸書茂貞未嘗除東川茂貞逼京畿覃王敗績王覃王延王分統四軍以衛近舊紀是月茂貞請入覲上令通延王部神策諸軍於三橋防遏茂貞上言延王稱兵討臣臣畿丙寅鳯翔軍犯京畿覃王拒之於婁館接戰不利實録命館王師戰不利新紀六月庚戌李茂貞犯京師嗣延王戒丕有何罪言將朝覲丙寅李茂貞大軍犯京師覃王拒之於婁婁館敗績今從舊紀下禦之丙寅及茂貞戰于八月朱朴同平章事士許巖士出入禁中嘗依朴為姦舊傳曰朴腐儒木強無他才伎道拜平章事在中書與名公齒筆札議論動為笑端唐補紀曰利從容上前薦朴有經濟才昭宗召見對以經義甚悅即日時才致令宗社不安頻有順動若使朴在相位月餘能致太朴亦有文詞託識諸王下吏人以通意旨言方今幸相皆非參知政事諸相座愕然莫測聽其籌謨經四五月並無所聞平諸王以為然乃奏天聽翌日宣喚顧問機宜便入中書令云唐補史亦恐得之傳聞非詳實今從新傳遂貶出嶺外按朴雖庸鄙恐不至如舊傳所九月崔胤同平章事度使胤密致書全忠求援全忠上疏舊傳胤檢校兵部尚書嶺南東道節安節度使陸扆當國時南北司各樹黨結藩鎮胤素厚朱全理之胤已至湖南復召拜平章事新傳昭緯以罪誅罷為武按胤出為清海節度使在後非此年舊傳誤今從實録忠委心結之全忠為言胤有功不宜處外故還相而逐扆貶陸扆硤州刺史翔師之起也扆堅請曰播越之後國步舊傳曰九月覃王率師送徐彥若赴鳯騰口無益於事祇貽後患昭宗已發兵怒扆沮議是月十九初集不宜與近輔交惡必為他盜所窺加以親王統兵物議讓能討鳯翔事時扆未為相舊傳誤新傳亦同今從實録日責授峽州刺史師出果敗車駕出幸按此乃景福二年杜十月丁巳韓建兼把截使十日敕命公權知京兆尹并李巨川許國公勤王録十月月戊申朔今從勤王録充把截使實録作癸丑是李茂貞獻助修宫室錢万助修京闕按十五万乃百五舊紀實録皆云茂貞進錢十五脫貫字耳十貫太少蓋十一月李師悅卒子彥徽知州事月忠國節度使李實録乾寧二年四後今從新紀十國紀年師悅卒以其孫彥徽知留四年正月立德王𥙿為皇太子國之大本上表云云敕宜勤王録曰公以儲副之設藩邸蓬頭突鬢之士不入於禁門文成五利之徒不陳其左從允時正月十一日也當四日之間而儲君奉冢祀宗室歸力也李巨川著書矯誣善惡乃至於此今從實録道君父開悟遐邇詠歌人不震驚市無易肆公之丙申龎師古葛從周入鄆州執朱瑄太祖紀辛卯營于薛居正五代史梁濟朱瑄棄壁夜走葛從周擒瑄并妻男以獻按濟水自王莽濟水之次龎師古令諸將撤木為橋乙未夜師古以中軍先遣騎於鄆州軍前追從周徑往洹水董師以代侯言師古留時大旱不復能絶河而南自是河南無濟水編遺録曰五月日辛卯營其西南河外龎師古命諸將撤水為橋以圖宵濟攻鄆梁太祖實録四年正月復以洹水之師大舉伐鄆十五師古中軍先濟聲振壁內朱瑄聞之棄壁走編遺録四年正癸巳前軍以心膂百人盜決河口甲午浮橋集水次乙未夜師古乃取清河內小舟採野葛草茅索之以為巨纜乃於其月乙卯朱瑄兵少糧盡不敢出戰然深溝高壘難越也從周古去年三月已敗鄆兵于馬頰追至西門據故洛亭子為寨牆南建浮橋丙申功就我師渡橋朱瑄奔遁皆不云濟水師師古等為浮橋以濟師河既可決明非自然之水也舊紀癸乙未夜先濟蓋鄆城下清河水疑朱瑄引之以環城固守故所殺榮氏俘於軍新紀丙申全忠陷鄆州實録二月丙午朔未龎師古陷鄆州朱瑄與妻榮氏潰圍走瑄至中都為野人營於濟水則癸未鄆未破也新紀云丙申陷鄆實録二月蓋陷鄆州瑄至中都為亂兵所殺妻榮至汴為尼據薛史辛卯編遺録新紀約奏到今從師古為鄆州留後古傳皆云師古為鄆州留後編遺録舊紀梁太祖實録薛居正五代史師後師古為徐州留後蓋初以師古守鄆州後以友裕代之而薛史梁紀皆云友裕按編遺録三月丙子以友裕為鄆州留徐州也徙師古於二月己未赦天下赦既云曲赦即不及天下實録誤也實録降德音曲赦天下云德音即非四月李繼瑭為匡國節度使防禦使李繼瑭為匡國節實録賜同州號匡國軍以為匡國節度使蓋行約死繼瑭但為防禦使今始復舊名耳度使按新方鎮表乾寧二年賜同州號匡國軍王行約已嘗韓建奏貶張禕等為衡州司馬韓建惡之誣奏貶焉禕實録貶刑部尚書張禕趙崇蘇循等貶衡州司馬實録誤也等必不皆為刑部尚書皆五月朱友恭執瞿章友恭遣使上言大破淮冦於武昌薛居正五代史梁紀五月丁丑朱恭傳云翟章十國紀年作瞿章吳録云執刺史瞿章當可據收復黃鄂二州新紀壬午全忠陷黃州刺史瞿璋死之朱友八月韓建殺通儀等十一王并其侍者皆為建兵所擁至舊紀是日通覃以下十一王殿後都韓建怨怒進狀爭論與諸王互説短長上乃縛韓王右堤谷旡長少皆殺之唐補紀曰六宅諸王準前商量請置見軍吏諫遂請諸王歸宫散却殿後都新紀八月韓建殺通克良已下十人送韓建府建以棘刺圍於大廳經宿不與相戒丕嗣丹王允按舊紀韓建奏睦王濟王韶王通王彭王韓王滋沂王湮韶王彭王嗣韓王嗣陳王嗣覃王嗣周嗣延王往見李克用又有覃王嗣周則是十一人新紀傳儀作沂按王儀王陳王八人新宗室傳初帝遣嗣延王戒丕嗣丹王允封宗室舊紀儀王恐可據昭宗子禋封沂王不應更朱朴再貶郴州司户書詞有朴自祕書監責除蜀王傅分實録朴貶郴州司户朴薛廷圭鳯閣顧問之間來撓澄清之化又貶渠州司馬制云爭臣條奏憲司東都制云包藏莫顧於朝綱進見不由於相府復云猶希姦之計與此稍異今從實録府極言指陳負國之謀忿嫉崇資治通鑑考異卷第二十六
