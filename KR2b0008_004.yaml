  text: 資治通鑑考異卷第四
  hash: sha256:71ed0056f19d6324ff049a866c85b10a3c2e0c5ce4810bbf5622fc1c1c869e41
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_004-1a}
body:
  text: 臣司馬光奉勑編集晉紀中惠帝元康四年正月安昌公石鑒薨縣侯今從帝紀本傳鑒封昌安傅咸卒月始親職十月卒二書附年月多差舛故以本傳為定三十國晉春秋元康四年七月傳咸為司隸五年五五年十月武庫火志云閏月庚寅今從晉書帝紀三十國晉春秋云閏月宋晉五行八年九月李特入蜀年而華陽國志三十國晉春秋皆云帝紀元康七年關中飢八年雍州有入蜀今從之八年特就榖九年正月出成都王穎為平北將軍北大將軍今從本傳帝紀云以頴為鎮六月髙密王泰薨為尚書令攺封髙密紀誤帝紀云隴西王本傳云泰裴頠賈模張華議廢賈后廢之衍後悔而止今從頠傳賈后傳曰模與裴頠王衍謀八月裴頠劉頌上表疏侍中太宰汝南王亮按頠表引元刑法志敘頌奏續頠表之下而云已久蓋志誤也康八年事時亮死永康元年正月之按長曆己卯十七日安得日食帝紀天文志皆有己卯日食宋志無皇孫虨卒文不當作霖今從傳帝紀虨作霖按虨字道八月石崇潘嶽歐陽建被收勸淮南王允齊王冏圖趙崇傳曰崇建潛知其計隂收時方宴於樓上蓋倫秀以舊怨誣殺之耳王倫若崇果與允同謀允敗崇應惶遽不應𬒳以劉頌為光祿大夫自殺頌傳云頌為光祿尋病卒今從傳三十國春秋云倫黨大怒謀害頌頌懼十一月耿滕為益州刺史陽國志作滕今從之帝紀作耿勝載記華滕欲入州俱治成都不容戰於廣漢又趙廞若已與滕戰華陽國志曰戰於廣漢宣化亭殺傳詔按州郡州今從載記不應欲直入趙廞殺趙模陳揔霍固按華陽國志犍為太守李苾汶山帝紀廞又殺犍為太守李密汶山太守記亦作李苾蓋紀誤太守楊邠非密固也載廞自稱益州牧年他書無之今不取晉春秋云建號太平元永寧元年正月趙王倫即帝位位義陽王威執詔示嵇三十國春秋云倫將篡有二威怒拔劒而出及惠帝遷于金墉城唯紹固志不從直紹曰聖上法堯舜之舉卿其然乎紹厲聲曰有死而已終不紹為侍中惠帝復祚遂居其職二説不同今皆不取于金墉絶不通倫時人皆為之懼晉書忠義傳云倫篡趙廞殺李庠及其子姪十餘人三十餘人今從華陽國載記曰及其子姪宗族春秋在今年春今從之志又國志庠死去年冬晉三月羅尚使王敦討汶山羌死之陽始知今從華陽國志帝紀在八月疑是洛趙王倫使管襲討斬王盛處穆穆謀起兵誅倫未發恐齊王冏傳曰冏潛與盛以安其意今從三十國春秋事泄乃與襲殺穆送首於倫四月大戰于溴水水今從帝紀趙王倫傳作激六月復封賔徒王晏為吳王倫誅復本封今從帝紀晏傳自賔徒徙封代王齊王冏為大司馬成都王穎為大將軍録尚書曰至頴傳禮按頴在洛慮志已謂頴曰今當與齊王共輔朝政明已有鄴詔王粹加九賜進位大將軍都督中外穎拜受徽號讓殊且頴功大於冏不應獨賞冏而頴未賞也今從帝紀録尚書之命但頴不受歸鄴故朝廷使粹追命之耳路秀從齊王冏傳帝紀作路季今八月齊王冏殺東萊王蕤冏事覺得罪甲戍冏為大司馬帝紀六月庚午蕤與王輿謀廢在冏為大司馬前今從三十國春秋在八月按誅輿詔已稱冏為大司馬則輿事覺不應九月東安王繇舉東平王楙鎮下邳東督徐州九月繇帝紀八月楙為平楙為平東故移在繇還後復爵按楙傳繇為僕射舉太安元年慕容廆擊素怒延怒率衆圍棘城按燕書載記作素延下云素延然則怒是其名也紀傳皆謂之素怒延二年正月李特攺元建初將軍載記太安元年特稱大將帝紀太安元年五月特自號大昭帝七年太安元年也祖孝徴修文殿御覽云太安二年特軍攺元後魏書李雄傳云昭帝七年特稱大將軍號年建𥘉安二年正月特僣位攺年今從御覽等書大赦攺年建初元年特見殺三十國晉春秋云太蜀郡任睿任鋭今從華陽國志載記作任明羅尚傳作六月李雄殺陳圖時今從載記華陽國志作陳七月處士范長生賢今從載記華陽國志作范涪陵徐輿奭今從載記華陽國志作徐長沙王乂徴李含為河南尹河南尹今從皇甫重傳含傳云河間王顯表含為張昌逃于下雋山斬之昌傳云昌敗竄于下雋山明年秋帝紀八月庚申劉弘及張昌戰于清水黨𥘉平昌未梟首故從昌本傳擒斬之按弘斬張奕表云張昌姦八月以長沙王乂為太尉都督中外諸軍事元年十二帝紀太安頴起兵乃以乂為太尉都督以討之按齊王死後頴懸執朝月乂誅齊王即以乂為太尉都督中外晉春秋二年七月顒尉乂不應更為太尉今從晉春秋政乂未應都督中外又顒見為太十月戊申戰于建春門鹿苑今從帝紀陸機傳云戰于孫拯下獄今從晉書傳晉春秋作孫承張方退屯十三里橋水橋今從帝紀河間王顒傳云駃閏月羅尚留張羅守城從華陽國志載記作羅特今永興元年正月癸亥東海王越收長沙王乂殿中諸越傳云朱默夜收乂别省逼越為主今從乂傳將及三部司馬疲於戰守密與左衛將軍甲子大赦攺元興元年正月大赦攺元疑是一事帝紀太安二年十二月甲子大赦永丙寅張方殺乂殺乂乂傳云𥘉乂執權之始洛下謡曰草帝紀三十國晉春秋云太安二年十二月焉樂廣傳云成都王頴廣之壻也及與長沙王乂遘難而廣木萌牙殺長沙乂以正月二十五日廢二十七日死如謡言午樂廣卒若廣卒時乂未死即乂傳正月二十五日廢為是既處朝望羣小讒謗之廣以憂卒惠帝紀永興元年正月丙按帝紀今年正月以頴為丞相遣兵屯城門代宿衛者疑此合移在永興元年正月而晉春秋太安二年八月樂廣自裁末亦有甲子丙寅今從乂傳皆乂𥘉死時事又今年正月十月劉淵遷都左國城淵猶在離石也按杜佑通典離下云離石大飢遷于黎亭則是雖遷左國猶在離石縣境內也石有南單于庭左國城然則淵淵即漢王位安後華陽國志李雄十月稱王一本作十二帝紀李雄劉淵稱王皆在十一月惠帝入長國鈔皆在十月今從之月三十國晉春秋十六范陽王虓等請降封太弟穎同上言按馥傳帝自長安虓傳云與鎮東將軍周馥東據此表張方猶存蓋自鄴還洛陽時也還馥出為平東將軍都督楊州代劉凖為鎮十二月髙密王略鎮洛陽密孝王略字元簡時都督青州惠紀作髙密王簡按宗室傳髙有朝命而略不至或嘗鎮洛陽而本傳遺脫耳後遷都督荆州未嘗鎮洛陽蓋簡即略也時雖二年六月拓拔猗色斬漢將綦母豚劉淵傳皆云淵南後魏書桓帝紀及自離石遷黎亭蓋後魏書夸誕妄言耳走蒲子按晉載記淵無走蒲子事下云八月琅邪王睿請王導為司馬導為安東司馬按元帝導傳曰元帝鎮下邳請字誤為安或後為安東司馬故但云司馬時為平東及徙揚州乃為安東耳或者平十月詔劉弘彭城王釋等討劉輿宗室傳皆作釋蓋喬劉喬傳釋作繹帝紀宛弘釋傳及衆書皆無之弘傳但云彭城前東奔有不善之傳誤帝紀八月車騎大將軍劉弘逐平南將軍彭城王釋于天下尊王室釋受王命鎮宛而弘肯更自逐之乎據此詔令言按弘晉室純臣劉喬與范陽構難弘猶以書和解之以安弘逐釋事帝紀必誤弘釋共討劉輿疑無十一月河間王顒遣吕㓪收劉暾㓪率騎五千收暾按暾傳云顒遣陳顔吕敇使收暾耳説者欲大其事故云爾暾匹夫安用五千騎蓋㓪時在洛顒十二月王浚以突騎資劉琨劉喬傳云琨率突騎五千琨傳云得突騎八百人按迎東海王之數致有兹誤今闕疑濟河攻喬疑八百太少或因下又劉喬奔平氏武帝分南陽置義陽郡有西平氏縣或者南帝紀云喬奔南陽按地理志南陽無平氏縣而非縣與陽有東平氏吳王常侍甘卓棄官東歸侍討石冰以功賜爵都亭侯卓傳云州舉秀才為吳王常吳王常侍甘卓自洛至按卓為常侍不應討石冰為離狐令東海王越引為參軍出輔離狐令棄官東歸遇陳敏敏傳云今從敏傳不應自洛至光熙元年三月李毅女秀守寧州城年五月建寧郡懷帝紀永嘉元降雄誘建寧夷使討之毅病卒城陷殺壯士三千餘人送婦夷攻陷寧州死者三千餘人李雄載記云南夷李毅固守不經年華陽國志有毅卒年月及女秀守城事今從之女千口於成都王遜傳云李毅卒城中奉毅女固守六月復羊后按方傳首已久不至今日今從帝紀后傳曰張方首至洛陽即日復后位司空越遣糜晃擊河間王顒東海王越求迎越遣將牽秀傳云顒密遣使就今從顒傳糜晃等迎顒李雄即帝位攺元晏平興二年六月雄即帝位華陽國晉帝紀三十國晉春秋皆云永二年雄稱帝即光熙元年也十六國春秋鈔晏平元年六月志光熙元年雄即帝位後魏書序紀及李雄傳皆云昭帝十國志同今從之諸書雄攺元晏平無大武年號惟晉載記改雄即帝位十六國春秋目録雄年號建興二晏平五與華陽大成攺年晏平故三十國春秋誤云攺年大成載記轉寫誤元大武無晏平年號按雄國號大成魏書雄傳云雄稱帝號書云大武之號為大武今從諸以范長生為天地太師節天地大師今從晉載紀華陽國志尊長生曰四時八八月以范陽王虓為司空徒今從帝紀虓傳云為司十二月南陽王模殺河間王顒王越殺顒今從顒傳三十國晉春秋云東海懷帝永嘉元年二月陳敏弟處勸敏殺顧榮等云弟敏傳我貝卿時昶已先死今從晉春秋昶勸殺榮按晉春秋敏臨死謂處曰七月琅邪王睿鎮建業邳以帝都督揚州越西迎大駕元帝紀曰東海王越之收兵下猶鎮下邳又懷帝紀明言七月己未睿都督揚州鎮建業今從之留帝居守永嘉𥘉用王導計始鎮建業按既都督楊州不當九月王導説睿引顧榮賀循餘士庶莫有至者會從兄導傳曰元帝鎮建康居月振宜有以匡濟者會三月上已帝觀禊敦導皆騎從王敦傳敦來朝導謂之曰琅邪王仁德雖厚而名論猶輕兄威風已就周玘傳錢璯聞劉聰逼洛陽不敢進乃謀反時王敦遷尚東海王越誅繆播後乃以敦為揚州刺史其後徴拜尚書不邪王睿鎮建業三年三月殺繆播四年二月錢璯反是時睿書與璯俱西欲殺敦敦奔告元帝懷帝紀永嘉元年七月琅數年而士庶莫有至者陳敏得江東猶首用周顧以收人望在建業已三年矣安得言月餘又睿名論雖輕安有為都督傳所云難以盡信今剛去導語及敦名而已導為睿佐豈得待數年然後薦之乎然則導十一月以王敦為靑州刺史王澄為荆州敦為揚州據吳晉春秋王衍言於太傳越以為中書監東海王越誅繆播後始出為揚州播死在永嘉三楚以為形援越從之於是澄敦同發越餞之敦傳自靑州入不在洛故以晉書為定年三月此年越在許昌十二月王彌劉靈降漢乃與其黨劉靈謀歸漢按十六彌傳曰彌逼洛陽敗於七里澗已在淵所五月彌乃如平陽然則二人先降漢已久矣彌傳誤也國春秋靈為王讃所逐彌為苟純所敗乃謀降漢今年春靈以魏興太守王遜為寧州刺史王遜為寧州按時廣漢華陽國志以廣漢太守陷今從遜傳已為李雄所二年正月丙午朔日食子朔誤今從長曆帝紀天文志云丙劉淵遣劉聰等據太行石勒等下趙魏元海使劉聰石勒載記曰救壺關勒敗秀於白田殺之遂陷壷關事在明年今從十六攻壺關命勒率所統七千為前鋒都督劉琨遣護軍黃秀等秋國春二月西平太守曹祛今從張軌傳晉春秋作曹祗治中楊淡今從張軌傳晉春秋作張淡七月劉淵徙蒲子其部落淵遂怖懼南奔蒲子雜虜歸劉琨答太傳府書曰潛遣使驛離間琨而徙都蓋琨為自大之辭史因承以為實耳降萬有餘落琨傳亦然按時淵強琨弱豈因畏氐酋單徴降漢皆謂之大徴即光文單后之父于衍字也載記作氐酋大單于徴按當時戎狄酋長十二月成尚書令楊褒卒褒今從晉春秋載記云丞相楊三年正月宣于修之言於漢主從載記十六國春秋晉春秋作鮮于修之今夏石勒敗黃肅於封田從十六國春秋及劉琨集石勒載記肅作秀封作白今淮南內史王曠王廣今從帝紀十六國春秋作龐淳降漢琨傳作襲醇今從帝紀十六國春秋作劉惇劉白部鮮卑從後魏書晉書劉琨集作百部今劉琨自將擊劉虎兵救之為聰所敗王曠等及聰戰又帝紀七月劉聰及王彌圍壷關琨使黃肅六月晉遣王廣等來討七月戰於長平晉師敗劉惇以敗龐淳以郡降賊十六國春秋淵五月遣聰攻壷關敗韓述黨龐悙不能禦又曰安居失利韓述授首封田之敗黃肅不壷關降按劉琨集載六月癸巳琨答太傳府書曰聰彌入上太守疾據襄垣續遣鷹楊將軍趙擬梁余都尉李茂與倚併還浹辰之間名將仍殄又曰即重遣江陶都尉張倚領上黨當聰彌之未走烏丸劉虎搆力輕行夜襲賊捐棄輜車宵為變逆西招白部遣使致任稱遁而退追尋討截獲三分之二圍然則琨討虎以上事皆在四月以前也蓋晉漢二史皆臣於淵殘州困弱內外受敵輒背聰而討虎自四月八日攻之今依琨集為定據奏報事畢而言十二月李臻遣其子成擊王浚咸今從李洪傳燕書王誕傳成作四年七月劉淵卒等受遺詔己卯卒辛未葬按長曆七月十六國春秋八月丁丑淵召太宰歡樂及辛未辛未乃九月十一日蓋淵以七月卒九月葬十六國壬戍朔十六日丁丑十八日己卯八月辛卯朔無丁丑己卯誤也春秋北海王義春秋作義今從之載記作乂按十六國十月劉琨以地與猗盧太原劉琨徙五縣居之六年八月懷帝紀永嘉五年十一月猗盧寇年晉春秋在永嘉四年且云猗盧率萬餘家避難自雲中入辛亥劉琨乞師于猗盧表盧為代公宋書索虜傳在永嘉三六月癸巳上太傅府箋云盧感封代之恩故知在四年六月鴈門後魏序紀在穆帝三年即永嘉四年也琨集永嘉四年封色為代公見聽時大駕在長安會值戎事道路不通竟未之前又琨與丞相箋曰昔車騎感猗色救州之勳表以代郡遣兼謁者僕射拜盧賜印及符册浚以此見責戎狄封華郡施行盧以封事見託琨實為表上追述車騎前意即蒙聽許之失浚實啓之浚遂與盧爭代郡舉兵擊盧為所破紛錯之誠為失禮然蓋以救弊耳亦猶浚先以遼西封務勿塵此禮從琨求陘北地以並遣三萬餘家散在五縣間既非所制又由始結於此鴈門郡有五縣在陘北盧新并塵官國甚強盛盧因移頗侵逼浚西陲圍塞諸軍營浚不復見恕危弱而見於琨殘弱之計得相聚集未為失宜即徙陘北五縣著陘南非避難而來也罪責以此觀之盧琨遣猗盧兵歸國二萬助之東海王越以洛陽飢荒不許後魏序紀曰劉琨乞師救洛穆帝遣步騎行即具白太傳切陳愚見取賊之計聰宜時討勒不可縱而按琨與丞相箋曰琨傾身竭辭北和猗盧遂引大衆躬啓戎使節抑挫臣鋭氣臣即解甲遣盧衆歸國若猗盧果遣衆赴宰相意異所慮不同更憂苟晞馮嵩之徒而稽二寇之誅遣得不言也洛琨箋安十一月加張軌鎮西將軍已加軌安西將軍今從本傳帝紀云安西按惠帝永興二年五年正月琅邪王睿使甘卓等攻周馥使卓攻馥於帝紀戊寅睿之日與攻日潰日故闕之壽春馥衆潰未知其為命卓三月丙子東海王越薨越乙未越遣楊瑁裴盾共擊晞帝紀五年正月帝密詔茍晞討薨晞傳晞移告諸州陳越罪狀帝惡越專權乃詔晞施檄六三月戊午詔下越罪狀告方鎮討之以晞為大將軍丙子越𥘉至奉被手詔卷甲長驅次于倉垣五年帝復詔晞陳越罪州協同大舉晞移諸征鎮帝又密詔晞討越晞復上表稱李項越使騎於成臯間獲晞使遂大構嫌隙晉春秋五年正月惡詔至之日宣告天下率齊大舉晞表稱輒遣王讃將兵詣滔何倫等不容晏然在洛且滔等未去則帝亦不敢明言使上遣李初詔晞討越按越若已得晞使則帝亦不能自安潘此今並置於越薨之時庶為不失晞討越年月事迹既前後參差如四月四十八王皆沒於石勒十六王今從帝紀東海王越傳云三六月丁未劉聰封帝平阿公記三十國春秋云平阿公帝紀聰以帝為會稽公載月乃封帝會稽公蓋先封平阿後進會稽帝紀闕略今從諸書晉春秋云平河公河字蓋誤十六國三十國晉春秋明年二秦王業南奔密國晉春秋愍帝名子業或作業又吳志孫晉書愍帝諱鄴又攺建鄴為建康按三十業為名皆不為鄴字今從之權攺秼陵為建業取興建基中書令李絙今從王浚傳閻鼎傳作李恆七月王浚立皇太子設壇場有所建立稱皇太子不知為誰晉書𥘉無其名劉琨與丞相箋曰浚九月劉粲殺南陽王模相箋曰平昌以九月遇禍丗子帝紀八月模遇害按劉琨上丞無恙今以為據時鎮隴右故得十月猗盧遣子六修助劉琨即六修也胡語訛轉耳晉春秋作利孫按利孫六年七月髙喬郝聿以晉陽降漢降于聰鴈門烏丸劉琨傳曰屬龐醇七月十六日復決計送死臣即自東下率中山常山之卒並復反琨親出禦之粲乘虛襲取晉陽按琨上太子箋曰聰以十六國春秋亦云琨收兵常山本傳誤也合樂平上黨諸軍未旋之間而晉陽傾潰九月賈匹等奉秦王業為皇太子劉粲於三輔走之懷帝紀云賈匹討新豐粲敗還平陽奉秦王入雍城六年三月劉曜棄長安走關中小定奉秦王為太子按賈匹等以永嘉五年攻劉粲于為太子時劉粲方在晉陽懷紀誤秦王入長安漢兵皆已退矣秦王十月猗盧遣其子六修及兄子普根等攻晉陽六十集云左右賢王又云右賢王撲速根本從後魏書國春秋云遣子曰利孫宥六須載記云賔六須劉琨箕淡作姬淡今從劉琨傳十六國春秋後魏書漢人殺盧志都王頴起義兵諌頴攻長沙王乂忠義敦篤劉聰載記志勸太弟義作亂被誅按志勸成亂者也今從盧諶傳始終不虧非勸人作十二月賈匹戰死之匹敗走墜澗死今從十六國春秋帝紀曰匹討賊張連遇害匹傳天護攻假疾陸眷就陸眷今從王浚傳石勒載記及後魏書作末柸今從王浚傳後魏書作末破王敦屯豫章為楊州刺史都督征討諸軍非為江州也王澄傳曰時王敦為江州鎮豫章按敦時王機入廣州皆無年月按衛玠傳玠依敦於豫章以永嘉王澄死周覬敗王敦鎮豫章機入廣州紀傳附於此六年卒故王如降於王敦如餘黨入漢中故附此如降亦無年月明年有愍帝建興元年四月琅邪王睿用郗鑒為兖州集建劉琨膽幹茍晞用為陳留太守獨在河南距當石勒撫綏有方琨興二年十一月壬寅朔與丞相箋曰焦求雖出塞鄉有文武不可與求同日而論至於膽幹可以處危權一時之用李述以求行領兖州刺史後聞荀公以李述為兖州以素論門望便召還而州界民物甚不安服述二千石及文武大姓連遣亦不能及求而王玄年少便欲共討求琨以求己與玄搆隙詣鄴至是斬王桑走趙固云云今勒據襄國逼近鄴城故令信使求刺史是以遣兄子演代求領兖州事往年春正月遣公所用或云為明公所用大寇未殄而自共尋干戈此亦大演轉南演今治在廩丘而李述郗鑒並欲爭兖州或云為荀在永嘉六年琨箋又云傳長安消息王上是秦王又建興二潰也輒敕演謹自守而已按王桑趙固之敗及石勒攻鄴皆琨發箋之日建興元年十二月壬寅朔也傳寫誤耳年十一月丙申朔元年十一月壬申朔十二月壬寅朔然則九月荀藩薨於開封陽今從藩傳帝紀曰薨于滎二年正月陳元逹言女寵太盛庭有三后之事按立二載記元逹等曰臣恐後於時未也后在明年二月劉琨移檄州郡按石勒以壬申克幽州蓋時晉陽尚琨集檄首云三月庚午朔五月甲戍然後敘勒事故置此未知也欲敘琨事畢三月壬申石勒至薊後言壬午勒晨至薊按劉琨表曰三十國春秋先言癸酉勒取幽州城然則當言壬申是也勒以三月三日徑掩薊五月己丑張軌薨又曰葬建陵蓋張祚僣號後追尊其墓耳帝紀作壬辰今從前涼録鈔前涼録鈔六月殷凱帥衆向長安今從麴允傳晉春秋作假凱三年三月漢攺元建元二年同編修劉恕言今晉州臨汾十六國春秋建元元年在晉建興亥二月六日立然則改建元在乙亥二月後也縣嘉泉村有漢太宰劉雄碑云嘉平五年歲在乙八月杜韜遁走道死秋云城潰韜投水死今從帝紀韜傳云韜逃遁不知所在晉春以第五猗為安南將軍將軍今從杜曽傳周訪傳云征南大四年正月追諡吳王晏曰孝今從愍帝紀本傳晏諡敬王漢太宰河間王易通今從載記晉春秋易作士七月漢三后之外佩后璽者七人外按時靳上皇后已劉聰載記曰四后之云四誤也死唯三后耳十一月侍中宗敞今從晉春秋帝紀作宋敞十二月乙卯朔日食志乙卯朔與長曆合今從之帝紀天文志皆誤作甲申朔宋中宗建武元年五月壬午日食丙子日食按長曆是月帝紀天文志皆云五月今以曆為據壬午朔無丙子十一月己酉朔日食按長曆十月十二月皆巳卯朔是月帝紀天文志皆云十一月丙子日食丙子朔則甲子丁卯乃在十月又劉琨集是年三月癸未朔己酉朔二十八日丙子晉書元帝紀十一月有甲子丁卯若長曆合今以為據八月庚辰朔皆與大興二年蒲洪降趙年按元年曜未都長安晉書洪載記三十國晉春秋洪降劉曜在太興元安洪歸曜故置此年無年但云曜僣號長三年六月閻涉趙卬等殺張實仰又云實知其謀收晉書實傳作閻沙趙卬又弘死在實𬒳殺後今從之劉弘殺之據晉春秋作閻涉趙四年十二月以慕容廆為車騎將軍平州牧車騎大燕書云平州刺史尋加車騎州牧今從之將軍平州刺史按晉書載記先拜永昌元年十月王敦以王諒為交州刺史三年敦以諒傳永興惠帝光熙元年也諒傳誤諒為交州按永興三年即肅宗大寧元年四月王敦移鎮姑孰屯于湖及後魏晉春秋帝紀云敦下屯于湖今從之書僣晉傳云屯蕪湖晉書明六月阮放卒乃云逢髙寶平梁碩還非成帝時也放傳誤放傳云成帝幼沖庾氏執政放求為交州下二年六月溫嶠與右將軍卞敦守石頭表為征虜將敦傳云王敦為鎮南將軍假節今從明帝紀軍都督石頭軍事明帝討敦以詔有能殺錢鳳送首封五千户侯為敦發喪前故云有晉春秋此詔在王導隕斃是稱敦已死也不應復購其首今從敦傳能斬送敦首封萬户侯賞布萬匹按此詔云敦以七月王含等水陸五萬三萬今從明帝紀敦傳及晉春秋皆云周光斬錢鳳良斬鳳今從敦傳晉春秋云戴淵弟三年二月宇文乞得歸遣兄子悉拔雄拒慕容仁跋堆載記亦作龜燕書武宣紀作乞得歸悉拔雄今從之燕書征虜仁傳作悉拔堆後魏書宇文莫槐傳作乞得龜悉四月石瞻攻兖州殺檀斌從石勒載記帝紀作石良今顯宗咸和三年二月後趙攺元太和位攺元太和按勒晉春秋云勒即帝位今從勒載記建平元年始即帝四月溫嶠從弟充今從晉書嶠傳晉春秋作從兄五年六月趙以翟斌為句町王亡後慕容垂誅翟斌斌晉書春秋作翟真按秦知此乃斌也兄子真北走故九月趙王勒即帝位建平二年四月勒如鄴議營新宫載記云自襄國都臨漳即鄴也按至虎建武元年九月始遷鄴是勒未嘗都鄴也三年勒如鄴臨石虎第勒疾虎詐召石宏還襄國封彭城王子浚為髙密王今從帝紀宗室傳作俊十月楊謙退保宜都從李雄載記帝紀作陽謙今七年正月趙主勒大饗羣臣後趙趙王勒饗之按侃晉春秋云陶侃遣使聘饗髙句麗宇文屋孤使今但云饗羣臣與勒必無通使之理今不取載記云勒因九年十一月石虎稱居攝趙天王位攺元永熙陳鴻大三十國晉春秋虎即國晉春秋不記弘攺元延熙虎之立實延熙元年也故誤云統歷云石虎即位攺建平五年為延興明年攺建武按三十平五年為延興即是弘踰年不攺元也恐云説誤永熙弘既號延熙虎安肯稱永熙陳鴻云虎攺建咸康三年趙庭燎油灌下盤死者二十餘人人今從三載記云七春秋十國七月趙王虎殺太子邃石虎至燕城下會鄴使至太子燕書文明紀云咸康四年四月胄使鄴還説四月浴佛日行像詣宫石太子邃騎出迎像往邃在後恣酒入宫殺害石主大恐狼狽引還又云初帳下吳副二而輕佻無禮將不得其死然及石主東歸留邃監國荒來馳騁無有儲君體王曰古者觀威儀以定禍福此子虎之在咸康三年燕書恐誤今從十六國晉春秋敗內亂以致誅戮按十六國晉春秋殺邃皆六年九月燕王皓襲趙略三萬餘家陽二郡男女數燕書云略燕范後趙燕載記千口而還今從八年正月己未朔日食從帝紀及長曆天文志作乙未今資治通鑑考異卷第四通仕郎試太學正臣周固校正
