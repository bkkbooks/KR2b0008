body:
  text: 阡戶臣司馬光奉勑編集唐紀七至德元載七月庚午上皇至巴西玄宗實録次栁氏舊聞肅宗實録作辛未今從得新熟酒一壺跪獻于馬首者數四上不為之舉倜懼乃注上始入料谷天尚早煙霧甚味知頓使給事中韋倜於墅中大醉損一人吾悼之因以為戒逮今四十年矣未嘗甘酒味於他器自引滿於前上曰卿以我為疑也始吾御宇之初嘗蜀記上皇在巴西郡宰臣請髙力士奏蜀中氣候溫瘴冝數指力士近臣曰此皆知之非紿卿也從者聞之無不感悅幸深愧卿等意也力士因説上皇開元四年因醉怒殺一人明進酒上皇令髙力士宣旨曰朕本嗜酒斷之已久終不再飲百匹用給喪事更令力士就宅宣旨致祭從兹斷酒雖下藥日都不記得猶召之左右具奏上愴然不言乃賜御庫絹五天下斷酒小善夫何足言今不取亦不輒飲按玄宗荒于聲色幾喪遣使召李泌謁見於靈武子繁所為鄴矦家傳云即位舊傳云謁見於彭原今從泌日矣八九欲以泌為右相固辭寵之解褐拜銀青光祿大夫俾掌樞舊傳泌稱山人固辭官秩得以散官陛下待以賔友則貴於宰相矣何必屈其志上無以逼今從之務鄴侯家傳曰𥘉欲拜為右相恐戎事固辭爵願以客從曰同羅突厥逃歸朔方投朔方與六州羣胡共圖河朔諸將肅宗實録忽聞同羅突厥背祿山走崔光逺傳云同羅背祿山以廄馬二千出至涯水孫孝哲安皆恐上曰因之招諭當益我軍威上使宣慰果降者過半舊譎許更謀河曲熟蕃以為已屬使蕃將阿史那從禮領同羅神威從而召之不得神威憂死陳翃汾陽王家傳云祿山多已來矣甲兵五萬部落五十萬蟻聚於經略軍比按同羅叛突厥五千騎為稱叛乃投朔方出塞門説九姓府六胡州悉叛則孝哲何故召之神威何為怖死又必須先送降𣢾於肅賊則當西出豈得復至涯水此舊傳誤也若祿山使從禮偽蓋同羅等久客思歸故叛祿山欲乘丗亂結諸胡據邊地耳宗如此則諸將當喜而不恐賊之隂計豈徒取河曲熟蕃也肅宗從而招之必有降者若云太半則似太多今參取諸書肅宗録所謂共圖何朔者欲據河朔西方兩道猶言河隴也存之可信者崔光逺至靈武以為御史大夫通儒為西京留守通儒天寶亂離記祿山以張復本職通儒許之由是微申存撫兩街百姓長安稍見寧帖素憚侍中苖公晉卿內史崔公光逺二人並偽於通儒處請苗公乘驢間道赴蜀奔駕光逺亦潛去焉通儒素憚兩公名密宣喻人主蒼惶西幸之意老幼對泣悲不自勝皆感恩有谷南投金州未嘗受賊官今不取德內特寬之按舊苗晉卿傳潛遁山上命河西李嗣業將兵五千赴行在嗣業將安西五萬假秀實别傳曰詔今從舊傳衆赴行在令狐潮圍雍丘張巡大破之雍丘城下攻守六十餘日潮張中丞傳自三月二日潮至謂巡曰本朝危蹙兵不出關則是潼關未破也又巡答潮書大敗而走然則於時已五月𥘉矣又云未幾潮又帥衆來攻之甲蕃漢雲集不咸四十萬衆前月二十七日已到土門蜀主上緣哥舒𬒳衄幸于西蜀孝義皇帝收河隴之馬取太原門竊料胡虜遊魂終不臘矣則是七月十五日丁卯以後也漢之兵吳楚驍勇循江而下永王申王部統已到申息之南相守四十餘日潮收兵入陳留不敢出其下乃云五月魯炅其曰前月一十七日兵到土門蓋圍城中傳聞之誤也又云月九日賊將瞿伯玉據圉城十二日賊屯白沙渦十四日夜敗於葉六月哥舒翰敗於潼關上皇幸蜀皇帝比巡靈武六差舛不可考按蓋李翰亦得於傳聞不能精審今但置關破巡襲破之七月十二日朝伯玉至雍丘又破之其日月前後以後事於七月耳以前事於五月關破烏承恩承玼之族兄恩承洽之兄今從新傳韓愈烏氏先廟碑云承八月壬午朔郭子儀李光弼並同平章事月壬午子儀肅宗實録八至自河北以子儀為某宫光弼為某官汾陽家傳六月八日光弼皆於常山郡嘉山大破賊子儀等俱奉詔領士馬五萬驅而南以定天下其月發恆陽至常山中使邢延恩至奉詔破史思明於嘉山之下公謂光弼曰賊散矣其餘幾何可長公聞之獨揔精兵五萬奔肅宗行在玄宗有誥以肅宗嗣皇取河北路席卷而南會哥舒翰敗績玄宗幸蜀肅宗如朔方月十三日即皇帝位二十七日制可武部尚書平章事幸蜀帝位肅宗奉誥歔欷哀不自勝公諫云云跪上天子璽以七秋六月二十五日大破賊於嘉山二十六日覆陳二十七日記六月十一日玄宗追郭子儀赴京李光弼守太原河洛春軍入井陘口邠志六月八日敗史思明于嘉山會潼關失守有詔至恆陽云潼關失守駕幸劒南儲君又往靈武由是拔子儀收軍赴朔方光弼赴太原河洛春秋又云光弼至太原二公班師唐曆七月二十八日子儀光弼並加平章事又詔收復詔子儀班師八月子儀與光弼帥步騎五萬至自河北光弼傳肅宗理兵殺王承恩固守晉陽舊紀與實録同子儀傳七月肅宗即位以賊據兩京方謀赴太原玄宗實録六月壬午光弼子儀破史思明於嘉山舊於靈武遣中使劉智達追光弼子儀赴行在又云以景城河間之卒五千嘉山子儀光弼傳皆云六月無日諸書言李郭事不同如此紀六月癸未朔庚寅哥舒翰敗於靈寶其日光弼破思明於宗實録八月壬午朔日也子儀光弼皆於嘉山大破賊領士按歲朔曆六月癸未朔與舊紀同玄宗實録云壬午誤也肅耳汾陽家傳邠志皆云六月八日破思明與舊紀同家傳云馬至自河北以為某官某官蓋壬午乃拜官日因言已前事日方傳至河北肅宗七月十三日即位若六月二十七日班勸肅宗即位上璽則恐不然哥舒翰以六月八日敗亦須旬與諸書皆不合恐太後也今據舊玄宗紀汾陽家傳邠志唐師七月十二日豈能便逹靈武也河洛春秋二十五日破賊子儀光弼事或如此但二傳皆云肅宗召之恐是二人在河曆皆云六月八日破史思明宜可從幸蜀記十一日玄宗召從舊傳唐曆拜相在七月二十八日汾陽家傳二十七日肅比聞潼關不守已收軍赴難在道遇肅宗中使遂趨靈武今實録亦略相應今從實録據舊傳光弼亦曽到靈武疑朔方宗實録八月一日三書皆不相逺子儀傳云八月雖無日與春秋月日尤疏所云殺王承恩固守晉陽必誤也兵盡從肅宗故光弼但領河北兵赴大原耳河洛癸未上皇下制赦天下肅宗實録唐曆舊紀長曆皆云壬玄宗實録舊紀皆云八月癸未朔從之午朔今癸巳靈武使者至蜀録八月癸未朔赦天下時皇太子已肅宗實録癸未上奉表至蜀玄宗實北使方至具陳羣臣懇請太子辝避之旨辛卯下詔稱太上至靈武七月甲子即位道路險澀表疏未逹及下是詔數日奉册今從舊紀唐曆皇庚子遣韋見素等九月上欲以建寧王倓為元帥李泌諫乃以廣平王俶為之以攻常山圖范陽郭子儀為右廂兵馬使帥衆南取鄴矦家傳曰以李光弼為元帥左廂兵馬使出井陘鄴矦家傳又曰上召光弼子儀議征討計二人有遷延之言馮翊河東按汾陽家傳時郭子儀方北討同羅未向河東也自偏禆一年遇國家有難朕又即位於此遂至三公將相看上大怒作色叱之二人皆仆地不畢詞而罷上告公曰二將已驕朕深憂之朕今委先生戎事府中議事宜示以威令使已有驕色商議征討欲遷延適來叱之皆倒方圖剋復而將暫至府二人至時寒臣與飲酒二人必請謁王臣因為酒令其知懼對曰陛下必欲使畏臣二人未見廣平伏望令王亦則二人見元帥以帝子之尊俯從臣酒令可以知陛下方寵約不起王至但談笑共臣同慰安酒散乃諭其修謁於元帥曰伏望言於廣平知是聖意欲李郭之畏臣非臣敢恃恩然任臣軍中之令必行他時或失律能死生之也上稱善又奏臣何人敢不懼明日將曉王亦至及李郭至具軍容修敬乃也上曰廣平於卿豈有形迹對曰帝子國儲以陛下故親臣得起及王至先公曰適有令許二相公不起王曰寡人不敢坐飲二人因言未見元帥乃使報王王將至執盞為令並不生能為二相公如此復何憂寡人亦盡力今者同心成宗社遽就座飲李郭失色談笑皆歡先公云二人起謝廣平曰先也欲令吾徒稟令耳按肅宗溫仁二公沈勇必無靣叱仆地大計以副聖意既出李謂郭曰適來飲令非行軍意皆上旨不取之事今阿史那從禮誘諸胡數萬將寇朔方命郭子儀討之傳又云九月十九日駕欲幸彭原命公赴天德軍伐叛蕃按汾陽家傳云甲兵五万部落五十万今從舊子儀傳汾陽家使訪于路曰王罪不宜及刑願少留於路使者感而受約既屬延王玢從上不及遣中使訪之而加刑焉會進明赴蜀遇無郡國以驕其志間道於豺狼乃責其不以時至陛下罪之至蜀進明言於上曰延王陛下之愛子也無兵權以變其心之謂進明曰俾父子如𥘉卿之力也遂遣進明往靈武道遇人復何望臣恐漢武望思之築將見於聖朝矣因遽馳使赦卿解平原之圍阻賊寇之軍而不以讒口介意復全我兄弟延王進明馳馬以慰之王望之降車稽首而去肅宗謂之曰史大夫今從舊傳乃社稷之臣因授御史思明陷淸河博平陷攻博州五日城陷今從肅宗實録河洛春秋云蔡希德引兵攻貝州貝州張興守饒陽賊攻彌年不能下攻深州經月不下後云興此事出河洛春秋前云賊次攻城也後云彌年者并計前後之數也戰守彌年而城池轉固蓋前云經月者今二載正月張良娣李輔國譛建寧王倓上賜倓死家傳鄴矦腹痛不能乘馬并小女寄謙家而去上即位使人迎之迎者曰肅宗自馬嵬北行至同官縣食於士李謙家張良娣稱與護國連結內外欲傾動皇嗣未知孰是實録新舊本紀皆或有它説建寧聞而數以為言舊傳曰倓屢言良娣頗專恣在至德元載也按鄴侯家傳上從容言曰廣平為元帥經年無倓死年月列傳云倓死明年冬廣平王復兩京然則倓死也又云代宗使自彭原迎倓喪故置於此今欲命建寧為元帥則是至德二載倓猶在廣平王俶謀去輔國及良娣李泌止之在內院未起輔國鄴矦家傳曰先公久而去按泌方為上所厚恐輔國亦不敢擅殺今不取體肥重因近牀語遂以身壓先公先公素服氣乃閉氣良李泌言以爵土賞功臣事因曰若臣者受賞與它人異鄴矦家傳曰泌既與上論封爵之帷幄運籌收京師後但枕天子膝睡一覺使有司奏客星犯上曰何故公曰臣絶粒無家祿位與茅土皆非所要為陛下元帥兵先發淸行宫收管鑰奏報然後上至至保定郡先公帝座一動天文足矣上大笑及南幸扶風每頓皆令先公領方覺上曰天子膝已枕睡了剋復效在何時還朕可也欲起於本院寐上來入院不令人驚登牀捧先公首置於膝上久必保定矣此近戲謔今不取謝恩持之不許對曰當如郡名二月永王璘敗死何處唯云璘進至當塗若在當塗不應新舊紀傳實録唐曆皆不見璘敗時在帝子金陵訪古丘又云𥘉從雲夢開朱邸更取金陵作小山登城望見瓜步揚子李白永王東巡歌云龍盤虎踞帝王州書别無所見疑未敢質如此似已據金陵但於諸郭子儀遣子旰等破潼關儀大破賊於潼關汾陽家傳實録三月朔方節度使郭子忠義與大軍約期以翻城公乃進軍出佫郊分兵收馬翊二云正月二十八日使宗子懷又潛墓郭俊苟文俊入河東構人崔乾祐尋縋而免乾祐先置兵於城北廢府遂以三千兵月十一日郭俊等伺大軍將至中夜舉火剋斬幽檀徑卒千擊之賊大破遽焚橋我軍蹈之而滅乾祐棄關城尋白涇嶺攻城自領馬步五千伏於關城中公使旰及僕固懷恩等先關崔乾祐退保蒲津時永樂尉趙復河東司户韓旻司士徐而逸遂收河東郡舊子儀傳曰二年三月子儀大破賊於潼應及子儀攻蒲州趙復等斬賊守陴者開門納子儀乾祐與麾靈宗子李藏鋒等陷賊在蒲州四人密謀俟王師至則為內乾祐未入遂得脫身東走子儀遂收陜郡永豐倉自是潼陜下數千人北走安邑百姓偽降乾祐兵入將半下懸門擊之河東馮翊之南若未破河東馮翊安能先取潼關又實録云之間無復寇鈔唐曆云子儀收蒲州又襲下潼關按潼關在與舊傳皆誤也今從汾陽家傳及唐曆三月取河東而下復載二月戊戍以後事安慶緒救潼關旰等大敗忠率兵至二十九日公使僕固汾陽家傳云偽關西節度安守祚決戰而死唐曆子儀襲下潼關及同州盛兵潼關以守之懷恩王仲升陳於永豐倉南及暮百戰斬一萬級李韶光王遂攻陷同州剌史蕭賁死之盡屠城中舊僕固懷恩傳云懷賊將李歸仁來救子儀戰大敗死者萬餘衆退守河東歸仁不得馮翊則西路不通後奉詔赴鳳翔歷馮翊而去則馮翊恩退至渭水無舟楫抱馬以度存者僅半奔歸河東按子儀敗則何以棄潼關而不守今參取衆書可信者存之不陷也潼關者兩京往來之路賊所必爭也子儀若不四月郭子儀為司空為元帥子儀為副元帥按鄴矦家傳唐曆四月子儀為司空尋以廣平王元帥唐曆誤也廣平在靈武已為子儀使李若幽等伏兵擊賊如圭今從舊傳汾陽家傳作桑五月子儀為賊所敗退保武功忠李歸仁領八萬兵屯汾陽家傳曰賊帥安守里斬首二萬級六日救兵至又陳于清渠我師敗績以冒暑於昆明池西五月三日陳於淸渠之側公大破之追奔十餘赴鳯翔今從舊傳毒師人多病遂收兵六月王去榮免死於陜郡效力力據賈至集陜郡也今從之實録云於河東承天軍效八月許叔兾奔彭城丞傳云許叔兾在譙郡蓋叔兾欲投實録云拔其衆南投睢陽郡按張中城譙郡耳今從新紀睢陽為賊所圍遂投彭南霽雲嚙指血淋漓以示賀蘭一座大驚皆感激為雲泣韓愈書張中丞傳後云因拔所佩刀斷一指其指曰噉此足矣今從舊傳下按柳宗元霽雲碑云自噬閏月戊辰遣郭子儀等攻長安三日肅宗授代宗鉞俾汾陽家傳閏八月二十帥領兵十五萬辝出又云戍子回紇葉獲至扶風蓋郭子儀誅元惡詔公為副元帥二十三日出鳯翔實録九月丁亥元風九月十二日廣平乃發也以閏月二十三日先行屯扶十月張巡許逺謀若棄睢陽是無江淮淮為巡逺功按唐人背以全江陽豈能障之哉蓋巡善用兵賊畏巡為後患不滅巡則不敢睢陽雖當江淮之路城既𬒳圍賊若欲取江淮繞出其外睢南耳越過其賊陷睢陽巡等𬒳殺陸氏遮巨勸勿行不納賜百縑弗受新傳曰虢王巨之走臨淮巡有妹嫁城若走臨淮陸姊在睢陽城何以得遮之今不取為巡輔縫行間軍中號陸家姑先巡𬒳害按巨在彭張鎬杖殺譙郡太守閭丘曉州刺史統紀作亳州刺史按舊傳作豪州刺史新傳作濠睢陽接境必亳州也今從統紀濠州在淮南去睢陽逺亳州與己未郭子儀等遇賊於新店大破之云子儀與嗣業等至實録無新店戰日但陜至洛城委棄道路無空地庚申慶緒走其夜自東京苑門新店遇賊大破之逐北五十餘里人馬相枕籍器械戈甲自傳九月安慶緒自洛疾使諸將至陜兼收敗卒猶十五萬十率其衆黨奔河北壬戍元帥廣平王與子儀收陜郡汾陽家屹立不動公使偽退引令下山使坰紀驀間走險以襲其皆月四日於陜西依山而陳彼則憑髙下擊此乃進軍上衝賊陜西八日收洛陽年代記十月己未破賊于新店辛酉慶緒賊乃敗績斬九萬級擒一萬人汾陽家傳十月四日破賊於入東京新紀戊申敗賊新店克陜郡壬子復東京按夾洛之聞軍敗率其黨投相州舊紀庚申慶緒奔河北壬戍廣平王戍收陜郡大晚今從年代記幸蜀記門幾三百里汾陽傳新紀太早實録壬許逺死於偃師翰程千里俱囚於客省及安慶緒敗渡河實録舊傳皆曰尹子竒執送洛陽與哥舒張許二君以守城睢陽陷張君遇害許君為羯賊所擒求死北走使嚴莊皆害之張中丞傳相里造誄曰唐故御史中丞亦𬒳兵焉今從之不得降逼至偃師縣田承嗣武令珣走河北珣攻之令珣死人令田承嗣攻之舊魯炅傳云炅保南陽賊使武令據鄴武令珣自唐鄧至炅傳云武令珣死誤也下又云王師收兩京承嗣令珣奔河北唐曆慶緒安慶緒攺元天成成與實録年號不同紀年通譜兩存之唐曆曰攺年天和薊門紀亂曰攺元至實録今從十二月上皇上馬上親執鞚行數步宫門上皇令左右扶幸蜀記云執轡鞚出從實録上馬今加李光弼司空光弼撿校司徒耳實録誤也實録光弼舊守司徒按舊傳立皇子係為趙王僙為襄王倕為𣏌王為徭倕為傀今實録孫為傑僙舊紀傳年代記從唐曆統紀新阿史郍承慶安守忠以五千徑騎自隨騎今從實録舊傳云三千史思明遣竇子昂奉表降乙丑至京師元年四月烏承河洛春秋乾元遂拘承慶斬守忠之首以徇舊傳亦曰遂拘承慶斬守忠李恩受命入幽州陳禍福思明乃有表今從實録實録曰明日月承慶守忠遣人齎表狀歸順舊郭子儀傳明年七月破賊立節之首以徇新烏承玼傳曰思明斬承慶按實録明年二人既被拘則降於思明復為之用耳河上擒安守忠然則此際未死也蓋二以思明為范陽節度使使按安祿山為范陽節度使兼河河洛春秋及舊傳皆云河北節度山舊官耳今從實録北采訪使思明蓋襲祿上欲免張均張垍死上皇不從召肅宗謂曰張均弟兄皆柳珵常侍言旨云太上皇彘之不若也其罪無赦肅宗下殿叩頭再拜曰臣比在東宫與逆賊作權要官就中張均更與賊毁阿奴三哥家事雖犬男一度合死臣不能力爭黨死者有知臣將何面目見張説𬒳人誣譛三度合死皆張説保護得全首領以至今日説兩處置張垍宜長流逺惡處張均宜棄市阿奴更不要若救這於地下烏咽俯伏太上皇命左右曰扶皇帝起乃曰與阿奴得均垍之力均垍以説遺言盡心於肅宗耳今略取其意賊也肅宗掩泣奉詔按肅宗為李林甫所危時説已死乃河中領蒲絳等州州不見在何月日是歲十二月戊午赦諸地理書皆云某郡乾元元年復為某郡為州之文也比頒下四方已涉明年矣故皆云乾元元年也云近日所攺百官額及郡名官名一切依故事蓋此即復以乾元元年正月戊寅上皇授册加上尊號御宣政殿授上實録戊寅玄宗曰光天文武大聖孝感皇帝授傳國寶符受命寶符各一按傳國寶禮畢册上加尊號上上言讓曰伏奉聖旨賜臣典册殿授上傳國璽於殿下涕泣拜受今又云授寶事似復重唐去年十二月癸亥上已受國璽告太淸官甲子玄宗御宣政傳國璽此年正月戊寅册尊號今從之曆統紀年代記舊紀皆云去年十二月復五月王璵同平章事月今從實録舊傳云三年七六月𥘉史思明事平盧軍使烏知義使按安祿山始為舊傳知義為節度舊傳誤也平盧節度使思明殺烏承恩耿仁智據河洛春秋四月始為節度副唐曆舊傳皆云四月殺承恩今月死使六郭子儀入朝元元年李光弼拔懷州始擒太清實録誤也實録郭子儀擒逆賊將安太清送闕下按上河上擒安守忠以獻諸書亦無之今不取唐曆本紀等皆無之舊子儀傳七月破賊八月靑登等五州節度使許叔兾節度使季廣琛青登實録云靑徐等五州荆州長史今年五月為右常侍九月討安慶緒時實録稱鄭等五州節度使許叔兾按青州豈可屬兩節度又廣琛先為州未嘗鎮青徐實録於此稱青徐恐誤也蔡節度使汾陽家傳稱淮西荆澧舊紀稱荆九月安慶緒殺蔡希德國將襲殺慶緒以為內應左右泄河洛春秋十月蔡希德有密𣢾歸兆矣薊門紀亂史思明常畏希德自知謀策果斷英武皆不之慶緒斬希德於鄴中又曰慶緒既殺蔡希德始有土崩之希德為慶緒所殺思明𥘉聞驚疑不信及知其實大喜見於及之時希德在相州為慶緒竭節展效思明未敢顯皆無何從實録顔色焉今庚寅命郭子儀等九節度討安慶緒崔光逺而云凡實録有李奐無實録脫光逺汾陽傳脫奐名耳兼訓蓋光弼禆將光弼未至九節度汾陽家傳有光逺無奐又有河東兵馬使薛兼訓蓋舊本紀廣琛為荆州今從實録汾陽傳又云公九月十二日間先遣赴鄴城也汾陽傳又以炅為襄鄧廣琛為淮西荆澧實録涉庚二十一日也出洛師涉河而東今從十月甲辰册太子殊私率土之間屢經蕩滌猶慮近者或滯實録云可大赦天下頃者頻興大典纍洽罪皆免豈有但免徒以下罪邪恐可大赦天下是衍字耳今狴牢其天下見禁囚徒已下罪一切放免按既云大赦則死赦不書郭子儀等破安慶緒於愁思岡愁岡據實録癸丑子儀汾陽家傳十月五日戰四日也蓋捷奏始到破賊擒安慶和癸丑十二年正月史思明以周摯為行軍司馬萬至邠志作周河洛春秋作周贄今從實録至舊傳作周二月百官請加皇后尊號輔聖今從實録舊紀作翊聖三月諸節度之師皆潰惟李光弼王思禮全軍以歸蓋蕃將也安肯盡節於國家因目左武鋒使僕固懷恩懷恩色變邠志曰史思明自稱燕王牙前兵馬使吳思禮曰思明果反于萬金驛賊分馬軍並滏而西郭公使僕固懷恩以蕃渾馬隂恨之三月六日史思明輕兵抵相州郭公率諸軍禦之戰夕收軍郭公疑懷恩為變遂脫身先去諸軍相繼潰于城下軍邀擊破之還遇吳思禮於陳射殺之呼曰吳思禮陳沒其實録今從四月制停口敕處分等李輔國由是忌李峴傳曰時李實録李峴宗甚嘉之即日下詔如峴奏由是挫輔國威權輔國頗忌之輔國專典禁中兵權詔旨或不由中書而出峴切陳其狀肅詔也蓋即此史思明稱應天皇帝懷西侵之謀慮比地之變乃令男朝河洛春秋曰上元三年春三月思明按實録此年正月一日思明稱燕王立年號實録舊傳皆不義當守相城自領士馬歸范陽因僣號後燕攺元順天元年曆思明有順天應天二號按薊門紀亂思明既殺烏承恩不載所攺年名紀年通譜此年即思明順天元年柳薒正閏位年四月癸酉思明僣位於范陽建元順天國號大燕立妻辛稱國家正朔亦不受慶緒指麾境內但稱某月而已乾元二元寺造塔攺寺名為順天上元二年正月癸卯思明大赦攺氏為皇后次子朝興為皇太子長子朝義為懷王六月於開門紀亂云立朝興為太子按思明欲立少子為太子左右泄元應天實録云正月立年號河洛春秋云上元三年僭號薊太子誤也按長曆四月丁酉朔無癸酉其謀故朝義弒之紀綱云於時已立為五月李峴貶蜀州刺史此軍者詔遣御史訊鞫盜已伏罪代宗實録云屬有盜發鳯翔􅩌在大怒下三司推鞫之峴以若虛不直陳於上前及三司覆奏李輔國執奏重覆殿中侍御史毛若虛奏覆與輔國協肅宗通州刺史三司大臣皆貶官今從肅宗實録舊紀傳與峴理協肅宗以為朋黨會同列李揆希旨遂貶峴為七月以李光弼代郭子儀為朔方節度使肅宗使丞相邠志曰四月不恱朋肆流議居十日有中使追郭公汾陽家傳曰六月公張公鎬東都慰勉諸軍郭公陳饌於軍張公不坐而去軍中傳曰五月李光弼代子儀為副元帥守東都今因實録七月朝于京師三讓元帥上許之乃詔李光弼代公為副假公别元帥并言之除趙王係為以趙王係為兵馬元帥光弼副之光弼太尉兼中書令代舊傳思明縱兵河南加諸將罪以光弼兼幽州大都督府長史知諸道節度行營事郭子儀為朔方節度兵馬副元帥以東師委之新傳曰帝貸光弼加太尉中書令在上元元年破史思明後為幽州都督又代子儀為朔方節度使未幾為天下兵馬副元帥按實録云宜副出車之命仍踐分麾之龐蓋只在此時耳在此年八月其代子儀節制朔方實録無月日制辝光弼斬張用濟諸將頗有異議欲逼留其衆光弼以數千舊傳曰用濟承子儀之寬懼光弼之令與京杲代之復追都兵馬使僕固懷恩懷恩懼先期而至邠志騎出次汜水縣用濟單騎迎謁即斬於轅門諸將懾伏以辛公既受命以河東馬軍五百騎至東都夜入其軍張用濟在曰五月二十三日詔河東節度使李公代子儀兼統諸軍李東都遂李公請郭公李公知之遂留東都表請濟師于河陽河陽聞之曰朔方軍非叛人也何見疑之甚欲率精騎突入武牢關揚兵於廣武原以待之遂引軍東出師汜水縣檄追冬十月思明引衆渡河李公曰思明渡河必圖洛城我當守職明日引軍入河陽按實録此月光弼為副元帥九月始移河陽諸將用儕後至李公數其罪而戮之以幸京杲代領其陽耳軍河九月光弼移軍河陽按河陽糧才支十日亦非糧多也今實録光弼謂韋陟曰洛城無糧不可守取不十月李日越髙庭暉降暉李日越按此月己亥髙庭暉授新傳曰上元元年光弼降賊將髙傳誤邠志曰二年三月思明引衆南去使其子朝義圍河陽特進疑即髙暉也丁巳李日越又授特進是此月皆已降新言曰我且渡河絶彼餉道三城食盡不攻自下李公聞之師四月一日思明陷洛城上元元年五月思明耀兵于河清宣實録亦相違今從實録于野水渡既夕還軍與李光弼大破史思明斬首千餘級周摯遁去擒徐璜王李秦授走安太淸大將徐璜玉李秦授周摯按李秦授舊傳斬萬餘級生擒八千餘人擒其實録云擒偽懷州節度安太清并男朝俊偽貝州刺史徐璜上元元年四月乃見擒周摯二年三月為史朝義所殺今從實録拔懷州始擒之今從舊傳玉按太清上元元年九月上元元年閏月史思明入東京京實録至此復云爾者蓋按去年九月思明已入東白馬寺不入宫闕今始移軍入城耳當時城空李光弼在何陽思明還屯六月如仙媛王女媛今從新舊傳蓋舊宫人也常侍言旨作九仙媛唐曆作九公十一月以劉展為都統淮南東江南西浙西三道節度使都統節度下云以展為都統江南淮南節度使下又云三沈既濟劉展亂紀云淮南東道浙江西道凡二十三州置展既代峘其所統亦三道耳淮南者東道揚楚滁和舒廬濠道皆發吏申圖籍按舊李峘傳峘都統淮南江南江西節度虔江吉袁信撫七州也凡二十二州亂紀誤以二為三又脫壽八州也江南者浙西升潤常蘇湖杭睦七州也江西者洪道字耳江南西甲午展陷潤州山李峘戰敗入日展陷潤州十日陷升州實録十一月壬子淮南節度奏展反鄧景子淮南奏宋州刺史劉展赴鎮楊州長史淮南節度鄧景山按八日甲午十日丙申壬子二十六日乃奏到日也唐曆壬景申陷潤州丁酉陷升州壬子在前蓋因實録也今從劉展都統尚書李峘承詔拒之兵敗奔於壽州乙未劉展陷揚州書本紀亂紀及新李光弼拔懷州擒安太清等送於闕下按周摯於時不在舊傳云擒安太清周摯楊希文義所殺非光弼所擒屯懷州城中明年為史朝十二月田神功入廣陵實録唐曆神功入揚州在此月今從劉展亂紀云二年春神功舉兵東下之資治通鑑考異卷第十五
