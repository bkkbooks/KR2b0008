front:
  text: 資治通鑑考異卷第十
  hash: sha256:7ac4ae9117b3ae2a41eb05777f257877557d7947ce39be07e70197d358179c7f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_010-1a}
body:
  text: 馬光奉勑編集唐紀一太宗貞觀元年正月定律加役流居作三年志皆云居新舊刑法王溥唐會要作二年今從九月杜淹參預朝政也今從新書宰相表是時宰相無定實録云杜淹署位不知所謂署位何也如李靖三兩日一至門下中書平章政事魏徴朝章國典名或云參預朝政或云參知機務之類甚衆不知其入銜否則史不入銜矣參議得失之類十月遣李公掩慰諭馮盎有前蒲州刺史韋叔諧偕行魏文貞公故事作李公淹又實録今從十二月以孫伏伽為諫議大夫德中自萬年主簿上疏韓琬御史臺記伏伽武不願事陛下太宗曰朕試卿耳卿能若是朕何憂社稷命授極諌太宗怒命引出斬之伏伽曰臣寧與關龍逢遊於地下之過深矣請授之五品遂拜為諌議大夫按髙祖實録武德之三品宰臣曰伏伽匡陛下之過自主簿授之三品彰陛下書侍御史御史臺記誤也今據魏徴故事元年伏伽自萬年縣法曹上書髙祖詔授治敇勒諸部多濫葛僕固魏時髙車或曰敇勒訛為鐵勒舊書敕勒作鐵勒新書云即元統紀又舊書僕固或作僕骨按胡語難明以中國字寫之故今從新書舊書多濫葛作多覽葛又作多臘葛今從實録唐昻集及僕固懷恩傳訛謬不一今從陳子薛延陀夷男附于突厥頡利可汗年葉護可汗死其國舊鐵勒傳云貞觀二叛頡利擊走其欲谷設安得二年始附頡利乎大亂夷男始附于頡利按突厥傳元年薛延陀已薛延陀叛頡利等叛在武德九年今從突厥傳舊阿史那社爾傳薛延陀回紇西突厥統葉護可汗傳作統葉護今從之髙祖實録止云葉護舊帝悅王圭之言出廬江王瑗姬不出此美人而甚重其實録新舊書皆云帝雖左右又非嬖寵著名之人太宗何愛而留之今從貞觀政要言按太宗賢主既重圭言何得反棄而不用乎且是人汛侍帝責王圭溫彥博既而悔之以祖孝孫為知音令教聲曲魏文貞公故事太宗曰人皆公進諌曰陛下生平不愛音聲今忽為教女樂責孝孫臣恐多不諧韻此其未至精妙為不存意乎乃敇所司令與其罪上為孝孫辭溫彥博等拜謝公及王圭進曰陛下不以臣等天下怪愕太宗曰汝等並是我心腹應須中正何乃附下罔奉明旨勿以臨時嗔怒即便曲從成我大過臣等不敢失墜不肖置之樞近今臣所言豈是為私不意陛下責臣至此常宗怒未已凛然作色公又曰祖孝孫學問立身何如白明達所以每觸龍鱗今以為責只是陛下負臣臣終不負陛下太可疑明達可信臣恐羣臣衆庶有以窺陛下太宗怒乃解今陛下平生禮遇孝孫復何如白明達今過聽一言便謂孝孫傳從舊三年六月詔文武官言得失馬周代常何陳事云貞舊傳有詔令百官上封事今從唐曆附此觀五年據實録詔在此年五年不見蕭瑀劾奏李靖無綱紀致令虜中奇寶散於亂兵之手舊傳御史大夫溫彥博害其功譛靖軍令三月始禽頡利今從實録據實録彥博二月已為中書七月蕭瑀氣剛辭辨房玄齡等不能抗帝多不用其言此安得為賢相且事之用捨在太宗非由玄齡今不取舊傳云玄齡等心知其是不用其言按玄齡若用心如六年正月魏徴諌封禪宗自不欲封禪而魏文貞公故事實録唐書志及唐統紀皆以為太太山徴諌而止意頗不同今兩存之及王方慶文貞公傳録以為太宗欲封三月徴諫資送公主倍於長主皇后賞之傳云使齎帛舊文德皇后錢二十萬絹百匹詣公宅宣命今從舊魏徴傳五百匹詣徴第賜之魏文貞公故事云遣中使齎七月西突厥設卑達官干今從舊傳新傳作沒卑達立泥孰為奚利邲咄陸可汗邲咄陸可汗新傳册號吞舊傳册為吞阿妻狀奚利可汗今從實録阿婁拔利邲咄陸九月尉遲敬德驅任城王道宗前驅宇文士及曰汝有唐曆云嘗因內宴於御諭之方止今從舊傳何功合居吾上太宗慰七年九月死囚三百九十人自詣朝堂下斷死罪止二四年實録云天疑又白居易樂府云死囚四百來歸獄舊本紀統紀年代記十九人今年實録乃有二百九十九人何頓多如此事已可今從新書刑法志皆云二百九十人十二月帝從上皇置酒未央宫城西髙祖親自臨視還舊髙祖紀八年閲武於宗實録八年正月頡利可汗死今從唐曆置酒於未央宫髙祖實録不記年月據太八年正月帝欲分遣大臣為諸道黜陟大使本紀但實録舊十六道黜陟大使據姓名止十三人皆所未詳故但云諸道云遣蕭瑀等巡省天下按時止有十道而會要統紀皆云發五月吐谷渾可汗伏允允為順步薩鉢今從舊傳實録十年立諾曷鉢詔稱伏伏允寇蘭廓遣段志玄擊之蘭州不云遣志玄擊之吐實録六年三月吐谷渾冦玄破吐谷渾故參酌置此又新書本紀是夏吐谷渾冦涼州谷渾冦蘭廓二州無年月新本紀此夏遣志玄實録十月志日月新紀亦無破吐谷渾月日實録冦涼州在十一月今參用之遣志玄等伐之實録十月辛丑志玄破吐谷渾而不書遣將十一月吐蕃贊普棄宗弄讃實録棄宗作器宗今從舊傳太宗實録贊普作贊府髙宗下詔討吐谷渾十餘返竟無悛心九年詔李靖等討伐太舊傳云吐谷渾拘趙德楷太宗遣使宣諭李靖等今從實録據舊傳拘德楷在前據實録此詔先遣使宗實録己丑吐谷渾拘我行人趙德楷即下此詔十二月遣詔伐之今兩存之宣諭後拘德楷即下十二月髙季輔上言年按舊傳季輔貞觀初拜御史纍轉貞觀政要季輔疏在三年會要在八從會要置此中書舍人故九年閏四月任城王道宗敗吐谷渾於庫山云賊聞軍舊道宗傳靖然之而君集不從道宗遂率偏師并行倍道去大軍十日至走入嶂山已行數千里諸將議欲息兵道宗固請追討李受敵一時奔潰庫山嶂山不知其所以為同異據嶂山已行追及之賊據險苦戰道宗潛遣千餘騎踰山襲其後賊表裏實録川今從靖聞伏允在突倫川突倫川虜語轉耳今從契苾何力傳吐谷渾傳云伏允西走圖倫磧蓋即契苾何力趣突倫川薛萬均引兵從之均率輕鋭追奔吐谷渾傳云萬蓋何力先進而萬均從之也入磧數百里及其餘黨破之矦君集等至柏海還與李靖軍合柏梁今從實録實吐谷渾傳柏海作非川在青海南烏海星宿海柏海並在其西且末又在其西録及吐谷渾傳皆云君集與李靖會於大非川按十道圖大會於大非川於事可疑故不敢著其地吐谷渾傳又云兩軍極逺據靖已至且末君集又過烏海星宿川至柏海豈得復邏真谷又行月餘日乃至星宿川然則破邏真谷在星宿川會於大非川至破邏真谷大寧王順乃降按實録君集歷破其處邪今從實録東甚逺矣豈得返至伏允為左右所殺而死今從實録吐谷渾傳云自縊十一年武士彠女年十四入宫三唐曆焦璐唐朝年代記舊則天本紀崩時年八十觀十三年入宫據武氏入宫年十四今從吳兢則天實録為統紀馬揔唐年小録聖運圖會要皆云八十一唐録政要貞置此年八十二故十三年西突厥二可汗以伊列水為境云東以伊列河沙鉢羅葉護傳沙鉢羅葉護既因嘻利失之地應云西以伊列河為界今未為界按乙毗陸傳云自伊列河以西屬咄陸以東屬嘻利失云伊列水為境知二傳孰誤故但十四年二月國學升講筵者至八千餘人人今從新書舊傳云八十餘八年矦君集至田城城今從舊傳實録作田地髙昌王文泰與西突厥可汗相結按欲谷設去嵗已敗舊傳云與欲谷設約不取死今髙昌戶八千四十六口一萬七千七百七千七百今從實録舊傳户八千口三萬十五年四月席君買襲擊吐谷渾丞相宣王破之傳舊丞相王破之殺其兄弟三人今從實録云鄯州刺史杜鳯舉與威信王合軍擊十六年九月禇遂良上疏請復立髙昌良疏云數郡蕭貞觀政要載遂唯有西突厥寇伊州不云冦西州蓋以伊州隸西州屬部故然五年不復下言十六年西突厥遣兵冦西州按實録此年者三字誤為五字耳舊傳置此疏於十八年蓋亦因此而誤云爾自十四年滅髙昌距此適三年耳何得云五年不復或西州事故附於此十八年無西突厥冦乙毗咄陸可汗奔吐火羅咄陸十五年屋利啜等請立舊突厥傳云都護郭孝恪敗十五年疑六字誤為五字耳二十年實録敘咄陸兵散居白可汗按上已云十五年册授沙鉢羅葉護可汗下不應更云以涼州都督郭孝恪為安西都護則咄陸寇伊州應在其後水胡城事亦云是嵗貞觀十五年也按十六年實録九月癸酉亦由此今因孝恪為都護并言之豈得十五年已敗散乎突厥傳誤蓋十一月髙麗東部大人泉蓋蘇文人今從實録舊傳云西部大十九年四月江夏王道宗將兵數千至新城懼敵不敢唐曆張儉十二月田仁會敗薛延陀北而還其意指真珠為延陀也髙宗實録云會延陀死耀威漠冬來寇必非真珠也田仁會傳作十八年亦誤也按真珠憚太宗威靈不敢入寇又死在九月而此云或譛劉洎詔賜死家之事不足慮也正當輔少王行伊霍實録云黃門侍郎禇遂良誣奏之曰國對遂良執證之不已洎引中書令馬周以自明太宗問周周大臣有異志者誅之自然定矣太宗疾愈詔問其故洎以實事中人所不為遂良忠直之臣且素無怨仇何至如此蓋許對與洎所陳不異帝以詰遂良又證周諱之洎遂及罪按此洎死歸咎於遂良耳今不取敬宗惡遂良故修實録時以二十年六月遣李世績圖薛延陀戒世績曰降則撫之叛則討之發突厥兵討擊今從鐵勒傳舊李績傳云詔績以二百騎世績至鬱督軍山語兩音也鐵勒傳云至于天山今從唐曆績傳作烏德犍山唐曆云即鬱督軍山虜八月多濫葛斛薛等十一姓從實録及本紀唐曆又回紇舊回紇鐵勒傳作多覽葛今契丹奚云十三姓按契丹奚本非薛延陀所統又內附已久傳陳彭年唐紀作斛薩鐵勒傳作解薛今從實録實録又有乃降今從舊本紀嘗從征遼非至此二十一年正月以僕骨為金微府從實録唐曆舊書作金徽今六月房玄齡言李緯美髭鬢改洛州刺史無何改緯唐曆云居今從舊傳太子詹事八月骨利幹煮羊脾熟日已復出僧一行大衍曆義及實録唐曆皆作羊脾者取其易熟故也若煮羊脾及髀則雖中國通夕亦未爛矣舊天文志唐統紀皆作脾新天文志云胹羊髀按正言羊脾衍曆義今從大十一月突厥車鼻可汗請入朝遣郭廣敬徴之竟不至飾其辭初無來意韓華將招歌邏祿共劫之車鼻覺其謀華實録詔遣雲麾將軍安調遮右屯衛郎將韓華迎之車鼻徒調遮亦被殺今從舊突厥傳與車鼻子陟苾特勒相射而死二十二年二月崔仁師流連州今從新舊本紀舊傳云流龔州十月以回紇吐迷度子婆閏為瀚海都督云詔西突舊回紇傳南去西州馬行十五日程回紇不肯西屬突厥按賀魯時為厥可汗阿史那賀魯統五啜五俟斤二十餘部居多羅斯水統咄陸五啜弩失畢五俟斤唐未嘗以回紇隸之也今不取將軍自多邏斯水入居庭州永徽二年乃西遁自稱可汗所二十三年正月以布失畢為左武衛中郎將武衛翊衛實録云左衛為左右衛然則於時已無翊衛之名且布失畢必不獨兼中郎將舊傳為武翊衛中郎將按會要武德五年改左右翊去翊衛字兩衛之官今遣髙侃擊突厥車鼻可汗拔悉蜜吐屯肥羅察降宗髙之不至太宗大怒遣右驍衛郎將髙侃引回紇僕骨等兵襲實録云初突厥車鼻可汗遣其子車鉢羅入貢太宗遣使徴諌其父請歸國車鼻不聽羯漫陀遂背父來降以其地為新擊之其下諸部落相次歸降其子羯漫陀先統拔悉密部泣等兵衆襲擊之其酋長歌邏祿泥執闕俟利發乃拔塞匐處黎州舊傳云二十三年遣右驍衛郎將髙侃潛引回紇僕骨漫陀先統拔悉蜜部車鼻未敗前遣其子恭鑠入朝太宗嘉木昆莫賀咄俟斤等率部落背車鼻相繼來降車鼻長子羯州以統其衆今從太宗實録之拜左屯衛將軍更置新黎髙宗永徽元年九月谷那律言瓦為油衣嘗從太宗出獵舊書那律傳云唐録政要髙宗出獵有此月日唐統紀亦在此年今從之在塗遇雨有此語意欲太宗不為畋獵太宗恱賜帛二百段五年三月戊午幸萬年宫長曆二月丁丑朔無戊午戊實録戊午以下皆為二月按二日也午三月十蕭淑妃有寵作良娣廢王后詔亦曰良娣蕭氏按當時後新舊唐書或作蕭淑妃或作蕭良娣實録皆髙宗在東宫時蕭為良娣及即位拜淑妃也宫位號無良娣名唯漢世太子宫有良娣疑六年六月武昭儀誣王后為厭勝密與母柳氏求巫祝舊傳云后懼不自安廢今從實録厭勝事發故帝欲以武昭儀為宸妃韓瑗來濟諫今據實録四月韓唐曆在此年四月武后詔書猶六昭儀武氏然則未嘗為宸妃也今從會要瑗來濟未為侍中中書令唐曆又云瑗濟諌帝不從按立李義府超拜中書侍郎申叶贊擢拜中書侍郎同中書舊傳云髙宗將立武后義府密嵗七月義府為中書侍郎參知政事實録但云超拜中書侍門下三品監修國史賜爵廣平縣男新書本紀年表皆云是侍郎參知政事今從之郎宰輔圖十一月自中書九月長孫無忌褚遂良諌廢王后遂良曰今者多為中唐曆云無忌等將入三顧無忌曰莫大之罪無過絶嗣皇后無子今欲廢之立武宫事遂良欲諌何如無忌曰公但極言無忌接公及入上再望陛下問其可否按如此則是無忌賣遂良也今不取士彠女何如無忌曰自貞觀二十三年後先朝託付遂良顯慶二年閏正月以西突厥酋長阿史那彌射步真為流沙安撫大使莫賀設貞觀七年遣鴻臚少卿劉善因舊西突厥咄陸傳云咄陸可汗泥熟父為嘻利失可汗彌射傳云彌射者室點密可汗五代孫也世册為吞阿妻狀奚利苾咄陸可汗明年泥孰卒弟同娥設立卿劉善因就蕃立為奚利邲咄陸可汗其族兄步真欲自立統十姓部落在本蕃為莫賀咄葉護貞觀六年詔遣鴻臚少處密部落入朝其後步真遂自立為咄六葉護部落不服步謀殺彌射彌射既與步真有隙以貞觀十三年率所部處月顯慶二年轉右武衛大將軍新傳略同今欲以咄陸彌射為真復擕家屬入朝彌射後從太宗征髙麗有功封平襄縣伯相違疑不能明故但云西突厥酋長二人則事多相類以為一人則事又八月貶褚遂良為愛州刺史柳奭為象州刺史月甲辰唐曆三又貶象州新舊書唐曆皆云愛州誤也今從實録貶遂良為桂州都督奭愛州刺史據實録奭坐韓瑗十二月蘇定方破西突厥擒阿史那賀魯傳云定方舊書賀魯定方率任雅相等與之交戰賊衆大敗斬大首領都搭達官行至曵嘻河西賀魯率胡祿居闕啜等二萬餘騎列陳而待者甚衆彌射進軍至伊麗水處月處密等部名率衆來降彌等二百餘人賀魯及闕啜輕騎奔竄渡伊西麗河兵馬溺死射步真攻之大潰又與蘇定方攻賀魯於碎葉水大破之舊射又進次雙河賀魯先使步失達官鳩集散卒據柵拒戰彌崑陵二都督府據實録擒賀魯置二都督皆在此月本紀又書本紀三年二月定方平賀魯甲寅西域平以其地置濛池今從實録非奏到月日三年六月程名振薛仁貴破髙麗斬首二千五百級東破髙麗於貴端城斬首三千級今從實録舊書仁貴傳云顯慶二年副程名振經略遼四年四月許圉師參知政事三品新傳無年今從實録舊傳云二年同中書門下許敬宗誣奏長孫無忌謀反告太子洗馬韋季方監察御實録洛陽人李奉節上封事敬宗按之甚急李方事迫自刺不死又搜奉節得私書有題史李巢交通朝貴有朋黨之事詔敬宗與侍中辛茂將鞫之謀反上驚曰豈當有此或容惡人間構小生疑阻至於即反與趙師者遂奏言趙師即無忌也陰為隱語欲陷忠良伺隙偽書是季方所作即疑無忌欲反使其潛行構間斥除忠臣猶恐不然敬宗奏曰臣始末推勘自奉節有趙師之言又得非社稷之福舊無忌傳云敬宗遣人上封事稱監察御史李近戚此計若行自然權歸無忌踨迹已露陛下猶有所疑恐略同按奉節乃告事之人推鞫者豈得反搜奉節之家且與巢與無忌交通謀反詔敬宗與茂將鞫之唐曆統紀與實録奉節當執以與訟何待搜而後得又既云趙師是無忌乃是趙師者誰之私書若是季方書安得在奉節家若在奉節家不可知其詳實故略取大意而已舊傳所云雖為簡徑然髙實與無忌書何得謂之偽書實録敘此事殊鹵莾首尾差舛奉節而獨令敬宗鞫之也且實録在前而詳列傳在後而略宗初無疑無忌之心故李弘泰告無忌反髙祖立斬之何至可據也故亦未髙履行貶洪州都督也今從唐曆舊傳云三年誤七月壬寅命李績等覆按無忌事刺史來濟為庭州唐曆是日以台州濟豈得移官舊書云五年徙庭州近是刺史按濟與韓瑗事同一躰瑗方下獄殺栁奭于象州宗就愛州殺之今從實録舊傳云奭纍貶愛州刺史髙韓瑗已死發棺驗尸死遣使殺之使至瑗已死褚遂良傳舊瑗傳云四年卒官明年長孫無忌然諸書多在此月蓋因實録年代記云七月辛未遣使逼無三年卒官後二嵗追削官爵實録或因無忌徙黔州終言之子朔無辛未不可據也忌自縊按長曆七月丙長孫恩流檀州統紀唐曆長孫詮流嶲州縣令希旨殺之唐統紀唐曆皆云長孫恩新書云族弟思滿作難遂殺滿是詮流嶲州在前今從之在此下實録詮流嶲州許敬宗懼其甥趙持五年二月蘇定方為神丘道大揔管伐百濟方傳新舊書定年實録新唐書本紀又舊本紀唐曆皆云四年十二月癸亥羅傳皆云定方為熊津道大揔管實録定方傳亦同今從此方時討都曼未為神丘道揔管舊書唐曆皆誤今從實録以定方為神丘道大揔管劉伯英為嵎夷道行軍揔管按定十二月劉仁軌坐督運覆船白衣從軍軍征遼以後期舊傳云監統水非征遼也今從張鷟朝野僉載坐免官接仁軌從軍乃在百濟龍朔元年三月詔起劉仁軌檢校帶方州願以仁軌檢僉載云劉仁史今從本傳校帶方州刺百濟僧道琛等退保任存城知孰是今從其多者實録或作任孝城未四月以吐火羅等十六國置州七十六十六今從統紀唐曆云置州二九月王勃為檄周王雞文時沛王賢已為太子當云周王舊傳云檄英王雞按中宗為英王十月回紇酋長比粟毒比粟嗣今從舊傳新書傳云婆閏卒子二年七月初劉仁願仁軌屯熊津城仁願於百濟府城去嵗道琛福信圍不則圍解之後徙屯熊津城耳今云尚在熊津城或者共是一城十月許圉師免官十一月辛未圍師貶虔州刺史今據實舊本紀十一月辛未圉師下獄新本紀貶虔州刺史在三年二月新本紀誤録辛未免官久之貶虔州刺史舊紀麟德元年十月以扶餘隆為熊津都尉督按時劉仁軌實録作熊津都稱熊津都尉扶餘隆與金法敏盟今從之檢校熊津都督豈可復以隆為之明年實録十二月武后預政中外謂之二聖奏皆呼為二聖帝坐于唐曆羣臣朝謁萬方表髙宗尚在與髙宗對坐受羣臣朝謁乎恐不至此今從實録東間后坐于西開后隨其愛憎生殺在口按武后雖悍戾豈得二年三月敇西州都督崔知辨救于闐督按於時未有實録作西川都必西州也西川之名乾封元年八月武惟良等獻食惟良等獻食今從實録舊傳云后諷上幸楊氏宅總章二年二月張文瓘為東臺侍郎同三品始入銜同三品時今從舊本紀陳紀在乾封二年文瓘始十一月李績言年將八十弟弼云年將八十新傳改云舊傳云績年八十六臨終語十七往從之自大業十三年至此五十二年若據新傳年八年踰八十按新舊傳實録皆云大業末翟讓聚衆為盜績年言忠對髙宗云績年登八十去此止一年若據新傳績滅髙十六則年十七當在開皇時不得云大業末也總章元年賈云年登八十今從實録麗時年已八十五亦不得績孫敬業襲爵利乃除徐敬業為刺史發卒郊迎敬業盡劉餗小説云髙宗時羣蠻為冦討之輒不問處置他事已畢方曰賊安在曰在南岸乃從二佐吏而往放令還單騎至府賊聞新刺史至皆繕理以侍敬業一無所營藏隱敬業直入其營內告云國家知汝等為貪利所害非觀之莫不駭愕賊初持兵覘望及見船中無人及兵仗更閉各杖數十而遣之境內肅然其祖英公壯其膽略曰吾不辨有他惡可悉歸田後去者為賊唯召其帥責以不早降之意兵旋踵敗亡若有智勇何至如此今不取此然破我家必此兒也按敬業武后時舉咸亨二年正月幸東都幸東都留太子於京師監國明舊本紀及太子弘傳正月乙巳太子監國按離長安時已留太子監國及自東都將還豈得年十月己未又云皇太子監國新本紀唐曆統紀皆連嵗言事唯明年十月有之今從之又令監國據實録此月無監國上元元年劉曉上疏今從統紀會要作劉墝二年四月太子弘薨傳云后將騁志弘奏請數怫旨從幸新書本紀云己亥天后殺皇太子新太子敬禮大臣鴻儒之士未嘗居有過之地以請嫁二公主合璧宫遇鴆薨唐曆云弘仁孝英果深為上所鍾愛自升為肅宗云髙宗有八子睿宗最幼天后所生四子自為行第故失愛於天后不以夀終實録舊傳皆不言弘遇鴆按李泌對臨朝乃鴆殺孝敬立雍王賢為太子新書蓋據此及唐曆也睿宗第四長曰孝敬皇帝為太子監國仁明孝悌天后方圖人以為天后鴆之疑以傳疑按弘之死其事難明今但云時儀鳳元年二月徙安東都護府於遼東故城亨元年實録咸儀鳳元年二月甲戌以髙麗餘衆反叛移安東都護府於遼楊昉髙侃討安舜始拔安東都護府自平壤城移於遼東州反者本其所以移也會要無咸亨元年移府事此年云移於東都城蓋咸亨元年言移府者終言之也儀鳳元年言髙麗今從之遼東故城三年正月以李敬玄代劉仁軌為洮河大揔管云與實録預新舊傳皆云以代仁軌今從之仁軌相知鎮守而敬玄之敗仁軌不九月敬玄與吐蕃戰敗還鄯州敬玄為元帥吐蕃至樹朝野僉載曰中書令李麥飯首尾千里地上尺餘言之太過今不取敦城聞劉尚書沒蕃著鞾不得狼狽而走遺却劉審禮子易從至吐蕃審禮已病卒之按舊傳審禮新本紀審禮死新紀誤也今終言之永隆二年卒于蕃中婁師德充河源軍司馬軍使今從舊傳御史臺記充河源調露元年正月狄仁傑劾奏韋弘機機坐家人犯盜舊傳云儀鳳中府二司造宿羽髙山上陽等宫莫不壯麗仁傑奏其太過機為憲司所劾免官狄仁傑傳云時司農卿韋機兼領將作少宫乘髙臨深有登眺之美乃敇弘機造髙館及成臨幸即上竟坐免官統紀云駕幸東都上遊韋弘機所造宿羽髙山等録營宫在前陽宫也今據實又奏王本立欠米萬餘斛髙宗怒曰仁傑偷我米命殺之御史臺記曰狄仁傑以司農發太原運句會偷請以官爵保明久之髙宗意解仁傑不坐案仁傑傳未嘗吏部侍郎魏玄同曰仁傑健而疏只是勾當失所臣委知不今不取為司農五月盜殺明崇儼求賊不得人也自監察纍遷刑部郎御史臺記鄭仁恭本滎陽妄承引連坐者甚衆髙宗怒促有司行刑仁恭奏曰此輩必中儀鳳中明崇儼以奇術承恩寵夜遇刺客敇三司亟推鞫慮淺短非的以為枉恐萬一非實則恐氣生遂緩之旬餘果死之囚願假其數日之命髙宗曰卿以為枉邪仁恭曰臣識之今從實録獲賊矣朝廷稱六月波斯王子泥洹師師師唐曆作泥洹師今從統紀實録作泥浬師師舊傳作泥湟命裴行儉册波斯王遣使送歸今從實録唐曆統紀舊傳唐紀云波斯王卑路斯入朝未還請永隆元年二月宗城潘師正皇人今從實録舊傳師正趙州贊三月裴行儉至朔川依實録及統紀舊傳作朔州今七月吐蕃冦河源黑齒常之擊却之贊婆及素和貴實録吐蕃大將中書令李敬玄統衆與賊戰于湟川官軍敗績副使左武衛等帥衆三萬進冦河源屯兵于良非川辛巳河西鎮撫大使等遂退擢常之為河源軍經略大使詔敬玄留鎮鄯州以為將軍黑齒常之帥精騎三千夜襲賊營殺獲二千餘級贊婆襲賊營賊乃退與此事頗相類舊書敬玄傳止一敗無再敗之援按儀鳳三年九月敬玄已與吐蕃戰敗于青海常之夜贊婆等屯良非川常之夜襲賊營走之擢為大使事似同時常之傳儀鳳中從敬玄擊吐蕃走跋地設充河源軍副使時拔地設調露中襲贊婆唐曆統紀皆無今年敬玄敗事又實新書敬玄傳戰青海又戰湟川凡再敗常之傳儀鳳三年襲日賈耽皇華四達記自長安至鄯州約一千七百餘里時髙録今年八月丁巳敬玄貶衡州刺史辛巳至丁巳才三十七日乃貶非三十七日之內所能容也今略去敬玄湟川敗事宗又在東都若敬玄敗後纍表稱疾得報乃來至東都必數常之擊却之而已但云吐蕃寇河源八月劉訥言流振州事流死振州今從實録新傳云除名為民復坐弘道元年四月綏州步落稽作亂程務挺討平之載僉鳳中務挺斬平之蓋誤也今從實録云延州稽胡又云自號月光王又云儀資治通鑑考異卷第十承事郎太學博士臣李敦義校
