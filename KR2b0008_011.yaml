  text: 資治通鑑考異卷第十一
  hash: sha256:997e0467536ff2480b3bd3ace297e0718909ddc185aa8076b3051a35ef7d608b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_011-1a}
body:
  text: 司馬光奉勑編集唐紀二則天皇后光宅元年三月丘神績殺故太子賢録賢死則天實唐曆遣神績舉哀追封皆有日今從之在二月丘神績往巴州下舊本紀在三月九月薛仲璋收陳敬之繫獄薛仲璋矯使楊府與徐敬實録作薛璋御史臺記云微發之長史陳敬之不察抑識微令遜謝仲璋佯事竟還出業等謀反夜與江都令韋知止子茂道計議倉曹參軍閻識繫問遂斬敬之今事從實録仲璋從臺記郭門羣官畢從其黨韋超遮道告密復留裴炎下獄天子會久雨太后不出而止若炎實有此謀則新傳云炎謀乘太后出遊龍門以兵執之還政諶輩無事猶欲陷之況有此迹其同黨能不首告乎又朝野太后殺之宜矣且炎為此謀必有同黨當炎下獄崔察李景同起事賔王足踏壁靜思食頃乃為謡曰一片火兩片火緋僉載裴炎為中書令時徐敬業欲反令駱賔王畫計取裴炎訪學者令解之召賔王數啖以寶物錦綺皆不言又賂以音衣小兒當殿坐教炎莊上小兒誦之并都下童子皆唱炎乃王賔王欻然起曰此英雄丈夫也即説自古大臣執政多移樂妓女駿馬亦不語乃將古忠臣烈士圖共觀之見司馬宣衣之事賔王即下北面而拜曰此真人矣遂與敬業等合謀社稷炎大喜賔王曰但不知謡讖何如耳炎以謡言片火非者朝臣莫之能解則天曰此青字者十二月鵝字者我自與楊州兵起炎從內應書與敬業等合謀唯有青鵝字人有告炎者所言耳非其實也也遂誅炎此皆當時構陷李敬業陷潤州業九月丁丑起兵十一月庚申敗才四十唐紀云李思文拒守四十餘日而陷按敬今不取四日耳李孝逸斬敬業等徑孝逸縱火賊懼燒而潰敬業猷之唐紀初官軍逆風不利俄而風回甚臣敬業初與宗臣木契為約時亡其契宗臣疑而不赴或云奇求仁賔王走歸江都焚簿書擕妻子潛算山下手書召宗將王那相斬之求降餘黨赴水死今從實録唐統紀宗臣已歸順敬業入海欲奔東夷至海陵界阻風偽十二月斬程務挺朕於天下無負羣臣皆知之乎羣臣曰唐統紀曰既而太后震怒召羣臣謂曰與之大下安樂朕長養之及先帝棄羣臣以天下託顧於朕唯太后曰朕事先帝二十餘年憂天下至矣公卿富貴皆朕也且卿輩有受遺老臣倔強難制過裴炎者乎有將門貴種不愛身而愛百姓今為戎首皆出於將相羣臣何負朕之深挺者乎此三人者人望也不利於朕朕能戮之卿等有能過能糾合亡命過徐敬業者乎有握兵宿將攻戰必勝過程務不敢仰視曰唯太后所使恐武后亦不至輕淺如此今不取此三者當即為之不然須革心事朕無為天下笑羣臣頓首垂拱元年正月太后不奪徐思文姓武表請改姓武實録云思文文因請之也今從唐紀許之蓋太后有此言思二年三月魚保家作銅匭今從實録舊本紀又朝野僉統紀唐曆皆云八月作銅匭咺應制為之甚合規矩遂用之今從御史臺記載作魚思咺云上欲作匭召工匠無人作得者思九月新豐有山踊出月今從實録統紀在十二三年正月封皇子成美為恆王作成義今從實録唐曆舊本紀新傳皆四月蘇良嗣留守西京嗣出守西京年月今據唐曆實録新舊本紀統紀皆無良五月張光嗣同平章事越王貞後今從實録舊本紀在四月傳在平七月曹玄靜討李思愼等斬之自眉州刺史轉廣州都舊書馮元常傳云元常之帥士卒濟南海先馳檄示以威恩喻以禍福嗣安徒黨多督屬安南首領李嗣仙殺都督劉延祐剽陷州縣敕元常誅安慰居人而旋今從實録相率歸降因縱兵誅其魁首十一月李孝逸流儋州郡公李孝逸孝逸初封梁郡公新紀天授元年五月己亥殺梁當削爵矣新傳云流儋州薨紀傳自相違唐曆云四月十一以平徐敬業功改封吳國公垂拱三年減死除名配流儋州元昉裴安期唐曆并其黨崔知賢董元昉裴安期等今從實日誅益州長史李孝逸亦舊任也統紀誅李孝逸并其黨崔舊傳録及太后欲遣韋待價擊吐蕃安息道行軍大揔管督三十實録十二月壬辰命待價為待價擊吐蕃七月敗於寅識迦河按本傳不云兩曽將兵今刪此事六揔管以討吐蕃不言師出勝敗如何至永昌元年五月又云命四年七月韓王元嘉等謀匡復月誤也今從實録舊傳垂拱三年七八月壬寅琅邪王沖起兵也舊傳本紀作壬寅按沖以實録作丙午蓋據奏到之日日而敗然則壬寅是也今從之戊申死而實録又云沖起兵七沖為守門者所殺孟青捧所殺今從實録及沖傳丘神績傳云為勳官吳希智白丁越王貞舉兵兵二十日而敗庚戌至丙寅才十七日蓋皆實録庚戌貞舉兵九月丙寅豫州平又云舉之日耳據奏到收魯王靈夔等赴東都皆自殺自縊死今從實録舊傳靈夔流振州十二月周矩按騫味道伏誅周興獄今從矩傳御史臺記味道陷起天堂五級至三級則俯視明堂大屋凡三層計髙三舊薛懷義傳云明堂袤亞明堂今從小説及通典百尺又於明堂北起天堂廣僧懷義以功封梁國公左武衛大將軍固辭不拜時有右實録云懷義監造明堂以功擢授陰有異圖欲奉之為主懷義密奏其狀由是慈徴等坐斬進玉鈐衛將軍王慈徴長上果毅元肅然請與懷義為兒既而物三千段又表辭不受今從舊傳拜懷義輔國大將軍封盧國公賜永昌元年五月懷義為新平軍大揔管揔管今從實録舊傳為清平道大七月紀王愼子徐州刺史東平王續等皆被誅愼長子舊傳云知名早卒今從實録和州刺史東平王續最八月甲申張楚金郭正一魏元忠流嶺南十四日張楚唐曆七月二絞死八月辛亥郭正一絞死新書紀八月辛丑殺郭正一今金絞死八月二十一日郭正一絞死年代紀七月甲戌楚金嶺南御史臺記云元忠將刑至于市神色自若則天以揚楚據實録楚金等皆流配未死舊書楚金正一萬頃傳皆云流神色如初其傍諸王子戮者三十餘尸重疊委積元忠顧視功免死流放復敘授御史中丞復陷來俊臣獄復至市將刑騎傳呼敕罷刑復放嶺南又云前後坐棄市流放者四舊傳曰大丈夫少選居此積矣曽不介懷會鳳閣舍人王隱客馳流今從舊傳云前後三被十月殺鄂州刺史嗣鄭王璥等璥作敬今從新本紀唐曆云撫州别駕舊傳嗣滕王修琦等六人流嶺南人免死配流今從舊傳統紀云元嬰男修瑶等五天授元年二月王本立薨本立為周興所誅今從實録新紀丁卯殺王本立御史臺記四月范履冰下獄死履冰今從實録唐曆新紀五月戊子殺范司刑丞杜景儉草書致誤新書因承之耳今從舊紀傳實録及新紀表傳皆作景佺蓋實録以八月殺唐宗室誅其親黨數百家今從舊本紀實録作數千家十月殺韋方質卒今從統紀新本紀舊傳云配流儋州尋徐有功爭李行褒獄下按行本得罪在長夀元年十月時新舊傳有功爭行褒皆在爭裴行本氏必在革命後今置此年之末周興已貶死矣行褒坐謀復李二年正月改唐太廟享德廟據此已袝武氏七廟主不當案實録此年三月己卯改唐太廟為廟為享德廟以武氏七廟為太廟今從唐統紀至三月方改唐廟新本紀元年十月辛未改唐太二月立故太子賢之子光順為義豐王今從唐曆統紀舊傳為安樂王九月王慶之等數百人上表餘人今從舊傳御史臺記作千李昭德言當傳皇嗣洛陽人王慶之率輕薄惡少數百人舊傳云延載初鳳閣舍人張嘉福令元年自御史中丞貶振州凌水尉實録長夀元年始為相舊詣闕上表請立武承嗣為皇太子則天不許唐曆昭德永昌郎蓋暫貶凌水尋召還為鳳閣侍郎也杖殺慶之據御史臺傳杖殺慶之在為相後按御史臺記昭德自中丞轉鳳閣侍載慶之上表或在載初年實録因岑長倩格輔元之死説及記乃是為鳳閣侍郎時非為相後也舊傳或誤以載初為延臺記及舊傳之語耳今參取實録御史長夀元年一月擢用存撫使所舉人月十道舉人石艾統紀天授二年二可等二十四人為御史并州録事參軍徐昕等二十四人為縣今王山齡等六十人擢為拾遺補闕懷州録事參軍霍獻二十二人為衛佐疑與此只是一事著作佐郎及評事內黃尉崔宣道等廬江郭霸延載元年云弘霸僉載云應革命舉蓋止謂此新傳名弘霸舊傳御史臺記皆單名霸唯統紀從臺託時也今來俊臣羅告任知古狄仁傑等書狄仁傑益州長史任舊來俊臣傳云地官尚左丞盧獻等六人並為羅告李嶠傳云太后使給事中李嶠令暉冬官尚書李遊道秋官尚書袁智弘司賔卿崔基文昌懼罪並從俊臣所奏嶠曰豈有知其枉濫而不為申明哉孔與大理少卿張德裕侍御史劉憲覆其獄德裕等雖知其枉旨出為潤州司馬按嶠平生行事恐不能如此今不取子曰見義不為無勇也乃與德裕等列其枉狀由是忤六月吐蕃酋長咱捶今從實録唐紀作沓搖夏官侍郎李昭德為鳳閣侍郎司賔卿崔神基並同平章事置夏官侍郎以昭德為之是嵗遷鳳閣鸞臺平章舊昭德傳舉明經纍遷至鳳閣侍郎長夀二年增蓋昭德自鳯閣為夏官自夏官復為鳳閣也婁師德傳長夀事新紀表傳皆云昭德自夏官侍郎遷鳳閣侍郎同平章事神基實録作崔基今從新紀表元年增置夏官侍郎今從之崔七月周矩上疏言制獄舊薛懷義傳云矩劾奏懷義遷矩御史臺記云書奏遂授洺州司功官選曹無緒敇矩監之侍郎李景謀為矩所制乃引為員外天官員外郎竟為懷義所構下獄免官御史臺記又云時天年出為洺州司功則不當復劾懷義但舊傳矩疏在載初元不間於吏道自此左出矣據舊傳矩劾奏薛懷義在後若此今因朱敬則疏終言之年一月是時制獄未息二年正月癸巳殺皇嗣二妃劉氏德妃竇氏舊傳云正月新本紀臘月癸亥殺皇嗣妃從之二日今殺戶婢團兒后尤所信任欲私於上而拒焉怨望遂作桐劉子玄太上皇實録云韋國兒諂佞多端天矯制按問上今從則天實録人潛埋於二妃院內譛殺之又龎氏減死徐有功除名名尋起為左司郎中竇孝諶傳長舊有功傳有功為御史坐龎氏除龎氏除名為流人月餘授御史按實録有功天授初纍補司夀二年龎氏為酷吏所陷御史臺記有功自秋官員外郎坐萬嵗通天元年擢拜殿中侍御史今從之刑丞秋官員外郎稍遷郎中後以公事免一月裴匪躬范雲仙腰斬雲仙於洛陽牧院虔朂等不舊來俊臣傳云按張虔朂范歷事先朝稱所司寃苦俊臣命截去其舌士庶膽破無敢言堪其苦自訟於徐有功俊臣命衛士以亂刀殺之雲仙亦言仙此年坐謁皇嗣斬今從實録者按張虔朂天授二年被殺雲二月遣劉光業等殺流人傅遊藝之旨按天授二年遊藝實録曰光業等亦受鸞臺侍郎其謀武后本遣万國俊一使國俊還言諸道流人亦反故更已死舊遊藝傳曰遊藝請則天發六道使雖身死之後竟從者也潘逺紀聞曰補闕李秦授寓直中書進封事曰陛下自遣五使耳遊藝豈豫知遣六道使此所謂天下之惡皆歸焉同心招集為逆出陛下不意臣恐社稷必危讖曰代武者劉夫劉者流也陛下不登極朱斥李氏及諸大臣其家人親族流放在外以臣所料且數萬人如一旦也何啓豫心即拜考功員外郎仍知制誥賜朱紱女妓十人殺此輩臣恐為禍深焉天后納之夜中召入謂曰卿名秦授天以卿授朕與牧守有流放者殺之天后度流人已死又使使者安撫流金帛稱是與謀發敇使十人於十道安慰流者其實賜墨敇害深為酷暴其輒殺流人使並所在鎖項將至害流人處斬人曰吾前發十道使使安慰流人何使者不曉吾意擅加殺止誅嶺南一道因万國俊言更發五道使非併發十道使也之以快亡魂諸流人未死或他事繫者兼家口放還按當時病死或自以它罪流竄必無併斬之理今並從實録又舊傳十道在近地者何嘗有流人也國俊既以多殺受賞餘使或延載元年二月王孝傑破吐蕃韓思忠破泥熟俟斤等破吐蕃万泥勳沒馱城語不可曉今刪去此事諸書皆無唯統紀有之統紀又云又僧懷義為伐北道大揔管道今從舊懷義傳實録新紀皆云伐逆九月來俊臣坐贓貶史紀履忠劾奏御史中丞來俊臣犯統紀云万嵗通天元年五月監察御而彈之不果黜授顔城尉俊臣誅授右領軍衛胄曹新傳云狀有五請下獄理罪御史臺記履忠與來俊臣不協具衣冠得不誅免為民按舊傳云俊臣為履忠所告下獄長夀二年俊臣納賈人金為御史紀履忠所劾下獄當死后忠其上變尉統紀云万歲通天元年紀履忠劾奏誤也王弘義傳云延除殿中丞又坐贓出為同州參軍万嵗通天元年召為合宫年已前坐贓下獄此年又坐贓貶今從舊傳載元年俊臣貶弘義亦流瓊州是俊臣長夀二天册萬歲元年正月韋巨源貶麟州傳皆作鄜州統舊紀傳新紀表曆作鄜州今從之紀作瀛州實録唐更造明堂天堂以懷義充使又鑄銅為九鼎懷義帥舊傳云功元年九鼎始成舊傳誤也或懷義死時方鑄耳人作號頭安置之按天册万嵗元年二月懷義死神逄敏言天魔燒宫姚璹之語今從實録僉載以七寶臺散懷為二月殺僧懷義張夫人令壯士縛而縊殺之送尸白馬寺舊傳云人有發其陰謀者太平公主乳母既久頗放縱耽內習不敬宗廟四方日有叛逆防豫不暇時其侍者僧徒皆流竄逺惡處李商隱宜都內人傳云武后篡四方事宜都內人曰大家知古女卑於男邪后曰知內人曰宜都內人以唾壺進思有以諌者后坐帷下倚檀機與語問出房閣斷天下事者皆不得其正多是輔昏主不然抱小兒古有女媧亦不正是天子佐伏羲理九州耳後世娘姥有越真天子也然今內之弄臣狎人朝夕進御者久未屏去妾疑獨大家革夫姓改去叉釧襲服冠冕符瑞日至大臣不敢動大家以陰事主天然宜體取剛亢明烈以銷羣陽陽銷然後此未當天意后曰何內人曰女陰也男陽也陽尊而陰卑雖勝而陰亦微不可久也大家始今日能屏去男妾獨立天下陰得志也今狎弄日至處大家夫宫尊位其勢陰求陽也陽專妾之願在此后雖不能盡用然即日下令誅作明堂者此則陽之剛亢明烈可有矣如是過萬萬世男子益削女子益今從實録蓋文士寓言萬嵗通天元年臘月甲申封神嶽作甲申按去嵗下統紀作壬午實録壬午九日甲申十一日皆非十六日今從實録制云臘月十六日有事于神嶽長曆是月甲戌朔武攸緒棄官隱嵩山隱嵩山今從實録舊傳云聖曆中棄官一月婁師德為肅邊道行軍副揔管官尚書婁師德實録云己巳秋肅政御史大夫仍依舊知政事證聖元年吐蕃冦洮州令師為肅政御史大夫知政事如故舊傳云万嵗登封元年轉左為謬誤新傳云師德為河源積石懷逺軍及河蘭鄯廓州檢德與夏官尚書王孝傑討之按證聖年號在登封前此傳尤證聖中與王孝傑拒吐蕃於洮州今據實録延載元年一月校營田大使入遷秋官尚書改左肅政御史大夫並知政事延載元年出為營田大使万嵗通天元年一月甲寅師德為自宰相出為營田大使新書宰相表長夀二年師德平章事事婁師德充副揔管討吐蕃蓋師德之出為營田大使不解左肅政御史大夫肅邊道行軍揔管統紀云秋官尚書知政從實録新本紀宰相之職也今三月王孝傑免為庶人婁師德貶原州司馬月庚子新紀四壬寅撫州火下言孝傑等敗蓋皆據奏到之日耳二人同罪貶師德而無免孝傑日新表三月壬寅孝傑免按實録三月依實録因其軍敗終言貶官之事而已貶必同時不容隔月不知果在何日今但九月突厥冦涼州執許欽明許欽明為賊所殺按明年實録云吐蕃寇涼州都督孫萬榮殺欽明以祭天實録云吐蕃誤也正月默啜冦靈州以欽明自隨又默啜將襲吐蕃請和親乃和親朝廷不許制書至河源納言婁師德御史臺記論欽陵必欲得四鎮及益州通市河源積石諸軍謂師德曰但稽制書虜必狐疑吾乃先為之患之曰制書到彼必入寇奈何監察御史南陽張彥先時按其國按師德延載元年一月日同平章事充河源積石懷逺備虜至必不捷矣師德從之欽陵入冦果無功由是得罪於王孝傑同擊吐蕃敗於素羅汗山尋貶原州司馬是嵗吐蕃等軍營田大使萬嵗通天元年一月為肅邊道行軍揔管與師德復同平章事九月乃守納言臺記誤也復求和欽陵請割四鎮之地神功元年正月十月徐有功拜左臺殿中侍御史臣羅織人罪皆先進朝野僉載云時來俊好然後斷雪有功好出罪皆先奉進止非是自專此蓋時人狀敇依即奏籍沒徐有功出死囚亦先進狀某人罪合免敇耳若有功一一先奉進止何至三陷死刑乎今不取見俊臣所誅有功所雪往往得其所欲疑以為先進狀神功元年三月王孝傑與孫萬榮戰大敗死之云孝傑將朝野僉載尸與崖平匹馬無歸單兵莫返張鷟語事多過其實今不盡取四十萬衆被賊誘退逼就懸崖漸漸挨排一一落澗坑深萬丈田歸道閻知微爭論默啜和親啜請和遣閻知微册為舊歸道傳云聖曆初默將至單于都護府乃令歸道攝司賔卿迎勞之默啜請六胡立功報國可汗知微擅與使者緋袍歸道上言不可及默啜請為國討契丹許之默啜部衆漸盛則天遣使册為立功報州不許遂拘縶歸道突厥傳云李盡忠孫萬榮陷營府默啜將殺之元珍諌乃放之按神功元年八月姚璹左遷益州長國可汗朝野僉載云歸道為知微副見默啜不拜默啜倒懸九月丁卯以默啜不同契丹之逆遣閻知微册為遷善可汗史則與之榖帛必在此前非聖曆初也實録萬嵗通天元年實在何時今因契丹末平姚璹未出附見於此歸道在朝為則於時未為立功報國可汗也册拜此號實録無之不知的為而上言耳其事則兼采諸書可信者存之左衛郎將何得預論默啜蓋在道見知微所六月誅喬知之紀八月壬戌殺右司郎中喬知之盧藏用唐曆天授元年二月十日誅喬知之新本王武攸宜親揔戎律特詔左補闕喬知之及公參謀幃幕及陳氏别傳趙儋陳子昻旌德碑皆云契丹以營州叛建安郡年平契丹子昻集有西還至散關答喬補闕詩云昔君事胡軍罷以父年老表乞歸侍攸宜討契丹在萬嵗通天元年明北戍邊疑知之之死在神功年後但唐曆統紀新紀殺知之馬余得奉戎旃攜手同沙塞關河緬幽燕歎此南歸日猶聞車未罷也又武后云來俊臣死後不聞有反者故置於此據皆在天授元年今據子昻詩必無誤者然云猶聞北戍邊則南破家籍沒此時知之在邊蓋承嗣先銜之至此乃殺之耳朝野僉載知之以婢碧玉事為武承嗣諷人羅告之斬於市來俊臣羅織自宰相以下籍其姓名而取之云俊臣嘗朝野僉載投石遙擊倒者則先令告至暮投李昭德不中今不取以三月三日萃其黨於龍門豎石題朝士姓名以卜之令楊玄基以奚兵破孫萬榮羣賊聞之失色衆皆潰散不朝野僉載突厥破萬榮新城新城要之契丹聞新城破衆心已離唐與奚人擊之遂潰耳云為玄基等所破實録但云為玄基及奚所破不云突厥取取之今兩八月姚璹左遷豆盧欽望同三品納言武三思檢校內新表庚子狄仁傑兼此月無庚子仁傑三思除命在明年新表誤重復史欽望為文昌右相同三品舊紀傳及新紀皆無之九月魏元忠坐棄市流竄者四今從御史臺記舊傳云三被流聖曆元年正月甲子朔冬至宫按長曆此年一月壬戌實録云正月壬戌享通天唐曆統紀新本紀朔實録誤也今從二月狄仁傑勸太后召廬陵王吉頊説張易之昌宗納諸武之議將移宗社擬立武三思為儲副遷廬陵王於房世有狄梁公傳云李雍撰其辭鄙誕殆非雍所為其言曰后取别姓將為後者也天后既已許禮問羣臣曰朕年齒將衰陵諸武陰計日夜獻謀曰陛下姓武合立武氏未有天子而多聞計定言皆希旨仁傑獨退立寂無一言天后問曰卿獨國無儲主今欲擇善誰可當之朕雖得人終在羣議諸宰臣心實未厭唐德天后曰卿何以知之公曰頃者胸奴犯邊陛無言當有異見公曰有之臣上觀乾象無易主之文中察人踵之未經二旬數盈五万以此觀之人心未去陛下將欲繼下使梁王三思於都市召募一月之外不滿千人後廬陵王廬陵王為河北元帥在立為太子後且當是時睿宗為皇嗣統非廬陵王餘實非臣所知天后震怒命左右扶而去之按或者仁傑以廬陵母子至親而幽囚房陵勸召還左右則有若仁傑請以廬陵王繼統則是勸太后廢立也此固未可信全請計於天官侍郎吉頊頊曰公兄弟承恩深矣非有大功之矣談賓録曰聖曆二年臘月張易之兄弟貴寵逾分懼不享茅土之封耳除此之外非頊所謀易之兄弟泣請之頊曰於天下自古罕有全者唯有一策茍能行之豈止全家亦當不從容請立廬陵以繫生人之望易之乃承間屢言之則天天下思唐德久矣主上春秋髙武氏諸王殊非所屬意公何髙宗切託於陛下唯陛下裁之則天意乃定御史臺記曰則意乃易既知頊首謀乃召問頊頊曰廬陵相王皆陛下之子自以貴寵踰分懼不全請計於頊云云如談賔録蓋太后寵天置控鶴府頊與易之昌宗同於府供奉與昌宗親狎昌宗左右以強李氏抑諸武耳張吉非能為唐社稷謀也欲求己信諸武誅鉏李氏雖己子廬陵亦廢徙房陵故仁傑勸召還太后從之然則欲召還廬陵者仁傑之志也立為太子者張利耳若仍立皇嗣則己有何功故勸太后立廬陵為太子而宗為相王則皆誤也新狄仁傑傳云張易之嘗從容問自安吉之謀也談賔言聖曆二年及以頊為天官侍郎臺記謂睿深言此事狄梁公傳又云後經旬召公入曰朕昨夜夢與人計仁傑曰惟勸迎廬陵王可以免禍計仁傑亦安肯與易之天之意假此以示陛下安可久虛儲位哉天后曰是朕家事雙陸頻不見勝何也對曰雙陸輸者蓋為宫中無子此是上海之內悉為臣妾何者不為陛下家事君為元首臣為股肱斷在胸中卿豈合預焉仁傑對曰臣聞王者以天下為家四言無子及久虛儲位也朝野僉載云則天曽夢一鸚鵡羽毛臣安得不預焉又命扶出竟不納按於時皇嗣在宫中不得下姓也兩翅折者陛下二子廬陵相王也陛下起此二子兩甚偉兩翅俱折以問宰臣羣公默然內史狄仁傑曰鵡者陛廷曰還我廬陵相王來則天乃憶狄公之言謂之曰卿曽為翅全也魏王承嗣武三思連項皆赤後契丹反圍幽州檄朝賢子外有賢姪取捨詳擇斷在宸衷則天曰我自有聖子承我占夢今乃應矣朕欲立太子何者為得仁傑曰陛下內有王等奏不許入城龍門安置賊徒轉盛陷沒兾州則天急乃嗣三思是何疥癬承嗣等懼掩耳而走即降敇追廬陵河內山頭兵滿無容人處賊自退散按是時睿宗未為相王又仁立廬陵王為太子充元帥初募兵無有應者聞太子行北邙兩端也今采衆説之可信者存之傑若言內有賢子外有賢姪乃是懷三月己巳遣徐彥伯召廬陵王郎徐彥伯往房州召廬陵統紀云癸丑遣職方員外敇云我兒在此令內人就看州縣長吏仰數出數入無令混王男女入都醫療狄梁公傳曰後潛發內人十人至房州宣數還州縣不悟數日達京朝廷百僚一無知者舊傳曰廬陵雜陰令內人一人以代廬陵王令廬陵王衣內人衣服以舊傑慷慨敷奏言發涕流遽出廬陵謂仁傑曰還卿儲君仁傑王自房陵還宫太后匿之帳中又召狄仁傑以廬陵為言仁天以為然乃復置中宗於龍門具禮迎歸人情感恱狄梁公降階泣賀既已奏曰太子還宫人無知者物議安審是非則坐於階下曰前者所議事實非小寤寐反覆思卿所言彌覺傳曰天后御一小殿垂簾於後左右隱蔽外不能知乃命公天下之位在卿一言可朕意即兩全逆朕心即俱斃公從容理非甚乖朕意忠臣事主豈在多違今日之間須易前見以皇帝之位陛下豈得而自有也太宗身陷鋒鏑經綸四海所言曰陛下所言天下之位何得專之以臣所知是太宗文武帝寢疾權使陛下監國大帝崩後合歸冢嫡陛下遂奄有神不告勞者蓋為子孫豈為武三思邪陛下身是大帝皇后大近云云天后於是歔欷流涕命左右褰簾手撫公背大呌曰器十有餘年今議纘承豈可更異且姑與母孰親子與姪孰老與爾天子公免冠頓首涕血灑地左右扶策久不能起天卿非朕之臣是唐社稷之臣回謂廬陵王曰拜國老今日國來豈有偷人作天子廬陵王留在房州天下所悉知今日在后曰即具所言宣付中外擇日禮册公揮涕而言曰自古已后曰安可却向房陵只於石像驛安置具法駕陳百僚就迎內臣亦不知臣欲奉詔若同衛太子之變陛下何以明臣天人既知其謀洛陽至房陵往來道路甚逺豈得外人都不知之於是大呼万嵗儲位乃定按武后若密召廬陵王宫人十房州之日又於時若儲位已定豈可自三月來九月始立為乎又實録豈能構虛立徐彥伯往迎之事及有廬陵王至自嗣亦以此遜位故遷延半嵗今皆取實録為正太子蓋廬陵既至太后以長幼之次欲立之皇六月楊齊莊今從僉載舊傳實録作楊鸞莊八月突厥陷定州殺孫彥髙彥髙無它識用性惟頑愚朝野僉載曰文昌左丞孫敢詣廳事文按須徴發者於小窗內接入通判仍簡郭下精出為定州刺史嵗餘默啜賊至圍其郛郭彥髙却鎖宅門不莫與鑰匙其愚怯也皆此類俄而陷沒刺史之宅先殱焉又健自援其家賊既乘城四面並入彥髙乃謂奴曰牢關門戶曰牢掌鑰匙賊來索慎勿與恐不至此今不取曰彥髙被突厥圍城數重彥髙乃入匱中藏令奴九月壬申立廬陵王為皇太子皇太子顯充河北道行軍實録云丙子據唐曆甲戌副是先立為太子後為元帥也今從新本紀大元帥狄梁公傳亦云皇太子為元帥以公為王及善請太子外朝睿宗為皇嗣時止於宫中朝謁不出實録辛巳皇太子朝見或作廟見蓋羣臣俱於外庭朝謁耳外朝今及善始請太子與突厥默啜殺趙定等州男女萬餘人盡抄掠趙定等州舊突厥傳云默啜定恆易等州財帛億万子女羊馬而去河朔諸州怖其兵威男女八九万人統紀云河北積年豐熟人畜被野斬啜虜趙今從實録不敢追躡十月誅閻知微三族百官射之河內王懿宗去七步射一朝野僉載云則天磔知微於西市命族小兒年七八嵗驅抱向西市百姓哀之擲餅果與者仍相發皆不中怯懦如此知微身上箭如蝟毛銼其骨肉夷其九不忍害奏捨之今從實録爭奪以為戲笑監刑御史二年四月吐蕃論贊婆來降支等來降以莽布支為左實録贊婆及其兄弟莽布吐蕃將麴莽布支冦涼州與唐休璟戰未詳實録所云今刪去羽林衛員外大將軍封安國公按贊婆弟名悉多子敷論明年八月王及善為文昌左相同三品今從實録朝野僉載曰新紀表及善同平章事遷文昌右相無它政但不許令史奴驢入臺終日迫逐無時王及善才行庸猥風神鈍濁為內史時人號為鳩集鳳池俄文成惡及善毁之耳今從舊傳暫捨時人號驅驢宰相此蓋張久視元年正月戊寅武三思罷頊為琰川尉壬申三思新紀表皆云戊午貶吉三思罷日及官皆同蓋誤重復耳今從實録罷中間未嘗復入相明年十一月壬申又云吉頊貶固安尉皆云貶琰川尉今從御史臺記實録但云坐事貶流僉載新書臘月狄仁傑為內史言十月丁巳罷先時不言巨源為左新紀表庚子文昌左相韋巨源為納左丞誤為左相耳相舊紀傳皆無之蓋九月仁傑薦張柬之等崔玄暐袁恕己皆公所薦公嘗梁公傳云張東之桓彥範敬暉冀各保愛願盡本心五公心知目擊懸悟公意公寢疾五公退食之後謂五公曰所恨衰老身先朝露不得見王公盛事退出遞不測其由袁恕己曰豈不氣力轉羸須問家事乎張候問偶對終日竟無一言少頃流涕及枕但相視而已五公彥範三公入餘二公立於門外曰向者無言蓋以二公之故東之曰未有大賢廢國謀家者也斯須命張東之袁恕己桓國異而家亡也至其時或不與共之事亦不就梁王三思掌此二公能斷而不能密若先與議之事必外泄泄之後則五公潛會於幽間之處敘公當時之言重結盟約徹饌之後權可先收而後行也不然則必反生大禍狄公沒後經嵗餘乃敘其言言猶未畢聞戶牖之外聲若雷霆須臾風雨咫尺相顧欲言未至其時恐負前諾欲言又止前後數四相彥範此是狄公忠烈之至假此靈變以驚衆心不欲吾輩先論此莫辨所坐牀褥悉擲於階下王公戰懼不知所據乃相謂曰既誅袁謂張公曰昔有遺言使先收三思豈可捨諸張公曰事未至其時不可復言也斯須天清日明不異於初易之等公果為所譛俱遭流竄所期興廢年月遺約軌模少無異也但大事畢功此是機上之物豈有逃乎後梁王交通於內五舉此五人專欲使之輔立太子邪且易之等若有可誅之便按東之等五人偶同時在位協力立功仁傑豈能豫知其事然後發邪此蓋作傳者因五人建興復之功附會其事云皆太子有可立之勢仁傑身為宰相豈待五年之後須柬之等取舊傳惟著舉柬之彥範暉三人姓名今從之仁傑所舉受教於仁傑耳其言譎怪無稽今所不十月韋安石逐蜀商而告人曰此真宰相非吾屬所及也舊傳曰時鳳閣侍郎陸元方在坐退罷相今不取按新紀元方已長安元年正月改元大足人秋分後無計可作乃於圓獄朝野僉載云司刑寺囚三百餘推問云昨夜有一聖人見身長三丈面作金色云汝等並寃外羅牆角邊作聖人迹五尺至夜半三百人一時大呌內使即大赦天下改為大足元年識者相謂曰武家理天下足也枉不須怕懼天子萬年即有恩赦放汝把火照之見有偽迹秋又無赦今不取按改元在春不在三月王求禮不賀雪統紀云左拾遺僉載云侍御史御史統紀在延載元年僉載在久視二年之味道不從今年從僉載官從臺記事則參取諸書臺記云殿中侍御史統紀云味道無以對舊傳云求禮止九月太后逼邵王重潤等令自殺構與其妹永泰郡主壻重潤傳云重潤為人所得恣入宫中則天令杖殺今從實録魏王武延基等竊議張易之兄弟何十一月命蘇頲按覆來俊臣等舊獄常召宰相蘇瓌李松窗雜録曰中宗二兒曰爾宜意所通書可為奏吾者言之頲應曰木從繩則嶠子進見二丞相子皆童年迎撫於赭袍前賜與甚厚因語心上曰蘇瓌有子李嶠無兒按頲此年已為御史瓌為相時正后從諫則聖嶠子亡其名亦進曰斫朝徏之脛剖賢人之樞密非童年也今不取頲為中書舍人父子同掌三年七月癸卯朱敬則同平章事十四日癸卯今從之新紀云壬寅唐曆云戊申相王旦為雍州牧未今從實録唐曆十八日丁烏質勒與西突厥相攻烏折勒今從新舊書武平一景龍文館記作九月蘇安恆上疏理魏元忠張易之等欲殺之朱敬則等保救得免客必不遣人知敬則等安能保護蓋舊傳云易之欲遣刺客殺之若遣刺殺之耳欲白太后鄭杲謂宋璟奈何卿五郎果乃髙祖時人新舊傳皆新舊傳皆作鄭善杲按善史臺記誤當從御八月甲寅韋安石檢校楊州長史午今從實録唐曆云五日戊十二月辛未楊元嗣告張昌宗問占相四年秋元嗣實録云長安一月丁亥承慶始為鳳閣侍郎今從唐曆告之太后令鳳閣侍郎韋承慶推鞫按十太后敇宋璟出使璟不行使後當列狀誅璟按易之等御史臺記云易之昌宗兾璟奏請收禁昌宗故太后欲遣璟出以散其事耳璟必欲收禁若果可以列狀誅璟則何必待其出使然後為之此蓋璟方行太后豈不能以拒違制命罪之邪又云時璟家禮會易之故辭不肯行太后自省理屈故不迫遣耳不然璟若無事不有其迹璟安得不自陳於太后若無其迹則人妄言耳今不取等伺其夕以刺之有密告璟者乘庫車于它所而免按若實璟按張昌宗太后遣使赦之收按易之等按璟止鞫昌御史臺記唐曆舊傳並云按易之則天陽許尋敇宋璟使幽州按都督屈突仲翔令司宗占相事耳無緣及易之今所不取舊張易之傳云宋璟請登時出使按璟傳云特敇原易之仍令詣璟謝則是昌宗赦禮卿崔神慶希旨雪昌宗兄弟唐曆云桓彥範上疏不報璟當是璟執正其罪而神慶寬之耳非璟出使後神慶始鞫之免時璟在都不出使也實録云令韋承慶崔神慶與璟推鞫相違今從御史臺記也舊宋璟易之傳自資治通鑑考異卷第十一
