body:
  text: 臣司馬光奉勑編集唐紀十二元和八年三月丙辰杖殺僧鑒虚曆二月乙酉朔三實録在二月按長入知政事十一日也實録脫不書月耳月甲寅朔丙辰三月三日甲子武元衡七月李光進請修受降城降城兼理河防又云以中實録云李光進請修東受坦與李絳叶議以為西城張仁愿所築不可廢三者不同莫受降城及所管騎士一千一百四十人隷于天徳軍舊傳盧屬振武有鎮兵四百人其時割屬天德交割惟有五十人人知孰是今但云受降城所闕疑也又李司空論事云中城舊百四十人是三城都數耳數如此不同或者一千一九年閏八月丙辰吳少陽薨丑下壬辰上而并元濟實録少陽卒在九月己凡四十日不為輟朝唐紀張弘靖請為少陽廢朝贈官而實焚舞陽言之統紀舊紀少陽卒皆在九月按舊傳曰少陽卒十二日耳豈容四十日不輟朝乎今從新紀録辛丑贈少陽右僕射然則己丑至辛丑才十月崔潭峻監軍今從舊傳實録作談峻十年三月劉禹錫為播州刺史攺連州和十年自武舊禹錫傳元子詩語涉譏刺執政不恱復出為播州刺史禹錫集載其詩陵召還宰相復欲置之郎署時禹錫作遊玄都觀詠看花君切除逺州刺史不止禹錫一人豈緑此詩蓋以此得播州惡曰玄都觀裏桃千樹盡是劉郎去後栽按當時叔文之黨一陛下孝理之風憲宗曰為子尤須謹慎恐貽親之憂禹錫更處耳實錄曰中丞裴度奏其母老必與此子為死别臣恐傷曰朕所言是責人子之事然終不欲傷其所親之心明日攺合重於它人卿豈可以此論之度無以對良乆帝攺容而言天下至如禹錫誠合哀矜憲宗乃從之明日制授禹錫連州授禹錫連州趙元拱唐諫諍集度曰陛下方侍太后以孝理元劉禹錫至京城俄而柳為柳州刺史劉為播州刺史柳以旣而語左右裴度終愛我切趙璘因話録曰憲宗𥘉徴柳宗錫有老親上曰但要與郡豈繫母在裴晉公進曰陛下方侍劉須待親播州最為惡處請以柳州換上不許宰相對曰禹將拜䟽而未上耳非已上而不許也禹錫除播州時裴度未太后不合發此言上有愧色劉遂攺爲連州按栁宗元墓誌録及諫諍集為相今從實六月盜殺武元衡斬張晏等李師道客潛匿亡去有鎮卒張晏輩數人行止無狀人多意之詔録付御史臺御舊張弘靖傳曰初盜殺元衡京師索賊未得時王承宗邸中於上前言之憲宗不聽及田弘正入鄆按簿書亦有殺元衡史陳中師按之皆附致其罪如京中所說弘靖疑其不直驟道將訾嘉珍問察皆稱害武元衡者然則元衡之死必師道者但事曖昧玄有所說卒未得其實按舊吕元膺傳獲李師衡故時人皆指承宗耳今從薛圖存河南記所為也但以元衡叱尹少卿及承宗上表詆元七月李師道遣賊謀焚東都宫闕嘉珍果於東都留河南記曰賊帥訾有小過被笞責之遂使兄弟一人告河南府當時飭兩縣驅後院潛召募一百餘人兼造置兵仗部署已定㑹門子健兒面矢下如雨俄然殄滅因縱火焚其院宇悉為煨燼今從實録丁壯悉持弓矢刀棒圍興道坊院數重賊黨迫蹙遞相蹂四九月韓弘欲倚賊自重不願淮西速平鎭汴州當舊傳曰弘烏重胤實當旗鼓乃授弘淮西諸軍行營都統弘雖居統帥兩河賊之衝要朝廷慮其異志欲以兵柄授之而令李光顔危國邀功如是按弘承宣武積亂之後鎭定一方居彊宼之常不欲諸軍立功隂爲逗撓之計每聞獻捷輒數日不怡其始末未甞失臣節朝廷若疑其有異志而更用爲都統則光間威望甚著若有異志與諸鎭連衡跋扈如反掌耳然觀其有何狀可尋恐毀之過其實耳今從其可信者顔重胤更受其節制非所以防之也且數日不怡十一年十一月柳公綽杖殺神策將穆宗朝爲大京柳氏敘訓曰公上顧左右曰爾輩大須作意如此神采我亦怕也因話録曰兆有禁軍校冐騶卒唱駐馬斃之翌日延英對上云云朝退陛下奬擢軍中偏禆躍馬衝過此乃輕陛下灋不獨試臣臣憲宗正色詰公專殺之狀公曰京兆尹在取則之地臣初授京兆尹此事恐非穆宗所能爲叙訓之誤也今從因話録杖無禮之人不打神策軍將按公綽憲宗穆宗朝俱甞爲十二年正月淮西人輕李愬不爲備勇長筭推誠舊傳曰愬沈襲蔡表請濟師詔以河中鄜坊騎兵二千人益之鄭澥平蔡待士故能用其卑弱之勢出賊不意居半嵗知人可用乃謀鐵城新興之敗人心皆惴恐不敢言戰公佯曰戰爭非吾所録曰正月二十四日甲申公至所部先是士卒經萬勝蕭陂其說乃使觀察判官王擬請師闕下詔徴義成河中鄜坊馬能旣而隂召大將計其事是時公以表請徑襲元濟人皆笑丁士良降吴秀琳是不待半歳然後知人可用舊傳恐誤然步共二千以𥙷其闕据此則是始至便請益兵又二月即擒人皆笑其說則是人人知之恐非也今不取愬密謀襲蔡豈可先洩之而云以表請襲元濟九月愬斬淮西將孫獻忠今從平蔡録舊傳作孫忠憲蔡之精兵皆在洄曲時曲按李光顔傳云董重質弃洄舊元濟傳李祐曰元濟勁軍多在曲子弟歸求寒衣然則元濟傳誤當為洄曲曲軍李愬傳云分五百人断洄曲路又云洄十月辛未李愬襲蔡州鄭澥告期於裴度十日夜以舊愬傳曰其月七日使判官三千殿而行元濟傳曰十一月愬夜出軍令李祐為前鋒其李祐率突將三千為先鋒愬自帥中軍三千田進誠以後軍判官鄭澥告師期於裴度按先七日即是平蔡録所云八日十日夜至蔡州城下實録曰愬以十月將襲蔡州先七日使傳十一月愬出軍尤誤裴度傳十月十一日李愬襲破懸瓠甲子也而愬傳誤云七日而又云十日夜師軍行亦誤元濟所得賊將自文城因天大雪疾馳百二十里即十五日也又城擒元濟亦誤按十月戊午朔韓愈平淮西碑云壬申愬用也實録己卯執元濟乃奏到日也今從平蔡録曰用夜半到蔡破其門取元濟以獻即十六日十三年正月李師道謀逆命髙沐與郭昈李公度諫之李愿者非幕僚同諫者也今從河南記新傳又有郭航名按航乃牙將昈所使詣十一月田弘正度河距鄆州四十里築壘云營於河南記今從實録陽穀西北十四年四月皇甫鎛之黨擠裴度相李逢吉令狐舊傳曰鏄與宰東川楚在昭義皆不為相今不取楚合勢擠度故出鎮按逢吉時在十五年正月帝暴崩時人言陳弘志弑逆云上崩實録但逆史氏諱而不書王守澄傳曰憲宗疾大漸内官陳弘慶等于天明宫之中和殿舊紀曰時帝暴崩皆言内官陳弘志弑崩新傳曰守澄與内常侍陳弘志弑帝於中和殿裴廷裕東弑逆憲宗英武威徳在人内官祕之不敢除討但云藥發暴暴崩然兹事曖昧終不能測其虛實故但云暴崩觀奏記云宣宗追恨光陵啇臣之酷郭太后亦以此十月王承元年二十卒年三十三則於今年二十矣今舊傳作年十八按承元大和七年録從實鄭覃崔郾等諫宴樂畋游酒坐朝常晩郾與同列鄭覃舊崔郾傳曰上即位荒於禽春秋富盛稍以畋遊聲色為事公晨朝正殿揮同列進而言等延英切諫上甚嘉之畋遊稍簡杜牧郾行狀曰穆宗皇帝自山巳東百城千里昨日得之今日失之西望戎壘距宗廟曰十一聖之功德四海之大萬國之衆之治之亂懸於陛下氣直天子為之動容歛䄂慰而謝之按是時未失山東杜牧十舎百姓憔悴蓄積無有願陛下稍親政事天下幸甚誠至傳承而用之皆誤也今從實録舊傳直取穆宗時事文飾以為郾諌辭耳新丁公著對宴樂非佳事伎因云上甞召公著問云云舊實録明年二月景子觀神策雜此誤也今因覃等諫荒宴事言之紀遂云其日上歡甚顧公著云云李光顔救涇州在十四年今從實録舊傳光顔救涇州事十一月鄭覃宣慰鎮州王承元與柏耆諭諸將承舊定舊鄭覃傳曰王承元移授鄭滑鎮之三軍留承元不能赴元傳曰承元與柏耆召諸將於館驛諭之斬李寂等軍中始至宣詔諭以大義軍人釋然聴命按實録辛亥田弘正奏今鎮承元乞重臣宣諭乃以覃爲宣諭使初鎮卒辭語不遜覃未能到鎮州作傳者推以爲覃功耳今從承元傳月九日王承元領兵二千人赴滑州討覃於時猶穆宗長慶元年二月劉緫乞弃官爲僧曰長慶元舊温造傳九州聴朝㫖穆宗選可使者或薦造乃拜起居舎人充太原年奉使河朔稱旨遷殿中侍御史旣而幽州劉緫請以所部示以禍福緫俯伏流汗若兵加於頸矣及造使還緫遂移家鎮州幽州宣諭使造初至范陽劉緫具櫜鞬郊迎乃宣聖旨慰使二月己卯劉緫奏乞爲僧計造奉使尚未還三月癸亥入覲按實録長慶元年正月己巳以造爲太原鎮州等道宣四面諸軍宣慰使造前以京兆司録宣慰兩河衆推其材故緫已卒八月丁亥以殿中侍御史温造爲起居舎人充鎮州傳誤也有是命舊三月緫以印節授張玘兄爲涿州刺史緫之妻父也按新傳曰緫以節付張臯臯玘之僧不知所在然則不以節付臯也實録幽州留後張玘奏緫以剃髪爲四月詔黜鄭朗等甲科此蓋言其始者登科耳鄭覃傳曰朗長慶元年登進士七月幽州軍亂殺張宗元厚今從實録舊傳作張宗又殺張徹處之後數日軍人恐徹與弘靖為謀將移之他實録徹到職纔數日軍人不之殺與弘靖同館使廻軍人以其無過不欲加害將引置館中徹不知其心遂所徹自疑就戮因抗聲大罵復遇害舊傳曰續有張徹自逺官至范陽府監察御史長慶二年今牛宰相為中丞奏君為索弘靖所在大罵軍人亦為亂兵所殺韓愈徹墓誌曰徹累發半道有詔以君還之至數日軍亂怨其府從事盡殺之而御史其府惜不敢留遣之而密奏臣始至孤怯須彊佐乃濟中貴人自京師至君謂其帥公無負此土人上使至可因請囚其帥且相約張御史長者無庸殺置之帥所居月餘聞有皆駭曰張御史忠義必為其帥告此餘人不如遷之别餘即見自辯幸得脫免歸即推門求出守者以告其魁魁與其徒日李師道斬於軍中同惡者父母妻子皆屠死肉餧狗䑕鴟以衆出君君出門罵衆曰汝何敢反前日吳元濟斬東市昨以死君抵死口不絶罵衆皆曰義士義士或收瘞之以俟据鵶汝何敢反行且罵衆畏惡其言不忍聞且虞生變即擊君書各不同按此月丁巳弘靖已貶官月餘則離幽州矣今從舊傳徹以弘靖囚時𬒳殺實録云後數日墓誌云居月餘三以墓誌實録參再貶張弘靖吉州刺史年乃攺撫州今從實録舊傳貶撫州刺史按明田弘正遣魏兵歸湊傳云六月魏兵還鎭崔倰傳曰遣舊弘正傳云七月歸卒於魏州王庭而鎭州亂今從之魏卒還鎭不數日十一月薛平斬馬廷崟也長慶元年詔徴數道兵馬且河南記曰韓國公之節制靑州兵部内隊長有馬士端者殺其首領遂驅所部士卒兼招召問罪於常山平盧發二千餘人駐於無棣臨當回戈青州所駐議除討大將等進計曰彼賊者兇頑一卒無經逺之謀可令迫脅比到博昌已萬餘人便謀入青州有日矣韓公聞之便懈然無備可伏甲而虜之韓公大然其策於是賊心不復疑紿以尚書已赴闕亭三軍將吏皆延頸以待留後賊必信之於我圍信旗一麾步騎雲合賊衆驚擾不知所為悉皆降伏貳翌日引兵而來遂於城北三十餘里三面伏兵賊衆果䧟明立簿書三千二千各屯一處霜刀齊發蟻衆湯消二萬餘遂令投戈釋甲驅入靑州矯令還家待以不死遂條其數目於城北於是具列其狀以上聞旋除左僕射据實録作馬廷人同命一日賊帥馬士端潰圍奔走尋於鄒平渡口追獲磔明年二月平加僕射舊傳云封魏國公河南記作韓公恐誤崟舊傳作馬狼兒河南記作馬士端今名從實録事從舊傳二年正月白居易言諸道兵計十七八萬七八十白集作十七八萬誤耳萬計無此數恐是二月元稹同平章事侍郎翰林學士李德裕為御史中實録以御史中丞牛僧孺為戸部畫欲定兩河方欲出師而卒継之元衡裴度而韋貫之李逢丞舊李德𥙿傳元和初用兵伐叛始於杜黃裳誅蜀吉甫經裴度而德𥙿於元和時乆之不調逢吉僧孺宗閔以私怨恒吉沮議深以用兵為非而韋李相次罷相故逢吉常怒吉甫頗欵密逢吉之黨深惡之其月學士出為御史中丞按德𥙿排擯之時德裕與李紳元稹俱在翰林以學識才名相類情南豈能排擯德裕蓋出於德裕黨人之語耳今不取元和中揚歴淸要非為不調此際元稹入相逢吉在淮裴度為司空東都留守都留守實録此云司徒後領舊紀傳皆云度守司徒為東留守及領淮南乃為司徒蓋實録此月誤紀傳遂因之新傳淮南及拜相皆云司空新書度自檢校司空為守司空東都止是守司空舊裴度傳又曰元稹為相請上罷兵洗雪廷湊後云司徒亦誤今据實録除淮南及拜相制書自此至罷相子雪廷湊辛已稹為相蓋稹未為相時勸上也克融解深州之圍蓋欲罷度兵柄故也按此月甲劉悟諷軍士作亂衆辱悟又縱其下亂灋悟不能平異實録監軍劉承偕頗恃恩侵權甞對困辱矣軍衆因亂悟不止之遂擒承偕殺其二傔欲并害承日有中使至承偕宴之請悟悟欲往左右皆曰往則必為其師以問代節度事悟知之以兵圍監軍殺小使其屬賈直言偕悟救之獲免新劉悟傳曰承偕與都將張問謀縛悟送京牧上李司徒書亦云其軍大亂殺兹州刺史張汶又云汶旣質責悟悟即撝兵退匿承偕囚之新直言傳張問作張汶杜必出於悟志及奏朝廷則云軍衆所為耳今承偕名從實録因依承偕謀殺悟自取軍人忌怒遂至大亂蓋軍士圍承偕杜書汶名從三月王智興逐崔羣事未行詔班師智興帥衆斬關而實録羣累表請追智興授以它官授智興旄鉞寢不報智興回戈城内皆是父兄開關延入金入舊智興傳亦同舊羣傳則曰羣以智興早得士心表請因之兼取李光顔乞歸許州賊帥連結未可朝夕平定事若差跌舊光顔傳曰光顔以朝廷制置乖方鎮朝廷果以討賊無功而赦廷湊今從實録即前功悉弃乃懇辭兼鎮尋以疾作表祈歸四月張平叔請官自糶鹽韓愈韋處厚言不可録實按韓愈時奉使鎮州猶未還又壬寅三月十一日愈論鹽灋因三月壬寅平叔遷戸部侍郎事遂言變鹽灋及處厚駮議何月也今附於四月之末狀云奉今月九日敕不知其五月于方客王昭于友明明舊元稹傳作王友明今從實録初作于友明後作于啓及新書實録之初李賞告于方結客刺裴度素不協度自太原入朝而惡舊裴度傳曰初度與李逢吉兵部尚書度旣復知政事而魏弘簡劉丞偕之黨在禁中逢度者以逢吉善於隂計足能構度乃自襄陽召違吉入朝為皆為之助五月左神策軍奏告事人李賞稱于方受元稙所吉用族子仲言之謀因毉人鄭注與中尉王守澄交結内官術甚多何必召逢吉又如所謀則稹當獲罪非所以害度也使結客欲刺裴度按惡度者不過元稹與宦官彼欲害度其逢吉非所以自謀也蓋賞自告耳非逢吉教令也又逄吉若使李賞告之下御史按鞫賞急必連引七月壬辰宣武軍亂逐李愿奏六月四日夜軍亂節實録戊戌汴州監軍使李愿若以六月四日夜被逐不應至此月十日方奏到京師度使李愿踰城以遁新紀亦云六月癸亥李睿反逐李愿按此奏到日今從愿傳七月四日疑實録十字誤為六舊紀止用九月竇易直誅王國淸及其黨二百餘人傳曰時舊易直州兵謀亂先事有告者乃收國淸下獄其黨數千犬呼入獄江淮旱水淺轉運司錢帛委積不能漕國淸指以為賞激諷亂者每獲一人賞千萬衆喜倒戈擊亂黨擒國清等三百餘中簒取國淸而出之因欲大剽易直登樓謂將吏曰能誅為今從實録人皆斬之十二月立景王湛為太子悆宰臣議立敬宗為皇太劉軻牛羊日曆曰穆宗不王守澄將不利於上又使楊虞卿漢公輩宣言於外曰王守子時牛僧孺懐異圖欲立諸子僧孺乃昌言於朝曰梁守謙處路傍或苑内草間削白而書之冀謀大亂其兇險若此此澄欲謀廢立又令其徒於街衢門墻上施牓每於穆宗行幸言不足信也出於朋黨之三年三月牛僧孺同平章事李德𥙿出為浙西觀察使成于方獄六月元稹裴度俱罷逢吉代裴度為相旣舊德裕傳曰初李逢吉自襄陽入朝乃密賂纎人􅌟懼紳與德裕禁中沮之九月出德裕浙西尋引僧孺同平章得權位鋭意報怨時德裕與僧孺俱有相望逢吉欲引僧孺怨逢吉未必皆出逢吉之意也事繇是交怨愈深蓋徳裕以此疑五月柳公綽誅舞文吏有名馬人爭畫為圖圉人絜其柳氏叙訓曰公為襄陽節度使可措公曰有良馬之貌含駑馬之性必殺之有齊縗者哭且蹄尾被蹴致斃命斬於鞫場賓吏請曰圉人備之不至良馬召軍候擒之破其十二柩皆實以稻米時歳儉鄰境尤甚人獻狀曰遷三丗十二喪于武昌為津吏所遏不得出公覧狀士乃在鄂岳時事叙訓舊傳皆誤也察齊衰者乃是閉糶非以為神明之政按韓愈與公綽書曰殺所乗馬以祭踶死之不取美事今七月南詔勸利卒立豐祐佺進其國信歳末又云南實録九月辛酉南詔王立立佺者蓋誤也今從新傳詔請立蒙勸利之弟豐祐云九月李逢吉結王守澄子仲言之謀因鄭注與守澄潜李讓夷敬宗實録曰逢吉用族續皆逢吉藩僚時又新爲右補闕續爲度支貟外郎劉昫承結上於東宫且言逢吉實立殿下上深德之又曰張又新李多端守澄見之甚恱自是逢吉有助事無違者其李訓傳則之爲逢吉傳亦言逢吉令仲言賂注求結於守澄仲言辯譎使訓因鄭注結王守澄然則逢吉結守澄乃在文宗時非穆云訓自流所還丁母憂居洛中時逢吉爲留守思復爲相乃李讓夷乃李德裕之黨惡逢吉欲重其罪使與李訓鄭注皆宗時也二傳自相違逢吉結守澄要爲不誣然未必因鄭注之爲逢吉藩僚乃在逢吉再鎭襄陽後於此時未也今不取有連結之迹故云用訓謀因注以交守澄耳又張又新李續十月李紳爲戸部侍郎倖自以望輕頗忌朝廷有名之穆宗實録曰紳性險果交結權常指鈞衡欲逞其私志時宰病之因以人情上論諫官歴獻士及居近署封植已類以樹黨援進修之士懼爲傷毒􅔂之是拜人情憂駭此蓋修穆宗實録者惡紳故毀之如是今從䟽方有江西之命行有日矣因延英對辭又泣請留侍故有實録敬宗四年二月韋處厚上䟽救李紳李逢吉用事素惡李處厚傳曰敬宗即位得減死貶端州司馬今從實録處厚上䟽在紳貶端州後紳乃構成其罪禍將不測處厚乃上䟽云云帝悟其事紳三月劉栖楚叩頭諫晚朝為惡無近刑意者旣能為近實録曰莊周云為善無近名逢吉擢而用之蓋取其鷹犬之効耳夫諫諍之道是豈能知名之善即必忍為近刑之惡栖楚本王承宗小吏果敢有聞之為新室也時危事迫不得不然故忠臣有死諫之義至如之乎即如比干剖心當文王與紂之事也朱雲折檻恐漢氏豈在暴揚面數激訐於羽儀之前致使上疑死諫為不難謂上年少嗜寢坐朝稍晚蓋宰臣密勿諫官封事而可止者也之況諫辭皆羣黨所作而使栖楚道之哉賣前直而資後詐細事皆當碎首從此遂不覽章䟽卒有克明之難實栖楚兆惡栖楚而彊毀之邪今所不取殊可歎駭桉李讓夷此論豈非四月八關十六字數蒙引接詢訪得失否臧人物其聞按宰相之門何甞無特所親愛之士品目以相譏誚此乃古今常態非獨逢吉之門有八關十六忠邪溷殽固亦多矣其踈逺不得志者則從而怨疾之巧立不如意亦恐未必然但逢吉之門險詖者為多耳此皆出於子也舊逢吉傳以為有求於逢吉者必先經此八人納賂無之士何得為佞邪之黨哉蓋讓夷徳裕之黨而栖楚為逢吉李讓夷敬宗實録按栖楚為吏敢與王承宗争事此乃正直詆之耳所善故深敬宗寶曆元年正月牛僧孺為武昌節度使松續皇甫外郎耳穆宗丗因承和薦不三二年位兼將相憲宗仙駕至牛羊日曆曰太牢旣交惡黨潜豫姦謀太牢乃元和中青衫館兩司出鎮未盡佩相印而太牢同平章事出夏口夏口去灞上以從百召知制誥當時宰臣未盡兼職而獨綜集賢史里去兄弟羞赧乃令攺醮旣與前夫義絶矣及貴請以出母節十五年由太牢而加節焉太牢早孤母周氏冶蕩無檢郷也妻者是不為白也母而李清心妻配牛㓜簡是夏矦銘所追贈禮云庶氏之母死何為哭於孔氏之廟乎又曰不為伋使其母為失行無適從之鬼上罔聖朝下欺先父得曰忠孝謂魂而有知前夫不納於幽壤殁而可作後夫必訴於玄穹太后為沈婆此乃無君甚矣此朋黨之論今不取智識者乎作周秦行紀呼德宗為沈婆兒謂睿眞皇八月庚戍劉悟暴疾薨子從諫匿䘮賈直言責之是日便死故置此餘從杜牧書据李絳䟽云悟八月十日得病計十一月李絳請除昭義師李逢吉王守澄不用其謀王守澄受其賂曲為奏請事有無難明今不取實録從諫以金幣賂當權者舊從諫傳曰李逢吉二年正月張權輿言裴度名應圖䜟曆𥘉度連上章舊逢吉傳曰寶來張權輿撰非衣小兒之謡傳於閭巷言度相有天分名應請入覲逢吉之黨坐不安席如矢攅身乃相與為謀欲沮其謡言當更加以惡言不止云天上有口𬒳驅逐而已蓋民閒謡䜟而韋處厚於上前解析言權輿所撰之言按權輿若撰名應謡䜟非撰之也先有此謡權輿因言度十一月癸卯百官謁見江王甲辰見諸軍使文宗魏謩不云别日今從敬宗實録實録見軍使事承見百官下文宗大和二年閏月亣志沼討李同捷于志沼或實録或作志沼新紀傳作亣志沼今從之作开志沼或作亣志紹舊紀作开馬植勛之子勛事見德宗實録舊傳勛作曛誤也三年五月壬寅加李載義平章事庚寅誤實録作貶柏耆循州司戸祐疑其詐柏耆請以騎兵三百入滄州實録四月李祐收徳州同捷請降于祐皇乗險縱恣指揮彈壓奏報蔑聞擅入滄州專殺大將補置祐從之耆徑入治收同捷與其家屬赴京師又詔曰假勢張上不獲已貶循州司戸新傳曰同捷請降祐使萬洪代守滄逆校潜送兇渠舊傳曰滄德平諸將害耆邀功爭上表論列師旣行諜言王廷湊欲以竒兵劫同捷耆遂斬其首以獻諸州同捷未出也耆以三百騎馳入滄以事誅洪與同捷朝京張皇邀功則有之然諸將疾之而論奏文宗不得已而貶黜將疾耆功比奏攅詆文宗不獲已貶耆循州司户參軍蓋耆亮奏其受同捷奴婢綾絹故也亦其實也至於賜死則因馬國六月王庭湊請納景州之亂庭湊據有之同捷旣平庭按景州本隷横海蓋因李同捷進之也湊懼而復魏博軍亂殺史憲誠奉何進滔知留後進滔下令曰新進滔傳曰凡斬九十餘人釋脅從者素服臨哭將吏皆入弔詔拜留後公等旣迫我當聽吾令衆唯唯孰殺前使及監軍者䟽出之傳蓋據柳公權進滔德政碑云公謂將士曰旣迫以為長當按進滔結王庭湊以拒李聽又襲擊聽大破之安能如是新姓名仍集之於庭無使漏網卒獲九十三人白黑旣分善惡謹而聽承命都將緫事者諭之曰害前使與監軍兇黨籍其將吏序弔此恐涉溢美之辭耳今從舊傳無誤會衆顯戮共弃咸恱公於是素服而哭十二月南詔䧟成都外郭杜元穎保牙城及子城實録㓂圍清溪關十二月丙辰奏官軍失利蠻䧟卭州至此乃云宼元穎方斍知按實録十一月丙申元穎奏南詔入宼乙巳奏似尤之太過今不取及子城元穎方覺知四年二月李絳為亂兵所害遣人迎說軍士曰將收新傳曰楊叔元素疾絳握節登陴或言縋城可以免絳不從遂遇害實録絳召諸卒募直而還為民士皆怒乃譟而入劫庫兵絳方宴不設備遂請辭監軍者而監軍使楊叔元貪財怙寵素怨絳之不奉已以詔旨諭而遣之發廩麥以賞衆皆怏怏而退出壘門衆有薄激之散卒遂作亂今從之與絳為隙乆矣至是因以賞六月裴度為司徒平章軍國重事時猶守司空自後寶曆二年度入相是殊寵又云宜其首賛機衡弘敷敎典蓋此時方遷司徒實未甞遷官至此實録直言司徒裴度按制辭云遷秩上公式裴度誤也録先云司徒五年二月宋申錫引王璠為京兆尹七月為京兆尹按舊璠傳去年罪時京兆尹乃崔琯也十二月遷左丞故申錫得五月李德𥙿索南詔所掠百姓得四千人南備邊德𥙿西又遣人入南詔求其所俘工匠得僧道工巧四千餘人復歸録曰南詔以所虜男女五千三百六十四人歸于我舊傳曰四千人今從之成都按實録云約八月牛僧孺言得維州未能損吐蕃僧孺語曰今舊僧孺傳載卿劉元鼎使吐蕃回文宗實録大和六年三月吐蕃遣論董論董勃纔還劉元鼎未至按穆宗實録長慶二年八月大理孺墓誌亦無董勃等名蓋舊傳誤也勃藏入見不言元鼎再奉使杜牧僧六年三月回鶻昭禮可汗為其下所殺子胡特勒立月二十七日薨已冊親弟薩特勒廢朝三日今從新傳舊傳云七年三月回鶻李義節等將駞馬到且報可汗二七年正月劉從諫歸鎮心輕朝廷劉從諫朝覲渥澤𥙷國史曰文宗朝諫廣行金帛賂諸權要求登台席人情多可相國李公固言甚厚自謂河朔近無比倫頗矜臣節文武百辟盡湊其門從館不敢導其誠懇遇休假謁於私第投誠瀝懇至於再三相獨無一言從諌欲市其歡王不可染欲諛其意水不可穿門之後僕射擅領戎務坐邀朝命朝廷以先君勲績不絶賞延公正色謂曰僕射先君以東平之功鎭潞二十餘年及即丗國僕射若請邊陲一鎭大展籌謀拓境復疆乃為勲業朝廷任居蕃閫位劇南宫豈是恩澤降於等倫欲以何事効忠報射英雄忠義首冠蕃臣今求佩相印擁節旄榮歸舊藩亦河豈不以衮職之重命賞封功區區躁求一何容易某比謂僕噤口無詞再拜趨出然從諫厚賂倖臣旬日間果以本官加朔尋常倔疆之臣所措履也忠節安在深為解體從諫矍然盛勉報國恩幸望保家勿殃後嗣從諫以笏叩額灑淚而辭平章事遽辭歸鎭宰相饑於郵亭李相公謂曰相公少年昌峻直貞明凛然可懼眞社稷之重臣也按固言此年未為相及至本鎭謂從事將校曰昨者入覲闕庭遍觀朝德唯李公今從實録其說妄也徐州卒驕髙瑀不能制厚聞名能治軍事舉動汗流拜杜牧上崔相公書曰髙僕射寛筆快耳未必然也于堂下此蓋文士七月加楊志誠檢校右僕射以含垢下詔諭之因再遣舊傳曰朝廷納裴度言務陽節度使舊傳恐誤今從實録使加尚書右僕射按此時度為襄九月王守澄奏鄭注為神䇿判官金吾將軍孟文亮開成紀事曰五年御史大夫王從亮薄其為人不為之礼注毀從亮於守澄竟出鎭邠郊以與注姻懿之故奏為軍司馬路經奉天防遏使軍晝恃澤潞劉從諫本欲誅注忌其權勢因辟為節度副使為守澄誣􅌟決杖投荒未幾文亮殁罷職還城守澄潜置為闕偶遭其時聖體獲愈上恱之自此恩寵漸隆凡臺省府縣纔至潞州涉旬之閒㑹上乖愈大和七年十一月驛徴之赴敕使外連朝臣兩地往來上射財貨晝伏夜動于竊化權人軍戎莫不從風七年九月十三日侍御史李𣢾彈奏注内通其鄭注請付有司時王涯重處台司注之所致又慮守澄黨不敢言道路以目城社轉固恐為禍胎罪不容誅理合顯戮年春暮上對宰臣歎天下無名醫便及鄭注精於服食或欲援遂寢不行注潜遁軍司矣李德𥙿文武兩朝獻替記曰八願此職守澄遂託從諫奏為行軍司馬及赴職宗閔又自山寘於翰林伎術院或欲令為左神䇿判官注自稱衣冠皆不諌要約令却薦入今從實錄南令判官楊儉至澤路與從資治通鑑考異卷第二十
