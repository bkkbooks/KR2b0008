body:
  text: 臣司馬光奉唐紀十九元化元年正月韓建為修宫闕使無眺覽之所表献城實錄建以行宫卑庳其叔父豐見其䟦扈謂建曰汝陳許閒一民乗時危乱位至南别墅建初修南莊起楼觀䟽池沼欲為南内行廢立之事覆族在旦莫矣吾不如先自裁免為汝所累由是建稍弭其方鎮不能感君父之恵而欲以同華兩州百里之地行廢立駕建懼故急營葺長安率諸道助役而又親程功焉按建若志及李茂貞表請助營宫苑又聞朱全忠繕治洛陽累表迎營南内今不取欲廢立何必先九月羅􅀪信薨皆云􅀪信八月卒按八月昭宗還京􅀪信薛居正五代史梁紀􅀪信傳太祖紀年錄從之實錄十月約奏到也猶加官舊紀傳九月卒今十月王珙殺王柷無年月今因珙伐河中事附此柷為給事中并遇害舊紀實錄皆十一月崔洪以弟賢為質節制遣兄賢質於汴按舊紀十囯紀年洪託以將士不受請以弟賢質于汴許之實錄亦云弟賢今從之十月汴將張存敬以兵襲蔡州刺史崔洪納􅅃二年三月朱全忠遣丁㑹下澤州復取澤州按編遺實錄丁巳葛從周錄三月周德威敗氏叔琮於洞渦驛先是逆温令丁㑹將兵錄丁巳河橋丁㑹收復澤州實錄云從周誤也唐太祖紀年我澤州梁實錄薛史梁紀皆云六月方遣從周入潞州紀年助李罕之戍潞州至是葛從周復入潞州以代丁㑹賊復陷言後事耳錄於此連六月葛從周代丁㑹守潞州疾甚請㱕河陽丁卯上令編遺錄六月乙丑李罕之入潞薛居正五代史梁紀六月帝表丁會為潞州節度使以抽大軍迴以丁㑹權制置綏懐上黨上乃東歸不言遣從周會梁實錄後唐紀皆云代㑹自此至潞州破賀德倫走不復李罕之疾亟故也又遣葛從周由固鎮路入于潞州以援丁從周代之不可知也今因㑹鎮潞終言之見會名或者李罕之既卒復召㑹守河陽以三年七月李嗣昭敗汴軍於内丘月嗣昭攻堯山至唐太祖紀年录七紀與紀年錄同惟唐末見聞錄八月二十五日嗣昭領馬歩内丘遇汴軍三千戰敗之擒其將李瓌薛居正五代史後唐日嗣昭兵士失利却回新紀八月庚辰陷洺州薛史唐紀九五萬取馬嶺進軍下山東某月山東告捷收得洺州九月二日上於毬􅂣饗士忽有大風驟起占者曰賊風果於是時李月嗣昭弃城歸蓋據此也按編遺錄八月中云前月二十五編遺錄又曰八月乙丑出兵救洺州乙丑九日也又進通敗進通領蕃寇出攻洺州然則嗣昭出兵乃七月二十五日也今從編遺錄紀年錄梁紀奔歸太原在八月見聞录誤八月嗣昭敗汴軍于沙門河進通領蕃寇出并川來攻編遺錄七月二十五日李翌日達滑臺軍前馳報洺州已陷刺史朱紹宗因踰堞墮而洺州八月乙丑發大軍救應之上尋亦自領衙軍相継北征門河擊而敗之進攻洺州刺史朱紹宗挈其族夜遁我師追傷足為賊所擒唐太祖紀年錄八月李嗣昭又遇汴軍於沙山東告捷收得洺州捉得刺史朱温姪男舊紀八月庚辰嗣及擒之唐末見聞錄八月二十五日嗣昭進軍下山東某日紀亦在庚辰乃二十五日也實錄在九月約奏到今從編遺錄昭攻洺州下之薛史梁紀八月河東遣李進通襲陷洺州新九月葛從周大破李嗣昭州嗣昭弃城而歸是役也王唐太祖紀年錄葛從周攻洺昭兵士失利却㓜被汴州捉到王郃郎編遺錄薛居正五代郃郎楊師悦陷賊洺州復為汴有唐末見聞錄九月二日嗣人懼而宵遁洺州復平唐紀九月汴帥自將兵三萬圍洺州史梁紀八月帝遣葛從周屯黄龍鎮親領中軍渉洺而寨晉嗣昭弃洺州敗於青山口今從唐末見聞錄唐紀實錄嗣昭弃城而歸葛從周伏青山口嗣昭軍不利實錄九月十月馬殷克桂州志楚世家皆云光化二年殷克桂州唐烈祖實錄新唐書本紀路振九國故事云天復甲子宣晟自安州入桂州天祐四年丁卯十二馬氏行年記及王舉大定錄云天復元年惟曹衍湖湘馬氏光化三年升桂管經畧使為靜江軍節度而本紀乾寧二年月收嶺北七州明年十月平桂州差繆極甚新唐書方鎮表政死之歳月既已倒錯又以士政為元静部將同死尤為乖安州防禦使宣晟陷桂州靜江軍節度使周元靜部將劉士位五歳而桂林歸欵自乾寧三年至光化三年五年矣又與誤今據武安節度掌書記林崇禧撰武威王廟碑云我王臨故從之實錄合十一月庚寅劉季述等廢立庚寅六日也廢立之者舊按此月乙酉朔己丑五日錄新紀云己丑誤也唐太祖紀年錄先云六日後云七日尤紀云庚寅舊宦者傳唐年補紀皆云六日無云五日者而實年錄云脅之以兵是也唐補紀云皇后穴牆取太子又云令誤也崔􅅌所恃者昭宗耳季述議廢立安肯即從之補錄紀聖上養疾皆程匡柔爲官者諱耳不可信也旨宣告大臣與社稷爲主又云后白軍容令解崔􅅌度支等使崔􅅌但罷知政事落使務守本官而舊傳劉季述畏朱全忠之强不敢殺絳河中按舊紀新紀新宰相表此際皆無􅅌罷相事全忠攻已􅅌復致書於全忠請出師返正故全忠令張存敬急攻晉年返正後今不取晉絳河中乃在明十二月李振勸朱全忠討季述傳十一月太祖遣振薛居正五代史李振事既至巖乃先啓曰主上嚴急内官憂恐左中尉欲行廢黜入奏於長安邸吏程巖白振曰劉中尉命其姪希貞來計大祥非敢聞也况梁王以百萬之師匡輔天子幸熟計之希貞敢以事告振顧希貞曰百歳奴事三歳主亂國不義廢君不殿以立㓜主振至陜陜已賀矣護軍韓彛範言其事振曰懿大沮而去振復命劉季述果作亂程巖率諸道邸吏牽帝下欲爾邪彛範即文約孫也由是不敢言編遺錄上雖聞其事皇初昇遐韓中尉殺長立㓜以利其權遂亂天下今將軍復梁欲潛謀返正乃遣李振偵視其事振迴益詳其宜也尋馳未知摭實但懐憤激丁未上離定州軍前十二月戊辰達大為帝仍遣其養子希度來言願以唐之神噐輸於帝時帝方蔣􅀇暉與崔􅅌宻圖大義薛史梁紀李述幽昭宗立德王裕於帝云云帝悟因請振復使于長安與時宰潛謀返正按季在河朔聞之遽還于汴大計未㳏㑹李振自長安使回因言返正乎今從編遺錄又按唐太祖紀年錄及舊張濬傳皆云述廢立之前李振若已嘗立異今豈敢復入長安與崔􅅌謀與紀年錄及舊傳相違恐梁實錄誤振傳據實錄也唐補紀濬勸諸蕃匡復而梁實錄及李振傳皆云濬勸全忠附中官蜺背璚崔􅅌覩其不祥便謀内變濳行書檄於関外播􅀭辭曰自監國居位將及五旬牋表不來朝野驚虞亢旱時多虹覆早宜别圖無何季述以此書示于崔􅅌曰比來同匡社禝舌於街衢朱全忠封崔􅅌檄書并手札等與季述云彼已翻圖刻蠟偽名自古乃有軍容若行怪怒則乞附存家族季述却為鬬亂藩方不審相公何至於此􅅌唯云無此事遭人反撓尊聽却􅀩封示左軍劉公其人已知意㫖今日與􅅌設盟乃與言誓相保始終􅅌其夜便致書謝全忠云昨以丹誠諮二取匹全忠覽書大詬曰劉季述我與伊同王事十二三年不川損害然逺託令公為主方應保全兼送女僕二人細馬是難容我若不殺此公不姓朱也乃擲於地其使者走一健兄弟之故特令報渠不能自謀却示崔相道我兩頭三面實外挾全忠與宦官為敵今昭宗既廢􅅌所以得未死者以與歩直申崔公從兹與大梁同謀大事按崔􅅌曏來内倚昭宗髓若得此書立當殺􅅌豈肯復以示􅅌而與之盟誓也此殊全忠親宻故也全忠安肯以其書示季述季述恨􅅌深入骨黨宦官疾􅅌之辭耳不近人情皆程匡柔天復元年正月全忠封東平王書令進封梁王薛居正舊紀二月以全忠守中癸巳沛郡王朱全忠加定謀宣力功臣進封東平王新紀二五代史梁紀正月癸巳進封帝為梁王酬返正之功也實录三年二月制云兔苑名邦睢陽奥壤光膺簡册大啓封疆可月辛未封全忠為梁王按編遺錄此年二月辛未表讓梁王受改封東平王至三年乃進封梁王而三年制辭前官爵已守太尉中書令進封梁王或者今年已曽封梁王全忠讓不也令從實錄稱梁王蓋誤崔􅅌留岐兵三千宿衛覲留二千人在右街侍衛而回唐補紀曰其月八日李茂貞朝朱全忠又闇以車子載噐仗稱是紬絹進奉推車子人皆是崔􅅌申朱全忠請三千人在南坊宅側安下鳯翔刼駕西去全忠不到新傳韓全誨等知崔􅅌必除已乃已因諷茂貞留官健入崔􅅌宅中人心驚惶不同前後崔􅅌累差人喚召朱南司以婁敬思領之蓋取唐補紀耳按韓偓金鑾宻記偓對選士四千宿衛以李継徽緫之􅅌亦諷朱全忠内兵二千居兵是兵不肯去臣曰其初何用召來又􅅌曰且喜岐兵只留昭宗云當留兵之時臣五六度與崔􅅌力爭􅅌曰某實不留錄編遺錄薛居正五代史梁紀等諸書皆不言全忠嘗遣兵三千人據此則是􅅌召茂貞入朝而留其兵也又舊紀梁實昭宗欲西幸時兩道兵必先鬬於闕下不則汴兵皆為宦官宿衛京師若如唐補紀所言岐卞各遣兵數千人戍京師則宦官深疾崔􅅌未足信也然􅅌所以欲留茂貞兵為己援者所誅不則先追去今皆無此事蓋程匡柔得於傳聞又黨於疾宦官以利誘之遂復與宦官為一耳今從金鑾記蓋以茂貞自已誅劉季述為己功必能與己同心讎二月李克用修好於朱全忠月差軍將發往汴州為使唐末見聞錄乾寧四年六去歳青山又擒列將又云鎮定歸欵浦晉求和則非乾寧四其書云云汴州回書云云據全忠書有前年洹水曽獲賢郎中仍詔與太原通和初朝廷以全忠吞併河朔又收下蒲津年明矣唐年補錄天復元年五月壬午制以朱全忠兼領河全忠漸强先以書聘全忠書辭與見聞錄同全忠荅太原書必恐兵起相侵乃下詔太原夷門使務和好時太原意亦以為各爭言氣又云但以來書意指未息披攘又云臣詳兹來又進表云臣與太原曽於頃歳首締歡盟及其偶掇猜嫌止訖續寶運錄載全忠表云臣當道先自河府抽軍便赴太原意益切憤懐不敢遂與通和必恐有孤朝寄已遣諸軍進討東都李克用差到專使張特與臣書一封并馳馬弓箭銀噐進討已累具狀分析聞奏訖臣今月二十三日部領牙隊到回兵士即勒權於河陽屯駐見排比收復路州便邐迤赴太匹段等與臣通和其張特臣且與迴書放歸訖當月河府抽月奏其年三月二日表到駕前奉襄宗三月八日敕云云云原進討次其李克用與臣書一封謹隨狀封進天復四年二持執檄厚幣而來釋憾亦差軍將持函以為報又曰辛巳上天復四年尤誤也編遺錄天復元年二月李克用遣軍將張其事奏聞語與補錄同唐太祖紀年錄天復元年六月太祖欲比回軍便征北虜近者李克用以甘言重幣請通和好遂幣馬書檄以諭之請復舊好書詞大陳北邊五部士馬之盛以梁寇方彊難以兵伏陽降心以緩其謀乃遣押衙張特持薛居正五代史梁紀天復元年二月李克用遣牙將張特來皆吾外援朱温視之不懌令敬翔修報詞㫖踈拙人士嗤之襲吉為書以貽梁祖書辭與見聞錄同其年月日各參差不聘帝亦遣使報命李襲吉傳天復中武皇議欲修好於梁命河陽抽軍赴太原又云二十三日到東都則克用書達全忠同據全忠荅太原書云今月二十二日使至又上表云先自旬今從編遺錄梁紀必在天復元年二月下五月氏叔琮等自石會関歸克用遣張特齎書請尋懽編遺錄四月壬戍上以李兼并州地寒節􅀱甚晚戎馬既多野草不足於芻牧尋令氏盟乃指揮諸軍所在且駐留見差發專人入太原許通懽好紀班師在四月後唐紀汴軍退在五月蓋全忠以四月命班叔琮迴戈後唐太祖五月氏叔琮及四面賊軍皆退薛史梁陽故國史記之各異也師而叔琮等以五月離晉六月癸亥朱全忠如河中帝發自大梁今從編遺錄薛居正五代史梁紀庚申閏月丁會為昭義節度使以疾致政於洛陽梁祖季年薛居正五代史㑹傳自河陽天復元年梁祖奄有河中晉絳乃起㑹為昭義節度使按光猜忌故將功大者多遭族滅㑹隂有避禍之志稱疾者累年表孟遷為節度使時罕之已卒必是㑹却領河陽至此纔二化二年六月㑹自河陽為昭義節度使九月李克用取潞州疑㑹降河東後作傳者誤以天祐中事在前言之耳年則非致政稱疾累年也又是時全忠未嘗誅戮大將崔􅅌召朱全忠􅅌之謀時􅅌專掌三司泉貨韓全誨教禁唐太祖紀年錄㑹汴入寇同華宦者知崔徇衆情罷崔􅅌知政事崔􅅌怒急召朱温請以兵師入輔唐兵伺􅅌出聚而呼譟訴以冬衣減損軍人又上前披訢天子云全忠得此書詔便發河中還汴按是時全忠未寇同華􅅌補紀時朱全忠在河中􅅌潛作急詔令全忠入朝又修書云誤今從唐補紀亦未罷紀年錄十月全忠舉兵發大梁詔赴長安是時朝廷軍囯大政薛居正五代史十月戊戌奉宻盡去之全誨等屬垣聞之中官視崔眥裂以重賂甘言誘蕃專委崔􅅌崔每事裁抑宦官宦官側目崔一日於便殿奏欲誨等教禁兵於昭宗前訢之昭宗不得已罷崔知政事崔急臣以為城社時因讌聚則相向流涕時崔專掌三司貨泉全前崔􅅌未罷相此與太祖紀年錄略同亦誤召太祖請以兵入輔故有是行按帝幸鳯翔丁酉宫禁諸門増兵防守崔公傳語明日請相看侵早按金銮記二十日入直隔夜日事實錄己亥差人把門己亥乃二十一日實錄誤也到門崔出御札相示然則添人把門及降御札皆十九日十一月壬子韓全誨等劫上幸鳯翔月朱全忠發士馬續寶運錄其年十扈從其皇后王氏及百官太子玉印龍服並是汴州迎在華十一月入長安聖上幸鳯翔宰臣裴諗翰林斈士令狐渙等入京劫掠街西諸坊寶貨士女至甚及七日汴州士馬入京州相次修東都宫室旋迎赴東都其年十一月初鳯翔士馬開化坊其説妄謬今不取赴救長安士庶並走攢在乙卯全忠取華州歸投上於西溪亭子與建飲膳畢却歸編遺錄上引兵逼華州韓建輕騎出牆及華州建來降甲辰署建權知華州事仍以宣武牙推龔麟赤水營旬日乃請建充忠武節度使梁太祖實錄乙卯大軍紀同州刺史王行約閉城登壘全忠斫開城門屠之不留噍佐之唐太祖紀年錄丙辰汴軍攻華州九日建以城降唐補許州便仰衣錦乃差人押出関東舊傳建令李巨川至河中類華州韓建聞此出城三十里迎之只於迎處云令公本貫辰帝表建權知忠武軍事促令赴任實錄乙卯全忠取華州送􅅃敬翔疾其文筆勸全忠害之薛居正五代史梁祖紀丙誤也全忠乙卯取華州丙辰豈能遽至武功唐補紀又云昭丙辰次武功徙建為忠武節度使按此月無甲辰蓋丙辰字時奔波西去按行約乃克用取同州時節度使也程匡柔妄宗不知崔􅅌偽行詔命聞朱全忠平陷兩州十一月三日亥祖實錄李巨川死從昭宗實錄謬多此類今取華州日從梁太崔􅅌請全忠迎駕帝在岐下無輔臣自漢魏以來喪乱未編遺錄于時長安無人主朝廷無敕畫水薛居正五代史梁紀己未發赤水按唐太祖紀年錄朱温若今日􅅌請王溥自西京至赤水請上進軍迎駕戊午離赤軍前商議實錄云胤東寓華州又云胤召溥至赤水皆誤也至長樂崔胤帥百官班迎編遺錄胤請王溥自西京至赤水迎駕今從之發赤水日從編遺錄舊紀亦云胤令溥至赤水促全忠戊辰全忠至鳯翔忠軍至城下按全忠癸亥離長安乙丑實錄乙丑全忠駐軍岐城之東丙寅全從編遺錄新紀丙寅至岐太速今辛酉全忠移兵趣邠州夜二更却迴云軍大衂汴令有金銮記曰十七日早聞岐師昨光啓可諫議大夫參知機務二十日翰林斈士姚泊兼知外表迎駕并述行止汴軍在岐東下寨十八日十九日白麻盧軍離發延英門舊紀癸酉全忠辝去今從編遺錄制誥二十四日汴令有表奉辝東去二十五日汴崔胤責授工部尚書稱又曰無功及人爲囯生事按舊寔錄載制辝曰四居極位一無可錄前云罷胤塩鐵使至此制官位中復帶塩鐵使皆誤傳前云罷知政事落使務後云同平章事塩鐵轉運使實二年二月戊寅全忠旋軍河中二月戊寅上以久駐兵寔錄在正月按編遺錄太祖實錄正月戊申朔上揔御戎馬發自三原復至武功縣車於三原乃議東歸蒲阪遂取高陵櫟陽左馮入于蒲津梁坂今從唐年補錄舊紀駐焉貢章奉辝迴軍赴蒲三月李嗣昭李嗣原等勸李克用固守嗣昭與今上日唐太祖紀年錄悉出友寧以飛騎犯其左右翼虜大敗北掩殺不知其数擒夜入賊營斬將塞旗賊多驚擾梁太祖寔錄三月癸丑虜衆北隅攻其西門城内大恐克用欲奔雲中弟克寧止之又遣克用男延鵉及將校健卒数千人寔錄朱友寧圍太原營西遁按紀年錄所謂今上者乃明宗非莊宗也寔錄誤李嗣昭與克用子存朂日夜擾賊營友寧乃燒營而李儼張濬之子儼齎御札自巫峽間道潜行宣告吳王楊唐補紀二年昭宗在鳯翔遣金吾將軍李為都統討太原退軍朝貶韓建力救不赴貶所只在三峯其行宻為討伐逆賊朱全忠事李儼者宰臣張濬男其張濬先張濬一門尽遭殺戮按此年濬未死儼陽姓李見此年十月註男行在乃授金吾將軍昭宗差來宣告於吳王行宻朱全忠探知五月己未朱全忠發河中敗迴戈傷中不少八日聞四金銮記五月三日歧馬歩軍雞下寨二十三日聞汴帥至石鼻又至横渠二十四日聞汴靣百姓尽般移入城内二十一日聞汴帥於郿縣築城及寶遊兵耳實錄據金銮記云癸亥朱全忠引軍至石鼻乙丑至帥至城南十里按編遺錄六月全忠始離渭橋此蓋全忠下師城南誤也横渠己巳駐六月丁亥全忠圍鳯翔辛未文通涸兵驟出布陣俟敵梁太祖實錄六月丁丑暨虢縣徙寨逼其壘自是岐人継出師靡不喪衂六月乙亥上以盩我之將卒躍進決闘始辰暨午寇大敗屍仆万餘人命諸軍勍領兵内大散関取鳯州按六月乙亥朔無辛未前云丁丑厔有博野軍與岐人往來以窺我命李暉討平丙戌復遣孔月皆誤從唐實錄後云辛未又再云六十月李儼至楊州仕唐為御史奉使楊州聞長水之禍改十囯紀年注李昊蜀書張格傳云弟休家校書郎遷右拾遺濬為朱全忠所害播自長水奔鳯翔昭姓名曰李儼九囯志云李儼本左僕射張濬之少子名播起於諫省俾銜命於敝藩授秩執金賜編属籍新舊唐書昭宗宗賜其姓名來使欲徵兵復讎行宻與朱全忠書云選張述來使時濬猶未死述與休自相乱或一名潘乎寔錄是日始紀及濬傳皆云天復三年十二月全忠殺濬於長水然則儼行宻書則儼父在時已賜姓李宣諭行宻為討全忠明年春以儼為江淮宣諭使以行宻充呉王東靣行營都統誤也據留淮南不敢歸朝耳全忠既克鳯翔儼遂朱全忠遣司馬鄴奉表入城午對全忠使司馬鄴薛居實錄庚辰司馬酆奉表壬事於昭宗再入復出寔錄作酆誤也正五代史司馬鄴傳大軍在岐下遣奏十一月孔勍拔坊州又取鄜州勍李暉領兵襲鄜州以牽編遺錄十二月癸酉遣孔知鹿畤軍事不数日周彛乃遣幕賔投分通好然上許抽兵李周彛之兵己亥我師攻陷鄜牆獲周彛親族遂令李暉權老聃祠之下上命孔勍李暉乘虚捷取之壬子勍等破中部梁太祖實錄十一月癸卯鄜帥李周彛統州兵万餘人屯于己亥近六十日鄜汴相守豈得全不交兵今從唐梁二實錄郡甲寅大雨雪大軍冒之夕進五鼓及其壘克之按癸卯距盧光稠陷韶州按十國紀年歐陽脩五代史光稠傳開平新紀是歳光稠卒牙將李圖自稱知州事新紀誤也五年方卒三年正月丙午王師範遣劉鄩取兖州牙將劉鄩陷全舊紀丙午青州婁敬思唐太祖紀年錄是月四日青州帥王師範將劉鄩竊忠之兖州又令牙將張厚入奏是日亦竊發於華州殺州將竊發燔其郛殺華州指揮使婁敬思而去新紀丙午師範取據兖州同日師範將張厚輦戈甲十乘至華為華人所詰因我兖州唐實錄亦在丙辰按長厯丙午正月四日丙辰十四兖州梁太祖实錄丙辰青州綱將亂于華而敗是日劉鄩陷與紀年錄等同梁太祖实錄多謬誤恐難據今從諸書移置日編遺錄云魏師及朱友寧告急劉鄩正月四日襲陷兖州天復二年尤誤丙午唐祖補紀云戊申誅韓全誨等等二十人首級告諭四鎮兵士囬鑾舊紀丁巳蔣􅀇暉與中使押送全誨翔李茂貞殺其子継筠觀軍容韓全誨張彦􅀪樞宻使袁易之期新紀正月戊申殺全誨等唐太祖紀年錄正月甲辰鳯鑾記六日誅全誨等唐年補錄正月癸卯賜朱全忠詔唐補簡周敬容等二十二人皆斬首囊盛押領出城以示朱温金金鑾記實錄新紀按金鑾記唐年補錄唐實錄從唐紀年录紀云天復三年二月誅全誨等八人其全誨等伏誅日今從金鑾記云是夜處置内官一十九人唐年補錄云全誨以下載六日所誅宦官名可見者全誨等四人處延等十六人而云二十二人首新傳云継筠継誨彦弼皆伏誅是夜誅内諸二十二人首級紀年錄云殺全誨等二十二人北夢瑣言亦數宦官則少二人若如金鑾記是夜又誅十九人則多一人司使韋處廷等二十二人若并継筠等數之則多一人若只名不見歟或者二人車駕幸全忠營脱呼梁祖曰全忠為吾繫鞋梁祖不得王禹偁五代史闕文曰昭宗佯為鞋系右擒梁祖以殺之其如無敢動者自是梁祖被召多不至其已跪而結之流汗浹背時天子扈蹕尚有衛兵昭宗意謂左方脱茂貞虎口託身全忠豈敢遽為此謀或者欲効漢高祖後盡去昭宗禁衛皆用汴人矣按全忠時擁十萬之衆昭宗不能辦耳今不取之折黥布亦恐昭宗庚午全忠殺第五可範等數百人可範已下七百人並舊紀辛未内官第五五十人太祖紀年錄内諸司百餘人及隨駕鳯翔羣小二百賜死於内侍省金鑾記二十八日處置第五可範已下四百誅第五可範等八百餘人與内侍省梁太祖實录己巳翌日餘人一時斬首于内侍省舊傳與紀年錄同新傳􅅌全忠議搜索處置以盡厥類唐年補錄云誅宦官七百一十人按舊誅宦官第五可範等五百餘人于内侍省仍命畿内及諸道運錄金鑾記唐年補錄薛居正五代史梁紀新唐紀或云己紀編遺錄皆云正月辛未誅可範等而梁實錄唐補紀續寶務追監軍赴闕其實即日已擅誅之至二月癸酉始下詔賜巳翊日或云二十八日今從之蓋全忠􅅌雖奏云罷諸司使而祭之耳死故昭宗哀二月陸扆言鳳翔獨無詔書降詔書獨鳳翔無詔扆奏舊傳帝還京後赦諸道皆書或赦前扆議如此故􅅌怒耳云云按是時未赦恐止是降詔蘇檢盧光啓賜死州唐太祖紀年錄初從幸鳯翔命盧光實錄檢光啓並賜自盡一説檢長流環之不一月皆貶謫之左遷陸扆沂王􅀓王溥太子賔客蘇檢啓韋貽範為相又命蘇檢平章事及車駕還宫􅅌積前事怒百餘人並賜自盡新紀朱全忠殺蘇檢盧光啓舊􅅌傳昭宗自盡續寶運錄二月五日應是岐王駕前宰臣盧光啓等一之新光啓傳云檢長流環州光啓賜死與寶運錄注同檢流初幸鳯翔命盧光啓韋貽範蘇檢等作相及還京􅅌皆貶斥本出何書環州不見輝王祚為諸道兵馬元帥云云新傳帝十七子德王􅁉金鑾記上曰朕以濮王處長禛瓊王祥端王禎豐王祁和王福登王禧嘉王祐頴王是蔡棣王祤䖍王禊沂王禋遂王禕景王祕輝王祚祈王祺雅王無端王禎以下七人按新舊傳昭宗諸子皆無濮王孫光憲王祜何皇后生􅁉及祚餘皆失母之氏位舊傳云昭宗十子忠冊紃為天子改元天壽明年禪位於梁此乃光憲傳聞謬續通厯濮王名紃昭宗之子母曰太后王氏哀帝被殺朱全記所云濮王蓋德王改封耳誤也昭宗亦無王皇后金鑾朱友􅁉為鎮國節度使賜名感化軍以友􅁉為節度使實錄壬辰以興德府復為華州並宜停薛居正五代史地理志華州梁為感化軍梁功臣傳按編遺錄天祐三年閏十二月乙丑敕鎮囯之號興德之名囯軍留後今從實錄天復三年友􅁉權知鎮五月雷彦威陷江陵成汭赴水死陷江陵今從編遺錄新紀彦威之弟彦恭陷將士亡其家皆無鬬志按新紀十國紀年皆云壬子汭敗舊紀及薛居正五代史十囯紀年皆云汭未至鄂渚江陵已江陵今不取北夢瑣言云天祐中汭死尤誤也死壬子此月十二日也而編遺錄云二十二日陷許德勲還過岳州鄧進忠降荆南振旅還遂入岳州降馬氏行年記天復三年自忠帥其衆來降許德勲傳云天祐二年領兵畧地荆南還經刺史鄧進思九國志楚世家天祐二年七月岳州刺史鄧進事言開平中收荆南囬進忠以城降又載何致雍天策寺碑岳州刺史鄧進忠以城歸附新紀全用九國志年月湖湘故月朱全忠謀討襄州趙匡疑九月克襄州始命楊師厚攻荆銘云乃克桂林乃襲荆渚彼岳之陽旋師而取天祐二年十年成汭敗死德勲及雷彦威襲江陵還取岳州與何致雍碑南然則七月許德勲何繇略地荆南蓋九國志之誤天復三行年記為据意略同故以朱友寧屠博昌友寧討之三月己酉先温至汴州大舉四唐太祖紀年錄師範之舉兵也朱温令朱攻城之衆死者大半俄而朱温至大怒斬其主將復起土山錐魏博之衆十萬擊師範朱友寧楊師厚攻博興旬餘不下青州别將攻北海渡膠水寇登萊等郡實錄據此而置於四翌日而拔城中無少長皆屠之仍毁其垣四月進陷臨淄傅破青州之博昌臨淄二邑殺戮五千餘衆暨北海焉編遺錄月梁太祖實錄四月丙子上至鄆領事辛卯從子友寧率師範逆狀己未上又往歴下壬戌上以兵士攻取博昌寨下少五月辛亥却離歴下宿豐齊驛甲寅上到汶陽乙卯奏王師客將劉捍謀曰捍請馳赴軍前傳諭上意敦將士令戮力速樹木時當炎毒却勒親從騎兵皆歸齊州因又前行夜將半往上乃西歸汶陽丙寅捷音至攻拔博昌盡戮其黨矣據此攻必可剋也今請上却歸歴下上悦而從之便令捍馳騎東月今從友寧傳則破博昌在五八月田頵舉兵叛楊行宻矯制削奪王官爵命頵及杜洪十國紀年朱全忠聞田頵等叛舊紀實錄梁太祖紀皆無削奪行宻命洪等爲招討使事今鍾傳錢鏐充四面招討使布制書於境上王知其詐妄按新取不九月楊師厚大破王師範勵衆決鬬青人大敗北走殺戮梁太祖實錄九月癸卯楊師厚人將援青壘我師邀截翦撲無一二存焉即時徙寨逼其闉一萬人擒師範弟師克翌日東萊郡遣州兵洎士團等五千臨朐北及青州四殺破賊黨擒斬頗衆至十一月萊州闍唐實錄略與此同編遺錄冬十月丁卯楊師厚繼告捷於之殺戮將盡下又有丁亥上誕辰聞朱友倫死誕辰乃十月刺史王師克領六千人欲徑入青丘助其守禦師厚伏兵邀一月是十一日字或七日字又曰一日師範請降疑脱二十二十一日友倫死亦十月中事也下又别有十一月疑上十午也今從梁實錄字二十一日即戊甲寅朱全忠如洛陽遇疾復還大梁實錄云十月丁卯梁實錄云壬戌唐編遺錄朔今從戊午王師範降全忠十一月師範降編遺錄曰十一月敗舊紀及薛居正五代史劉鄩傳皆云降按梁太祖實錄薛史梁紀唐實錄皆云九月戊午今從之萊州刺史王師克一曰師範差人捧􅅃檄至軍前請舉牆歸十月丁丑劉鄩降全忠州來降舊紀十一月鄩以兖州降梁實錄四年正月辛丑劉鄩自兖傳曰天復三年十一月師範告降且先差鄩領兵入兖州請實錄十一月鄩降薛居正五代史梁紀十一月丁酉鄩降鄩州叛附于朱全忠按青兖相距不逺師範之降亦以告鄩豈釋其罪亦以告鄩鄩即出城聽命新紀十月丁丑劉鄩以兖至兖州邪十月丁丑日差近今從新紀有自戊午至丁酉五十日師範使者始辛巳朱友倫卒十四自朱友倫墜馬而卒十四日則庚辰編遺錄丁亥趙廷隠自長安馳來告今月紀昭宗實錄皆云辛巳今從之也後唐紀年錄薛居正五代史十二月劉仁恭擒述律阿鉢傳皆云光啓中守光禽舍薛居正五代史及莊宗列未得幽州也今從薛史蕭翰傳及王曍唐餘錄利王子其王欽德以重賂贖之按是時仁恭猶天祐元年正月柳璨同平章事召璨入内殿草制敕􅅌舊傳崔􅅌得罪前一日以新傳曰崔􅅌死昭宗宻許璨相無知者日暮自禁中岀死之日既夕璨自内出前驅傳呼相公來人見制莫測所除平章事新舊傳云􅅌死後誤也傳呼宰相人大驚按􅅌未死璨已朱全忠殺崔􅅌圖王之䇿又曰天子還宫全忠東歸􅅌以舊傳全忠攻鳯翔􅅌寓居華州為全忠畫茂貞為辤全忠知其意從之令州軍人入關應募者數百事權在己慮全忠急於簒代乃與鄭元規謀招致兵甲以扞突然而出唐太祖紀年錄曰及事權既大知朱温懐簒奪之人及友儉死全忠怒遣其子宿衛軍使友諒誅􅅌而應募者私心漸異與元規宻為計畫倍招兵數繕治鎧甲朝夕不止志慮一朝禍發與國俱亡因圖自安之計與朱温外貌相厚每日教閲弓弩梁卒偽示怯懦或倒弓背矢有若不能􅅌莫朱温察之乃隂令部下驍果數千給為散卒於京師應募􅅌幸荆襄温乃抗言􅅌將交亂天下傾覆朝廷宜急誅之無令之識俄而朱有倫打毬墜死温愈不悦又聞􅅌欲挾天子出未行温子友諒引兵攻􅅌詰旦擒之又攻鄭元規於京府擒事發天子將罷􅅌知政事貶太子賔客鄭元規循州司户事隂狡險躁其罪固多然本召全忠欲假其兵力以除宦官耳之崔鄭俱獻首岐下實錄􅅌重世宰相而志滅唐祚按崔􅅌圖全忠故全忠覺而殺之若云唐室因􅅌而亡則可矣舊傳宦官既誅全忠兵勢益彊遂有簒奪之心􅅌復欲以譎詐并􅅌仕唐以為上相滅唐立梁於己何益假令􅅌實有此志則云􅅌為全忠畫圖王之䇿實錄云􅅌志滅唐祚恐未必然也歸焉者也紀年錄序朱崔之情近得其實今從之然紀年錄惟患全忠簒代之不速何故復謀拒之此所謂天下之惡皆兵何必更令汴卒應募若在訓練之際突出擒􅅌猶須此卒云傳首岐下誤也又全忠之去長安也留歩騎萬人何患無多或能圖已故使汴卒應募察其動靜以壊其謀非藉北兵􅅌既貶官家居一夫可制安用此計邪蓋全忠以􅅌募兵既際皆突出人方知是汴卒耳以誅􅅌也人始不知及誅􅅌之二月乙亥車駕至陜遣士庶出京朕將翌日命駕壬戌襄梁實錄丁巳詔以今月二十二日先蹕陜郡翌日上來覲于行在編遺錄正月丁酉上聞闕下人宗發自秦雍甲子暨華州二月丁卯上至河中乙亥天子駐崔􅅌死是時皆崔􅅌已下潛諫帝不令東遷雒陽又宻與心不遑遂往河中以審巴動静己酉離梁園行至汜水聞屬車離長安是日丁巳王鑾東指癸丑到甘棠二月乙亥上岐鳯交通及斯禍也洎上至蒲津帝謀東幸決取二十一日朝辤明日東邁唐太祖紀年錄丁巳下詔與梁實錄同又曰離河中丁丑到陜郊戊寅朝上欲躬往洛下催促百工壬辰州丙子朱温自汴州迎覲見已先發自此人使相望于路請壬戌昭宗發長安遷幸洛陽丁卯車駕次華州乙亥駐蹕陜彦卿奉表請車駕遷都洛陽丁巳車駕發京師癸亥次陜州駕早行幸洛陽舊紀正月己酉全忠率師屯河中遣牙將寇薛居正五代史梁紀正月辛酉帝發自大梁西赴河中京師全忠迎謁于路二月丙寅朔乙亥全忠辤赴洛陽親督工作及還宫至暮全忠已移書宰臣裴樞促百官東行是日下詔聞之為之震懼唐年補錄丁巳帝御延喜樓全忠迎扈表至仍起豪民從行貧者亦繼焉車駕以其月二十三日己未至與梁實錄同尋以張延範為繟營使便毁折宫室㳂河而下下其差舛如此實錄丁巳全忠遣牙將寇彦卿奉表言慮邠華州二月丙寅車駕駐陜郊又曰三月三日戊辰車駕離華寅朔丁卯次華州時朱全忠屯河中乙亥駐陜州丙子全忠岐兵士侵迫請車駕遷都洛陽乃下詔與梁實錄同二月丙兵士擁脅朕東去新紀正月戊午全忠遷唐都于洛陽二月來朝又賜王建絹詔云正月二十日朕登樓二十二日東軍實錄所載詔書皆云二十二日遣士庶出京朕翌日命駕而戊寅次陜州朱全忠來朝按梁實錄唐紀年錄唐年補錄唐紀年宜得其實而正月一十一日丁巳全忠請遷都表始至諸書月日各不同莫有與此詔相應者編遺汴人所錄比唐棠首尾七日太似忽遽實錄全用紀年錄正月二十六日始長安車駕當日豈能便發長安去陜猶八程而癸亥巳到甘故同以十日至陜差似相近今從之離長安二月二日至華州駐留數日三月全忠奏以長安為佑國軍軍令京兆府乃與同名按河南府先已為佑國三年鄭賨猶爲西京留守判官然則立軍額京名尚存耳者蓋車駕既在河南則無用軍額故移其名京兆耳天祐上遣間使賜王建楊行宻李克用等絹詔復四年三月續寶運錄天三月二十三日四月二十七日賫到西川頒示管内州縣實二十二日丑時襄宗在陜府行營宻遣絹詔告晉楚蜀末云王建四月得詔與寳運錄略相應今移置此月錄此月絹詔在四月據十國紀年楊行宻三月四月全忠殺内園小兒二百餘人錄據之今從舊紀薛史後唐紀年錄云五百人實敕内諸司不以内夫人充使洛都經費甚廣况國用未編遺錄曰戊申鑾輿初到並停廢仍不差内中夫人充使蓋初誅宦官後内諸司使皆豐庶事草創因刪略閑冗司局今後除留宣徽等九使外餘也而實錄改充使爲宣事誤也以内夫人領之至此始用外人昭宣帝天祐二年八月己亥全忠擊趙匡凝錄薛居正梁太祖實州辛未帝南征唐實錄七月全忠奏匡凝擅通好西川淮南五代史梁紀皆云七月庚午遣楊師厚率前軍討趙疑於襄全忠自帥軍以進編遺錄八月壬辰先抽武寧楊師厚是日又遣弟專領荆南請削奪官爵已遣都將楊師厚討之翌日政己亥上領親從歩騎繼大軍之後是夜宿尉氏今從之薛到乃議伐襄州帥趙匡凝乙未大發車徒委楊師厚總其軍凝對使者流涕荅以受國恩深豈敢隨時妄有他志使者復史太祖將圖禪代以匡凝兄弟並據藩鎮乃遣使先諭㫖焉忠南征表匡凝罪狀請削官爵按全忠劫遷昭示於洛陽匡命太祖大怒天祐二年秋七月遣楊師厚率師討之辛未全全忠安肯以禪代問之今不取凝與行宻等移檄諸道共討之盧約陷温州紀年在此月戊戌今從之新紀正月約陷温州十國九月全師朗降王建作全行宗林思諤王宗播王承規傳李昊蜀書高祖紀作全行思後主紀傳寫差誤不可考正按後蜀後主實錄云金州招安指揮使作全行宗桑􅀪志傳作全行朗新書馮行傳作金行全蓋昆弟族人也今從十國紀年全師郁世居金州襲是師朗周隠請召劉威劉威豈肯對其父斥渥短請以軍府授威按徐温謂隠為姧人隠若欲為亂當宻召之人耳隠乃戅直十月辛卯朱全忠抵光州軍發自襄州由安黄渉申光暨梁太祖實錄十月壬申上御大萬趨光壽按十月丙戌朔無壬申梁實錄誤今從編遺錄壽春之翟丘駐焉十國紀年十月朱全忠自襄州帥衆二十十一月庚辰楊行宻薨吳史官王振撰楊本紀皆云天祐十國紀年注吳錄唐烈祖實錄及潁州獲河東諜者言去年十一月持李克用絹書往淮南十二年十一月庚辰行宻卒敬翔梁編遺錄云天祐三年三月載略同沈顔行宻神道碑殷文主行宻墓誌游恭渥墓誌皆二月至楊州方知楊行宻且死與莊宗功臣列傳行宻傳所傳亦云天祐三年卒行宻之亡嗣君幼弱不由朝命承襲或云天祐三年丙寅二月十三日丙申卒薛居正五代史行宻十一月吳王寢疾付渥後事授淮南使或本紀等誤以此月始死未敢發喪赴以明年二月疑沈顔等從而書之墓誌云異固不可考今從舊史而存碑誌年月以廣傳聞為行宻卒王振沈顔殷文圭游恭皆仕吳而記錄差十二月戎昭節度使馮行襲領武定軍新表云改為武實錄云改為武寜運錄注云天復七年秋汴軍都頭號為青面改姓朱授全忠定軍按武寧乃徐州軍額武定乃洋州軍額不應同名續寶後被朱全忠除此年秋蜀第二指揮使王宗綰收獲金州都印綬為洋州刺史洋州自景福元年刺史楊守佐歸順鳯翔祐三年二月云行襲已於均州建節因署韓恭知金州事請押衙全貴率衆降賜姓王名宗朗拜金州刺史又編遺錄天以行襲兼領洋州節制非改戎昭為武定軍也實錄新表皆朝廷落下防禦使并不建戎昭軍以比諸書參驗似是今者復七年亦誤也誤續寶運錄云天三年四月鍾傳養子延規曰延規補江州刺史遂召實錄初鍾傳養上藍院僧為子十國紀年吳史淮師陷其城今從七月朱全忠引兵南還紀年錄編遺錄七月癸未上起兵實錄在六月今從編遺錄甫太祖朔無癸未編遺錄誤也離魏都按長曆是月壬子壬申全忠至大梁壬辰亦誤編遺錄云十月王建立行臺行下北牓帖則是比年十月也續寶運錄曰天復六年十月六日十二月錢鏐薦王景仁領寧國節度使鏐辟為兩府行薛居正五代史事歐陽修五代史曰表景仁領宣州節度使今從之軍司馬具以狀聞太祖復命遥領宣州節度使同平章閏月丁㑹降河東閏十二月太祖以李嗣昭為路帥薛唐太祖紀年錄丁酉丁會開門迎降月今從新舊唐紀薛史梁紀及編遺錄居正五代史梁紀在閏月後唐紀在十二資治通鑑考異卷第二十七
