body:
  text: 臣司馬光奉勑編集後梁紀上太祖開平元年正月張顥徐温殺楊渥親信十餘人等下斬之渥不能止由是失政按璠等已死於宣州今從十歐陽史四年正月渥視事陳璠等侍側温顥擁牙兵入拽璠年囯紀三月甲辰唐帝禪位月唐帝御札敕宰臣張文蔚等備法實錄薛居正五代史唐餘錄皆云四也舊唐書云三月甲辰甲辰三月二十七日也唐年補錄三駕奉迎梁朝而旡日五代通録云四月丁未丁未四月一日爲差誤按此年三月戊寅朔四月丁未朔今從舊唐書月二十七日甲子降此御札四月戊辰朱全忠即位尤楊凝式諫父渉押傳國寶泄即日佯狂時謂之風子按陶岳五代史補曰凝式恐事以心疾罷明宗時及清泰帝未俱以心恙罷官天福初致仕周世宗實錄凝式本傳仕梁未嘗有疾唐同光初知制誥始梁初佯狂也今不取在洛有風子之號非四月朱全昱責帝滅唐社稷數匝廣王全昱怱駐不擲王仁裕玉堂閑話曰骰子職乆逺家族得安否於是大怒擲戲具於皆下抵其盆而碎顧而白梁祖再呼朱三梁祖動容廣王曰你愛他尔許大官從王禹偁五代史闕文之喑嗚眦睚數日不止今戊辰大赦皆不云大赦今從歐陽史梁實錄編遺錄薛史唐餘錄五月契丹阿保機不受代本姓大賀氏後分八族一曰蘇逢吉漢髙祖實錄曰契丹邸六曰内㑹雞邸七曰集解邸八曰奚盟邸管縣四十一縣利皆邸二曰乙室活邸三曰實活邸四曰納尾邸五曰頻没尊之毎三年第其名以相代莊宗列傳曰咸通未其王曰習有令八族之長皆號大人稱刺史常推一人爲王建旗鼔以邊旡備遂蠶食諸部逹靼奚室韋之屬咸被驅役漢髙祖實尔疆土稍大累來朝貢光啓中其王曰欽德乗中原多故比族不受代自號天皇王後諸族邀之請用舊制保機不得已錄唐餘錄皆曰僖昭之際其王邪律阿保機怙彊恃勇距諸族率漢人守之自為一部諸族諾之俄設䇿復併諸族僭稱傳旗鼔且曰我為長九年所得漢人頗衆欲以古漢城領本州東城延之帳中約為昆弟莊宗列傳又曰及欽德政衰阿皇帝土地日廣大順中後唐武皇遣使與之連和大㑹於雲因與之面㑹於雲州東城延入帳中約為兄弟謂曰唐室為保機族盛自稱國王天祐二年大冦我雲中太祖遣使連和許諾保機既還欽德以國事傳之賈緯備史云武皇㑹保機賊臣所簒吾以今冬大舉弟助我精騎二萬同収汴洛保機往來以展酬酢之禮保機喜謂武皇曰我蕃中酋長舊法三故雲州城結以兄弟之好時列兵相去五里使人馬上持盃有遷移之制但不受代則可何憂罷乎保機由此用其敎不年則罷若他日見公復相禮否武皇曰我受朝命鎮太原亦諱幹里太祖生而智入部落主愛其雄勇遂退其舊主遙輦受諸族之代趙志忠虜庭雜紀云大祖諱億番名阿保謹父其有德行功業者立之或災害不生羣牧孳盛人民安堵則氏歸本部立太祖為王又云凡立王則衆部酋長皆集㑹議以畨法亦甘心退焉不為衆所害又曰有韓知古韓頴康枚王更不替代茍不然其諸酋長㑹衆部别選一名為王故主部名與漢髙祖實錄所載八族名多不同蓋年祀相逺虜語王奏事王郁皆中國人共勸太祖不受代新唐書載契丹八乆矣非因武皇之敎也今從漢髙祖實錄又唐餘錄前云乾不常耳其實一也阿保機云我為長九年則其在國不受代此十餘年不能犯塞下乃云大順中與武皇㑹於雲中按大寧中劉仁恭鎮幽州保機入寇仁恭擒其妻兄述律阿鉢由武皇謂曰唐室為賊臣所篡吾以今冬大舉此非大順中事順在乾寧前乾寧二年仁恭方為幽州節度大順中未也又機及前國王欽德貢方物然則於時七部猶在也唐餘錄誤也又編遺錄開平二年五月契丹王阿保晉王與阿機連和盛召之天祐二年五月阿保機領其部唐太祖紀年錄太祖以阿保機族黨稍而去留男骨都舍利首領沮禀梅為質約冬初大舉渡河反族三十萬至雲州東城帳中言事握手甚歡約為兄弟旬日聘于契丹阿保機以兵三十萬㑹克用於雲州東城握手約正㑹昭宗遇盜而止歐陽史曰梁將篡唐晉王李克用使人祐四年而紀年錄獨在天祐二年又云約今年冬同收汴洛為兄弟期共舉兵擊梁按雲州之㑹莊宗列傳薛史皆在天在二年也且昭宗遇盜則尤宜興兵討之何故止也按武皇㑹昭宗遇盜而止如此則應在天祐元年昭宗崩已前不應武皇寢疾蓋以此不果出兵耳今從之云唐室為賊臣所篡此乃四年語也其冬甲午敬翔為崇政院使五月甲午詔樞宻院宜改為崇政實錄四月辛未以翔知崇政院事之至是始併樞密院職事悉歸崇政院耳􅊨院始命翔為院使蓋崇政院之名先已有之六月楚秦彦暉破淮南兵執劉存等年四月湖南軍編遺錄天祐四陽江口大破賊黨生擒偽鄂州節度使劉存按薛史梁紀馬陳邵告㨗淮南㓪州水陸合勢奔衝其境馬殷出舟師於劉楚在五月敗在六月楚史亦然編遺錄誤也殷奏破淮寇在六月十國紀年呉史劉存攻七月曲裕卒以其子顥為節度使何親按薛史六月諸書不見顥於裕顥起復為安南都䕶充節度使既云起復知其子也丙辰􅁉卒七月丙申以靜海行營司馬權知留後曲九月蜀王即皇帝位年號武成薛史唐餘錄天祐五年九莊宗列傳太祖厭代建自帝於成都改元宋庠紀年通譜天祐四年秋稱帝次年改元歐陽史十月建自帝於成都年號武成九國志此年七月即帝位明年即位明年改元今從之國紀年天復七年九月二年正月晉王命克寧等立存勗皇臨薨以三矢付莊五代史闕文世傳武契丹且曰阿保機與吾把臂而盟結為兄弟誓復唐家社稷宗曰一矢討劉仁恭汝不先下幽州河南未可圖也一矢擊莊宗藏三矢于武皇廟庭及討劉仁恭命幕吏以少牢告廟今背約附梁汝必伐之一矢滅朱温汝能成善志死無恨矣納矢于太廟伐契丹滅朱氏亦如之按薛史契丹傳莊宗初請一矢盛以錦囊使親將負之以為前驅凱旋之日隨俘馘曰我與先王為兄弟兒即吾兒也寧有父不助子邪許出師嗣世亦遣使告哀賂以金繒求騎軍以救路州契丹荅其使將部兵五千救之然則於時莊宗未與契丹及守光為仇也㑹潞平而止廣本劉守光為守文所攻屢求救於晉晉王遣撰此事以誇其英武耳此蓋後人因莊宗成功五月牛存節救澤州行營排陳使晉兵已破夾城存節以歐陽史云存節從康懷英攻潞州為䧟河南尹張宗奭召龍虎統軍牛存節謀之存節帥本軍及餘兵歸行至天井関聞晉兵攻澤州而救之梁列傳澤州將澤州薛史亦同按存節若自夾城遁歸則先過澤州後至天右神武羽林等軍往應接上黨回師至天井関即引衆前救也今從梁列傳及薛史井関豈得已過而返救之周德威退保髙平刺史王班棄城而去澤潞皆平今不取莊宗列傳朱温傳云李存璋進攻澤州張顥徐温共謀弑􅀪農王等執渥于寢室弑之不言徐呉錄顥使紀祥陳暉黎璠孫殷歐陽史云温顥共遣盜殺握約分其地以臣於梁按温與顥蓋徐􅉗為温諱耳薛史因之而江南别錄有獨用左衙兵囯紀年張顥欲称淮南留後送款於梁以淮南昜蔡州節制分掌牙兵温若不同謀顥必不敢独弑渥今從江南别錄十不若有所立然後圖之按顥称留後則有主矣今不取徐温曰􅀭州距汴州往返僅三千里軍府踰月无主必乱鍾泰章斬顥年作鍾泰章今從之呉錄作鍾章十囯紀秦彦暉入朗州雷彦恭奔廣陵朗州軍前奏㨗彦恭梁太祖實錄云丁酉今從紀年沒溺于江十月丁巳帝還大梁今從實錄薛史編遺錄在乙卯三年四月保大節度使李彦博容今從劉恕廣本編遺錄五代史作彦六月乙未朔劉知俊以同州叛郡反削奪官爵㒷師討伐實錄六月庚戍知俊據本將之鳯翔盖編遺據奏到之日實錄據削奪之日也編遺錄六月乙未初奏本道軍民遮留尋聞擒使臣及七月商州將吏斬李稠都牙校李玫權知州事歐陽史薛史稠弃郡西奔本州將吏以刺史李稠弃郡逃山谷又曰商州將吏以稠驅虜士庶西遁商州軍乱逐其刺史李稠稠奔于岐實錄丙寅陜州奏商州李玫主州事今從之追斬无遺暫令都押衙王班鎮襄州今從實錄薛史作王珏劉玘為亂兵所立逃來翌日受賀衙庭享士伏甲幕下姚顗明宗實錄薛史玘傳皆云丁酉賜玘王延順物以其違逆將之難來歸編遺錄斬李洪中筵盡斬其乱將以聞以功為復州刺史按梁祖實錄八月州何由至九月始収復盖玘脫身㱕朝及梁亡入唐妄云斬等敕云始扶劉玘既奔竄以㱕明若使玘翌日便斬乱將襄能考察從而書之耳乱將自誇大史官不八月楊師厚救晉州破周德威蕭萬通等賊由是弃寨實錄云殺戮生擒賊將級師厚退絳州是役也小將蕭万通戰没師厚進營平陽德而遁莊宗實錄云汴軍至䝉坑周德威逆戰敗之斬首二百絳州既敗而還豈得復進營平陽德威既戰勝安肯便収軍威収軍而退二軍各言勝㨗然既殺蕭万通師厚何肯退保宗實錄妄言耳盖晉軍實敗走莊十一月羅紹威乞骸骨以其子周翰為天雄節度副使亦馳簡獻替或中途相遇意玄合者十得五六太祖歎曰竭梁功臣列傳朝廷自開創有大事皆降使咨訪紹威有謀慮尚金華公主早卒次周翰起復雲麾將軍充天雄節度留後忠力一人而已又曰子三人長廷規司農卿尚安陽公主又实录己亥以司門郎中羅廷規充魏愽節度副使知府事仍尋檢校司徒正授魏慱節度使亦早卒次曰周敬薛史亦同傳紹威卒温以其子周翰嗣政莊宗实录紹威厚率重㰸傾改名周翰時鄴王紹威病日甚慮以後事故奏請焉莊宗列弱之謀乃潛収兵市馬隂有覆温之志而賂温益厚温恠其府藏以奉温小有違忤温即遣人詬辱紹威方懷愧恥悔自半嵗温却召還以此得其隂事内相矛楯薛史又云開平四曲事慮蓄姧謀而莫之察乃賜紹威妓妾數人皆承嬖愛未於羅氏令終其婦節也唐餘录歐陽史皆同惟唐莊宗實录年夏詔金華公主出家為尼居於宋州􅀇静寺盖太祖推恩似與此言合然梁祖若聞紹威有隂謀必不使周翰更居魏獨異按均帝時趙巖䓁言羅紹威前恭後倨太祖毎深含怒之語今從衆書廷規更名周翰亦恐实录之誤疑後唐史以紹威與梁最親疾之而載此傳聞四年三月夏州殺李彜昌推族父仁福爲帥福本党薛史仁姓李歐陽史云不知其於思諫為親踈也按仁福諸子皆連項托拔氏唐末托拔思恭以破黄巢功賜姓故仁福之族亦昌必父行也彜字則於彜五月劉守光兼義昌節度使後劉継威為義昌節度使實录是歲五月以義昌留復為留後不然守光兼幽滄節度使継威但為滄州節度使八月又云以守光兼義昌節度使不言置継威於何処或者今兩存之皆不可知十二月楚王殷遣吕師周討辰溆蠻斬潘金晟於武崗湖湘故事吕師周師益一時歸投馬氏今從十囯紀年其年十月十一日辰州宋鄴溆州昌龐巨昭劉昌魯降于楚等州防禦使聞馬氏令公以征湖湘故事庞巨曦本唐末邕容桞互蒙賀桂等州巨曦聞此雄勢謂諸首領曰李瓊有破竹南歩軍指揮使李瓊知桂州軍事領兵士収服嶺外昭梧象莫彦昭對曰李瓊兵馬其勢已雄必然輕敵今欲燒毁城内之勢若長驅兵馬此來侵吞吾境其將柰何時容南指揮使峒兵士後攻之堅守旬月之間城内必無軍粮外無救應方軍儲且各入山峒抛州城與李瓊􅀱纔入州却依前出諸山占氣象馬氏合當五十餘年㒷覇湖外茍五十年對壘安知可制造攻具再攻擊之必取勝也庞巨曦曰吾毎至中宵獨故密走事宜於湖南又曰天復末甲子十有二月容南庞巨孰非是以憂疑不暇遂至深夜斬莫彦昭於私弟明日以其歸於馬氏是時湖南遣澧州刺史姚彦章領馬歩軍八千徑曦深慮廣南劉巖不道加害於己遂差小吏間路密馳書欵魯以廣南先主劉巖欲併吞嶺外數召昌魯欲藉没其家族往容南巨曦遂帥萬餘衆歸于馬氏又曰髙州防禦使劉昌揮使張可球部轄兵馬於界首應接一行三千余口歸于馬昌魯知之乃刺血寫書投馬氏具述縣急湖南遂遣捉生指囯紀年氏今從十乾化元年正月丙戌朔日食食今從实录等諸書李昊屬書丁亥朔日五月以劉巖為清海節度使清海節度使陟復名巖按十囯紀年甲辰太祖授陟考葬叚氏得石版有篆文曰隱台巖因名其三子是先名巖薛史僣偽傳云前偽漢劉陟胡賔王劉氏㒷亡录髙祖巖皇吳录天祐十四年南海王劉巖自立為漢唐烈祖实录天祐後名陟也呉越備史乾化四年廣帥彭城巖遣陳用拙來使海節度副使劉陟為節度使二年四月以韋戩為潭廣和叶十四年劉陟僣位改名巖梁太祖实录乾化元年五月以清校太􅀓薛史梁末帝紀貞明五年九月削奪廣州節度使劉使云廣守淪謝其母弟巖為軍情所戴七月友珪加劉巖檢戴漢超推守光為尚父辛亥三月二十七日也壬辰乃三月放出按莊宗實錄及南唐列祖實錄皆云三月辛亥晉王遣得上表云六鎮推臣為尚父編遺録月日多差錯今不取初八日王瞳等安得已在幽州甲午乃三月十日守光安八月守光以史彦羣為御史大夫使今從莊宗實錄編遺錄云御史臺副十一月髙萬興奏収鹽州韓遜奏収復塩州擒偽刺史李實錄開平三年六月丁未靈武項犬牙相接為二境咽喉之地又烏池塩醝之利戎羌意未継直已下六十二人至此年降髙行存下云塩州與吐蕃党于靈武歲以河南河東山南淮南青徐江浙等道兵士不啻嘗息唐建中初為吐蕃所䧟其墉而去由是銀夏寧延泊渾瑊揔兵三萬復取其地建百雉焉自是虜塵乃息邊患遂四萬分護其地謂之防秋貞元九年朝政稍暇乃命副元帥疣其息哉李茂貞養子多連継字開平三年所収似屬鳯翔止唐代革命又復失之今纔動偏師遽収襟要國之右臂瘡一誤或者開平既得又失之也今又収復云唐革命失之前後必二年二月帝至白馬樸殺孫隲等盡今從莊宗實録梁祖實錄云賜自三月􅀥強卒詐降擊李周彜左右未至其人抽擔擊周莊宗實錄頃之周彛晝寢彛曰吾比欲倳刄於朱温之腹非圖尔也誤矣編遺錄云時彛首踣於地求兵仗不獲周彛大呼左右救至獲免卒睨周劒願先登以収其牆未許間忽然抽茶檐子揮擊周彛頭上有一百姓來投軍中李周彛収於部伍間謂周彛曰請賜一欲窺筭招討使楊師厚斯人不能辨乃誤中周彛按此卒從中檐幾仆于地左右擒之元是􅀥強邑中遣來令詐降本意與將帥居處侍衞不同豈容不識而誤中之若本欲殺楊師周彛請劒周彛不許而令負檐豈不知周彛非温也又帝王既可疑皆不取厚則似近之今五月單廷珪與周德威遇於龍頭岡岡今從莊宗列傳莊宗實錄作羊頭及莊宗列傳周德威傳云五月七日擒廷珪十二日次大城莊宗實錄四月己邜朔周德威擒單廷珪進軍大城莊薛史從之莊今六月張厚殺韓建遇害今從薛史莊宗實錄九月建七月楊師厚殺潘晏據魏博云太祖初弃天下郡府梁功臣列傳楊師厚傳訓將謀反變有宻告者師厚布兵擒捕斬之七月除魏博節乘閒為亂甚衆魏之衙内都指揮使潘晏與大將臧延範趙宗列傳朱友珪傳及莊宗實錄度使薛史師厚傳略同今從莊八月龍驤軍潰健者團結於鞏村將為朱温雪恥明宗實莊宗列傳友珪傳云重霸據懷州為亂壯實錄戊子鄭州奏稱懷州屯駐龍驤騎軍潰散十一日夜至錄杜晏球傳云龍驤軍作亂欲入京城已至河陽今按梁祖逃逸安得據懐州及至河陽事也州南十五里鞏村安下及五鼓分隊十月晉王遇康懷貞於解縣宗列傳薛史唐餘錄朱莊宗同光四年實錄莊破之今從莊宗天祐九年實錄友謙傳皆云與汴軍遇於平陽大三年正月甲子友珪改元鳯厯庚戊友珪祀圎丘改元今莊宗列傳云七日實錄云史從薛二月均王激怒龍驤軍史末帝紀云左右龍驤都成汴友莊宗列傳朱友貞傳及薛史歐陽太祖實錄云丙戌東京言龍驤軍凖詔追赴西京軍情不肯貞偽作友珪詔追還洺下莊宗實錄云友珪疑而召之按梁偽作詔但激怒言坑之耳進發實友珪徴之非友貞三月帝更名鍠乆之又名瑱皆無年月今因名鍠終言之薛史云貞明中更名瑱諸書戴思逺為保義節度使留後屬張萬進殺劉継威命思薛史思逺傳云貞明中為邢州威在前今從本紀逺鎮之按萬進殺継髙行珪使弟行周為質於晉軍温張昭周太祖實錄莊宗實錄行周作行守光必敗赴召無益乃請行欽為燕師稱留後行欽無如之云燕城危䠞甲士亡散劉守光召元行欽行欽部下諸將以武州慮為後患乃令人於懷戍掠得其子縶之自隨至武州何乃謂諸將曰我為帥亦湏歸幽州衆然之行欽以行珪在然後降太原若不從必殺汝子行珪曰大王委尔親兵遂圖行欽謂行珪曰將士立我為留後共汝父子同行先定軍府以徇從與尔訣矣行珪城守月餘城中食盡士有飢色行珪叛逆吾死不能從也其子泣告行珪行珪謂曰元公謀逆何斬予首出降即坐見寧帖行珪為治有恩衆泣曰願出私糧乃召集居人謂之曰非不為父老惜家屬不幸軍士乏食可德威命李嗣本李嗣源安金全救武州比至行欽解圍矣嗣濟軍以死共守乃夜縋其弟行周為質於晉軍乞兵救援周與公俱事劉家我為劉家守城尔則僣稱留後誰之過也今源與行珪追躡至廣邉軍行欽帥騎拒戰行珪呼謂行欽曰报曰可行周馬足微蹶將蹄嗣源躍馬救之撾擊行欽幾墜日之事何勞士衆与君抗衡以決勝負行欽驍猛騎射絶衆發矢中行欽猶沬血酣戰不解是夜行飲窮䠞固廣邊軍晉行欽正身引弓射嗣源中髀貫鞍嗣源抜矢凡八戰控􅁌七來相見必㳭功名翌日行欽面縛出降嗣源酌酒飲之抚其兵圍之嗣源遣人告之曰彼此戰將不假言諭事勢可量亟荘宗實錄薛史紀及元行欽傳明宗實録皆云行欽聞行珪背曰吾子壯士也養爲假子臨敵擒生必有所獲名聞軍中珪城守不從然恐行周卒時去燕亡已乆行周名位尊顯門降晉帥兵攻之惟周太祖實錄髙行周傳云行欽称留後行与諸說特異今從衆書生故吏虛羙其兄弟故王從珂爲李嗣源子帝諱從珂明宗皇帝之元子也母張昭於囯初修唐廢帝實錄云廢平山得魏后帝以光啓元年正月二十三日生於外舍屬趙曰宣憲皇后魏氏鎮州平山人中和末明宗徇地山東留戍禆將性闊達不能治生曹后亦疏於畫略生計所資惟宣憲人負盟用兵不息音問阻絶帝甫十嵗方得帰宗時明宗爲比往來供饋曹后憐之不異所生薛史未帝諱從珂本姓王而已曹后未有怠􅅌幹家宣室帝与部曲王建立皇甫立代福中明宗爲武皇騎將略地至平山遇魏氏虜之帝時年十氏鎮州人也母宣憲皇后魏氏以光啓元年生帝於平山景從珂而欲立從榮從榮死傳位於從厚故人皆謂從珂為養餘歲明宗養為己子劉恕取廢帝錄以為明宗即位後不立養子事似可信然李克用光啟元年以前未嘗徇地山東又子按張昭仕明宗為史官異代修廢帝錄旡所諱避而不言而立從榮從珂亦當不服今從薛史從珂若果是明宗子明宗必不捨之七月蜀太子元膺殺唐道襲一日元膺召諸軍使及諸九囯志建將七夕出游先曰詰朝元膺入白建曰潘峭毛文錫離閒兄弟將圖不軌又王宴飲邸第中且議七夕從行之礼而集王宗翰等不至又士以自衞又曰明日徐瑶常謙与懷勝軍使嚴璘等恊謀以曰及聞唐襲徴兵乃遣伶官安悉香諭軍使全殊率天武甲召与同進宗賀曰兵起无名不敢奉命又曰建急召宗侃宗所部兵挾元膺以逐唐襲元膺介馬率卒過其兄宗賀之門兵又自大安門登陴以入攻瑶謙等歐陽史曰元膺与伶人賀及諸軍使令以兵討寇乃逐唐襲至城西斬之尽殺屯營出拒襲与襲戰神武門襲中流矢墜馬死十囯紀年丁朱元安悉香軍將喻全殊率天武兵自衞召大將徐瑶常謙率兵軍使王承燧等各帥所部兵奉元膺攻唐道襲道襲自私第膺令軍使喻全殊帥天武兵自衞戊申徐瑶常謙及左大昌宜緩行元膺遣天武將唐據帥親兵逐道襲至城西斬之据被甲乗馬過王宗賀門邀之宗賀曰兵起无名且不奉詔公也歐陽史云元膺召瑶等率兵出拒襲攻東宫而元膺拒之九囯志云徐瑶等挾元膺以逐唐襲似襲在宫中欲逐出之在外第元膺就攻之也按道襲止以挾君自重既勸蜀主發紀年云瑶等奉元膺攻道襲襲自私第被甲乗馬似道襲出禁以求道襲道襲以屯營兵出拒戰兵敗走至城西為唐據兵自衞豈肯更出在外第必止於禁中也盖瑶等引兵攻宫同進是元膺邀宗賀也紀年云道襲自私第被甲乗馬過宗所殺耳九囯志又云元膺介馬率卒過其兄宗賀之門召与所荅之辭似語太子非語道襲也若語道襲宜勸之速入宿賀門要之是道襲邀宗賀也按道襲私第安得有兵觀宗賀大臣以安社稷盖當時蜀主聞乱既信道襲之言又不忍討衞豈得云公宜緩行也潘炕言太子非有它志陛下宜面諭為乱者耳九囯志云令宗侃等出兵討寇乃逐唐襲至城西太子旡决然號令故炕言太子旡它志當召大臣討徐瑶等明日遽加襲贈謚乎此必誤也斬之是官軍斬襲也若然何故資治通鑑考異卷第二十八
