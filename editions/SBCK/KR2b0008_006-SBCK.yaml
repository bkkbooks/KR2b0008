  text: 資治通鑑考異卷第六
  hash: sha256:07be3b68d1a2016e4ba1766bbfde4bd39f527c9ab858a2a0c3aa86d470d45a2b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_006-1a}
body:
  text: 臣司馬光奉勑編集宋紀下蒼梧王元徽二年五月壬午桂陽王休範反子按長曆宋書作壬壬子今從宋略此月辛未朔無休範登臨滄觀以數十人自衞人皆散走按休範左右張敬兒傳云左右數百何敢徑往取之今從休範傳若有數百人黃回敬兒雖勇陳靈寶送休範首弃之於水云弃諸溝中今從宋書南齊書云埋首道側宋略杜黒騾攻新亭黒蠡今從宋略宋書南齊書作禇澄開東府門納南軍賊南齊書作車􅀐典籖茅恬蓋皆宋書作撫軍典籖茅恬開東府納今從宋略爲禇澄諱耳六月休範使陳公昭遺沈攸之書攸之送之朝廷略宋相攸之斬其使今從宋書云桂陽遺攸之書署曰沈丞癸卯毛惠連降有戊申今從宋書宋略作癸亥按下九月後継伐蜀漢不言勝􅀒列傳及宋書皆無之今不取後魏帝紀使將軍元蘭五將二万􅀐及假東陽王丕爲司徒左長史蕭惠明爲司徒長史今從南史宋略作惠㓪按惠㓪不四年六月魏馮太后鴆顯祖伏壯士於禁中太上入謁元行沖後魏國典云太后終不之知按後魏書及此史皆無殺事而天象志云獻文暴遂崩按事􅀂如此安得不彰而中外恬然不以爲怪又孝文之禍今從之崩實有鴆毒順帝昇明元年端午太后賜蒼梧王毛扇賜今從未書宋略作太妃六月蒼梧王殺杜幼文等殺其十六餘皆帝殺之按宋南史云孝武二十八子太宗餘皆太宗殺之無及蒼梧時者南史誤也書孝武諸子十人早卒二人爲景和所殺蕭道成族弟順之何至皇考一十餘丗皆有名及官位蓋齊髙帝紀姚思廉梁書武帝紀自相國今所不取史官附㑹七月蒼梧王於臺岡賭跳今從宋書南史作蠻岡蕭道成開承明門而入太祖乗馬在外􅀼謂親人曰今􅀂齊髙帝紀云衞尉丞顔靈寶窺見湏有知者豈得􅀫衞晏然不動今從宋後廢帝紀不開內領軍入天下㑹是亂耳按靈寶􅀂語所親則十月氏楊文度遣弟文􅀪䧟仇池傳作䑕皆避顯祖諱也魏書本紀作楊黽氐李訢信用范􅋆弟瑛諫璞今從後魏書魏典􅋆作摽瑛作十二月魏軍至建安楊文􅀪弃城走一月宋之十二月也是年魏置閏在十劉韞入直門下省今從宋書南史南齊書韞作韜王藴帥部曲數百向石頭數百宋略云是夕微其私衆宋書云齊王使藴募人巳得素巳疑藴必不使之募兵宋略近是也倐忽之間􅀍甲數百莫知所從出按道成戴僧靜殺􅀽粲父子最呌抱父乞先死兵士人人莫不南史云僧静舊刀直前欲斬之子大宋䇿名兩畢今便歸䰟墳隴永就山丘僧静乃并斬之按隕涕粲曰我不失忠臣汝不失孝子仍求筆作啓云臣義奉啓從容如此宋書皆無此等事今不取時僧靜掩粲不備挺身直往安肯容粲作閏月癸巳沈攸之至夏口爲亂張敬兒遣使詣攸之慶沈約齊紀十一月攸之遂謀楊諸人書呼我􅄩下可令雍州知此意荅敬兒書曰信口一冬攸之呼使人於密室謂之曰奉皇太后今得􅀽司徒劉丹二日壬辰攸之遣孫同等先􅀤十七日丁酉張敬兒使至十二而封雞毛桃耳數物置函中敬兒賀冬使即乗驛白公十按是歳宋暦閏十二月庚辰朔魏曆閏十一月庚戍朔然則八日戊戍公率衆入鎭朝堂閏月十四日癸巳攸之至夏口二日巳發兵東下乎又攸之􅀂十二日巳舉兵於江陵豈可冬至必在十一月晦攸之對敬兒賀冬使者猶隱祕豈可十入守朝堂丁卯乃十二月十八日也閏月癸巳攸之圍郢城六十餘日始至夏口又宋順帝紀十二月攸之反丁卯齊王日至夏口宋略十二月沈攸之作亂丁卯蕭道成入屯朝堂攸之傳十一月反十二月十二日遣孫同等東下閏月十四卯太祖入居朝堂諸書大抵略相符合惟齊紀不同蓋齊紀閏月癸巳攸之師及郢州南齊髙帝紀十二月攸之舉兵乙不取之誤今二年正月沈攸之帥衆過江軍遂大散之衆潰西逃乙宋略云甲辰敬月己酉朔無甲辰乙巳巳華容民斬其首按是張敬兒至江陵敬兒據城走死不容敬兒至辛未乃入城也宋略云辛未敬兒克江陵按已巳攸之以齊紀上太祖建元元年五月賞佐命之功禇淵王儉等進爵増戸曰公以仁恕匡社稷執股肱之義君子爱人以德不宜南史崔祖思傳曰帝將加九錫內外皆賛成之祖思獨處任職而禮見甚重垣崇祖受密旨參訪朝臣光禄大夫垣如此帝聞而非之曰祖思逺同荀令豈􅀌所望也由此不復軍將軍崔文仲與崇祖意同及帝受禪閎存故爵丈仲崇祖閎曰身受宋氏厚恩復蒙明公眷接進不敢同退不敢異冠帝曰䜟云金刀利刄齊刈之今宜稱齊實應天命從之然則皆封侯祖思加官而巳按宋朝􅀄議封帝為梁公祖思啓髙於宋今刪之祖思安得誠節丙寅追尊考妣午今從齊書南史在四月甲十月􅀄帝在淮隂欲附魏遣書結王􅀇邈房叔安勸􅀇邈不荅并求􅀇邈表叔安曰王將軍表上天子不上將南史云仍遣叔安奉表詣闕告之帝於路執之之帝曰物各為主無所責也按太祖時爲邊將若執叔安又軍且僕之所言利國家不利將軍無所慮問荀伯玉􅂆帝殺齊書無此事今不取不殺便應不復爲宋臣十一月謝天蓋欲附魏韋珍引兵應接豫章王嶷遣蕭惠朗助蕭景先討天蓋構扇景先言於督府豫章王齊蕭景先傳云天蓋與虜相南洛州刺史昌􅀺王馮莎屯清丘景先􅃊待敵虜退魏韋遣惠朗助景先討天蓋黨與虜尋遣僞南部尚書􅀋跋屯汝景所攻闈詔珍率在鎭士馬渡淮援接時道成聞珍將至遣珍傳云天蓋自署司州刺史規以內附事泄爲道成將崔慧殺降於慧景珍乗勝馳進又破慧景擁降民七千餘户內徙將荀元賔據淮逆拒珍珍腹背􅁬擊破之天蓋㝷爲左右所景亦非討天蓋之將蓋時二國之史各出傳聞􅀇有訛謬今表置城陽剛陵義陽三郡以處之按魏將無􅀋跋馮莎而慧㮣而用之約取二史大帝遣王洪範約柔然宼魏軌今從齊紀齊書作王洪二年正月以禇淵爲司徒不受淵爲司徒十二月戊戍齊書建元二年正月以司徒禇淵薨淵傳三年爲司徒又固讓四年寢疾遜位攺授以淵爲司徒四年六月癸卯以司徒禇淵爲司空八月癸卯月辭十二月受耳紀傳前後各不相顧司空及薨詔曰司徒奄至薨逝蓋二年正崔孝伯攻魏龍得侯等殺之侯今從齊書齊紀作龍渴北上黃蠻文勉徳宼汶陽徳今從齊書齊紀作文施五月王圖南崔慧景破李烏奴宼武興今從慧景傳魏書帝紀八月慧景十月徐州民􅁊標之爲宼即標之也今從齊書魏書蘭陵民􅁊富蓋三年二月􅁊康拔魏樊諧城城今從齊書齊紀作樊階魏議者欲盡殺道人案咸陽王禧時尚幼太和九年始齊盡魏虜傳咸陽王欲盡殺道人非也封恐己酉垣崇祖破魏師卯朔無丁卯今從齊紀齊書作丁卯按是月辛三月魏滅􅁊標之等掠三萬餘口歸平城征諸將擊魏書云南下蔡昌􅀺王馮熈擊破之假梁郡王嘉大破道成將俘獲三破蕭道成㳺擊將軍􅁊康於淮陽道成豫州剌史垣崇祖宼書齊紀亦以魏書參之万餘口送平城今從齊丗祖永明二年十一月乙未魏李彪來聘月庚申虜齊紀十二今從魏帝紀使李道固至三年七月魏立梁彌承爲宕昌王巳以行宕昌王梁齊書是歳八月丁以彌承爲河涼二州刺史今從魏書彌頡爲河梁二州剌史六年五月甲午四年六月辛酉魏主如方山戍又云幸方山皆不言還宫魏帝紀是日幸方山七月戊文耳蓋闕五年五月魏公孫邃張儵宼舞隂安南將軍遼東公齊書魏虜傳云僞文􅂟上谷公張伏干南討舞隂按公孫邃傳邃字文􅂟與內平南將軍上谷公又攻舞隂魏書帝紀云詔南部尚書公孫舞隂戍蓋伏干亦儵字也都幢將上谷公張儵討蕭􅞾七月髙車阿伏至羅自立為王十一年蠕蠕在十六年魏書髙車傳云在大和車傳今從髙八年四月魏陽平王頥􅞾今從本傳帝紀作熈又作八月河南王丗子伏連籌留成今從魏書齊書作丗子休蕭順之縊殺巴東王子響散子響乃白服出降詔賜死齊書曰子響部下恐懼各逃諱耳今從南史蓋蕭子顯爲順之十二月孔顗上言從齊書南史齊紀作孔顗今九年二月魏著作郎成淹遷侍郎淹又云自著作作楊松玠談藪作朱今從魏書郎遷著作郎八月乙巳魏帝問羣臣禘祫之義五月壬戌今從本紀禮志作太和十三年十年正月壬戍魏主詔承晉爲水徳年正月穆亮等禮志太和十五行次以水承金蓋志誤以六爲五耳言云云按帝紀十六年正月壬戍詔定七月吐谷渾丗子賀虜頭魯頭今從帝紀魏吐谷渾傳作賀八月魏陽平王頥陸叡擊柔然月壬申蠕蠕犯塞遣平魏帝紀太和十一年八左僕射陸叡討蠕蠕按蠕蠕傳無十一年犯塞及征討事唯原王陸叡討之事具蠕蠕傳十六年八月乙未詔陽平王頥與紀合蓋十一年紀誤也冇十六年八月頥叡出征事十一年三月遣吕文顯曹道剛收王奐殷叡勸奐録取奐納之接臺使不過隳官免爵耳彪堅執不同叡又請南史奐子彪議閉門挂命叡諌曰今開門白服忠不背國勇不逃死奐仰藥叡與彪同誅今從齊書遣典籖間道送啓奐從之典籖出城爲文顯所執叡曰王肅奔魏邊帝謂份曰比有北信不份曰肅近忘墳柏寕南史奐弟份自拘請罪帝宥之肅屢引魏人至肅始見魏主於鄴南史誤也齊書無此語逺憶有臣按奐以三月死帝以七月殂是冬九月魏穆亮與支酉戰兵敗老生今從魏書齊書穆亮作繆髙宗建武元年三月壬申魏主至彭城月按魏閏二魏帝紀作閏三月也月齊暦之四月庚辰魏罷西郊􅀕天庚辰按長曆三月丙午朔無庚魏帝紀禮志比史紀皆云三月亥朔齊曆之四月也故置於此辰魏閏二月齊門四月魏三月乙五月甲戍朔日食今據齊書志南史紀齊魏書帝紀皆無此食九月乙亥纂嚴未下有乙酉丁亥蓋癸未當作癸酉乙未齊帝紀作乙未按是月壬申朔而上有癸亥耳當作乙何昌㝢拒徐􅀇慶臨海王昭秀得還建康使裴叔業南史明帝得從君單詔邪即時自有啓聞須反更議叔業曰􅀂爾便是齎旨詔昌㝢令以便宜從事昌㝢拒之曰臨海王未有失寕僕也叔業不敢逼而退昭秀由此得還都今從齊書拒詔拒詔軍法行事耳荅曰能見殺者君也能拒詔者十二月魏盧淵韋珍攻赭陽陽烏淵小字靈智珍字也齊書作盧陽馬韋靈智按二年四月房伯玉等敗魏薛眞度於沙堨傳眞度敗齊書魏虜軍獲罪在太和十九年五月今從之在建武元年下魏帝紀城陽王鸞以敗三年正月丁卯以楊崇祖爲沙州刺史酉按長曆是齊本紀作丁有己巳當作丁卯月乙丑朔無丁酉下魏主攺功臣姓胡俗始攺之魏収作魏書巳盡用新姓不魏􅀄功臣姓皆􅃨重竒僻孝文太和中變者蓋其舊姓名耳今並從魏書以就簡易用舊姓宋書索虜傳南齊書魏虜傳所稱魏薛宗起入郡姓海內姓地人物戲謂聦日人謂卿諸薛北史薛聦傳爲羽林􅁥帝曾與朝臣論爲漢臣九丗祖永隨劉備入蜀時人呼爲蜀臣今事陛下是是蜀人定是蜀人不聦對曰臣逺祖廣徳丗事漢朝時人呼投㦸而出帝曰薛監醉耳其見知如此今從元行沖後魏國典虜非蜀也帝撫掌􅀏曰卿可自明非蜀何乃遂復苦朕聦因閏月丙寅魏主廢太子恂夜讒恂魏書無之又魏帝紀齊書魏虜傳云大馮有寵日十一月齊閏十二月今從齊曆在十二月丙寅按長暦魏閏四年正月大赦是月己丑朔無庚午故不日齊帝紀云庚午大赦按長曆丙辰誅王晏誅丙辰正月二十八日也按郊禮必在正月晏傳云元㑹畢乃召晏誅之本紀丙辰晏伏㑹之日也本傳蓋言元㑹禮後耳旣云未郊一日敕停則誅晏必非元二月魏穆泰等伏誅刺史鉅鹿孤賀鹿渾守桑乾宏從齊書魏虜傳云僞征北將軍􅁪州僞定州刺史馮翊公自鄰安樂公主拓跋阿幹兒謀立安壽叔平陽王安壽戍懷柵在桑乾西北渾非宏任用中國人與人任安壽如故與魏書名姓全不同今從魏書分據河北期乆不遂安壽懼告宏殺渾等數百九月魏中書舎人孫延景雲今從魏書齊書作公孫十一月以楊靈珍爲北秦州刺史州今從帝紀齊氐傳作比梁十二月曹虎頓軍樊城口今從虎傳齊魏虜傳云均東昬矦永元元年三月張千戰死逹今從齊書魏書作張干以陳顯逹爲江州刺史以顯逹爲江州本傳顯逹敗於齊明帝紀永泰元年七月癸卯得此授甚喜按明帝末逹方以三公將兵擊魏不容無故馬圈求降號不許乃除江州又云東昬立顯逹彌不樂京師從本傳除江州今四月魏賜馮后死人顧任城王澄曰任城不􅀒我嵩亦當元嵩傳曰將遣使者賜馮后死而難其曰詞司徒􅎰徴太子與䘮㑹魯陽踐祚按馮后傳梓宫至魯不􅀒任城可使嵩也乃引髙平矦嵩入內親詔遣之髙祖紀􅎰遏祕喪事遣張儒徴丗宗亦無髙祖詔􅎰徴太子事陽乃行遺詔賜后死安有髙祖遣嵩之事又􅎰傳髙祖崩八月垣歷生降曹虎虎斬之所禽謂虎曰卿以主上爲南史云歷生出戰爲曹虎殺之按歷生若見獲遥光不當殺其子今從齊書聖明梅茹爲賢相我當死且我今死卿明亦死遂二年三月左興盛拒崔慧景於北籬門此籬門傳云紀云王瑩屯今從傳左興盛四月癸酉慧景敗走斬之南兖州刺史崔慧景於廣陵齊本紀四月丁未以張沖爲王瑩屯北籬門壬戍慧景至瑩等敗甲子慧景入京師蕭懿起兵襲京師壬子左興盛督衆軍寶􅀇以京城納慧景乙卯攻陷竹里按長曆是歳三月辛丑朔四月庚午朔丁未三月入援癸酉慧景弃衆走死慧景傳四月至廣陵回軍十二日日四月皆無也蓋四月當作三月至癸酉乃四月四日耳南七日壬子十二日乙卯十五日壬戍二十二日甲子二十四之曰江劉徐沈君之所見今擁強兵北取廣陵収吴楚勁卒史云時江夏王寶􅀇鎭京口聞慧景北行遣左右余丈興􅀃于時廬陵王長史蕭寅司馬崔恭祖守廣陵城慧景以寶􅀇身舉州以相應取大功如反掌耳慧景常不自安聞言響應不敢岀慧景密遣軍主劉靈運間行突入慧景俄係至遂據事告恭祖恭祖口雖相和心實不同俄而慧景至恭祖閉門少極失所望拒覺擊走之恭祖及覺精兵八千済江恭祖心其城子覺至仍使領兵襲京口寶􅀇本謂大軍併來及見人軍器精􅃊柳憕沈佚等謂寶􅀇曰崔護軍威名旣重乃誠可本不同及至䔉山欲斬覺以軍降京口事旣不果而止覺等之於是登北固樓並千蠟燭爲烽火舉以應覺惠景停二日見旣巳脣齒忽中道立異彼以樂㱕之衆亂江而済誰能拒慧景領大都督爲衆軍節度又云時柳憕别推寶􅀇崔恭祖便率大衆一時俱濟趣京口寶􅀇仍以覺爲前鋒㳟祖次之間出􅄬慧景慧景意更向之故猶豫未知所立此聲頗泄憕爲寶􅀇羽翼不復承奉慧景慧景嫌之巴陵王昭胄先逃人榮之故爲慧景門人時爲蟹浦戍斬慧景送都按恭祖始􅀂㳟祖始貳扵慧景又云慧景單馬至蟹浦􅄬漁人太叔榮之景􅀂不立寶􅀇柳憕豈能别推又榮之旣云漁人又云爲戍閉城拒慧景慧景襲得其城而據之豈肯更授以兵柄又慧並從齊書自相違錯今九月魏田益宗敗呉子陽于長風城傳皆無之魏帝此一事齊書紀於長風梁書鄧元起傳云蠻師田孔明附于魏自號郢州剌紀九月乙丑東豫州刺史田益宗破寶卷將呉子陽鄧元起城斬獲万計餘黨皆散走仍戍三關二書勝敗不同如此今史宼掠三􅀜規襲夏口元起率銳卒攻之旬月之間頻陷六紀從魏十一月蕭衍召王茂等定議帝諸腹心並􅂆除之而茂南史云茂與梁武帝不睦茂因擲枕起即袴褶隨紹叔入見武帝大喜下牀迎因結兄少有驍名帝又惜其用令腹心鄭紹叔往候之告以飲起義敢豫告以大事茂亦安能便響應今不取弟被推赤心按茂􅀂與梁武不睦梁武何乙巳衍建牙集衆襄陽誤也今從梁書髙祖紀齊帝紀十二月梁王起義兵於和帝中興元年正月戊申蕭衍發襄陽二月戊申發梁髙祖紀云十三日梁紀誤也襄陽按戊申正月三月乙巳南康王即帝位皇帝位蓋是日建康始聞之東昬紀云丁未南康王諱即及梁武帝紀耳今從和帝六月呉子陽進軍加湖今從齊梁帝紀梁韋叡傳作茄湖蕭衍使王茂襲加湖先今從梁書和帝紀作王茂郢城民死者什七八可以家數今從梁髙祖紀及韋叡傳齊張沖傳云死者七八百家按死者不十月壬午蕭衍築長圍守宫城此事先後多不同按齊帝紀與梁帝紀敘紀事以齊紀甲子次之齊紀皆有甲子今用梁十一月魏田益宗上表請攻義陽遣元英攻義陽按英益宗傳曰丗宗納之梁武攻東昬時蓋益宗建策於今日而行於後年耳攻義陽在景明四年八月此表言蕭氏君臣交争則是益宗入宼黃天賜敗績卷將黃天賜於赤亭田益光傳景魏帝紀七月乙未田益宗破蕭寶與之據長風城逆擊子陽大破之斬獲千餘級按呉子陽乃明􅀄蕭衍遣軍主吴子陽率衆宼三􅀜益宗遣光城太守梅拒何暇宼魏三􅀜此必益宗傳誤東昬將非衍將也且衍方與東昬相十二月張稷斬東昬首送石頭議立湘東嗣王寶晊領南史王亮傳曰張稷等帝已立稷等知建康不可守故弑東昬豈敢復議立寶晊今軍王瑩曰城閉巳乆人情離解征東在近何不諮問按時和紀從齊梁紀上髙祖天􅁥元年四月丙寅追尊考妣尊今從梁書南史云五月追五月河南禇緭褚胃今從梁書魏蕭寶寅傳作三年三月魏人歸張惠紹復還事今從魏書惠紹傳無􅀍獲及八月遣馬仙琕築二城理按仙琕於時未爲豫州也司馬恱傳作豫州刺史馬仙四年正月夏矦道遷以漢中降魏月魏陷梁州而列傳梁帝紀天􅁥三年二事夏矦道遷據漢中來降道遷傳具言其事按長曆梁閏二皆無其事魏帝紀正始元年閏十二月癸卯朔蕭衍行梁州正月朔也故置於此月癸卯即天􅁥四年四月孔陵等戍深阬西晉壽並遣告急按魏邢巒傳曰蕭梁鄧元起傳魏將王景胤孔陵宼東孔陵等據深杭然則景胤陵皆梁將也元起傳誤衍晉壽太守王景胤據石亭又曰蕭衍遣其將軍西昌矦淵藻殺鄧元起貶爲冠軍將軍藻以粮儲無梁書元起傳􅀂止以逗留表元起安敢擅收前刺史付獄殺之必誣以反遺甚怨望之因表元起逗留不􅁨軍事収付州獄自縊死按冠軍爲益州刺史與南史異也今從南史又梁書藻本以五年四月王茂與魏楊大眼戰敗失亡二千餘人眼大餘今從魏帝紀傳云俘馘七千有五月韋叡敗魏兵抜小峴小峴戍今從叡傳魏帝紀六月辛丑陷或欲保三义今從梁書南史作三丈裴邃克魏羊石霍丘城爲長橋以濟䆳築壘逼橋密作􅃿梁裴邃傳云五年征邵陽洲魏人大破之進克羊石霍丘城平小峴攻合肥魏帝紀辛巳衍將突艦㑹淮水􅁀漲邃乗艦徑造橋側魏衆驚潰邃乗勝追擊乗艦焚橋事在克合肥後又梁帝紀辛巳叡克合肥丁亥邃陷合肥己丑又陷羊石霍丘案韋叡傳叡攻邵陽洲方使邃載取二城在破邵陽洲後誤也克羊石庚寅克霍丘今從之邃傳九月臨川王宏夜遁將士皆散久有詔班師殊爲不梁書宏傳云㑹征􅃥南史實今從六年三月淮水􅁀漲帝紀四月戊戍鍾離大水英敗績按梁帝紀四月癸未景宗等破魏軍魏二史蓋據奏到月日書之耳今從景宗傳曹景宗傳云三月春水生淮水􅁀長梁魏生擒魏兵五萬人數十萬按魏軍共止數十萬如叡傳所韋叡傳云其餘釋甲稽顙乞爲囚奴者猶今從景宗傳言似爲太過十二月魏常邕和以淮陽降安樂以城南叛今從梁帝紀魏帝紀十月庚午淮陽太守七年九月魏執京兆王愉髙肈密使人殺之北史愉魏書及賞自􅀂略無愧懼之色至野王榆語人曰雖主上慈深不忍傳皆云愉毎止􅀫亭傳必􅂝李手盡其私情雖鏁縶之中飲令人殺之按愉旣敗􅀍執猶略無愧懼安能慙見魏主遽感殺我吾亦何面見至尊於是戯欷流涕絶氣而死或云髙肈殺愉因以此言紿魏主耳激絶氣而死蓋肇潜使人魏中山王英將歩􅀐三萬救郢州馬歩十萬巒統精田益宗傳詔曰英統耳今從魏帝紀􅀐三萬蓋虚聲十月魏白早生殺司馬恱琅玡王司馬慶曾今皆從魏書梁帝紀作白皁生馬仙琕傳作齊苟兒從梁書南北史魏書作苟仁今以早生爲司州刺史以城内附詔大舉北伐以始興玉憺梁帝紀十月丙子魏陽􅀜王許敬珍以城內屬以皁生爲司州胡遜爲豫州刺史明年正月壬辰帥衆入淸王茂帥衆向􅀫豫丁丑白皁生與豫州刺史胡遜卯魏楚王城主李國興以城內附姓名年月事迹旣與魏書魏鎭東參軍成景雋斬􅀫豫城主􅃊仲寶以城內屬二月丁無其事今並從魏書參差又徧檢諸列傳皆八年正月馬廣屯長薄胡文超屯松峴云遣馬廣㑹梁馬仙琕傳魏中山王英傳超守三􅀜今從遣徐元季援武陽今從魏帝紀英傳作徐超秀魏主於齊苟兒等四將之中分遣二人以易董紹傳紹今從司馬恱傳云歸苟兒等十人十年正月王珍國罷梁秦二州還梁秦剌史今從南史梁書珍國未甞爲三月王萬壽殺劉晣酉朔而盧昶傳云三月二十四日夜梁帝紀云三月辛丑按長曆是月丁及魏帝紀盧昶傳皆云劉晣而梁帝紀云鄧晣蓋字誤也萬壽等攻掩朐城蓋辛酉也今不日以闕疑又梁馬仙琕傳十二月馬仙琕大破魏兵梁帝紀梁紀云斬馘十餘萬按魏帝紀盧昶敗在十一月今從以四千給之安得十餘萬衆蓋梁史爲夸大耳盧昶表云此兵九千賊衆四萬永益兵六千魏主十二年二月鬱洲民徐道角等殺張稷降魏紀作魏帝稷死在朐山叛之明年今從魏帝紀郁州人徐􅀇明今從梁康絢傳又絢傳十五年二月康絢擊却魏兵督衆軍來戰按魏帝紀此絢傳十二月魏遣李曇定絢傳誤也曇定即平字也年正月乃遣李平節度諸軍昌義之王神念救硤石又遣義之神念率水軍沂淮上李崇傳衍遣趙祖恱襲據西硤石魏軍義之乃救硤石今從之而規取壽春按義之傳絢破十六年四月詔宗廟去牲史云在二月云祈告天地宗梁帝紀此詔在四月甲子南祀則不按長曆是月辛卯朔無甲子隋志但云四月亦不云廟以去殺之理欲􅀍之􅍭識郊廟牲牷皆代以麵其山川諸今從之郊祀去牲十八年二月魏髙湖子謐北史作謐今從之李百藥北齊書作謚髙歡曰宿衞焚大臣之第嘗爲領軍故但云大臣也北齊書云領軍張彞按彞未資治通鑑考異卷第六
