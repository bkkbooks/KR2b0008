body:
  text: 臣司馬光奉勑編集唐紀九永泰元年九月丁酉懷恩死於鳴沙恩領廻紇及朔舊懐恩傳曰懐長曆九月庚寅朔丁酉八日也唐曆邠志皆云九月八日懐方之衆継進行至鳴沙縣遇疾舁歸九月九日死於靈武按今從實録恩死於靈州魚朝恩欲奉上幸河中使姚良據温誘回紇陷河陽朝新魚朝恩傳云僕固瑒攻絳州敗瑒於萬泉生擒良髙暉等引吐蕃入宼遣劉德信討斬之恩遣李忠誠討瑒以霍文􅂣監之王景岑討良王希遷監之居人臣第一心媢之乗相州敗醜為詆譛肅宗不内其語然故朝恩因麾下数克􅀗竊以自髙是時郭子儀有定天下功子儀憂甚俄而吐蕃陷京師卒用其力王室再安朝恩内慙猶罷子儀兵留京師代宗立與程元振一口加毁帝未及寤曰虜犯都甸欲幸洛云何宰相未對有近臣折曰敕使反耶乃􅂆帝徙洛陽欲逺戎狄百僚在廷朝恩從十餘人持兵出亦謂不可乃止李肇國史􅀘曰代宗朝百僚立班良乆閤門今屯兵足以捍宼何遽脅天子弃宗廟為朝恩色沮而子儀欲幸河中何如宰臣已下蒼黃不知所對給事中劉不記其不開魚朝恩忽擁白刃十餘人而出宣言曰西蕃頻犯郊圻攻榆次不聞攻絳州髙暉為李日越所擒不聞劉德信所斬名出班抗聲曰敕使反耶云云由此罷遷幸之議按僕固􅂣蕃後入宼時也新書所云不知據何書今從國史􅀘朝恩欲幸河中不聞欲幸洛旣云頻犯郊圻必是吐十月辛酉吐蕃回紇至奉天入宼九月詔郭公討之師邠志曰八月懐恩以諸戎與回紇情契頗至今兹為宼必將有故吾方導而問之可不于涇陽回紇屯涇北去我十里朝恩請擊回紇郭公曰我昔上郭公章䟽逾旬不逹郭氏諸子在長安聞之使小將強羽戰而下也朝恩流言謂郭公與懐恩為應隂率諸軍列營渭令赴涇陽朝恩驚曰郭公眞長者吾比疑之誠小人也按回以物議告郭公郭公間道入覲且以衆議聞上曰無是即日儀已與之盟首尾纔七日豈容有章䟽逾旬不逹之事子儀紇九月未至涇陽十月辛酉始至奉天丙寅圍涇陽丁卯子汾陽家傳此際亦無入朝事今不取為元帥與彊敵對壘豈可弃軍入朝丙子郭子儀以回紇破吐蕃於涇州東吐蕃退至邠實録曰十月死貳於吐蕃丁丑郭子儀單􅀐詣回紇軍免胄與回紇大將州與回紇相遇復合從為宼辛酉㓂奉天乙亥回紇以懐恩庚辰子儀遣白元光率精銳㑹回紇兵數千人大破吐蕃十語責以負約遂與之盟己卯回紇首領石野那等六人來朝合圍涇陽屯于北原其夜公使方面各除道二詰朝將戰明餘萬衆于靈臺縣之西原汾陽家傳曰十月八日吐蕃回紇請決戰公以虜􅀐勁亦以衆寡不敵孤軍無救使闢軍門躍日宼又至兵甲益盛公使衙前將李光瓚等出諭之亦不受紇合胡禄都督藥葛羅宰相立于陣前持滿相向公前叱之一􅀐而出兵部郎中馬錫主客貟外郎陳翃時以一􅀐從回半抽兵而逸回紇藥葛羅等遽追之公使白元光等継之十云云藥葛羅等惘然懐慙伏而請罪因與之盟吐蕃聞之夜舊子儀傳曰子儀自河中至屯於涇陽而虜􅀐已合子儀一五日至靈臺破尚結息一十萬衆十八日於涇州東又破之楚王當其南陳廻光當其西朱元琮當其北子儀率甲􅀐二軍萬餘人而雜虜圍之数重子儀使李國臣髙昇拒其東魏紇曰令公存乎僕固懐恩言天可汗已弃四海令公亦謝岀千出没於左右前後虜見而問曰此誰也報曰郭令公也回壽無疆回紇皆曰懐恩欺我子儀又使諭之云云回紇曰謂中國無主故從其來今令公存天可汗存乎報之曰皇帝萬諸將諫子儀曰今力固不敵且至誠咸神況虜軰乎回紇傳令公亡矣不然何以至此令公誠存安得而見之子儀將出領羅逹于等率其衆二千餘􅀐詣涇陽請降子儀許之率衆曰吐蕃將馬重英等十月初引退取邠州舊路而歸廻紇首我令公也回紇曰請去甲子儀便脫兠鍪槍甲竦馬挺身而被甲持滿數千人回紇譯曰此來非惡心要見令公子儀曰大將合胡禄都督藥葛羅等手責讓之曰國家知逈紇有功前回紇酋長相顧曰是也便下馬羅拜子儀亦下馬執迴紇身挺入汝營任心拘縶我下將士須與汝戰廻紇又譯曰懐報汝犬厚汝何背約犯我王畿我須與汝戰何乃降為我一我是以敢來今知天可汗見在上都令公為將懐恩天又殺恩負心來報可汗云唐國天子今已向江淮令公亦不主兵日廻紇逼涇陽陣于郭西使漢語者曰城中誰將軍吏對曰之今請追殺吐蕃收其羊馬以報國恩邠志曰十月二十四六人常服相詣其子晞等扣馬止之公撾其手曰去使人告郭令公也虜曰郭令公亡矣給我也郭公聞之獨與家僮五尚在今日降可乎郭公入其衆取酒飲之虜又請曰恐不見虜按轡就之廻紇熟視曰是也下馬皆拜曰始者不知令公蕃衆於靈臺殺萬餘人而去按長曆十月己未朔三日辛酉信願擊吐蕃以自効郭公從之廻紇擊吐蕃逐之三十日敗留十七日而寂無攻戰之一事乎當是時陳翃在子儀軍中十九日丁丑如實録所言豈有廻紇吐蕃數十萬衆入京畿吐蕃日皆從汾陽家傳事則兼采衆書擇其可信者取之所記月日近得其實今二虜圍涇陽及子儀與廻紇盟反破閏月李昌巙討崔旰䕫今從實録唐曆作李昌大曆元年二月邠卒引弓至二百四十斤引二十四舊傳作能公别傳弓今從叚八月魚朝恩講易譏王縉元載得預此㑹者按實録是時縉留守東都而於其第然則雖守東都有時朝京師也明年二月郭子儀入朝許元載王縉等宴二年四月杜鴻漸請入朝以崔旰知西川留後鴻舊仍賜名寧鴻漸歸遂授寜西川節度使至十四年始入朝實漸傳云鴻漸份率旰同入覲寧傳云鴻漸請旰為行軍司馬朝事鴻漸傳誤也録亦無隨鴻漸入七月髙郢上書月十二日上今因造寺終言之郢集前書八月二十五日後書九九月甲子郭子儀移鎮奉天吐蕃至涇西二十七日汾陽家傳八月十七日寅宼靈州乙卯宼宜禄蓋據奏到日今從唐曆詔統精卒一萬與馬璘合攻之今從實録實録甲十月戊寅路嗣㳟破吐蕃嗣㳟破吐蕃按長曆戊申九唐曆九月吐蕃圍靈武戊申今從實録月一日也三年四月上欲以李泌為相固辭以讓元載按載時鄴侯家傳曰固辭中人手詔馹􅀐徴先公於衡嶽先是半年前先公夜遇盗三已為相何讓之有又曰到山四歳而二聖登遐代宗踐阼命無所傷縁巖攀蘿而出不敢至舊居山中人初以為仙去及人為其所拉而投之於懸澗及日出乃寤下藉樹葉丈餘都疑盗為張后及輔國所遣亦竟不知其由按􅀇肅登遐泌雖中貴將至先公大懼沐浴更衣以俟命乃代宗踐阼之徴也經幸陜泌豈得全無一言召泌必在幸陜之後李繁誤記耳在山林豈容全不知如家傳所言是代宗纔立即召泌也須上為泌娶盧氏女食肉結㛰按下云阿足師竊氊履置鄴侯家傳云永泰元年端午上令泌㛰上即位至永泰纔四年耳又云因此得謗元載遂因魚朝紫宸上欲使内人護燈燭泌曰臣六七年在此又曰况新賜不相逺今盡因追贈承天言之恩事排出之然則結㛰與朝恩誅承天皇帝葬順陵喪葬齊陵今從實録葬順陵鄴侯家傳曰命使自彭原迎崔旰賜名寧司馬即攺名寧今從實録舊傳旰􅀄為杜鴻漸行軍六月崔寧妾任氏破楊子琳即日詔寧還成都七月壬實録五月子琳襲據成都據城七月奏破之成功雖因任氏奏時須著寛名故也由又云子琳宼成都遂據其城寧弟寛破之蓋五月奏九月白元光破吐蕃京師解嚴靈州破吐蕃六萬餘實録戊戍郭子儀奏光所破也子儀合前後所破而奏之耳衆百僚入賀京師解嚴蓋即壬辰白元十月命賀􅀂察按李岵煞木道節度判官姚奭及奭之實録十月乙巳潁州剌史李岵初岵以公務為彰所怒因遣奭廵按境内便留知潁州事岵弟岵弃州奔汴州本道節度使令狐彰以聞岵亦抗表上聞州守將得之懼乃與岵同謀煞奭詔給事中賀􅀂察使于潁間之遂與親吏潜謀詐為奭書將為變使將士遺於路中潁怒潁州剌史李岵遣奭代之且告之曰􅀂岵不受替即殺之按覆唐曆曰十月潁州將士怒殺毫州判官魏奭初令狐彰又曰彰表先至遣給事中賀􅀂察往滑州宣詔決李岵配流岵覺之以告將吏怒而殺奭并弟統紀作滑亳州判官姚奭實録統紀事則參取諸書夷州尋賜自盡今姓名從十二月徙馬璘於涇原以邠寧慶􅀠朔方酉以吐實録己原節度使以邠寧慶等州􅀠朔方汾陽家傳四年五月詔集蕃歳犯西疆増修鎭守乃以邠寧節度馬璘鎭涇州仍為涇子儀傳時以西蕃侵宼京師不安馬璘雖在邠州力不能拒兵於邠郊六月公自河中遣一萬兵二十八日公如邠州舊度使邠志初吐蕃旣退諸侯入覲是時馬鎭西以四鎮兼邠乃以子儀兼邠寧慶節度自河中移鎮邠州徙馬璘涇原節責己曰今四郊多壘中外未寧公執國柄有年矣安危大計寧李公軍澤潞以防秋軍盩厔丞相元公載使人諷諸將使乎載莞然曰安危繫於大臣非獨宰臣也先王作兵置之四一無所聞如之何載曰非所及也他日又言且曰得非曠職厔遊軍伺宼不逺京室王畿之内豈假是邪必令損益須自境所以禦戎狄也今内地無虞朔方軍在河中澤潞軍在螫千涇朔方于邠澤路于岐則内地無虞三邊有備三賢之意此始故曰非所及也郭李曰宰臣但圖之載曰今􅀂徙四鎭乎十二月詔馬公兼領涇原尋以鄭潁資之李公兼領山南何如三公曰惟所指揮旣而相謂曰我曹旣為所􅁽得無行朔方軍自此大徙于邠郭公雖連統數道軍之精甲悉聚邠猶以澤臨資之郭公兼領邠寧亦以河中資之三將皆如詔于邠十年之閒無遺甲矣叚公别傳曰馬公朝于京師以公府其它子弟分居蒲靈各置守將以專其令蒲之餘卒稍遷方何中之軍鎮之自率四鎮北庭之衆遷赴涇州將以拓西掌留事馬公懇奏請以邠寧慶三州讓副元帥子儀令以朔度使蓋三年立此議至四年子儀始遷邠今參取諸書境代宗壯而許之十二月二日朝廷以馬公為涇原節平盧行軍司馬許杲韓愈順宗實録舊傳作許果今從五年二月元載謀誅魚朝恩食召郭公豐年令節思邠志曰五年春詔以寒以功卒數千人入朝朕因宴賞得以相識一月郭公以組甲與大臣為樂時欲誅朝恩因喻郭公朔方一軍有社稷勞宜相得使諷邠吏請公無往邠吏自中書馳告郭公曰軍容將三千人入覲魚朝恩請公遊章敬寺公許之丞相元公意其從者三百人願備非常郭公怒曰我大臣也彼非有宻旨安不利於公亦告諸將須􅁷朝恩使至郭公將行士之􅂨甲請􅀱之驚曰何車􅀐之省也公以所閒對且曰恐勞思慮耳軍敢害我􅀂天子之命爾曹胡為獨與僮僕十數人赴之朝恩子儀五月入朝七月至邠川或是四年正月入朝時事於時容撫胷捧手嗚咽雪涕曰非公長者得無疑乎按汾陽家傳結周智光為外應乆掌禁兵􅀂不早圖禍將作矣亦不取未有誅朝恩之謀今不取家傳又曰三月公上言魚朝恩潜周皓擒朝恩縊殺之使更加實封留于禁中朝恩旣奉實録是日初詔罷朝恩􅀚軍容等處㑹寒宴近臣朝恩入謁有詔留之朝恩乃懼言頗悖戾上詔知負恩乃自縊又曰載遣腹心京兆尹崔昭等􅀱朝恩出昭尹京兆厚以財結其黨皇甫温周皓按實録去年十月乙以舊勲矝貸不加嚴刑朝恩遂自縊新傳曰載用左常侍崔兆也奉詔自縊殆非其實新傳云周皓與左右擒縊之今從之卯孟皥為京兆尹今年三月辛卯為左常侍未甞言崔昭為京八年五月乙酉徐浩薛邕貶原尉舊李栖筠傳云華實録云侯莫陳怤為美上依違未決屬月蝕上問其故對曰臣聞日蝕修德月蝕修原尉侯莫陳怤以主郵傳優攺長安尉又曰栖筠劾奏浩等坐怤者皆貶謫自此朝綱益振百度肅然按己丑月乃食於刑今誣上行私之罪未理此天所以儆戒於明聖由是感寤今不取時未也八月吐蕃宼靈武南七級渠公遣温儒雅後政等連兵汾陽家傳八月吐蕃五千􅀐至靈州之今從實録救之九月大破十月庚申渾瑊與吐蕃戰于宜禄到之日也邠志云實禄作甲子蓋奏曆命今從之十八日與唐甲子馬璘爲吐蕃所敗度馬公襲之郭公使其將渾瑊邠志曰十月西戎宼邠涇原節引其衆前據束險仍設拒馬槍以遏馳突之勢史抗温儒雅率步􅀐五千爲之掎角十八日師登黄萯原望見吐蕃瑊急則皆醉矣見拒馬槍曰野地見賊須撃設此何爲命去之戎等宿將五六人任氣自負輕海都將置酒髙飲瑊使召之至我師大敗卒之不死者十二三汾陽家傳十月吐蕃四節度衆旣陣抗等叱馬軍使馳賊及回自衝其軍吐蕃躡背而入之三十四日大戰于長武城我師敗績瑊等突出乃免唐曆曆涇川過閣川南於渭河合軍公遣渾瑊等前後相接以待璘出兵擊之又敗二十七日己巳璘遣兵斫吐蕃營破之二十八日吐蕃宼邠州瑊與戰于宜禄官軍大敗二十二日馬别傳曰八年冬十月二十三日犬戎入宼大戰于鹽倉我軍十八日庚午詔追諸道兵屯西郊十一月一日吐蕃退叚公是我師不利今日從邠志唐曆叚公家傳事從實録舊傳兼與朔方兵馬使渾瑊之衆併力齊攻防秋諸軍望賊而退於書采諸九年二月庚辰汴宋兵潰是月庚午朔十日乃己卯唐曆作十日己酉按長曆實録也今從四月甲申郭子儀辭還邠州今從實録唐曆作癸未十年三月陜州軍亂逐趙令珍辛卯陜州軍亂實録唐曆三月二十八日午朔今從之唐統紀云甲八月辛巳郭子儀還邠州丑今從實録汾陽家傳作丁九月馬璘破吐蕃於百里城潘原西而還八日至小汾陽家傳九月吐蕃略入華亭十月公遣渾瑊李懐光等與幽州義寧汴宋軍㑹于石門白草川十八日下朝那川二十三日至里城營支磨原大破之今從實録故平涼縣三日詰朝十月盧子期攻磁州邢州今從實録舊李寳臣傳作文田承嗣謂李正已曰承嗣今年八十有六卒時年按承嗣六者蓋欺正已七十五此云八十王武俊􅀃李寶臣玩養田承嗣嘉其功使中貴人馬舊王武俊傳曰代宗擲出道中王武俊勸玩養承嗣以為已資寳臣曰今與承嗣承倩齎詔宣勞承倩將歸止傳舎寶臣親遺百縑承倩詬罵閒耳􅀂傳虚言無益也今中貴人劉清譚在驛斬首送承嗣有釁矣可推腹心哉武俊曰勢同患均轉宼讎為父子欬唾兵滄州請擒送承嗣以取信許之按承嗣方求解於寶臣何承嗣立質妻孥矣寶臣曰吾不能如此武俊曰朱滔為國屯清譚乎寶臣自以承嗣誘之共取幽州故襲朱滔非因承倩必擒滔以取信且承清尚在傳舎武俊何不勸斬承倩而斬從唐紀之辱也今十一月路嗣恭擢敬冕為將俛今從舊傳鄴侯家傳作敬嗣恭克廣州斬哥舒晃之徒多因晃事誅之嗣恭前後舊嗣恭傳曰嗣恭平慶州商舶故嗣恭雖有平方靣功止轉檢校兵部尚書無所酬勞建中没其家財寶數百萬貫盡入私室不以貢獻代宗心甚衘之任以苟安之其王師征討不失有罪始斯役也旣而有謗其實録曰自兵興已來諸軍殺將帥而要君者多矣皆因授其遺載琉璃盤惡之故不用耳事見鄴侯家傳或當時亦有人收南海府庫閲上不實不得用乆之按代宗以嗣恭附元載恭􅀄平五嶺元載奏言嗣恭多取南人金寶是欲為亂陛下迎合以匿貨謗嗣恭不可知也今不取李肇國史􅀘云路嗣修覲禮江西判官栁渾入雨泣曰公有功方暑而追是為執不信試召必不入朝三伏中追詔至嗣恭不慮請待秋涼以追還表緘公今日過江宿石頭驛乃可從之代宗謂元載曰政所中今少遷延必族滅也嗣恭懼曰為之柰何渾曰健步營救得免事見鄴侯家傳載豈有譛嗣恭云欲為亂之理蓋嗣恭不俟駕行矣載無以對按嗣恭素附元載載誅賴李泌此疑時人因以為渾美事耳今不取載已􅀍誅而召嗣恭適在三伏渾有此十二月回紇宼夏州無之按實録明年二月加朔方戍此事出汾陽家傳實録新舊紀皆回紇甞入宼也兵以備回紇則是十一年八月加朱泚同平章事朱泚如奉天行營按實録閏八月己亥遣泚毎年往奉天防秋至春還京師伹實録不載其入朝耳去年已云泚出鎮奉天行營至此又云明年九月又云蓋汴宋兵馬使李僧惠思惠今從舊傳汾陽家傳作李十二月丙申馬璘薨月十三日景申馬公薨十二年正實録庚寅璘薨叚公别傳曰十二實知河東留後按時馬璘新薨秀實涇原留後備禦吐蕃豈月八日奉制除涇州刺史知節度事實録又云丁酉以叚秀有斯命尋聞璘薨遂除涇原耳可輟之使攝河東蓋奏報未至十二年九月叚秀實爲涇原節度使自授鉞三五叚公别傳曰侵陵我疆舊傳亦曰三四年間吐蕃不敢犯塞按是月吐蕃年間西鄰無烽燧之警又曰戎帥論乞力陀慕公清德不敢逼涇州云三四年閒不敢犯塞蓋史家溢美之辭耳宼原州十二月朱泚拒吐蕃自涇州還明年九月吐蕃十月劉洽爲宋州刺史洽將兵乗其無備徑入宋州桉舊劉􅀇佐傳云李靈曜據汴州守宋州朝廷因授宋州刺史耳􅀂僧惠未降則洽不能得宋劉昌以宋州牙門將􅀃李僧惠歸順則是僧惠先已爲靈曜引兵據宋州耳舊傳欲以爲洽功故云然其實非也州已降則不敢取宋州蓋僧惠已爲李忠臣所殺洽因十二月李納爲靑州刺史靑州刺史充淄靑留後至此實録此年二月丙戍以納爲納及腹心之將分理其地納傳云正已擊田承嗣署奏留後又云爲青州剌史舊正已傳云正已自靑州徙居鄆州使子史今從之尋遷靑州刺十四年五月崔祐甫作相未二百日除官八百人八百貟多稱允當今從建中實録舊紀云祐甫作相未逾年凡除吏幾八八月楊炎為門下侍郎同平章事門下遷中書是時崔祐甫與炎皆自上中書在下不知何時升攺中書在上也憲宗以後門下在十月吐蕃入宼一出茂州一出扶文一出􅀺雅中建來年四月乃云去冬吐蕃三道來侵一自靈武一自山南一實録裴垍德宗實録此月吐蕃三道入宼皆在梁益之境而已入扶文蜀師已趣􅈅口追且不及與此自相違今不取自蜀又云賛普謂韋倫曰今靈武之師聞命輟矣而山南輼輬車稍指丁未出門欲斜就道西不當道中閒行耳按車指丁未之閒則行出道外矣蓋張光晟知單于振武等城振武今從實録舊傳云王雄為楊炎欲奪崔寧權置三留後史大夫平章事寧以爲舊傳􅀄寧代喬琳為御人為御史楊炎大怒其狀遂寢炎又數讒毁劉晏寧又救解選擇御史當岀大夫不謀及宰相乃奏請以李于結等數難制奏上之按寧為御史大夫在吐蕃南蠻宼蜀後舊傳恐誤之因此大怒其年十月南蠻大王上遣寧還鎭炎懼怨已入蜀十二月詔財賦歸左藏歳擇三五千匹進入大盈萬匹今從建中實録德宗實録作三五十徳宗建中元年正月罷劉晏轉運等使曰初大曆建中實録閹官劉清潭京兆尹􅀺幹與左右嬖幸欲立貞懿為皇后且中上居東宫貞懿皇后方為妃有寵生韓王回帝又鍾愛故効圖為幸輔時宰臣元載獨保護上以為最長而賢且甞有言韓王所居獲黃蛇以為符動揺儲宫而晏附其謀兾立殊後其議漸定貞懿卒不立上憾之至是以晏大臣而附邪為功義不當移王縉亦謂人曰晏黠者也今所圖無乃過黠乎沈旣濟楊炎所薦蓋附炎為􅀃今從舊傳姦不去將為亂託陳奏不實謫為忠州刺史二月遣黜陟使十一人洪經綸等使河北録黜陟建中實名而無河北道及經綸名蓋脫誤也使十一人而無名徳宗實録有十人四月吐蕃發使隨韋倫入貢上命歸其俘録曰及建中實土宇日廣守兵勞弊以國家始因用胡為邊將而致禍故得境境上守陴者焚樓櫓弃城壁而去初吐蕃旣得河湟之地以為婢僕故其人苦之及見倫歸國皆毛裘蓬首窺覷牆􅂩河隴之士約五十萬人以為非族類也無賢愚莫敢任者悉之􅀂歳焉君子曰惜乎人心之可乗也􅀂逾代之後斯人旣或搥心隕泣或東向拜舞及密通章䟽言蕃之虚實望王師溢美且欲附楊炎復河隴之􅀃耳令不取没後生安於所習難乎哉此恐沈旣濟之五月劉海賔殺劉文喜誅之師圍涇城數月不㧞文邠志曰詔李懐光朱泚并軍弈使韓逰瓌爭之曰西戎􅀂來涇衆必變義不為文喜没身喜使其子求救于吐蕃蕃衆將至二將議退軍以避之都逰喜求節度耳王師致討困則歸之安能赤土塗面為異方之於戎虜秋七月西蕃遊􅀐登髙麾涇人涇人果曰始吾為文泚之亂亦自此始按是時吐蕃通好無入援文喜事又實録人乎劉海賔因之殺文喜以衆降泚泚無所戮涇人徳之萌蕃至皆相違今從建中實録此月涇州平而邠志云七月西六月桑道茂請城奉天神䇿修奉天城道茂請髙其垣舊傳云道茂待詔翰林建中初方思道茂之言時道茂已卒命􅀕之今從實録及崔庭光幸墻大爲制度徳宗不之省及朱泚之亂帝蒼猝出幸至奉天九姓胡􅀃回紇乗喪入宼因遣源休􅁽命追叙之耳旣云乗喪入宼當在去年今源休使回紇而離妻族上訢下御史臺驗理休遲留不荅舊傳曰休妻即吏部侍郎王翊女也因小忿尹嚴郢威名稍著心欲傾之郢即王翊甥壻也休與王氏離欵狀除名配流溱州乆之移岳州建中初楊炎執政以京兆伺郢過失休旣在職乆與郢親善炎怒之奏令以本官兼御絶之時炎風聞休郢有隙遂擢休自流人為京兆少尹俾令晟未殺突董炎安知回紇欲殺休而遣之今不取史中丞奉使回紇按休奉使時回紇方恭順張光八月姚令言為涇州留後為四鎭北庭行營涇原節度舊傳孟皥尋歸朝遂拜令言後姚令言為節度使此年必始為留後也使按實録建中三年八月以涇原節度留九月不按贓吏殆二十年年蓋字之誤也建中實録云三十資治通鑑考異卷第十七
