body:
  text: 臣司馬光奉勑編集周紀安王二十五年魯穆公薨子共公奮立六國表周威司馬遷史記王十七年己巳康公元年二十六年戊寅景公元年赧王元烈王十九年甲戍魯穆公元年烈王元年丙午共公元年顯公元年五十九年乙巳周亡秦莊襄王元年壬子楚滅魯按年丁未平公元年二十年丙寅文公元年四十三年己丑頃也共公二十二年卒􅀂元丙午終戊辰則是二十三年也康魯丗家穆公三十三年卒􅀂元甲戍終乙巳則是三十二年乙丑則是十九年也文公二十三年卒頃公二十四年楚滅公九年卒景公二十五年卒平公二十二年卒􅀂元丁未終惟平公二十年耳本志自魯僖公五年正月辛亥朔旦冬至魯班固漢書律曆志文公作緡公其在位之年與丗家異者巳朔旦冬至元公四年正月戊申朔旦冬至康公四年正月推之至成公十二年正月庚寅朔旦冬至定公七年正月己八年十一月乙巳朔旦冬至武帝元朔六年十一月甲申朔丁亥朔旦冬至緡公二十二年正月丙寅朔旦冬至漢髙祖七十六年此最為得實又與魯丗家注皇甫謐所紀歳次皆旦冬至元帝􅀄元二年十一月癸亥朔旦冬至其間相距皆差謬難可盡據也合今從之六國表顯王七年燕􅁊公薨子文公立侯按春秋時此燕簡公史記蘇秦傳謂之燕文豈文公獨稱侯乎今從丗家已稱公文公之子易王尋稱王三十六年蘇秦約六國從谷関十五年又云其後秦使史記蘇秦傳秦兵不敢闚函從約止在明年耳其自相違戾如此秦本紀惠文王七年公犀首欺齊魏與共伐趙蘇秦去趙而從約皆解齊魏伐趙敗十五年乎此出於遊談之士誇大蘇秦而云爾今不取子卬與魏戰虜其將龍賈後二年事耳烏在其不闚函谷愼靚王二年魏惠王薨子襄王立三十六年卒子襄王史記魏丗家云惠王國表惠王元辛亥終丙戌襄王元丁亥終壬寅哀王元癸卯立襄王十六年卒子哀王立哀王二十三年卒子昭王立六古書其紀年篇起自夏殷周皆三代王事無諸國别也唯特終乙丑按杜預春秋後序云太康􅀄汲縣有發舊冡者大得年相次晉國滅獨記魏事下至魏哀王之二十年蓋魏國之記晉國起自殤叔次文侯昭侯以至曲沃莊伯皆用夏正編王三十六年改元從一年始至十六年而稱惠成王卒即惠史記也哀王於史記襄王之子惠王之孫也古書紀年篇惠乃卒故特不稱謚謂之今王裴駰魏丗家注引和嶠云紀年王也疑史記誤分惠成之丗以為後王年也哀王二十三年惠成王但言惠王惠王子曰襄王襄王子曰哀王惠王三十起自黃帝終於魏之今王今王者魏惠成王子按太史公書成王立三十六年攺元稱一年攺元後十七年卒太史公書六年卒襄王立十六年卒并惠襄為五十二年今按古文惠無哀王然則今王者魏襄王也彼旣魏史所書魏事必得其為誤分惠成之丗以為二王之年數也丗本惠王生襄王而從之真今赧王五十七年魏新垣􅄛􅀃趙欲帝秦魯仲連折之為却軍五十里按仲連所言不過論帝秦之利害耳使新垣史記魯仲連傳云新垣衍謝請出不敢復言帝秦秦將聞之十里乎此亦遊談者之誇大也今不取衍慙怍而去則有之秦將何預而退軍五漢紀上太祖元年十月沛公至霸上是月五星聚東井按魏􅼲史記漢書荀恱漢紀皆云星行度并譏前史之失别為魏歴以示允允曰善言逺者必後魏書髙允傳崔浩集諸術士考校漢元以來日月薄蝕五事今譏漢史而不覺此謬恐後之譏今猶今之譏古浩曰所先驗於近且漢元年冬十月五星聚於東井此乃歴術之淺尾箕昬􅃿於申南而東井方出於寅北二星何因背日而行謬云何允曰按星傳金水二星常附日而行冬十月日旦在君獨不疑三星之聚而怪二星之來允曰此不可以空言争是史官欲神其事不復推之於理浩曰欲為變者何所不可虚言也後歳餘浩謂允曰先所論者本不經心及更考究果宜更審之時坐者咸怪東宫少傳游雅曰髙君長於歴當不月也今從之十月不言五星聚如君語以前三月聚於東井非十三年酈生勸漢主據敖倉又請􅀃齊王食其勸取敖倉史記漢書皆以序分為二臣謂分為二者是及請􅀃齊合為一事獨劉向新五年九月壬子立盧綰為燕王云使丞相噲將兵平代史記漢書髙紀於此皆為丞相又代地無反者噲傳亦無此事疑紀誤地按樊噲傳從平韓王信乃遷左丞相是時未十年五月太上皇崩七月癸卯葬崩七月癸卯太上皇漢書五月太上皇后荀恱之時漢書本尚未訛謬故也今從之崩葬萬年荀紀五月無后字七月無崩字蓋徙周昌為趙相以趙堯為御史大夫皆云十二年上擊史記漢書張良傳為御史大夫則是時太子位已定今從之黥布還愈欲易太子按百官表十年趙堯十一年二月丙午立皇子恢為梁王三月丙午按劉羲漢書諸侯王表作丙午今從史記年表叟長曆三月丙辰朔無七月立皇子長為淮南王子厲王長元年漢書諸侯王史記諸侯年表云十二月庚今從漢書帝紀表十月庚午立上欲使太子擊黥布太子客使吕釋之夜見吕后記史釋之今此上云建成侯而下云吕澤恐誤當為釋之是又留漢書皆云吕澤夜見吕后按恩澤侯表有周吕侯澤建成侯能得堅決者也吕后恐不知所為人或謂吕后曰留侯善畫侯丗家上欲廢太子立戚夫人子趙王如意大臣多諌爭未謀臣今上易太子君安得髙枕而卧乎留侯曰始上數在困計筴上信用之吕后乃使建成侯吕澤劫留侯曰君常為上臣等百餘人何益吕澤強要曰為我畫計留侯曰此難以口急之中幸用臣筴今天下安定以愛欲易太子骨肉之間雖為上慢侮人故逃匿山中義不為漢臣然上高此四人今公舌爭也顧上有不能致者天下有四人四人者年老矣皆以宜來來以為客時時從入朝令上見之則必異而問之問之誠能無愛金玉璧帛令太子為書卑辭安車因使辯士固請卑辭厚禮迎此四人四人至客建成侯所上欲使太子擊黥上知此四人賢則一助也於是吕后令吕澤使人奉太子書建成侯云云上遂自行上破布歸置酒太子侍四人從太子布四人相謂曰凡來者將以存太子太子將兵事危矣乃􅀃四人前對各言名姓曰東園公角里先生綺里季夏黄公上年皆八十有餘鬚眉皓白衣冠甚偉上怪問之曰彼何為者人皆曰陛下輕士善罵臣等義不受辱故恐而亡匿竊聞太乃大驚曰吾求公數歳公辟逃我今公何自從吾兒游乎四等來耳上曰煩公幸卒調護太子四人為壽已畢起去上目子為人仁孝恭敬愛士天下莫不延頸欲為太子死者故臣已成難動矣吕氏眞而主矣戚去人泣上曰為我楚舞吾為送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼四海當可柰何雖有矰繳尚安所施歌數闋戚夫人嘘唏流若楚歌歌曰鴻鵠髙飛一舉千里羽翮已就横絶四海横絶髙祖剛猛伉厲非畏搢紳譏議者也但以大臣皆不肯從恐涕上起去罷酒竟不易太子者留侯本招此四人之力也按顧義理以留侯之乆故親信猶云非口舌所能争豈山林四身後趙王不能獨立故不為耳􅀂決意欲廢太子立如意不數寸之刃耳何至悲歌云羽翮已成矰繳安施乎􅀂四叟實叟片言遽能柅其事哉借使四叟實能柅其事不過汚髙祖侯豈為此哉此特辯士欲夸大四叟之事故云然亦猶蘇秦能制髙祖使不敢廢太子是留侯為子立黨以制其父也留將聞之却軍五十里耳凡此之類皆非事實司馬遷好竒多約六國從秦兵不敢闚函谷闗十五年魯仲連折新垣衍秦今皆不取愛而采之十二年十一月陳豨反漢擊斬豨斬豨按斬豨者周勃非盧綰傳云漢使樊噲擊也噲四月甲辰帝崩于長樂宫誅諸將酈商見審食其􅀃以漢書云吕后與審食其謀盡以丁未發䘮按吕后雖􅁀戾亦安敢一旦盡誅大臣又時陳如此大臣内畔諸將外反亡可蹻足待也審食其入言之乃代此􅀃恐妄今不取平不在滎陽樊噲不在惠帝三年季布曰前匈奴圍髙帝於平城前陳豨反季布傳云城之圍乃韓王信反非豨反也於代時匈奴圍髙帝於平城按平髙后元年大謁者張釋漢書匈奴傳皆作澤史記吕后本史記文帝本紀及惠景間侯者表皆云張釋顔師古注曰荆燕吳傳云張擇今從史記吕后本紀八年中大謁者張釋漢書紀作釋卿恩澤侯表及周勃傳侯表周勃傳紀漢書恩澤酈侯台鄜侯今從史記本紀功臣侯表漢書外戚侯表及髙五王傳皆作二年十一月吕肅王台薨不疑為􅁪山王吕台為吕王二史記本紀髙后元年立孝惠子本紀元年立不疑吕台産禄通為王二年不疑薨年表元年年􅁪山王薨十一月吕王台薨年表二人皆以元年薨漢書書於元年耳其實二人皆以二年薨漢書本紀云産禄通為不疑及吕台為王二年皆薨蓋史記年表薨字應在二年誤誤也王亦五月封楚元王子郢客齊悼惠子章皆為侯后紀在史記髙書王子侯表元年今從漢六年夏張敖卒功臣表髙后六年敖卒漢書功臣表敖以史記吕后本紀敖卒在明年六月按史記年薨蓋本紀之誤髙祖九年封十七七年七月封劉澤為琅邪王田生先􅀃張卿令風大臣史記丗家漢書列傳皆云之以産代為吕王産非始封於吕又諸吕之王已乆何必待立吕産為吕王然後􅀃令王澤按太后自以吕王嘉驕恣廢以此不取田生之謀八年四月封張侈為新都侯壽為樂昌侯間侯者表史記惠景作受今從本紀新都作信都壽七月審食其為帝太傅其為太傅九月丙戍復為丞相史記將相表八年七月辛巳食月復為丞相後九月免以長曆推之八年七月無辛巳九月後九月免漢書公卿表七年七月辛巳食其為太􅀓八年九本紀免相在此月本紀又云八月壬戍食其復為左丞相亦誤無丙戍閏月羣臣代邸上議無食其名二表皆誤今從史記八月齊王使祝午詐奪琅邪王澤兵傳皆以為澤與齊史記澤丗家漢書齊王丗家漢書吕后紀齊王傳王合謀蓋誤今從史記吕后本紀九月庚申旦后紀亦云八月庚申今以長曆推之下八月當史記本紀八月庚申旦上有八月丙午漢書髙月為九景帝三年周亞夫至洛陽喜曰滎陽以東無足憂者者按孟一游俠之士耳亞夫得之何足為輕重蓋其徒欲為史記漢書皆云太尉得劇孟喜如得一敵國曰吳楚無足憂言不足信也孟重名妄撰此中二年殺郅都吏傳郅都死後宗室多犯法上乃召寗成史記本紀後二年正月郅將軍擊匈奴酷將軍者非都也疑别一人漢書紀無郅將軍事為中尉成為中尉在中六年則後二年所謂郅丗宗建元元年十月䇿賢良以董仲舒為江都相莊助為中大夫公孫􅀪出焉仲舒傳曰仲舒對冊推明孔氏漢書武紀元光元年五月詔舉賢良董仲舒舉孝廉在元光元年十一月􅀂對䇿在下五月則不得云自抑黜百家立學校之官州郡舉茂才孝廉皆自仲舒發之令年以前唯今年舉賢良見於紀三年閩越東甌相攻莊助己仲舒發之蓋武紀誤也然仲舒對䇿不知果在何時元光元災仲舒推􅀃其意主父偃竊其書奏之仲舒由是得罪按二為中大夫故皆著之於此仲舒傳又云遼東髙廟長陵髙追述二災而作書或作書不上而偃後來方見其草藁也災在建元六年主父偃傳上書召見在元光元年盖仲舒二年石慶為太僕御出為太僕蓋甞攝職也接百官公卿表慶不三年閩越圍東甌天子問田蚡皆云建元三年閩越圍史記東越漢書嚴助傳誤也下云太尉不足與計盖追呼其官或亦誤耳東甌天子問太尉田蚡按是時蚡不為太尉云太尉上招選天下之士得朱買臣等令與大臣論辯東方朔諌起上林苑司馬相如諌獵東甌及微行始出終言之此多非今年事因莊助救元光二年王恢議誘擊匈奴聶壹畫馬邑事而漢書武史記韓長孺傳元光元年言之二年議乃決也紀在二年蓋元年壹始三年春河水徙從頓丘東南流勃海按頓丘屬東郡勃漢書武紀云東南流入北恐誤今不取海乃在頓丘東五月丙子復決瓠子注鉅野子東注鉅野服䖍注漢書武史記河渠書元光中河決瓠將相名臣表曰五月丙子河決瓠子然則瓠子即濮陽縣境紀曰瓠子隄名在東郡白馬蘇林曰在鄄城以南濮陽以北也隄名四年十二月晦殺竇嬰之羣臣多是竇嬰上亦不復窮班固漢武故事曰上召大臣議后太后亦哭弗食上不得已遂乃殺嬰按漢武故事語多誕問兩罷之田蚡大恨欲自殺先與太后訣兄弟共號哭訴太人為之託固名耳妄非班固書盖後三月乙卯丞相蚡薨夫事其夏取夫人五年十月論灌夫武安侯傳云元光四年春丞相按灌薨在嬰死後分明四年當是三年五年當是四年今從之廣及家屬十二月晦魏其棄市徐廣引武帝本紀侯表以為蚡恐魏其得釋故以十二月晦殺之何必攺為二月也又疑十二月為二月按漢制常以立春下寛大詔書蚡五年公孫􅀪對策一歳中至左内史元年五月詔策賢漢書武紀云元光文學菑川國推上􅀪其策文與武紀元年策文頗相􅀋又云良於是董仲舒公孫􅀪等出焉按􅀪傳元光五年復徵賢良再舉賢良不在元光元年明矣荀紀著於此年徵吏民明當一歳中至左内史百官表元光五年􅀪為左内史然則􅀪之上為賢良􅀂此續食之詔在八月則􅀪不容於今年已為左丗之務下葛洪西京雜記亦云􅀪以元光五年為國士所推文相類盖出偶然或者此䇿乃􅀪先舉賢良時所對班氏誤内史盖此詔在今年不知何月故班氏繫之於年末耳其策未能明今從漢紀以為此年之䇿疑董偃見上恩猶自親近後置酒主家主見所幸董偃按東漢武故事曰陳皇后廢處長門宫竇太主以􅀫名曰長門宫則偃見上在陳后廢前明矣方朔傳爰叔為偃畫計令主獻長門園更元朔元年二月皇子據生春戾太子生外戚傳衛皇后元漢書武五子傳賛曰建元六年外戚傳合蓋賛語因􅃖尤之旗致此誤亦猶五星聚在秦二朔元年生男據按枚臯傳云武帝春秋二十九乃有皇子與漢元年也丗末年誤為也或者元狩元年天子始令騫通身毒國疑不能明故因是表騫以元朔六年二月甲辰封愽望侯必非元狩元年始歸立終言之歳伊穉斜五年封丞相􅀪為平津侯官表􅀪為相皆在今年建元以史記將相名臣表漢書公卿百􅀪始為御史大夫盖誤書五為三因置於三年耳來侯者表恩澤侯表皆云元朔三年封侯按三年元狩二年三月戊寅丞相􅀪薨壬辰以李蔡為丞相張湯為御史大夫廷尉張湯為御史大夫六年有罪自殺漢書百官公卿表元狩三年三月壬辰應補其缺豈可留之朞年復與李蔡為丞相月日正同乎又史記將相名臣表元狩二年御史大夫湯按李蔡旣遷湯即之年推之在今年明矣今從史記表按長曆三年三月無壬辰又以得罪渾邪王降發車二萬乗迎之從史記平準書汲黯傳漢書食貨志云三萬兩今三年得神馬於渥洼水中次以為歌汲黯進言上不􅀃使僮男僮女七十人俱歌又甞得神馬渥洼水中復次以史記樂書武帝作十九章歌常以正月上辛祠太一甘泉陛下得馬詩以為歌云云丞相公孫􅀪曰黯誹謗聖制當族為太一之歌後伐大宛得千里馬次以為歌中尉汲黯進曰隂乃立樂府作十九章之歌以正月上辛用事甘泉圜丘按漢書禮樂志武帝定郊祀之禮祠太一於甘泉􅀕后土於汾年秋馬生渥洼水中五年十一月立泰畤於甘泉太􅀄四年天馬歌本志云元狩三年馬生渥洼水中作武紀云元鼎四黯以元狩三年免右内史五年為淮陽太守元鼎五年卒又貳師獲汗血馬作西極天馬之歌公孫􅀪以元狩二年薨汲右内史而譏之言當族者非公孫􅀪也雖未立泰畤或以歌黯未甞為中尉或者馬生渥洼水作歌在元狩三年汲黯為歌當時未能盡備也之於郊廟其十九章之四年少翁以方夜致􅀑如王夫人之貌李夫人傳中古漢書以此事置王夫人卒少翁以方夜致王夫人及竈􅀑之貌云按李夫人今相承皆以為李夫人事史記封禪書少翁見上上有所幸書誤也今從史記卒時少翁死已乆漢五年三月􅀄行五銖錢銖錢明年以三銖錢輕更鑄五銖漢書食貨志前以銷半兩錢鑄三半兩錢行五銖錢誤也錢武帝元狩五年乃云罷六年冬楊可告緡民告緡據義縱傳則在今冬漢書武紀元鼎三年十一月令義縱棄市霍去病射殺李敢病鼎湖甚病愈幸甘泉大史記封禪書云明年天子官公卿表義縱李敢死皆在今年敢傳云從上雍至甘泉宫赦莫知其為何年本紀皆無其事獨義縱傳有之按漢書百元狩四年造白金元鼎元年赦首尾四年􅀂今年更有赦則雍盖衍字也平凖書云自造白金五銖錢後五歳赦按武紀不合今從百官表四年再赦與平準書顔異誅廣見漢書百官公卿表其年注云大農令顔異二徐廣注史記平凖書云異誅在元狩四年壬戍歳二年字致此誤也年坐腹非誅不思有元鼎元年寳鼎于河東汾水上吾丘壽王對云云按封禪漢書武紀此年云得鼎汾水上漢紀云六月得土營旁得鼎詔曰間者廵􅀕后土云云武紀元鼎四年十月書欒大封樂通矦之歳其夏六月汾隂巫錦為民祠魏睢后旁禮樂志又云元鼎五年得寶鼎恩澤矦表元鼎四年四月幸汾隂十一月立后土祠于汾隂睢上六月得寶鼎后土祠誤增此得鼎一事耳非兩曾得鼎於汾水上也封禪書天子乙巳欒大封矦然則得鼎應在四年蓋武紀因今年攺元而元年然則元鼎年號亦如建元元光皆後來追攺之耳封太山反至甘泉有司言寶鼎出為元鼎以今年為元封四年樂成矦丁義薦欒大史記漢書功臣表當為丁義漢書郊祀志作樂成矦登按欒大鬭旗漢武故事云大甞於殿前樹旍數百枚大令旍封禪書郊祀志皆作棊獨史記孝武紀作旗按􅀚者皆駭然則作旗字者是也自相擊繙繙竟庭中去地十餘丈五年三月封樛廣徳為龍亢侯越傳作㰍矦晉灼曰㰍漢書功臣表作龍矦南及南越傳皆作龍亢侯今從之古龍字史記建元以來矦者表六年越郎都稽得吕嘉越傳皆云都稽今從傳史記漢書表皆作孫都南封樓船蘇􅀪都稽趙光等皆為矦皆有月日為其先後凡此等封矦者年表功之處後倣此難齊故盡附於立分武威酒泉置張掖敦煌郡王降以其地為武威酒泉漢書武紀元狩二年渾邪􅀄元年開武威郡太初四年開敦煌郡後元元年分酒泉置郡元鼎六年分置張掖敦煌郡而地理志云張掖酒泉郡太武紀今從元封元年冬釋兵須如今從史記漢書作涼如上問黃帝冢公孫卿對故事云公孫卿對今取之史記漢書皆云或對漢武正月幸緱氏紀及荀紀皆作正月今從之封禪書郊祀志作三月漢書武四月乙卯封泰山下東方卯自海上還乙卯至泰山行事也武紀癸卯上還登封泰山蓋癸二年公孫遂往正之字誤今從漢書史記作征之蓋天子誅遂市則武帝必以遂執樓船為非漢書作許盖字漢書作許遂按左將軍亦以争功相嫉乖計棄史記誤今從相韓隂今從史記漢書隂作陶三年七月膠西于王端薨瑞今從漢書荀紀端皆作五年四月衛靑薨每因太子涕泣請上削其封上曰吾自漢武故事云大將軍四子皆不才皇后子封爵各留千户焉按靑四子無坐奢滛誅者此􅀃妄也知之不令皇后憂也少子竟坐奢滛誅上遣謝后通削諸天漢元年衞律使匈奴還聞李延年家収亡降匈奴利尚爲將帥盖止誅延年及弟季妻子耳延年傳云誅延年兄弟宗族按是後李廣七月閉城門大搜侈七月大搜則搜索踰侈者不必閉城臣瓉注武帝紀曰漢帝年記六月禁踰搜姦人耳門大搜蓋四年正月遣李廣利等擊匈奴利於此降匈奴誤史記匈奴傳云廣四月立皇子髆爲昌邑王立今從武紀表云六月乙丑征和二年七月壷􅀜三老茂上書天子感寤事云治漢武故寤赦反者拜鄭茂為宣慈校尉持節徇三輔赦太子太子欲隨太子反者外連郡國數十万人壷􅀜三老鄭茂上書上感􅀂赦太子當詔吏勿捕此􅀃恐妄也出疑弗實吏捕太子急太子自殺按上四年八月辛酉晦日有食之按長曆是年九月壬戌朔荀紀作七月漢書作八月馬牛羊驢橐駝七十餘萬頭千人七十餘萬頭為六十常惠傳四萬級為三萬九從烏孫傳餘萬頭今六月己丑蔡義薨乙丑誤荀紀作地節二年四月戊申以張安丗為大司馬車􅀐將軍為衞將軍霍禹為大司馬七月壬辰禹要斬荀紀三年四月百官表地節三年四月戊申張安丗為大司馬七月戊戍更當再言七月以宣紀張安丗霍光傳考之安丗為司馬當在戊辰安丗為大司馬按明年四月無戊辰七月無戊戍又不年七月盖年表旁行通連書之致此誤也今年為衞將軍當在明年十月禹死在四三年四月戊申立子奭為皇太子年四月戊申漢書舊荀紀立皇太子在去地節三年立皇太子知在此年者是也本亦然顔師古據䟽廣及邴吉傳並云鄭吉與司馬憙擊車師匈奴傳校之知在三年西域傳云地節二年以元康元年冬趙廣漢坐要斬罪要斬百官表本始三年本紀元康二年冬廣漢有按廣漢傳司直蕭望之劾奏廣漢摧辱大臣望之自司直為廣漢為京兆尹六年要斬元康元年守京兆尹彭城太守遣元康元年本紀誤也廣漢傳又云地節三年七月丞相婢自平原太守元康元年自平原太守為少府然則廣漢死當在而廣漢追發其事也絞死蓋婢死已數年三年三月封故昌邑王賀為海昬􅇋月壬子封宣紀賀王子侯表賀以四月癸亥朔無壬子表誤封在丙吉之前按是歳四四年八月求髙祖功臣子孫皆復其家年五月復髙宣紀元康元適後黃金人二十斤按功臣表詔復家者皆云元康四年其皇帝功臣絳矦周勃等百三十六人家子孫四年又賜功臣誤蓋紀誤耳數非一不容盡神爵二年五月趙充國奏罷屯兵秋羗斬先零猶非楊玉首降奏罷屯兵秋羌斬猶非楊玉降今從傳宣紀五月羗斬猶非楊玉降充國傳五月置都護自鄭吉始置盖誤以神爵為地節也西域傳又云百官表曰西城都護加官地節二年􅀄年亦誤神爵三大鴻臚蕭望之議不可許烏孫結昬康二年望之傳云烏孫傳請昬在元為鴻臚蓋誤以神爵為元康也神爵二年按元康二年望之未三年八月詔益吏百石已下俸十五以下俸十五韋昭宣紀云益吏百石蓋以十五難曉故攺之然詔云以下恐難指五十斛也曰􅀂食一斛則益五斗荀紀云益吏百石以下俸五十斛四年五月匈奴單于遣弟呼留􅀂王勝之來朝傳握匈奴􅀂王勝之入漢獻見蓋即謂此也衍朐鞮單于立復修和親遣弟伊酋五鳳元年春皇太子冠於元康三年􅅃二䟽去位事已按宣紀太子冠在此年而荀紀重􅃨言之蓋誤也云皇太子冠至是又二年正月幸甘泉郊泰畤作正月按漢制常以正月郊宣紀云三月行幸甘泉荀紀必不至河東矣蓋時亦幸河東祠后土史脫之也祀蓋荀恱作紀之時本猶未誤也又楊惲傳曰行十一月匈奴烏厲屈與父呼遫累烏厲温敦降封烏厲屈為新城侯烏厲温敦為義陽侯累單于帥衆來宣紀匈奴呼遫率衆降侯義陽侯厲温敦以匈奴謼連累單于率衆降侯此降功臣表信成侯王定以匈奴烏桓屠驀單于左大將軍時自稱單于或紀表二者誤也即屈與敦也未甞為單于或降楊惲戴長樂皆免為庶人禄勲有罪免為庶人不悔過宣紀十二月楊惲坐前為光臣之得罪已三年矣又因日食之變騶馬猥佐成上書告惲怨望大逆不道要斬荀紀因而用之惲傳惲與孫㑹宗書曰爵元年為光禄勲五年免戴長樂亦以其年為太僕五年免罪下獄死又楊譚稱杜延年為御史大夫按百官表惲以神使光禄勲惲䇿免望之其事在今年八月惲猶為光禄勲至杜延年以五鳯三年六月辛酉為御史大夫又按蕭望之傳二月免為庶人至四年乃死宣紀誤也四年四月乃有日蝕之變蓋惲以今年十三年六月辛酉杜延年為御史大夫表作辛酉按長曆荀紀作辛巳百官朔無辛巳此月丙午四年匈奴單于遣弟谷蠡王入侍臣即遣銖婁渠堂入按匈奴傳呼韓邪稱單于不知此單于為誰也侍事在明年時匈奴有三甘露元年張敞免為庶人數月拜冀州刺史於五鳯荀紀載元年為京兆尹八年免敞傳云為京兆九歳免二年因楊惲事并致此誤也百官表敞以神爵二年春正月立皇子嚻為定陶王乙亥立今據宣紀諸矦王表云十月四年夏廣川王海陽十三王傳作海陽今從之諸侯王表作汝陽宣紀景元帝􅀄元二年二月丁巳立弟竟為清河王作寛今荀紀竟書從漢戊午隴西地震敗城郭屋室壓殺人衆月地大震今劉向傳云三紀從元四月詔賜蕭望之爵􅀜内侯云前􅀪恭奏望之等獄決三元紀此詔在今冬按劉向傳見昴卷舌間上感悟下詔賜望之爵関内侯望之傳曰後數月地大震然則望之等黜免在今春地震前也又曰夏客星死在十二月因置此詔於彼上耳月賜望之爵関内侯盖紀見望之七月己酉地復震年中地再動漢紀在七月己酉今從之劉向傳曰冬地復震元紀此月詔曰一五年六月匈奴郅支單于殺谷吉支求侍子元帝紀五陳湯傳􅀄元四年郅按禹今年六月始爲御史大夫或者郅支以四年求侍子而年谷吉使匈奴不還湯傳又云御史大夫貢禹議吉不可遣使匈奴也吉以五年永光元年九月于定國史髙薛廣徳皆罷韋玄成爲御史大夫御史大夫十一月戊寅丞相定國免荀紀七月百宫表七月癸未大司馬髙免辛亥韋􅀇成爲徳爲御史大夫凡十月免月日參差未知孰是故皆􅃿不書己未髙免薛廣徳傳酎􅀕後月餘以歳惡民流乞骸骨罷廣賈􅂢之謂楊興曰使我得見言君蘭今從漢書荀紀作君簡建昭二年六月立皇子興爲信都王今從漢書荀紀興作譽京房言於上曰陛下視今為治邪亂邪所任者誰與字有上曰亦極亂耳尚何道房曰今十二字今取之故資政殿學士邵亢得兩浙錢王寫本漢書無亂邪二京房棄市朔上封事去月餘徵下獄百官表八月癸亥匡元紀及荀紀京房死皆在此年末按房傳二月也紀不知月日故繫之歳末耳衡為御史大夫房死必不在歳末成帝河平元年匈奴單于遣右臯林王伊邪莫演等朝正月單于上書願朝河平四年正月遂入朝據此則是匈奴傳河平元年單于遣莫演朝正月下云明年正月之下恐誤漢紀又以莫演為黃渾今從漢書莫演以元年至漢朝二年正月也而荀紀繫於元年二年夜郎與鉤町相攻陳立討誅之平中而胡旦漢春西南夷傳但云河月未知何据也秋云在此年十一鴻嘉三年上微行過陽阿主家趙后外傳及荀紀亦作五行志作河陽主伶玄阿字作河又或為河陽皆後人所妄攺耳今從之河陽外戚傳顔師古注曰陽阿平原之縣也今俗書永始元年春正月癸丑太官凌室火戊午戾后園南闕火皆作災今從漢書五行志及荀紀二火劉輔上書曰腐木不可以為柱人婢不可以為主傳云劉輔作珪卑人作人婢今柱從漢書人婢從荀紀腐木不可以為柱卑人不可以為主荀紀柱七月癸卯封蕭何六丗孫喜為鄼侯蕭相國後喜為鄼成紀元延元年封始四年質侯尊嗣五年薨綏和元年質侯章嗣蓋本紀誤以侯荀胡皆用之按功臣表永始元年􅁵侯喜紹封三年薨永延故也永始為元立城陽哀王弟俚為王今從漢書漢紀俚作悝九月丁巳晦日有食之曆丁巳晦荀恱誤荀紀作乙巳按長二年上諸舅風丞相御史免張放御史按放傳丞相宣御敘傳云王音以風丞相為御史大夫然則風丞相御史者疑非音也放傳又云上諸史大夫方進奏放過惡音以正月乙巳薨方進以三月丁酉但云上諸舅舅皆害其寵故十一月己丑丞相宣免御史大夫方進貶壬子方進為丞相擢為丞相而荀紀云秋八月方進貶為執金吾蓋方進傳薛宣免方進亦左遷執金吾二十餘日遂為執金吾故致此誤也按公卿表所云者謂方進自三月為以公卿表云三月丁酉京兆尹翟方進為御史大夫八月貶去年九月谷永傳著之甚明而荀恱亦載之於此年云冬黒御史大夫至十一月而貶凡居官八月耳又黒龍見東萊在雖正黒龍之誤而方進貶官猶承荀恱之失龍見東萊蓋因陳湯獲罪在今年故也漢春秋陳湯徙邊陳咸逢信免官後因陳湯事連言之咸信免官皆在明年以三年十一月李譚等殺樊並皆封矦表止有四人蓋紀誤本紀云五人而功臣元延元年劉向上書已上此奏披岷山崩在三年此奏云向傳云星孛東井岷山崩向懐不能一發則上此奏當在今年也胡旦亦載之三年自建始以來二十歳間而食八率二歳六月而十二月乙未王商為大將軍辛亥商薨庚申王根為大司馬一月甲子朔無乙未辛亥庚申荀恱誤荀紀云十一月成紀云十二月按是歳十􅀭雄待詔雄自序云上方郊祠甘泉泰畤召雄待詔承明雄傳云車􅀐將軍王音竒其文雅薦雄待詔按王音卒已乆蓋王根也胡旦遂誤以為曲陽侯云之庭奏甘泉賦其十二月奏羽獵賦事在今年時二年四月立廣陵孝王子守為王今從漢書荀紀守作憲立烏孫小昆彌安日弟末振將為小昆彌末振將為烏孫傳以以為兄兄字誤耳安日弟叚㑹宗傳三年上令胡人搏禽獸從胡客大校獵􅀫萯陽宫賜從成紀元延二年冬行幸長楊宫校獵賦明年從至射熊館還上長楊賦然則從胡客校獵當官胡旦用之按揚雄傳祀甘泉河東之歳十二月羽獵雄上有羽獵事致此誤耳在今年紀因去年冬綏和二年二月本紀無之故不取荀紀云赦天下今四月己卯葬孝成皇帝于延陵未央宫四月己卯葬延成紀三月丙戍帝崩于己卯葬延陵自崩及葬三十四日按是年三月己巳朔無丙陵臣瓉曰自崩至葬凡五十四日漢紀三月丙午帝崩四月紀則當云閏三月丙午崩二者各有差舛未知孰是按是年午四月己亥朔無己卯􅀂依成紀則當云五月已卯葬依荀月今且從成紀之文閏七月不當頓差四七月丁卯王莽罷就第庚午師丹為大司馬四月徙又曰公卿表十一月丁卯大司馬莽免遷荀紀七月丁巳大司馬莽免按丹􅀂以十一月為司馬四十月癸酉丹為大司空又曰太子太􅀓師丹為左將軍五月丁卯朔無丁巳年表月誤荀紀日誤月徙官不得以十月為司空也七月九月庚申地震上問李尋問尋按公鄉表􅀓喜為衞尋傳云使侍中衞尉􅀓喜在九月當是時喜已不為衞尉矣尉二月遷右將軍十一月罷地震資治通鑑考異卷第一
