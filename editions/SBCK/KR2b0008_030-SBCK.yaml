body:
  text: 臣司馬光奉勑編集後唐紀下潞王清泰元年三月朱􅀪昭赴井死安從進殺馮贇按從進傳贇首於陜則贇死非閔帝之命明矣今不取張昭閔帝實錄帝召􅀪昭不至俄聞自殺乃令從進殺贇四月庚午劉知逺盡殺閔帝左右及從騎午朔四鼔帝閔帝實錄庚主俱西析孟津北據壷関南向徴諸侯兵乃啓問康義誠西至衛州東七八里遇敬瑭竇貞固晉髙祖實録始帝欲與少欲與從臣謀害晉髙祖詐屏人對語方坐庭廡帝宻遣御士討作何制置云云蘇逢吉漢髙祖實錄是夜偵知少帝伏甲以巨木塞門敢力當其鋒死之帝解佩刀遇夜晦以在地葦石敢䄂追立於後俄頃㐲甲者起敢有勇力擁晉祖入一室帝親將李洪信謂人曰石太尉死矣帝隔垣呼洪信曰太尉炬未然者奮擊之衆謂短兵也遂散走帝乃匿身長垣下聞􅀪贄南唐列祖實録􅀪贄曰今京囯阽危百官無主必相率無恙乃踰垣出就洪信兵共䕶晉祖殺建謀者以少主授王然其語按為晉漢實録者必為二祖飾非今從閔帝實録攜神噐西向公何不囚少帝西迎潞王此万全之計敬瑭是日太后令内諸司迎潞王至并内司迎奉至乾壕帝促廢帝實録三十日太后傳令午朔三月無三十日廢帝實録誤也令還京按長曆三月辛丑朔四月庚癸酉廢少帝為鄂王為鄂王今從廢帝實録閔帝實録云七日廢帝十二月葬鄂王位謚曰閔與秦王及重吉並葬徴陵域中閔帝實録及薛史閔帝紀皆云晉髙祖即帝實録今從廢二年三月呉徐知誥令陳覺輔景遷權位日隆中外江南禄時先主景遷呉主之壻也先主鍾愛持甚斉丘使陳覺為景遷教授皆知有代謝之勢而以呉主恭謹守道欲待嗣君先主次予景遷之美㡬有奪嫡之計所以然者以呉主少而先主老必為之聲價齊丘參決時政多為不法輒歸過於嗣主而盛稱其日夕為謀也先主斍之乃召齊丘如金陵以為己之副遙不能待他日得囯授於景遷易制已為元老威權無上矣此從容而已今從十囯紀年兼申蔡節度使無所關預後晉紀髙祖天福元年五月魏愽逐劉延皓皇后之姪按薛廢帝實録延皓朗宋州虞城人也獨廢帝實録云后姪今不取史唐餘録歐陽史皆云延皓后之弟應州人也延七月誅石敬瑭之子重殷重裔上將軍石重英皇城副薛史七月己丑誅右衛乂供奉官重英與薛史不同按重乂敬瑭子即位後為張從使石重裔皆敬瑭之子也廢帝實録云石諱妷男尚食使重本英作殷今從之賔所殺實録誤也廣九月契丹五萬騎自揚武谷而南北有長城嶺聖佛谷代州今有陽武寨其實録作􅀭武今從漢髙祖契丹陳於虎北口此在太原而云陳於虎北口又云歸虎按幽州北山口名虎北口亦名古北口有地名虎北口也北口蓋太原城側别十月詔毎七户出征夫一人從廢帝實錄薛史云十户今十一月丁酉石敬瑭即皇帝位石諱為天子於栁林誤也廢帝實錄閏月丁卯胡立薛史契丹冊文今從晉髙祖實録閏月契丹主令太相温送帝至河梁翰范質䧟蕃記作廢帝實録作髙謨相温漢名髙謨翰今從晉髙祖實録髙模翰歐陽史作髙牟翰蓋蕃名太二年正月乙卯日有食之十囯紀年蜀乙卯朔日食蓋實録正月甲寅朔乙卯日食日食改曆耳晉人避三朝二月呉越王鏐少子元㺷球今從呉越備史九囯志晉髙祖實録十囯紀年作元十月唐李德誠出宋齊丘書令宗信諷止德誠勸進十國紀年云遺宗信書但云上德誠勸進書而下云宗信何人今十一月加錢元瓘天下兵馬副元帥進封呉越國王使四年十月丙午以程遜没于海廢朝贈官程遜傳云天福實錄天福二年十一月加元瓘副元帥國王程遜等為加恩蓋二年冬制下遜等以三年至杭州不知溺死在何年而晉三年秋使呉越使回溺死元瓘傳云天福三年封呉越國王遜等授王副元帥國王甲午王即位用建國之儀如同光故朝以四年十月始聞之也呉越備史天福二年四月敕遣程禮明年明宗封呉王應順初閔帝封呉越王故以天福三年事是歲程遜還京溺于海按元瓘初立稱鏐遺命止用藩鎮帥國王然後即位誤矣即王位而備史以為授元以賈仁沼代胡漢筠紹今從實録薛史仁沼作仁三年八月以馮道劉昫為契丹冊禮使道傳云虜遣使周世宗實録馮命權辭以老病晉祖謂道曰此行非卿不可道無難色按晉加徽號於晉祖晉亦獻徽號於虜始命兵部尚書王權銜其戊寅北朝命使上帝徽號戊子王權以不受北使停任周世髙祖實錄天福三年八月戊寅道為契丹太后冊禮使十月誤也宗實録十月桑維翰李崧皆罷樞密使及薛史劉處讓傳云竇貞固晉少帝實録使以處讓為之楊光逺傳云范延光降光逺靣奏維翰擅權楊光逺入朝遂於髙祖前靣言執政之失乃罷維翰等樞密守今按晉髙祖實録天福三年十月壬辰維翰崧罷樞宻使髙祖以光逺方有功於國乃出維翰領安陽光逺為西京留天福四年閏七月壬申維翰出為相州節度使蓋處讓光逺庚子光逺始入朝對於便殿十一月戊申光逺為西京留守叙光逺鎮洛陽後疏維翰出相州是也傳之誤晉少帝實録及薛史桑維翰傳十一月呉讓皇卒歐陽史但云卒九國志云溥能委運授薛中唐餘録皆云溥禪位踰年以幽卒曰辛丑唐人弑讓皇事不可明今但云卒終不罹簒殺之禍深於機者也十國紀年四年二月唐主復姓李氏祖呉王恪稱昇唐􅀇宗第六子周世宗實録及薛史後主實錄云唐嗣薛王知柔為嶺南節度使卒於官其子知永王璘苖裔江南録云憲宗第八子建王恪之􅀇孫李昊蜀吉人父為安吉砦將呉將李神福攻衣錦軍過湖州虜昇歸誥流落江淮遂為徐温養子呉越備史云昇本潘氏湖州安魚飛上天昇始事神福後歸温故冐李氏以應䜟劉恕以為為僕􅀠徐温甞過神福愛其謹厚求為養子以䜟云東海鯉昇少孤遭亂莫知其祖系昪曾祖超祖志乃與義祖之曾祖昪復姓附㑹祖宗故非李氏而呉越與唐人仇敵亦非實録皆附㑹也祖同名知其四月唐人遷讓皇之族於泰州之族於泰州號永寧宫十國紀年唐人遷讓皇讓皇子及五嵗遣中使拜官賜朝服即日而卒按唐烈祖受守衛甚嚴不敢與國人通昏姻乆而男女自為匹偶江表志而已何必如此之污也他書皆未之見不知紀年據何書今禪使讓皇居故宫稱臣上表慕仁厚之名若惡楊氏則滅之取不閏七月閩王延羲弑康宗自稱威武節度使閩國王改元永隆元永隆即晉天福四年也周世宗實録薛史唐十國紀年通文四年延羲自稱威武節度使改閩中啓運圖通文四年己亥閏七月延羲立明年庚子改元餘錄南唐烈祖實録呉越備史及運曆圖紀年通譜皆同惟然五代士人撰録國書多不慿舊文出於記憶及傳聞雖本永隆五年甲辰被弑林仁志閩國人載延羲改年宜不差失之後然亦閩人故不敢獨從仁志所記又王曦既立若但稱國近事亦有抵捂者髙逺叙事頗有本末余公綽雖在仁志錄天福五年十一月甲申授閩國王延羲威武軍節度使閩節度使則不應改元及以其臣為三公平章事按晉髙祖實閩國王紀年脫漏耳國王是曦先已自稱五年正月釋閩使鄭元弼等所責乃遣使越海聘於契洛中紀異云昶既為朝命曰閩國禮物並付喬榮放其使人還本國晉祖不敢拒之既丹即將籍沒之物為贄晉祖方卑辤以奉戎主戎主降偽詔一時人無不憤惋按昶以天福四年閏七月被弑十月元弼而昶又遣使於契丹求馬由滄齊淮甸路南去自兹往復不知而告契丹今不取等至京下獄昶安得六年九月辛酉滑州言河決河決而不載庚午濮州決薛史紀載九月辛酉滑州要及志皆云天福六年九月決滑州兖濮州界皆為水漂溺史髙祖實録載庚午濮州奏河決而不載辛酉滑州決五代㑹流皆涸濮州無庚午再決之理蓋滑州河決漂浸及濮州耳匡翰傳亦云天福六年自馬河決按辛酉滑州河已決則下七年五月帝寢疾以㓜子屬馮道大漸召近臣屬之曰漢髙祖實録晉髙祖謝當歸許王寡人之願也此說難信今從薛史此天下明宗之天下寡人竊而處之乆矣寡人既齊王天福八年三月閩王納尚保殷之女為妃作尚閩録十國紀年可殷今從九月河陽牙將喬榮􅉷今從晉少帝漢髙祖實録薛史漢隱帝實録作喬熒䧟蕃記作喬契丹傳景延廣傳開運元年正月唐主勑齊王景遂參決庶政蕭儼上疏紀年紀年云宋齊丘上疏今從江南録江南録此勑在去年十二月今從十國二年三月李仁達殺王繼昌志皆云四月殺繼昌今從閩中實録閩王列傳九國紀年十國仁達立卓巖明為帝明閩中實録閩王列傳九國志薛史閩録啓運圖啓國實録江南録作巖為僧名體明即位改巖明今從之江南録云繼昌為禆將王唐餘録王審知傳吳越備史作儼明按啓運圖巖明本名偃諷立巖明為主今從十國紀年延諷所殺旬日故内臣李義殺晉軍至白團今從晉少帝實録漢髙祖實録作白檀三年四月中山人孫方簡人今從漢髙祖實録周世宗實録云清苑九月契丹使劉延祚詐以瀛州内附按陷蕃記前云延歐陽史作髙年翰師而出蓋延祚爲刺史摸翰乃戍將耳今從陷蕃記祚詐輸誠􅅃後云大軍至瀛州偵知蕃將髙摸翰潛十一月杜威趣􅁪州以張彦澤爲前鋒子其心宻已變備史曰彦澤狼常山及至真定東垣渡與威通謀先遣歩衆跨水不之救致矣乃通􅅃邪律氏請爲前導因促騎說威引軍㳂滹水西援威若已通􅅃於契丹則彦澤何故猶奪橋契丹何故猶議回敗將沮人心以行詭計因促監者髙勲請降於虜按彦澤與不取旋今十二月彦澤殺桑維翰畫請與虜和慮戎主到京則顯薛史帝思維翰在相時累貢謀按是時彦澤豈肯復從少帝之命今不取彰已過欲殺維翰以滅口因令張彦澤殺之後漢紀髙祖天福十二年正月晉主迎契丹主辭不見祖實漢髙皆歴歴能對無撓屈色邪律氏亦假以顔色陷蕃記薛史帝錄少帝帥族侯於野邪津氏䟽之帝指陳前事乃大臣同謀待罪於野虜長面撫之遣泊封禪寺今從陷蕃記紀五代通錄云戎主不與帝相見少帝實錄帝舉族契丹主以劉晞爲西京留守琋今從陷蕃記實錄作禧或云名潘聿撚爲横海節度使聿涅今從陷蕃記周太祖實錄聿撚作二月延州軍亂逐周密推髙允權為留後允權為膚施周太祖實録延州令周宻以允權故將之子恐與邊人締結移為州主簿令䧟蕃記云前錄事參軍退居田里漢髙祖實録云允權為復遣親黨潜搆諸部衆心遂搖廣本云允權為延州令密徙密後以暗而黨下惟誅掠是務允權乗其民怨時以言間之延帥按晉少帝實錄開運三年八月辛未以右龍武統軍周為録事參軍今從之周太祖實録又曰契丹犯闕以周密為所授今從漢髙祖實録密為彰武節度使非契丹三月以皇弟崇行太原尹陽見聞録云仲弟歐陽史云母薛史云崇髙祖從弟王保衡晉實録弟今從劉晞奔許州方太入洛陽伊闕賊帥稱天子太擊走之王誓衆於洛南郊天壇號萬餘人大率部兵與朝士輩虛實録方太􅀓云劉禧走許田復有頴陽妖巫姓朱號嗣密師遂安今從陷蕃記張幡幟一舉而逐之洛丙子契丹主卒亥卒今從陷蕃記實録云二十日乙五月馬希範卒劉彦瑫等立希廣希範得疾集國官告十國紀年五月己丑日衆口勸上乃受軍府排衙賀之以其事奏朝廷託以希範以傳位希廣湖湘故事希廣又不能彊弱猶豫之間羣輔明廣則沒後將佐誰敢更有異議必彦瑫等假託希範遺令也臨終之日遺言以付希廣按希範存時若已集國官傳位希湘故事今從湖乾祐元年三月徙孫方簡為大同節度使方諫按方簡實録方簡作諫實録誤也避周諱改名方匡國節度使張彦威祖諱薛史因之今從廣本周太祖實録作彦成蓋避周八月壬午以郭威為西面軍前招慰安撫使祖紀七月薛史周太發離京師漢隱帝周太祖實録七月平章事制詞無西十三日授同平章事即遣西征以安慰招撫為八月六日受命出征蓋薛史之誤征之言至八月壬午方九月李彦從破蜀兵于散關言都監李彦從將兵掩襲實録戊辰樞密使郭諱上月李彦從敗蜀兵於散關而蜀後主實録無之蜀實録十月川賊至大散關殺賊三千餘其餘弃甲而遁漢隱帝實録九於玉女潭而漢實録無之蓋兩國各舉其勝而諱其敗耳然安思謙敗漢兵於時家竹林遂焚蕩寶雞十二月又敗漢兵也豈得全不書殺三千人非小敗也豈十月遽能再舉蓋九漢實録言官軍不滿萬人而蜀兵數倍是二三萬人非小役蜀實録十月但云思謙退次鳯州不云歸興元十二月云思月止是蜀邊將小出兵為漢所敗漢將因張大而奏之耳又州蓋十月脱略耳謙自興元進次鳯十二月蜀兵食盡引去寅思謙以軍食匱竭自摸壁退次十國紀年蜀廣政十二年正月甲正月表始到成都耳今從周太祖實錄鳯州上表待罪蓋去年冬木已退軍明年隱帝乾祐二年五月呉越内牙都指揮使斜滔備史呉越無此姓今据字書斜音他口徒口二切皆云姓也十國紀年滔姓皆金旁斗按何氏姓范元和姓纂皆三年四月郭榮本姓柴母曰聖穆皇后柴氏以唐天祐十世宗實録曰太祖皇帝之長子也太祖之養子蓋聖穆皇后之姪也本姓柴氏父守禮太子少八年九月二十四日丙午生於邢臺之别墅薛史世宗紀云子乃養為己子按今舉世皆知世宗為柴氏子謂之柴世宗保致仕帝年未童冠因侍聖穆皇后在太祖左右時太祖無祖長子誣亦甚矣而世宗實録云太十月楚劉彦瑫攻朗州為馬希蕚所敗敗在九月十三湖湘故事彦瑫國紀年日今從十十一月希蕚發兵趣長沙日直往湖南今從十國紀年湖湘故事希蕚以十月二十一己夘侯益等將禁軍趣澶州郭威獲鸗脫丑孟業至澶隱帝實録丁州守捉鄴軍獲鸗脫又云庚辰郭諱次滑州宋延渥納軍辛州戊寅鄴兵至河上己夘呉䖍裕入朝庚辰詔侯益等赴澶鄴都翌日郭威以衆南行戊寅至澶州庚辰至滑州是日詔巳鸗脫還宫薛史隱帝紀丁丑李洪義得密詔遣陳光穗至穗至翌日遵路明日遇鸗脫云見召侯益等令守澶州十六侯益等赴澶州守捉餘與實録同周太祖實録十四日陳光史周太祖紀十六日至澶州獲鸗脫十七日至滑州餘與實日趣滑臺十七日賞諸軍令奉行前詔十八日自滑而南薛日郭威獲鸗脫何故已見之也蓋帝遣侯益赴澶州必在十錄同按丁丑十四日也若十七日始詔侯益赴澶州則十六後今從薛史周太祖紀六日鸗脫行在遣益之辛巳宋延渥以滑州降郭威楊史丁丑孟業至澶州王隱帝實録十一月丙子誅周太祖實錄云十三日夜太祖夣入朝見至詰旦以夣示峻殷錮業送郭威即日首塗戊寅至河上見王殷庚辰次滑州十五日戊寅也明日行次遇鸗脫欲往澶州十六日己夘也是日陳洪穗至鄴都是十四日丁丑也翌日為衆所廹遵路至鄴都一百四十里至滑州三百二十里不應往還如是之下文又云十六日趣滑臺按大梁至澶州二百七十里澶州趣滑州十七日至滑州也今從周太祖實録速漢周實録首塗與至滑州日不同蓋十六日帝為亂兵所弑西北郭允明露刃隨後西北至趙村前鋒實錄帝至􅀇化門劉銖射帝左右帝廻詣刃犯蹕而崩薛史隱帝紀郭允明知事不濟乃刺刃於帝而已及亂兵騰沸上懼下馬入於民室郭允明知事不濟乃抽帝所親信何由弑逆蓋郭威兵殺帝事成之後諱之因允明崩允明自殺周太祖紀云允明弑漢帝於北郊劉恕曰允明允明但莫知爲誰故止云亂兵自殺歸罪耳按弑帝者未必是獲劉銖囚之家子孫婦女十數人極其慘毒反隱帝遇害五代史闕文周祖自鄴起兵銖盡誅周祖之家戮叛族耳不知其他威怒殺之稱曰周世宗朝史官周祖以漢太后令収銖下獄使人責銖殺其家對曰銖爲漢第按銖所至貪婪酷虐在青州謀不受代賴郭瓊諭之始入修漢隱帝實録銖之忠言諱而不載銖今有子孝和擢進士周祖之家出於殘忍之性耳豈忠義之士邪而王禹偁所記朝私怨楊史快其就戮隱帝敗歸射而不納使至野死其屠言耳今不取蓋慿孝和之馮道受郭威拜見道猶設拜意道便行推戴道受拜如平五代史闕文周祖入京師百官謁之周祖舉兵既克京城所以不即爲帝者蓋以漢之宗室崇在河東時徐曰侍中此行不易周祖氣沮故禪代之謀稍緩按周祖中外必有響應者故陽稱輔立宗于信素庸愚不足畏忌贇信在許州贇在徐州若遽代漢慮三鎮舉兵以興復爲辤則近然後并信除之則三鎮去其二矣然後自立則所與為敵乃崇子故迎贇而立之使兩鎮息謀俟其離徐已逺去京稍道之所以受拜如平時者正欲示器宇凝重耳者惟崇而已此其謀也豈馮道受拜之所能沮乎遣馮道等迎武寧節度使贇遣前太師馮道往彼諭㫖周太祖實録己丑太祖奏宰臣百寮表祕書監趙士交齎詔同日首塗五代史闕文周太祖將奉表於徐州未知所遣樞密直學士王度請行許之誓道曰莫教老夫為謬語人及行謂人曰平生不謬語今為祖請道詣徐州冊湘隂公為漢嗣道曰侍中出衷平周祖設事迹所宜諱矣按道廉智自將陽愚逺禍恐不肯觸周祖未謬語人矣王禹偁曰周世宗朝詔史臣修周祖實録故道之后遣中使馳諭劉崇請崇入纉大位崇知立其子上章謙遜發之機其徒欲歸美而云耳又隱帝實録云初議立徐帥太今不取恐無此事太后臨朝帝實録自是至國亡止稱誥今從之周太祖實錄云太后自臨朝今稱制隱殺劉銖等赦其家與周祖善因言劉氏祚短事處訥曰漢實録國子愽士司天監洛陽王處訥素不得乆長耳時周祖方以兵圍蘇逢吉劉銖之弟俟旦而族厯未盡但以即位後讎殺人夷人之族怨結天下所以社稷隂公立之豈得遽言劉氏祚短乎今不取之聞其言蹶然遽命釋之按周祖時方迎湘十二月武陵何敬眞景眞今從十國紀年湖湘故事九國志作何後周紀太祖廣順元年二月馬希蕚遣劉光輔入貢于唐湘湖今從十國紀年故事光輔作光瀚楚小門使謝彦顒新録作謝延澤今從十國紀年湖湘故事作謝彦欽周羽沖三楚五月北漢鄭珙卒于契丹君恩禮周厚虜俗以酒池肉林晉陽見聞録鄭珙既達虜庭虜魁岸善飲罹無量之逼宴罷載歸一夕腐脇於窮廬之擅堵為名雖不飲酒如韋曜輩者亦加灌注縱成疾無復信之珙大髙祖鎮河東甞命韋曜北使曜羸瘠不能飲酒虜人強之間輿尸而復命九國志契丹宴犒漢使必厚具酒肉以示夸保衡引以為文章路振云髙祖時人誤也遂卒按韋曜孫皓時人韋昭也不能飲酒王九月戊寅徐威等囚馬希蕚故事在十九日今從之十國紀年作丁丑按湖湘二年十月楊信子崇訓訓後蓋避梁王宗訓改名也崇訓或作崇勲世宗實録作崇顯德元年正月丙申晉王即帝位制晉王榮可於柩前太祖實録乙未宣遺奉帝即皇帝位蓋以乙未宣遺制丙申即位也即皇帝位世宗實録丙申内出太祖遺制羣臣二月契丹遣楊衮將萬餘騎如晉陽騎五七萬號十萬晉陽見聞録衮帥世宗實錄來㑹今從張元徽為前鋒騎為前鋒今從晉陽見聞録世宗實錄賊將張暉領三千三月癸巳前鋒與北漢兵遇擊之於髙平南之按世宗實録甲午賊陳誤也今從十國紀年下又有甲午此必癸巳楊衮全軍而退及覩世宗兵少悔之召諸將謀曰吾觀周五代史補劉崇求援於契丹得飛騎數千使契丹見而心服諸將皆以為然乃使人謂契丹主將曰柴師易與耳契丹之衆宜勿使但以本軍決戰不唯破敵亦足之可也契丹不知其謀從之洎世宗之入陳也三軍皆賈勇氏與吾主客之勢已見必不煩足下餘刃敢請勒兵登髙觀不敢救而崇敗今從世宗實録薛史争進莫不一當百契丹望而畏之故四月瀛文懿王馮道卒今從世宗實錄薛史五代通録諡曰文愍五月攻晉陽不克議引還萬攻城旦夕之間期於必取㑹世宗實錄徴懷孟蒲陜丁夫數還京之意晉陽見聞録六月旦周師南轅返斾惟數百騎間大雨軍士勞苦又聞忻口之師不振帝數日憂沮不食遂决城隅晡晩殺行而抽退今從世宗實録之以歩卒于人長搶赤甲􅃷趫㨗跳梁於十一月北漢主殂云顯德二年十一月劉崇卒大定録云劉恕云世宗實録薛史帝紀僭偽傳皆崇死顯德三年承鈞改元天㑹開寶元年承鈞之天㑹十三顯德二年春旻病死紀年通譜顯德二年崇之乾祐八年冬年也河東劉氏有國全無記録惟其舊臣中書舎人直翰林年死開寶二年繼元改元廣運興國四年繼元之廣運十一伐敗歸夏周師攻圍旻積憂勞成心疾是冬卒鈞即位丁巳院王保衡歸朝後所纂晉陽偽署見聞要録云甲寅年春南嗣位年四十三卒右諫議大夫楊夢申奉敕撰大漢都統追年正月旦改乾祐十年為天㑹元年又云鈞丙戌年二十九也十七年繼顒卒末題廣運元年嵗次甲戌九月丙午朔今封定王劉繼顒神道碑云天㑹十二年今皇帝踐祚之初年旻之乾祐七年也旻卒鈞立顯德四年丁巳鈞改乾祐十年按周廣順元年辛亥旻即帝位稱乾祐四年顯德元年甲寅元立開寶七年甲戌繼元改天㑹十八年為廣運元年據厯為天㑹元年宋開寳元年戊辰鈞之天㑹十二年也鈞卒繼唐天成元年丙戍主至顯德元年甲寅嗣位乃二十九嵗矣是歲九月丙午朔興國四年己卯繼元之廣運六年也鈞以諸書皆傳聞相因前後差戻惟晉陽見聞録劉繼顒碑歲月鈞及繼元踰年未改元蓋孟蜀後主漢隱帝周世宗之比也故以為據最可考正世宗顯德二年閏九月蜀趙玭以秦州降召宫屬告之十國紀年玭危就安禍且至矣衆皆聼命舉城叛降周斜谷援兵亦潰五曰周兵無敵今朝廷所遣勇將精兵不死即逃我軰不能去之中塗聞黄花之敗奔秦州玭與城中將校閉門不納處儔代通録官軍之圍鳯州偽秦州節度使髙處儔引兵往復援歸國今從實録遂西奔玭即以城三年二月潘叔嗣襲朗州王逵戰敗死逵奉詔伐呉有湖湘故事云王謀曰我覩王公妖怪入傘他時忽落别人之手我軰處身何蜜蜂無萬數集逵傘蓋周行逢内喜潜與潘叔嗣張文表等哉叔嗣文表聞行逢之言已㑹深意遂乃拜受此語各散歸地我等若三人同心共保馬氏舊基同取富貴豈不是男兒表爲前鋒軍次醴陵縣吏請具牛酒犒軍立不許叔嗣文表營廣本逵命行營副使毛立爲袁州營統軍使潘叔嗣張文朗州叔嗣追至朗州殺之湖湘故事逵連夜走歸朗州去經因士卒之怒縳立送于行逢以兵叛告逵逵大懼乗輕舟奔而起至朗州殺之今按世宗實録顯德三年二月丙寅朗州數日潘叔嗣始到潭州既聞王逵走歸朗州亦以舟棹倍程癸巳荆南髙保融言進逵自岳州領兵復歸本道又云潘叔王進逵言領大軍入淮南界庚寅言入鄂州界攻下長山寨武陵叔嗣攻其城進逵敗走爲叔嗣所殺又云三月壬寅進嗣爲先鋒行及鄂州叔嗣回戈襲武陵進逵聞之倍道先入逵行在與薛史承襲傳及湖南傳記略同惟湖湘故事及下逵差牙將押送淮南將陳澤等蓋進逵未敗前奏事三月始州四月叔嗣叛丁璹云五月五日叔嗣殺逵于朗州皆妄也璹馬氏行事記載逵攻袁州叔嗣叛事曹衍云逵三月至潭教授及張文表叛辟爲幕職事敗逃遁㑹赦乃敢出窮困無周行逢據湖南仕進尚門䕃衍屢獻文章不得調退居郷里宗憫其窮且老授將作監丞衍本小人言詞鄙俚非有意著以自進采摭舊聞撰湖湘馬氏故事二十卷如京師獻之大行逢尤多誣毁不欲行逢不預叔嗣之謀乃妄造此說凡載書故叙事顚倒前後自相違背以無爲有不可勝數素怨周其說得於衍書皆不可為據今從十國紀年行逢罪惡之甚皆出於衍云璹亦國初人疑十二月唐陳處堯如契丹乞兵處常今從晉陽見聞録十國紀年作兵部郎中叚四年三月唐周延􅌟等作劉仁贍表來降贍臥疾已實録時仁贍輕財重士法令嚴肅故能以一城之衆連年拒守逮其來亟遂飜然納欵而城内諸軍萬計皆屏息以聼其命又曰仁贍病甚已不知人其副使孫羽詐為仁贍書以城降世宗命降而其下無敢竊議者斯亦一時之名將也歐陽史三月仁日制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比予舁仁贍至帳前歎嗟乆之賜以玉帶御馬復使入城養疾是度使仁贍不能受命而卒世宗追封彭城郡王以其子崇讃之南伐得尔為多乃拜仁贍檢校太尉兼中書令天平軍節以自明矣豈有垂死而變節者乎今周世宗實録載仁贍降為懷州刺史李景聞仁贍卒亦贈太師又曰仁贍既殺其子之乆不下其後力屈而降世宗頗嗟其忠然正以為大將軍書蓋其副使孫羽等所為也當世宗時王環為蜀守秦州攻書乃知仁贍非降者也今從之視世宗待人之薄厚而考其制五年三月唐主遣兵部侍郎陳覺奉表密使陳覺奉表十國紀年遣樞陳覺躬聼敕命蓋當時所假之官耳今從之實錄載其表云今遣左諫議大夫兵部侍郎臣五月唐主去帝號稱國主用周正朔德二年乙邜十一世宗實録薛史顯幸淮南五年戊午三月江北平唐之交泰元年也而江南録月伐淮南唐之保大十三年也三年正月四年二月十月三帝號明年乃顯德五年又明年即建隆元年中間實少顯德誤以保大十五年事合十四年十五年丁巳改交泰五月去此不可按故世宗取淮南年月專以實録及薛史為据六年江南録最為差誤其記李昪復姓亦先一年佗事放六年正月唐宋齊丘縊死家人亦菜色中使云令公捐館江表志齊丘至青陽絶食數日而卒今從江南録紀年方始供食家人以絮塞口資治通鑑卷第三十
