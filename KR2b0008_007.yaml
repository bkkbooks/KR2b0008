  text: 資治通鑑考異卷第七
  hash: sha256:ad47d00f94fd4699189b879dfe64acafcca05c71b33d84665fffac68118dbc12
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0008_SBCK_007-1a}
body:
  text: 臣司馬光奉勑編集梁紀下普通二年五月魏桓叔興降記奏到之日今從魏帝紀梁帝紀七月叔興率衆降蓋七月魏張普惠救義州不及走今從裴邃傳普惠傳云棄城三年十一月魏初行正光曆大赦孝明帝加元服攺元正後魏律曆志云曆成㑹加元服三年十一月丙午行正光曆今從之光因命曰正光曆按帝紀正光元年七月辛卯西豐矦正德明年自魏逃歸車將軍頃之奔魏七年自魏梁書正德傳普通六年爲輕通三年爲輕車將軍湏之奔魏又自魏逃歸六年隨豫章王逃歸魏書蕭衍傳正光二年弟子正德來奔南史正德傳普表論正德後乃云莫折大提反按大提反在正光五年唯南北侵輒弃軍走北史蕭寶寅傳正光四年表論考課後乃云相近今從之北史年月先後四年魏破六韓拔陵反詔臨淮王彧討之五月彧敗削官魏帝紀正光五年破落汗抜陵反於彧然則拔陵反當在四年蓋帝紀因詔彧討抜陵而言之按令狐德棻周書賀拔勝傳衞可孤圍懷朔經年勝乃告急書作破六韓今從之非拔陵於時始反也周衞可孤圍武川今從周書北史可作瓌五年四月魏賀拔勝見臨淮王彧於雲中州見彧按後勝傳六至朔朔州不容更以雲中爲朔州今但云雲中魏地理志雲中舊名朔州及攺懐朔鎮爲五月魏廣陽王深從列傳及北史魏帝紀作淵今六年正月魏元法僧殺髙諒稱帝魏帝紀又魏紀云自法僧傳作髙謨今從云稱帝按法僧立諸子爲王必稱帝也今從梁書稱宋王怯僧傳及北史皆云稱尊號梁書法僧傳云法僧遣子景仲來降匡復旣而魏亂稍定將討法僧法法僧傳云魏室大亂法僧據鎮議欲未定今從北史懼歸𣢾按時魏亂元略爲魏所敗叛下不應如此之速今移於月末魏帝紀叙元略等事便在庚申法僧三月元法僧驅彭城吏民萬餘人南渡彭城者三千餘南史云武官戍南渡魏書梁書皆無此事人法僧皆印額爲奴逼將五月魏李崇卒月乙巳朔無戊子今不書日魏帝紀在五月戊子按長曆是魏安豐王延明等將兵二萬逼彭城衆十萬今從梁書南史陳慶之傳云六月豫章王綜與梁話淮隂苗文寵投魏軍綜夜潜與南史綜傳而拜延明坐之問其名是不荅曰殿下問人有見識者延明梁話苗寵三騎開北門涉汴河遂奔蕭城自稱隊主見延明陽按魏書及北史鹿悆傳皆豫有盟約魏豈得不知人魏書召使視之曰豫章王也延明喜下地執其手荅其拜送于洛作濟隂苗文寵今從南史蕭賛傳作濟隂芮文寵北史綜更名賛纉今從魏書北史梁書南史皆云攺名延明令江革作大小寺碑碑今從梁書南史作文八寺十二月魏恒農太守王羆恒農太守今從魏書周書羆傳羆未甞爲七年六月魏長孫稚爲討絳蜀都督平絳蜀不應有爾費穆傳穆爲都督從帝紀都督今八月元洪業殺鮮于脩禮請降于魏葛榮殺洪業自立柵日行十里行逹交津隔水而陣賊脩禮常與葛榮謀後稍北史廣陽王深傳云深以兵士頻經退散人無鬬情連營轉使人諭之普賢乃有降意又使録事叅軍元晏說賊程殺鬼信朔州人毛普賢榮常衘之普賢昔爲深統軍及在交津深帝紀全殊又其語雜亂難曉今從帝紀果相猜貳榮遂殺普賢脩禮而自立與魏十一月曹義宗逼新野魏遣魏承祖辛纂救之年冬新梁書此野此年魏使魏承祖救之也又周于謹傳云孝昌二年与辛野降魏書肅宗崩後新野猶在恐梁書誤蓋梁自前年攻新今以爲據纂討義宗大通元年正月莫折天生宼雍州遮今從魏書羊侃傳作莫湛僧智圍魏豫州湛僧今從梁夏侯夔傳魏帝紀及曹丗表傳作十月魏元慶和降陳慶之破魏兵王緯降辛卯東豫州魏帝紀九月和以渦陽内屬夏侯夔傳湛僧智圍元慶和於廣陵慶和請剌史元慶和以城叛梁帝紀十月庚戍魏東豫州刺史元慶渦陽放㑹之滅主王偉降陳慶之傳大通元年隷曹仲宗代降詔以僧智爲東豫州鎮廣陵韋放傳普通八年曹仲宗攻兩事梁紀慶和渦陽之間或更有脫字耳魏紀九月據聞慶渦陽城主王偉降詔以渦陽置西徐州然則廣陵渦陽兩處春至冬今從梁紀十月爲定此别一廣陵非南兖州之廣陵和始叛之時梁紀十月據慶和降𣢾到日按陳慶之傳云自蓋草書之誤也也王偉當作王緯二年四月魏長樂王子攸自髙渚渡河藍記髙渚作霤楊衒之洛陽伽魏書波今從已亥魏百官迎敬宗於河橋於芒山之北河隂之野十三伽藍記云十二日尔朱榮軍月戊子朔十二日已亥也今從魏書日召百官迎駕至者盡誅之長曆是榮殺魏髙陽王雍以下二千餘人言謂天下乗機可取此史云榮惑費穆之下馬西度即遣胡騎圍之妄言丞相髙陽王反殺王公以下乃譎朝士共爲盟誓將向河隂西北三里至南北長隄悉命三百餘人今從魏紀二千餘人榮傳一千趙元則應募爲禪文原温子昇並當丗辭人皆在圍中恥北史曰時隴西李神儁頓丘李諧太何得不死魏書本傳皆無其事從是命俯伏不應按神儁等不應髙歡勸榮稱帝司馬子如等切諌陳不可之理榮曰愆誤魏尓朱榮傳曰於是獻武王與外兵叅軍曰未若還奉長樂以安天下於是還奉莊帝北齊書神武紀若是唯當以死謝朝廷今日安危之機計將何出獻武王等収與北齊史官欲爲神武掩此惡故云爾今從周書賀抜岳傳云榮將篡位神武諌恐不聽請鑄像卜之鑄不成乃止蓋魏十月以元顥爲魏王遣陳慶之將兵送之云以顥爲魏梁魏帝紀皆爲梁王皆俟得國然後使稱帝耳若顥在南巳稱魏帝當行主唯顥傳作魏王按魏封劉昶爲宋王蕭寶寅爲齊王蕭察渙水蓋由王字與主字止欠一㸃故多致謬誤今從顥傳即位之禮又梁朝應以客禮待之又顥不應再即帝位於中大通元年二月魏濟隂王暉業今從魏書梁書作徽業四月元顥即帝位攺元主號年孝基入據銍城顥傳永安魏帝紀去年十月蕭衍以顥爲魏壇燔燎年號孝基今從之二年四月於梁國城南登陳慶之拔考城辛丑後今從梁帝紀魏書帝紀克考城在五月魏臨淮王彧迎顥宋遊道傳有之蓋魏史爲彧諱也彧傳無迎顥事而梁陳慶之北齊二年三月魏万俟仵醜今從周書北史作万俟行六月以魏汝南王恱爲魏王子魏汝南王恱求還本國許梁帝紀中大通元年正月甲恱傳恱未甞歸魏復入梁今刪去元年事之二年六月丁巳遣恱還北爲魏主按魏書万俟道洛歸略陽賊帥王慶雲慶雲今從尓朱天光傳魏帝紀作白馬龍涸胡王八月遣兵送魏王恱至境上衍遣其將軍王僧辯送置境恱傳云立爲魏主號年更興未甞送恱蓋王弁耳上以兾侵逼按僧辯傳魏邢邵巒之族弟中乃云巒叔祖祐祐從子蚪蚪子臧邵北史邢巒卷首排目云族孫臧邵而卷臧邵乃巒族弟非族孫也魏書亦云巒從祖祐然則尔朱榮妻鄕郡長公主郡公主今從魏帝紀北史丗隆傳作北鄕九月榮至洛陽史九月𥘉榮至京十五日天穆至是月田魏帝紀曰辛卯榮天穆自晉陽來朝按北十八日非也戍朔辛卯乃尓朱丗隆走賀拔勝不從至河橋勝以爲臣無讎君之周書及北史云勝復隨丗隆帝大恱今從魏書義遂勒所部還都莊十月尓朱拂律歸度律時在丗降所或者拂律歸即度律也魏書無拂律歸名伽藍記有之按尓朱魏源子恭鎭太行丹谷騎三萬鎮河内今從魏書伽藍記云源子恭揚寛領步尓朱丗隆至長子之髙都今從丗隆傳魏帝紀云丗隆停建興十二月尓朱兆從河橋西渉渡渡今從魏書兆傳伽藍記云從雷波渉魏城陽王徽抵宼祖仁家皆連祖字或者名彌字祖仁今魏書作宼禰按宼讃諸孫所字藍記從伽尓朱兆召髙歡并力曰今天下擾攘人懐覬覦正是智士北齊慕容紹宗傳兆召髙祖紹宗諌雲雨兆怒曰我與晉州推誠相待何得輙相間阻囚紹宗數用䇿之秋髙晉州才雄氣猛英略蓋丗譬如蛟龍安可借以東下按兆始召歡以自救非猜嫌之時今從北史日乃釋之北史紹宗語在神武請帥降户就食山二年二月魏廣陵王恭陽瘖夜遣人盗掠衣物拔刀劔伽藍記云莊帝疑恭姦詐莊帝信其真患放令歸第今從魏書欲殺之恭張口以手拈舌竟乃不言尓朱兆監軍孫白鷂今從北齊書北史作白雞四月尓朱仲逺使魏僧勉討崔祖螭斬之普泰中崔社北齊李渾傳援而社客宿將多謀諸城各自保固堅壁清野諸將議有異客反於海岱攻圍靑州以渾爲征東將軍都官尚書行臺赴其不意咄嗟之間便可擒殄如社客就擒則諸郡可傳檄而同渾曰社客賊之根本若簡驍勇衘枚夜襲徑趨營下出法洛按其年時事迹與祖螭略同未知社客即祖螭爲别一人也今從魏帝紀定諸將遟疑渾乃送行未明逹城下賊徒驚散擒社客斬首六月庚申髙歡起兵信都庚子北史魏紀齊紀亦然今從魏書紀魏書帝紀起兵在庚申北齊書帝紀在魏楊愔見髙歡於信都史愔隨之仼俄而孝莊幽崩愔時北齊書愔傳云愔父津爲并州剌剌史劉誕以愔名家盛德甚相哀念遣隊主鞏榮貴防禁送適欲還都行逹邯鄲過津義從楊寛家爲寛所執至相州見神武至信都遂投剌轅門即署行臺郎中按時齊神武巳在都至安陽亭榮貴遂與俱逃乃投髙昻兄弟僣竄累載屬齊幽崩而愔欲還都見執皆非也信都言潜竄累載誤矣又云孝莊四年四月髙歡以賀拔岳爲關西大行臺通爲中書北史薛孝利猶足據之節閔帝深以爲然問誰可任者通與賀拔岳同郎以關中險固秦漢舊都須預謀鎮遏以爲後計縱河北失授岳督岐華秦雍諸軍事關西大行臺雍州牧周文帝爲左事天光又與周文帝有舊二人並先在關右並推薦之乃超敗於韓陵節閔遂不得入關爲齊神武幽廢按天光尚在節丞孝通爲右丞齎詔書馳驛入關授岳等同鎮長安後天光關中今從魏書閔安敢除岳鎮髙歡欲立汝南王恱聞其狂暴乃止人示意恱旣至淸狂魏書恱傳云神武令比召至洛往返幾日蓋神武聞其所爲而止耳如故動爲罪失不可扶立乃止按恱時猶在梁境五年正月魏竇泰破尓朱兆献武王自晉陽出討兆丁酉魏帝紀正月庚寅朔甲午齊在今年按歳首宴㑹不應直至八日今從齊書大破之於赤洪嶺北齊帝紀出兵在去年破兆五月魏王早等來降蘭寶以下邳城降今從魏書梁帝紀六月巳卯魏建義城主七月魏以賀拔允爲太尉阿鞠埿蓋埿字誤爲渥耳魏帝紀作賀拔渥按允字六年正月魏泉企討民夷平之今從周書北史作泉仚六月髙歡表魏主庫狄干等將兵自來違津渡國典略丘恱三北齊書北史作朱違津今從七月髙歡引軍渡河元斌之紿魏主云歡兵已至斛斯魏書東魏孫搴卒陳元康爲功曹四月按搴卒然後陳元康典略孫搴卒在大同十年髙歡追宇文泰事並在九年北史元康傳又云草劉蠡升軍爲功曹髙慎叛髙澄巳令元康救崔暹邙山之戰元康又勸不取然則搴卒宜置於澄入輔之下書按蠡升滅在元年孫搴二年猶存今五月魏万俟普奔東魏甲午典略在六月北史齊紀在六普降東魏事北齊書帝紀在三月紀齊紀在五月今從之月甲午周書帝紀北史魏十二月東魏淸河王亶卒太祖數歡罪亦云殺亶魏書北國典云亶爲髙歡所酖典略周皆云亶薨今從之史皆無亶傳而帝紀三年閏九月髙歡自蒲津濟河神武自蒲津濟魏帝紀北齊帝紀十一月壬辰十月壬辰朔北齊紀誤也十月壬辰敗于沙苑按長四年二月東魏矦景攻廣州降之十一月按北史魏文典略矦景克廣州在頴豫廣四州今從之帝紀二月東魏陷南汾三月髙歡解大丞相頃之復故丞相年月而無復故之北齊帝紀止有髙祖解軍信都芳蓋因邙山之捷而復也又按興和元年議曆有丞相田曹參五月東魏鄭伯猷來聘受命時也今從梁帝紀魏帝紀在二月丙辰蓋始七年正月宕昌王梁彌定立泰今從典略梁帝紀作彌十二月劉敬躬以妖術惑衆今從梁書北史作敬宫八年十二月東魏楊斐來聘今從魏書紀典略作陽斐九年三月東魏大破魏兵斬首三萬餘級斬六萬計今北齊書云俘彭樂傳從北史東魏尉興慶戰死從北齊書北史典略作尉興敬今東魏軍士逃奔魏者告以髙歡所在祖見齊神武旗鼔周賀拔勝傳云太從典略識之今十一年六月楊㬓陳霸先至交州至交州姚思廉陳書典略作十二月癸丑月今從之帝紀在六中大同元年正月癸丑楊㬓等克嘉寧城今從梁帝紀典略作乙未三月幸同泰寺講經寺設無遮大會捨朕身及以宫人并典略云癸卯詔以今月八日於同泰愈佛骨表云三度捨身爲寺家奴若并此則四矣今從梁書所王境土供養三寳四月丙戍公卿以錢二億萬奉贖按韓九月李賁屯典澈湖新安村今從陳帝紀典略云渡武平江據十月髙歡攻玉壁五十日士卒死者七萬人寛傳云苦北史韋孝什四五今從北齊書戰六旬傷及病死者太淸元年三月矦景請以十三州内附豫州剌史髙成梁書景傳云與史李密兖州剌史邢子才南兖州剌史石長宣濟州剌史許廣州剌史暴顯潁州剌史司馬丗雲荆州剌史郎椿㐮州剌恂北荆州剌史梅季昌北楊州剌史元神和等隂結私圖尅季良東豫州剌史丘元征洛州剌史尓朱渾願楊州剌史樂楊州剌史可足渾洛無邢子才典略有荆州剌史庫狄暢無相影㑹蕭韶太淸紀又有兖州剌史胡延豫州剌史傅士哲今依梁書而太淸紀有兩豫州蓋前官也髙成暴顯許季良尓朱渾願樂恂梅季昌是歳正月乙卯帝夢中原牧守皆降月夜夢今從梁書典略云去年十二四月東魏李系來聘緯今從本傳魏帝紀作李六月東魏韓軌等圍潁川聞魏李弼等將至引還帝紀周書景今從典略三月李弼救矦髙澄使髙德政佐弟洋今從北齊書北史作德正十二月乙亥以元貞爲咸陽王遣貞今從典略梁帝紀作戊辰二年正月矦景衆潰晝夜兼行追軍不敢逼晝息夜典略云今從梁書行追軍漸逼羊鴉仁弃懸瓠羊思逹弃項城今從梁帝紀典略在六月三月屈獠洞斬李賁謂破賁之年今從梁帝紀陳髙祖紀云太淸元年蓋八月矦景啓請戮羊鴉仁朱异拒之云云今從太清紀梁書南史皆云並抑不奏典略矦景反西攻馬頭附於景無煩攻執今從太清紀典略梁書云執太守劉神茂按神茂素十月庚寅景陷譙川三日以王質廵江遏防典略上作庚太清紀云十三日陷譙城下又云十子朔蓋三日庚寅也戍下作庚子按此月戊太子戎服入見上禀受方略面啓髙祖曰請以軍事並以太淸紀云太宗見事急乃入此自汝事何更問爲今從典略垂付願不勞聖心南史云帝曰十一月陳昕說范桃棒降千人來降以景首應購今從典略太清紀南史皆云桃棒求以甲士二乙酉邵陵王綸進軍玄武湖側略云壬午今從梁帝紀太淸紀云二十九日典景擒莊丘慧霍俊等軍胡子約廣陵令霍儁今從太淸紀典略作廣陵令崔俊南史作直閤將鄱陽丗子嗣軍于蔡州洲今從太清紀梁帝紀作張公湘東王繹遣王僧辯將舟師萬人東下精卒二萬今從梁書太清紀云僧辯將十二月宣猛將軍李孝欽仕今從太清紀梁帝紀作李遷三年正月庚申朱异卒從太清紀典略梁帝紀作乙丑今甲子湘東丗子方等軍至今從太淸紀梁帝紀作戊辰二月庚子南康王㑹理等衆三萬至馬卬洲丁未今從梁帝紀作琅邪今從太淸紀梁帝紀太清紀典略典略云至于移軍江潭苑今從太淸紀典略梁帝紀作蘭亭苑三月𥘉閉城之日擐甲者二萬餘人今從典略南史作三萬南安侯駿說邵陵王綸仲禮如此今從太淸紀典略云綸巳下咸說柳柳津言邵陵仲禮不忠不孝禮曰天下事勢如此何不自典略云柳仲禮族兄暉謂仲臺城囚天子徐而縱兵既破之後復挾天子令諸侯也仲禮取冨貴仲禮曰兄今若爲取之暉曰正當堅營不戰使賊平丙午呉盜陸緝今從太淸紀南史典略作戊子陸黯癸丑侯景殺臨賀王正徳今從太淸紀南史典略五月正徳死景封元羅等十餘人皆爲王十八日今從典略太淸紀在八月二景殺永安侯確九月今從典略太淸紀確死在湘東王繹使丗子方等討河東王譽諮議參軍周弘直太淸紀云𥘉上遣汝東往但使諸蕭有一人能匡國難吾無所惜譽對弘直攘往湘州報河東王譽云侯景旣須撲滅今欲遣荆州兵力使預至譽所曰周弘直還知汝必不能自出師吾今便長驅席袂云身始至鎮百度俱闕征伐之任便未能行又遣舎人虞事參軍劉瑴往雍宣旨於岳陽王察曰吾舟艦足乗唯糧仗卷還望三湘兵糧以相資給譽又拒絶意色殊慣上又遣録自擇之察荅曰兵馬蕃扞所須非敢减撤襄陽形勝之地豈闕少湘州有米巳就譽求雍部精兵必能分遣行留之計爾之意卿是股肱所寄可相毗賛邪荅曰樊沔衝要皇業所基可蹔虚㲄出謂雍州別駕甄玄成曰觀殿下辝色曾無匡復征獯逆義異西伯非敢聞命於是湘雍二蕃成亂謀矣是月人情驍勇山川險固君其雅識寧俟多言㲄曰本論東討共使往湘並未相脣齒今故令汝至彼必望申吾意若能得相上遣丗子方等往湘州具陳軍國之計誡方等曰吾近累遺此皆蕭韶爲元帝隱惡飾辭耳今從梁書南史隨下可留王冲權知州事譽遂不受命潜圗構逆七月陳霸先擒蘭𥙿等八月今從陳書太清紀擒𥙿在丁卯鮑泉伐湘州八日受命丁卯乃行也太清紀作八日或者庚午以南康王㑹理兼尚書令十六日今從典略太清紀在八月二八月東魏髙澄以蘭京爲膳奴成今從北齊帝紀陳元康傳作蘭固九月岳陽王察伐江陵兵敗守者殺張纉使制文檄纉太清紀云察無操筆及軍敗將殺之纉曰若使南師必振北賊將亡吾雖曰吾蒙朝廷不丗之榮又荷湘東王國士之眷今日雖死義以如子之情情所未忍曰彼不應來而來明其爲逆我應逐死無所恨遂殺之弃尸於江陵北湖又云諸將並欲追躡上蕭韶之虚美今從南史不逐見我之弘此蓋亦十一月乙卯葬武帝逹于脩陵今從梁書太清紀云十四日梓宫邵陵王綸奔鄱陽害已乃圖之綸覺之乃去今從典略南史云東土皆附綸臨城公大連懼將十二月庚寅宋子仙執南郡王大連子朔擒大連按是典略云十二月庚從太清紀月壬午朔今太宗大寶元年正月陳霸先進軍南康今從陳帝紀太清紀在二月南康王恪推邵陵王綸承制置百官逼奪恪州徙恪於太淸紀云三月綸梁書典略郡廨今從魏楊忠敗柳仲禮於漴頭年十二月今從典略太清紀作潼頭在去二月侯子鑒克廣陵城中無少長皆殺之中數百人典太清紀曰城人今從南史略曰死者八千五月乙卯鄱陽王範卒今從太清紀典略作已酉卒丙辰東魏主禪位于齊日留咸陽王坦等七日司馬子如北齊書北史髙徳政傳云五月六王如鄴甲寅加九錫丙辰魏主遜位戊午王即帝位典略辛等至鄴九日文宣至城南頓按後魏書北史帝紀皆云辛亥傳日相應蓋辛亥始自晉陽如鄴非到鄴之日也亥王還鄴以長曆推之此月己酉朔皆不與徳政武陵王紀使丗子圎照帥兵東下遣圎照東下按六月南史云六月辛酉紀五月或者五月辛酉歟己卯朔無辛酉典略在六月丁亥齊主立李后今從北齊帝紀典略在五月乙丑庚子羊鴉仁奔江西盗殺之從梁帝紀典略太淸紀在十月令髙涼洗氏今從隋書典略作沈氏七月侯景以侯瑱爲湘州刺史月今從典略太淸紀在十一八月甲午湘東王繹遣王僧辯等趣江郢戊申朔繹遣典略云九月月末今從梁簡文帝紀僧辯按太淸紀事在八九月任約據西陽武昌月今從太清紀梁帝紀在十一任約擒衡陽王獻送建康殺之月今從太淸紀梁帝紀在十一十月立皇子大鈞等爲王四日今從梁帝紀太清紀在十一月十十一月武陵王紀帥諸軍發成都是月壬子朔無壬寅南史云十一月壬寅按矦景自出屯晉熈府事按典略九月景請梁妃主同宴梁典略七月景軍次濡須使梁仲宣知留康王㑹理事見之太淸紀梁書典略晉熈皆作皖口今從南史帝紀十月乙未景逼太宗幸西州不容七月巳在濡湏今囚南王偉殺南康王㑹理㑹理梁帝紀十月壬寅景害㑹理今典略云十二月癸未建安矦賁等告清紀從太矦景殺武林矦諮死前今從南史太淸紀在㑹理二年正月湘東王繹遣尹恱等將兵趣武昌年十一月典略在去淸紀今從太張彪將趙稜孫鳯敗走趙伯超戰敗于臨平死者八万餘典略去年十一月彪自圍錢塘與刀披心出血自㰱彪信之亦取刀剌血報之刀適至心稜以人走還剡伯超兄子稜在彪軍中謀殺彪僞請與彪盟引小巳死當共求富貴彪左右韓武入視之彪巳蘇細聲謂曰我手按之刀斜入不深彪頓絶稜謂巳死出外告彪諸將云彪表於湘東王繹今從太淸紀尚活可與手武遂誅稜彪復奉二月魏楊忠執邵陵王綸稱來相禮接綸白服與相見執太淸紀云宇文泰遣忠襲綸詐梁書南史而害之今從齊遣曹文皎使于江陵朔今從太淸紀典略在正月丙午陳霸先擒李遷仕斬之雩都縣連營相持百餘日是月廣太淸紀在四月云遷仕追霸先於破之斬遷仕首餘黨悉降霸先引軍前進今從陳書州剌史蕭勃遣歐陽隗水歩萬餘人來援隗與戰大閏月矦景發建康三月丁未按乙卯徐文盛克武昌不容梁帝紀三月丁未景發京師典略云閏甲戊朔無丁未蓋字誤也丁未景巳發建康閏三月四月壬戍景衆濟江今從太淸紀梁帝紀作甲子六月景別將支化仁鎭魯山司徒安得爲景守城今從典略梁帝紀作魏司徒張化仁按魏范希榮行江州事史今從太淸紀典略云江州刺余孝頃遣兵救鄱陽于慶走曰慶走二曰擒任約三曰景長曆六月癸卯朔太淸紀一梁帝紀走今從七月丁亥矦景還至建康七月二十日今從梁帝紀典略作六月壬戍太清紀作八月壬戍豫章王棟即帝位今從太清紀典略作壬辰誤景殺南郡王大連於姑熟江今從梁書太淸紀云於九十月宜豐矦循今從梁書南史作脩丙辰王僧辯等啓湘東王繹上尊號今從太淸紀典略作乙卯十一月戊寅繹以安南矦方矩爲中衞將軍月辛亥今梁書在八淸紀從太丗祖承聖元年正月已卯矦子鑒等帥兵至合肥二月典略其羅城今從太清紀庚子子鑒等圍合肥克突厥子弟謂之特勒舊唐書及宋祁新唐書諸書或作特勤今從劉昫三月矦子鑒以鵃䑠千艘載戰士千艘今從梁書典略作烏鵲舫庚辰王僧辯督諸軍至張公洲今從太清紀典略作戊寅陳霸先於石頭西落星山築柵柵今從典略陳書云橫隴立已丑僧辯等上表勸進社巳丑僧辯等奉表按表文云衆梁帝紀戊子王以賊平告明堂太江陵乎蓋僧辯等以己丑日發表勸進耳軍以戊子緫集建康豈是日告捷即能逹四月僧辯啓陳霸先鎮京口辯啓髙祖鎮京口按是時徐陳紀髙祖應接郭元建還僧領兵戍京口耳未爲剌史也嗣徽爲南徐州剌史蓋霸先但羊鯤叱海師向京口景向南徐州今從梁書典略云舟人李橫文紿溧陽公主亦預食焉公主今從南史典略云復烹溧陽五月遣侍中豐城矦泰等謁山陵空太淸紀在此月官梁書在四月官爲司從典略太宰今九月魏宇文泰遣西豐矦循還江陵朔太祖謂循云云典略云十月乙未至江陵今從之按太淸紀是月循十一月李洪雅保空雲城城今從梁書典略作空零二年二月突厥科羅立號乙息記可汗厥傳云弟逸可顔師古隋書突書及北史汗立今從周三月柔然又立鄧叔子爲可汗立鐵伐爲可汗突厥傳魏書北史蠕蠕傳皆云部落分散各有所立也皆云立鄧叔子爲可汗蓋俟斤立號木杆可汗俟斗木杆今從北史周書作木汗隋書作魏宇文泰遣尉遲廻伐蜀辰今從周紀典略在正月戊陸納遣呉藏等據車輪曆二月無丙子梁紀誤梁紀云二月丙子按長王僧辯至巴陵月癸亥朔無辛酉典略誤典略云三月辛酉按長曆是宜豐矦循讓都督於僧辯讓都督今從典略僧辯傳云與陳霸先四月丙申僧辯軍于車輪也今從梁紀典略作甲子非六月湘州平曆是月無乙酉梁紀誤梁紀乙酉湘州平按長七月辛未苻昇等斬公孫晃降於王琳今從梁書典略作丙戍九月齊主遣邢景逺歩大汗薩將襲建康杲逺歩六梁書作邢齊書北史汗薩今從北三年正月齊主破山胡男子十三以上皆斬二以上今北史作十略從典宇文泰廢魏主立齊王廓帝北史皆在正月今從之國典云三月廢帝四月立恭三月甲辰以王僧辯爲太尉子今從梁紀典略作二月甲五月魏李遷哲徇地至巴州牟安民降之巴州剌史牟典略云斬梁周書北史安平今從十一月甲寅魏人百道攻城也今從典略梁紀作辛卯誤帝焚圖書十四萬卷萬卷按周僧辯所送建康書巳八萬隋經籍志云焚七萬卷南史云十餘七萬卷乎今從典略卷井江陵舊書豈止胡人牽帝使拜于謹武陵河東二王子孫於獄列於沙州典略云謹撝梁主令西至龍泉廟出此何以爲君上無以應接武陵諸子先巳餓死河東子孫亦鎻械嚴酷瘡痍腐爛引梁主使視之謂曰此皆骨肉忍虐如今不取應不存十二月于謹選百姓男女數萬口爲奴婢今從梁紀南史典略作五十萬敬帝紹泰元年正月梁王察即帝位位八載保定二年周書察傳云察在所立乙亥年乃即位攺元也薨然則察雖以甲戍年爲魏齊淸河王岳進軍臨江陸法和宋蒞降之宋茝今從北北史宋蒞作法和按典略甲午齊巳召岳還今從之齊紀又北齊紀云壬寅岳度江克夏首送甲午齊召岳還使慕容儼戍郢州使侯瑱討之按齊主梁紀四月法和降齊士相㑹然則法和先巳降齊也今從典略與王僧辯書云淸河王岳今次漢口與陸居五月王僧辯遣使送質於貞陽矦淵明遣廷尉張種等典略三月辛卯始入建康疑太早恐非送質于鄴按淵明五月辛丑淵明自采石濟江京師北齊紀五月蕭明入建業按梁紀七月辛丑淵明濟江甲辰入丑濟江癸卯至建康今從之典略五月庚子僧辯逆淵明辛九月丙午淵明遜位巳大赦攺元按長曆丙午九月二十梁書九月丙午帝即皇帝位十月已乎蓋丙午復梁王位十月乃即帝位耳典略丁未廢貞陽矦九日已巳十月二十二日豈有即位二十四日始攺元大赦並從陳書出就邸今十月韋載以郡應杜龕今從梁陳書典略作韋載王僧智據吳郡拒守任約今從典略南史云僧智奔陳霸先還建康一月十三日太晩且庚寅以前霸先巳有梁書十一月庚寅霸先還建康按庚寅十事迹今從陳書在建康與齊相拒十一月癸未矦安都襲胡墅戊寅朔無己巳今從陳書典略作己巳按長曆是月太平元年正月陳蒨斬杜龕杜龕降詔賜死陳書紹泰梁書太平元年正月癸未從弟北叟司馬沈孝敦並賜死典略魏恭帝二年十二月蒨元年十二月杜龕以城降明年正月癸未誅杜龕于呉興龕龕祠項王神使力士拉於坐龕從弟北叟司馬沈孝敦並賜命劉澄等攻龕大敗之龕乃降明年正月丁亥周鐵虎送杜南史死今從王僧智弟僧愔俱奔齊智得就任約約敗走僧智肥不能梁書南史王僧辯傳僧辯旣亡僧還時吴州剌史羊亮隷在僧愔下與僧愔不平密召矦瑱見行又遇害僧智弟僧愔位譙州剌史征蕭勃及聞兄死引軍齊陳書南史矦瑱傳則云僧辯使其弟僧愔與瑱共討蕭勃禽僧愔以名義責瑱瑱乃委罪於將羊鯤斬之僧愔復得奔愔徒黨僧愔奔齊典略魏恭帝三年正月𥘉僧愔與瑱共討及陳武帝誅僧辯僧愔隂欲圖瑱及奪其軍瑱知之盡収僧瑱攻之僧愔奔齊凡比諸說莫知孰是今約其梗槩言之曲江矦勃至是吴州剌史羊亮說僧愔襲瑱而翻以告瑱四月矦安都襲齊司馬恭長曆是月乙巳朔無壬午梁書云壬午安都襲恭按五月齊人詐許退師赫怒召魏収於前立爲制書欲自將典略云五月齊主在東山飲酒投杯按梁陳北齊帝紀及渙傳皆無是事今去之西討長安令上黨王渙將兵伐梁於是渙南侵矦安都擒齊乞伏無勞芳今從陳書南史作乞伏無十一月齊併省一百五十三郡郡今從齊書北史作五十六十二月齊築長城同不知與此爲一事爲二事北齊書北去歳六月已云築長城而城名長短不兩存之史皆然今陳紀上髙祖永定元年二月蕭孜勃之從子傳皆作子今從梁陳書南史周文育紀書帝南江州刺史余孝頃剌史今從梁書典略作南康州十月矦安都等大敗績按髙祖以乙亥受禪安都聞之而典略云乙亥安都敗陳書云是月敗今從陳書嘆豈同日乎二年二月沈泰奔齊月今從陳帝紀北齊帝紀在八三月齊司馬消難降周叛今從周書典略北齊帝紀四月消難齊主自晉陽還鄴言其還八年四月帝在城東馬射敕京北齊帝紀天保七年八月帝如晉陽不自晉陽北廵則又復在晉陽必有差玄今不敢增損師婦女悉赴觀是在鄴也此月又言至自晉陽六月乙丑帝王琳奉梁永嘉王莊即帝位遣使請立莊仍以江州内北齊帝紀十一月丁巳琳及典略然陳書典略皆云立莊於郢州按琳時在湓城蓋始屬令莊居之十二月癸酉詔莊爲梁主進居九派今從陳書遷郢州耳居江州後十一月齊主刺尉子輝從北齊書典略北史作子燿今齊常山王演因諫爭𬒳毆撻魏時宫人醒而忘之謂帝北史孝昭紀云文宣賜帝致困今從北史王晞傳擅取遂令刀環亂築因此丗祖天嘉元年二月侍中袁泌袁泌今從陳書北齊書作長史齊常山王演出歸第皆決於帝月餘乃居藩邸今從楊愔傳北齊書孝昭紀云除太傳録尚書朝政可朱渾天和道元之子今從北齊書典略云道元弟武衞娥永樂叩刀仰視桃枝今從北史北齊書作領軍劉二年正月合州刺史裴景徽暉今從陳書北齊書作景三年正月周遣杜杲送安成王頊南歸今從周書典略作杜果閏二月攺鑄五銖錢年今從陳帝紀隋志在天嘉五九月丁亥詔安成王頊代吳明徹攻周迪丁亥迪請降陳書帝紀云招納之今從南史迪傳詔安成王諱督衆軍以四年正月齊魏収除名已卯除名相去五日不容如此之北齊書帝紀正月乙亥収爲僕射去其日速恐誤今九月周楊荐使突厥復命是歳乃興入并之投故置於此典略在保定二年按王慶傳云臨海王光大元年二月安成王頊欲収韓子髙毛喜止之密賂宦者蔣裕令誘建安人張安國使據郡反兾因此以陳書文沈后傳云安成王旣專沈太后憂悶計無所出乃后恐連逮黨與並殺之按后欲圖髙宗而令安國據建安反圖髙宗安國事覺並爲髙宗所誅時后左右近侍頗知其事宗旣立后豈得自全今刪去理不相渉且后若實有此謀髙到仲舉韓子髙賜死華皎傳子髙誅後皎始謀叛帝紀此陳書子髙傳死在光大元年八月按及余髙頃始興王伯茂傳師知等誅後伯茂乃進號中衞然年五月皎巳謀反又慈訓太后令先言劉師知子髙誅後乃傳誤也則子髙六月齊封皇弟仁直爲丹陽王統今從列傳北齊書帝紀名九月周元定以歩騎數千圍郢州夸誕之辭今從周帝紀陳帝紀云歩騎二萬盖徐度執元定盡俘其衆千匹亦恐夸誕今不取陳書云獲萬餘人馬四資治通鑑考異卷第七
