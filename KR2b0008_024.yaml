body:
  text: 臣司馬光奉勑編集唐紀十六乾符三年七月宋威擊王仙芝破之月宋威自青州實録去年十二十二月敗走中間半年豈能靜處蓋實因威除招討使連言與副使曹全晸進軍擊王仙芝仙芝敗走按仙芝若以去年月不在十二月也之其實仙芝敗在此十二月鄭畋請以崔安潛代宋威張自勉代曽元裕此言安潛為諸道行營都統李琢為招討草賊使自勉副實録雖於此月載畋所上書亦不言行與不行新紀遂於副猶如故新紀誤也之按明年威元裕為使安南戍兵逐李瓚二月今從實録新紀在四年十黃巢言五千餘衆安所歸衆至數萬至此才有五千仙芝巢初起時云數月間聚散無常耳者蓋烏合之衆王仙芝黃巢分道而去仲夏天示彗星草冦黃巢尚君王坤驚聽録曰乾符四年丁酉即大寇黃巢尚君長並賊帥之徒黨僅一千餘人攻陷汝州長奔突即五年戊戌之嵗狂寇王仙芝起自鄆封而侵汝鄭蔡間取羣凶之願三千餘冦屬仙芝君長二千餘人屬黃巢云云又曰黃巢望閩廣而去仙芝指鄆州南行尚君長期陳趣鄆也王坤此書年月事迹差舛尤多但擇其可信者取之所管明年二月仙芝陷鄂州巢陷鄆州則非巢趣閩廣仙芝四年二月南詔國號鶴拓亦號大封人録曰南詔别徐雲虔南詔封人是以封為國號也名鶴拓其後亦自稱大四月黃巢尚讓保查牙山七月入查牙山與王仙芝舊紀四年三月巢陷鄆州五年八月王鐸斬王仙芝先是尚君長弟讓以兄奉使見誅合五年二月君長仙芝皆死尚讓以兄遇害大掠淮南舊傳録乾符二年仙芝陷曹濮巢已起兵應之三年十二月招討率部衆入查牙山黃巢黃揆昆仲八人率盜數千依讓按實四月黃巢引其衆保查牙山其年冬君長乃死驚聽録巢與副都監楊復光奏草賊尚讓據查牙山官軍退保鄧州四年時君長亦在座非仙芝死後巢方依讓也又按舊紀仙芝死仙芝俱入蘄州以仙芝獨受官而怒驅仙芝傷面由是分隊璘乃陷廣州先云陷華州方攻潼關敘事顛錯不倫今從實録後王鐸始為都統討賊而舊傳云王鐸斬仙芝又先云殺張五年二月李克用殺假文楚據雲州紀年録曰乾符趙鳯後唐太祖雲州防禦使以代支謨時嵗荐飢文楚削軍人衣米諸軍咸三年河南水災盜寇蜂起朝廷以假文楚為代北水陸發運邉校程懷信康君立等十餘帳日譁於太祖之門請共除虐怨太祖為雲中防邉督將部下爭訴以軍食不充請具聞奏中械文楚出以應太祖後唐閔帝時史官張昭逺撰莊宗功帥以謝邉人衆因大譟擁太祖上馬比及雲中衆且萬人城亂代北仍嵗阻飢諸部豪傑咸有嘯聚邀功之志文楚法令臣列傳曰康君立為雲中牙校事防禦使假文楚時天下將謂君立等曰假公儒者難與共事方今四方雲擾皇威不振稍峻軍食轉餉不給戍兵咨怨雲州沙陀兵馬使李盡忠私雄徑聞於時者莫若李振武父子官髙功大勇冠諸軍吾等丈夫不能於此時立功立事非人豪也吾等雖擁部衆然以武皇為沙陀三部落副兵馬使在蔚州盡忠令君立私往圖合勢推之則代北之地旬月可定功名富貴事無不濟也時給我等邉人焉能守死公家父子素以威惠及五部當共除之曰方今天下大亂天子付將臣以邉事嵗偶飢荒便削儲君立曰事機已泄遲則變生咸通十三年十二月盡忠夜帥虐帥以謝邉人武皇曰豫家尊在振武萬一相逼俟豫稟命知軍州事遣君立召太祖於蔚州是月太祖與退渾突厥三牙兵攻牙城執文楚及判官柳漢璋陳韜等擊之於獄遂自軍判官符印請太祖知留後事七日盡忠械文楚漢璋等五人部落衆萬人趨雲中十四年正月六日至鬪雞臺盡忠遣監軍表請授太祖大同防禦使懿宗不悅時已除盧簡方代文送鬪雞臺軍人亂食其肉九日太祖權知留後府牙受上三軍防禦使假文楚自稱防禦留後塞下之亂自兹始矣薛居楚未至而文楚被害實録乾符元年十二月李克用殺大同君立與薛鐵山程懷信王行審李存璋等謀悉以盡忠語為正五代史君立傳皆與莊宗列傳同惟削去李盡忠名但云衆因聚諫擁武皇比及雲州衆且萬人師營鬪雞臺城中械君立之語云君立等乃夜謁武皇言曰方今天下大亂云云狀以聞舊紀咸通十三年十二月李國昌小男克用殺雲州文楚以應武皇之軍既收城推武皇為大同軍防禦留後衆首領李盡忠陷遮虜軍竇浣遣康傳圭率土團二千屯代州防禦使假文楚據雲州自稱防禦留後乾符五年正月沙陀著撰人姓名專記晉陽事其書云乾符五年戊戌竇浣自前將發求賞呼噪殺馬步軍使鄧虔有唐末三朝見聞録者不文楚正月二十六日軍於石窯二十七日到白泊二十九日守京兆尹拜河東節度使在任便值大同軍變殺防禦使假共賞絹一匹監軍使差仇判官聞奏李盡忠等準詔各賞馬至靜邉軍三十日築却四面城門二月一日在城將士三人匹諸軍將銀碗絹等三日李盡忠却入四日兩面馬步五萬一匹銀鞍轡一副銀三鋌銀碗一枚絹一束錦二匹紫羅三與李九郎七日城南門樓上繫縛下假尚書柳漢璋雍侍御餘人城四面下營五日又賞土團牛酒六日監軍使送牌印却骸骨八日李九郎被土團馬步軍約二千人持弓刀送上陳韜等四人尋分付軍兵於鬪雞臺西剮却又令馬軍踐踏奏沙陀首領李盡忠冦石窯白泊至靜邉軍二月奏李盡忠與舊紀五年事微合實録亦頗采之云五年正月壬戌竇浣文楚在咸通十三年十二月歐陽修五代史記取之太祖紀求賞詔賞馬一匹銀鞍勒綿絹等按莊宗列傳舊紀克用殺乾符五年二月新紀取之惟實録在乾符元年不知其所據年録在乾符三年薛居正五代史新沙陀傳取之見聞録在亦須發兵徴討而自乾符四年以前皆不見其事唐末見聞何書也克用既殺文楚豈肯晏然安處必更侵擾邉陲朝廷今從之録敘月日以盧簡方為大同防禦使前義昌節度使盧簡方為舊紀咸通十三年七月以防禦等使國昌稱病辭軍務乃以太僕卿盧簡方為雲州刺太僕卿十二月以振武節度使李國昌為雲州刺史大同軍州節制屈居大同然朕以沙陀退渾撓亂邉鄙以卿曽在雲史充大同軍防禦等使上召簡方於思政殿謂之曰卿以滄所猜嫌也十四年正月辛未以雲朔暴亂代北騷動賜盧簡中惠及部落且忍屈為朕此行具達朕旨安慰國昌勿令有領兵權又曰若克用暫勿主兵務束手侍朝廷除人則事出方詔曰近知大同軍不安殺害假文楚李國昌小男克用主允料國昌輸忠效節必當已有指揮簡方準詔諭之國昌不權宜不足猜慮若便圖軍柄欲奄大同則患繫久長故難依之三月以簡方為振武節度使至嵐州率實録乾符元年十奉詔乃詔太原節度使崔彥昭幽州節度使張公素出師討蓋舊紀實録各隨假文楚死之後載除簡方及詔書使事相二月簡方除大同二年正月賜詔亦不云使彥昭公素討之來事實録所以不取者方知招諭未必攻討也唐末見聞録接續耳恐皆未足據也舊紀所云太原幽州討之蓋因敘後五年而云六月卒蓋約奏到之月耳今從三朝見聞録又云五年四月敕除簡方振武節度使五月卒實録亦在曽元裕破王仙芝斬之梅縣殺戮五萬餘人追至曹州實録元裕奏大破王仙芝於黃討使宋威出軍屢敗之仍宣詔書諭仙芝仙芝致書於威求南華縣斬仙芝傳首京師舊紀二月王仙芝餘黨攻江西招乃斬君長溫王以徇仙芝怒急攻洪州陷其郛宋威赴援與節鉞威偽許之仙芝令其大將尚君長蔡溫玉奉表入朝威舊傳曰齊克讓為兖州節度使以本軍討仙芝仙芝懼引衆賊戰大敗之殺仙芝傳首京師君長弟讓與黃巢大掠淮南十月又遣將徐唐莒陷洪州時仙芝表請符節不允以宋威歷陳許襄鄧無少長皆虜之衆號三十萬三年七月陷江陵以朝旨釋罪别加官爵仙芝乃令尚君長蔡溫玉楚彥威相為荆南節度招討使楊復光為監軍復光遣判官吳彥宏諭狗脊嶺斬之賊怒悉精鋭擊官軍威軍大敗復光收其餘衆次詣闕請罪且求恩命時宋威害復光之功並擒送闕敕於首獻於闕下新傳黃巢自蘄州與王仙芝分其衆尚君長入以統之朝廷以王鐸代為招討五年八月收復荆州斬仙芝繇潁蔡保查岈山引兵復與仙芝合圍宋州會自勉救兵至陳蔡巢北掠齊魯衆萬人入鄆州殺節度使薛崇進陷沂州芝自圍洪州取之使徐唐莒守進破朗嶽遂圍潭州觀察使仙芝解而南度漢攻荆南陷之賊不能守巢攻和州未克仙部還入河南帝詔崔安潛歸忠武復起宋威曽元裕以招討崔瑾拒却之乃向浙西擾宣潤不能得所欲身留江西趣别闕請罪又遺威書求節度威陽許之上言與君長戰擒之復使還之而楊復光監軍復光以詔諭賊仙芝遣尚君長等詣還攻洪州入其郛威自將往救敗仙芝於黃梅斬五萬級獲光固言其降命侍御史與中人即訊不能明卒斬之仙芝怒潰黨歸巢新舊傳敘賊所經曆皆不同又云宋威殺仙芝今仙芝傳首京師當此時巢方圍毫州未下君長弟讓帥仙芝實録皆從黃巢改元王霸建元曰王霸元年舊傳先是尚君長弟讓續寶運録乾符元年黃巢聚衆於會稽反讓月餘衆至數萬陷汝州虜刺史王鐐大掠關東官軍加討以兄見誅率衆入查牙山黃巢黃揆昆仲八人率盜數千依將軍仍署官屬蕃鎮不能制新傳曰尚君長弟讓率仙芝潰屢為所敗其衆十餘萬尚讓乃與羣盜推巢為王曰衝天大南山南之民十餘萬掠淮南建元王霸今從之黨歸巢推巢為王號衝天大將軍署拜官屬驅河巢請降詔以為右衛將軍竟不至巢東攻亳州不下舊傳及王仙芝敗王霸連為王師所敗詣天平乞降除右衛將軍復叛去自是乃襲破沂州據之仙芝餘黨悉附焉實録巢自稱黃王建元殺尚君長非是且討賊無功詔還青州以元裕為招討使張兵不能制新傳曰曽元裕敗賊於申州死者萬人帝以宋威東北面行營招討使督諸軍急捕巢巢方掠襄邑雍丘詔滑自勉為副巢破考城取濮州元裕軍荆襄援兵阻更拜自勉將軍劉景仁以兵五千援東都河陽節度使鄭遷休兵三千州節度使李嶧壁原武巢寇葉陽翟欲窺東都會左神武大襄城陽翟者為崔安潛逐走在浙西者為節度使裴璩斬二壁河陰巢兵在江西者為鎮海節度使髙駢所破寇新鄭郟巢度藩鎮不一未足制已即叛去轉寇浙東執觀察使崔璆長死者甚衆巢大沮畏乃詣天平軍乞降詔授巢右衛將軍同今從實録與實録先後不四月以盧簡方為振武節度使李國昌為大同節度使百騎邉界巡檢至四月三日進發至五里堠北副將唐末見聞録遮虜軍及代州告急竇尚書差回鶻五縛入府尚書令下於衙南門全家處斬使司差副兵馬使趙康叔談恃酒叛逆射損都將趙歸義斫損將判官閻建弘擒前大同軍防禦使盧簡方充振武節度使除振武節度使李元掠領馬軍進發閻建弘遞送海西當月內有勑送節到除大同蓋誤以康叔談作亂之日為簡方等建節之日也新沙尚書充大同軍節度使實録云戊辰以簡方為振武國昌為後不許發諸道兵進捕諸道不甚力而黃巢方引兵渡江朝陀傳曰李克用既殺假文楚諸校共丏克用為大同防禦留詔河東節度使崔彥昭幽州張公素共擊之旡功據此則是廷度未能制乃赦之以國昌為大同軍防禦使國昌不受命諸將列狀以聞請授武皇旄鉞朝廷不允徴諸道兵以討之大同防禦使非節度也薛居正五代史紀曰武皇殺假文楚同軍節度使檢校工部尚書是克用為大同節度使非國昌乾符五年黃巢渡江其勢滋蔓天子乃悟其事以武皇為大節度使獨實録於此言之下五月又云國昌殺監軍不肯代實録國昌傳及獻祖紀年録舊唐本紀俱不言國昌為大同用必無違命故徙國昌為大同節度而以盧簡方鎮振武二必有所據蓋國昌父子俱不肯受代朝廷以為用國昌代克死於嵐州國昌亦未嘗赴大同也人竟不毁命故簡方不得赴鎮而崔淡等議南詔和親南詔遣奠望趙宗政來朝且議和實録置淡議於二月至四月又云爭蠻事置此好今因盧鄭五月鄭畋盧携罷相崔璆書求天平節鉞畋携爭論於舊紀六年五月賊圍廣州與李岧萬行經屢陷郡邑六年陷安南府據之致書與浙東觀察使中書辭語不遜俱罷分司畋傳曰五年黃巢東渡江淮衆百天子下百僚議初黃巢之起也宰相盧携以浙西觀察使髙崔璆求鄆州節鉞璆言賊勢難圖宜因授之以絶北顧之患營都統及崔璆之奏朝臣議之有請假節以紓患者畋採羣駢素有軍功奏為淮南節度使令振賊衝尋以駢為諸道行髙駢將略無雙淮士甲兵甚鋭今諸道之師方集蕞爾纎寇議欲以南海節制縻之携以始用髙駢欲其立功以圖勝曰本因飢嵗人以利合乃至實繁江淮以南荐食殆半國家久不足平殄何事捨之示怯而令諸軍解躰耶畋曰巢賊之亂容權降恩澤彼本以飢年利合一遇豐嵗孰不懷思鄉土其不用兵皆忘戰所在節將閉門自守尚不能枝不如釋咎包下之憂未艾也羣議然之而左僕射于琮曰南海有市舶之衆一離則巢賊几上肉耳若此際不以計攻全恃兵力恐天乃依携議及中書商量制敕畋曰妖賊百万橫行天下髙公利嵗貢珠璣如令妖賊所有國藏漸當廢竭上亦望駢成功輩三四人畫度公倚淮南用兵吾不知稅駕之所矣携怒拂遷延玩冦無意翦除又從而保之彼得計矣國祚安危在我儀四海二人俱罷政事携傳曰五年黃巢陷荆南江西外郛衣而起染袂於硯因投之僖宗聞之怒曰大臣相詬何以表使李岧遂抗表求節鉞初王仙芝起河南携舉宋威齊克讓及虔吉饒信等州自浙東陷福建遂至嶺南陷廣州殺節度廷遂以宰臣王鐸為都統携深不悅浙帥崔璆等上表請假曽兖等有將略用為招討使及宋威殺尚君長致賊充斥朝堅言不可假賊節制止授率府率而已與同列鄭畋爭論投黃巢廣州節鉞上令宰臣議携以王鐸為統帥欲激怒黃巢盧携議南蠻事携請降公主通和畋固爭以為不可抗論是硯於地由是兩罷之實録五年五月丙申朔是日宰臣鄭畋太子賓客分司注云舊史洎雜説皆云畋携議黃巢節制忿非携怒拂衣而起袂染於硯因投而碎之丁酉以畋携並為所述恐不謬又畋傳曰時黃巢攻陷江浙上表乞節鉞畋與爭腸罷而鄭廷昌撰畋行狀乃云議蠻事無可證之然當時公主和好畋因爭以為不可遂抗論之乃與携俱罷相又携同列盧携謀議攻討及拔用將帥事多異同又南詔蠻請降政議論不協初王仙芝起河南携舉宋威齊克議曽兖等有傳曰携人質甚陋語亦不正與鄭畋俱李翺之外孫及同輔以公主和南詔蠻鄭畋執之以為不可帝前忿爭由是兩罷將略用為招討使討賊皆無功致賊充斥又主髙駢之請欲察使崔璆書求保薦乞天平節鉞璆岧上表論之宰相鄭畋之舊紀六年五月賊圍廣州仍與廣南節度使李岧浙東觀新舊傳舊紀皆以畋携罷相在六年實録新紀表在此年五盧携爭論於中書詞語不遜俱罷為太子賓客分司東都按知二人罷在五月必有所據今從之月實録新書皆自相矛盾然宋氏多書李國昌不受代土團兵咼鄧虔武損却别敕不受除唐未見聞録五月振二日指揮在府三城排門差夫一人齊掘四面壕塹盧尚書替李尚書收却遮虜軍進打寧武及岢嵐軍代州告急二十刺史乂發太原晉陽兩縣點到土團子弟一千人往代州屯發赴振武至嵐州身薨二十四日拜都押衙康傳圭充代州尋被咼却床舁尸柩入府尚書監軍自出安慰定每人各給駐至城北卓隊不發索出軍優賞差馬步都虞侯鄧虔安慰充者將發赴軍前使司有榜借商人助軍錢五万貫文實録錢三百文布一端差押衙田公鍔給散不放却回便被請將代州出兵禦之始國昌遣克用以兵襲大同三軍表克用為五月李國昌殺監軍使不肯受代起兵進打寧武及岢嵐軍貪其土地欲父子分統故拒命焉實録六月乙丑朔嵐州奏留後朝廷不允乃以國昌命之欲以其子無能拒也時國昌州刺史發太原晉陽土團千人戍代州至城北卓隊不發索新除振武節度使盧簡方卒以太原府都押衙康傳圭為代撫慰乃定初太原府帑空竭每有賞賚必科民家至是尤窘優賞馬步都虞候鄧虔安慰為其衆殺之節度使竇浣自出其月日以象奏到之時耳唐末見聞録又云六月十一日左迫乃榜借商人助軍錢五万此皆約唐末見聞録為之而後副使軍前同指揮事此謂到府之日而實録云甲戌以謨為散騎常侍支謨奉敕到府充大同軍制置使兼攝河東節度月十日亦誤也制置使甲戌乃六十二月李鈞與李克用戰敗死季康與北面行營招舊紀河東節度使崔中流矢而卒戊戌至代州昭義軍亂為代州百姓所殺殆盡討使李鈞與沙陀李克用戰于岢嵐軍之洪谷王師大敗鈞鈞為猛虎軍所殺又曰詔統本道兵由鴈門出討雲州與賊比年實録略同廣明元年八月實録河東奏昭義節度使李洪谷敗績薛居正五代史紀曰乾符六年春朝以昭義節度戰敗歸為其下殺之新紀庚辰崔季康李鈞及李克用戰於州與幽州李可舉會赫連鐸同攻蔚州獻祖以一軍禦之武使李鈞充北面招討使將上黨太原之師過石嶺關屯于代苦寒臨戰大敗奔歸代州李鈞中流矢而卒唐末見聞録曰皇以一軍南抵遮虜城以拒李鈞是冬大雪弓弩弦折南軍後觀察判官李劭權觀察留後昭義節度使李鈞領本道兵十九日崔尚書發往岢嵐軍請别敕賈敬嗣大夫權兵馬留鳴谷各歸本道按昭義軍變必非李鈞所為代州百姓捉到馬到代州軍變被代州殺戮並盡捉到李鈞殘軍潰散取鴉處之今從舊紀李鈞不知如何六年正月髙駢將張璘梁纘傳實録作潾今從舊髙舊紀張璘作張麟新紀續寶運録舊紀梁纘作梁績今從衆書駢黃巢傳及唐年補録妖亂志唐補紀降畢師鐸等鐸為先鋒攻脅天長纍日不克師鐸之志沮郭延誨妖亂志曰初黃巢將蹂踐淮甸委師駢敗巢於浙西皆師鐸之效故置於此焉及巢北向師鐸遂降勃海按舊師鐸傳二月辛巳李侃為河東節度使安慰使到府李侃充唐末見聞録三十日云庚寅除侃誤也河東節度使實録因四月王鐸為荆南節度使招討都統鐸請自督衆討舊紀五年二月侍郎江陵尹荆南節度使充諸道兵馬都統舊傳四年賊陷賊天子以宋威失䇿殺君長乃以鐸檢校司徒兼侍中門下立戰功宜付軍柄物議未允鐸廷奏臣願自率諸軍蕩滌羣江陵楊知溫失守宋威破賊失策朝議統率盧携稱髙駢纍尹荆南節度使充諸道行營兵馬都統今從實録及新紀表盜朝議然之五年以鐸守司徒門下侍郎同平章事兼江陵五月黃巢上表求廣州節度使求廣府兼使相朝廷續寶運録曰黃巢先夏六月上表稱義軍百万都統兼韶廣等州觀察處置等使不與黃巢夏初兵屯廣南纍候敕旨不下遂恣行攻劫黃巢安南安東東等節度使指揮觀察使開國公食邑五百戶官末云六月十五日表秋遣內侍仇公度齎手詔并廣南雍府十日仇公度到廣州至十月一日巢與公度雜匹假藥物等告六通又賜節度將吏空名尚書僕射官告五十通九月二一日上表公度等其年十月二十九日至京如寶運録所言五馱表函一并所賜官告並却付公度表末云廣明元年十月州也按其月巢已入長安今從舊紀則是廣明元年十月一日巢猶在廣宰相請除巢率府率度使李迢浙東觀察使崔璆書求舊紀五月賊圍廣州仍與廣南節懇激乃詔公卿集議巢又自表乞廣州節度安南都護巢自保薦乞天平節鉞迢璆上表論之實録迢璆上表論請詞甚是請左僕射于琮議云云時朝廷倚髙駢成功不允其奏乃春夏其衆大疫死者十三四欲據有嶺表永為巢穴乃繼有舊巢傳曰時髙駢鎮淮南表請招討賊許之議加都統巢乃議除官或云以正貟將軍縻之宰相亦沮其議乃除率府率之因虜其衆尋南陷湖湘遂據交廣託崔璆奏乞天平節渡渡淮偽降于駢駢遣將張潾率兵受降于天長鎮巢禽潾殺司正貟將軍盧携駮其議請授率府率如其不受請以髙駢朝議不允又乞除官時宰臣鄭畋與樞密使楊復恭欲請授李迢書求表為天平節度又脅崔璆言于朝宰相鄭畋欲許討之新巢傳曰有詔髙駢為諸道行營都統巢進寇廣州詒右僕射于琮議云云乃拜巢率府率舊盧携傳亦皆以為携之盧携田令孜執不可巢又乞安南都護廣州節度使書聞携已罷相今從實録議授巢率府率按此時九月巢陷廣州殺李迢海隅又陷桂州次攻湖南屯衡驚聽録曰據李迢在寇復併爇怒而躓害新紀十一月辛酉黃巢陷江陵殺李迢新傳曰其州方知王仙芝已山東沒陳又尚君長生送咸京遂召李迢瑣言曰黃巢入廣州執李紹隨軍至荆州令紹草表述其所十月巢據荆南脅李迢草表報天子迢不可巢怒殺之北夢斷表終不為領於江津害之今從實録懷紹曰某骨肉滿朝世受國恩腕即可十月巢陷潭州劉漢宏大掠江陵月巢陷潭州王鐸舊紀廣明元年二永州下十月二十七日攻陷潭州新巢傳曰廣明初賊自嶺棄江陵奔襄陽漢宏大掠實録閏月湖南奏黃巢賊衆自衡朝命是嵗自春及夏其衆大疫死者十三四衆勸請北歸以南冦湖南諸郡攻潭州陷之舊巢傳巢欲據南海之地坐邀傳皆云廣明元年敗王鐸今月日從實録事從舊書又據舊圖大利巢不得已廣明元年北踰五嶺犯湖湘江浙按舊紀也實録用之而於鐸奔襄陽下添先是字若鐸在江陵漢宏紀傳則劉漢宏本王鐸將鐸去而漢宏留江陵大掠遂為盜乃據其城也吳越備史云漢宏本兖州小吏領本州兵禦巢先曾寇掠江陵與黃巢事了不相干何必言後半月餘賊衆此則漢宏本羣盜也新傳用之而去鐸招降之或者漢宏本冦遂殺將首劫輜重而叛後命前濠州刺史崔錯招降之據大掠為盜其後又降於崔錯遂為唐臣也羣盜中間降鐸為部將鐸去江陵漢宏復廣明元年正月侯昌業上疏極諫賜死云司天少續寶運録乃明祈五道暗祝冥官悚息於班列之中願早過於閻浮之監侯昌業上疏其略曰陛下不納李蔚杜希敖之諫又曰臣不望堯舜之年得同先帝之日又曰明取尹希復指揮暗策世又曰受爵不逢於有德之君立戟每佐於無道之主又曰全城般運又曰莫是唐家合盡之嵗為復是陛下夀足之年王士成進狀強奪波斯之寶貝抑取茶店之珠珍渾取匱坊無私財帛供養諸佛用資世祿共力攘災表奏聖上龍威震又曰伏惟陛下暫停戲賞救接蒼生於殿內立揭諦道場以時又內養劉季逺宣口敕云侯昌業出自寒門擢居清近不怒侍臣驚悸宣徽使宣云侯昌業付內侍省候進旨翌日午是不能容其侯昌業宜賜自盡北夢瑣言曰唐自廣明後閹能修慎妄奏間詞訕謗萬乘君王毀斥百辟卿士在我彛典而王仙芝黃巢剽掠江淮朝廷憂之左拾遺侯昌業上疏極人擅權置南北廢置使軍容田令孜有回天之力中外側目事躰其末云請開揭諦道埸以銷兵厲似為庸僧偽作也必言時病留中不出命於仗內戮之後有傳侯昌業疏詞不合上宜其死也今從之若侯昌業以此識見犯上好鬬雞賭鵝直五十萬錢按鵝非可鬬之物又一鵝新田令孜傳曰帝沖騃喜鬬鵝一鵝至新傳誤也今從續寶運録至直五十萬錢亦恐失實三月髙駢為諸道行營都統詔云今以卿為諸道都統續寶運録載駢上表及答却不許行軍只令固守封疆不得擅行征討於是髙駢乃引應行營將士兵馬悉受指揮詔旨未到之間朝廷猜二續敕出鎮荆南亦為諸道行營都統而實録及新紀表皆云為南淮水繞江都城三重坐甲不討黃巢自此轉盛舊紀傳王鐸招討使六年十月以駢為淮南節度使江南行營招討使廣面行營都統舊紀乾符四年六月以駢為鎮海節度使江西統駢傳四年為鎮海節度使尋授諸道兵馬都統六年冬徙明元年三月朝廷以鐸統衆無功乃授駢諸道兵馬行營都以髙駢代之實録五年六月駢移鎮海六年正月以駢為諸淮南節度使兵馬都統如故盧携傳曰及王鐸失守罷都統如之十月駢徙淮南依前充都統按駢表請追郎幼復備守道行營兵馬都統仍賜詔如寶運録所載者八月駢上表亦也六鎮謂安南天平西川荆南鎮海淮南也又詔云今以卿浙西則是在鎮海時也詔云周旋六鎮則是駢已移淮南後招討使既數破巢軍乃以滅巢為己任上表請布置諸軍自為諸道都統則似移淮南後方為都統也疑駢在浙西止為諸道都統若駢先為諸道都統鐸但為南面都統則鐸已在攻巢於廣州及王鐸敗盧携遂以駢代之携欲重其權故為都督諸將討賊故立都統之名不應同時有兩都統也其在駢統下可以指揮表不須云乞降敇指揮鐸也且鐸自宰相虔吉饒信故也今從舊紀及盧携傳浙西領江西招討使者時黃巢方掠四月李琢為蔚朔等節度使者誤也琢作瑑五月張潾戰死淮南將張潾急擊之賊懼以金啖潾仍致舊紀是嵗春末賊在信州疫癘其徒多喪軍兵馬數萬赴淮南駢欲收功於己乃奏賊已將殄滅不假書髙駢乞保明歸國駢信之許求節鉞時昭義武寧義武等與駢絶請戰駢怒令張潾整軍擊之為賊所敗臨陳殺潾賊諸道之師並遣還淮北賊知諸軍已退以求節鉞不獲暴怒聞賊復振大恐髙駢傳曰廣明元年夏黃巢自嶺表北趍江遂乘勝渡江攻天長六合等縣駢不能拒但自固而已朝廷降於駢駢遣將張潾率兵受降于天長鎮巢擒潾殺之實録淮由採石渡江潾勒兵天長欲擊之黃巢傳云巢乃渡淮偽同新紀傳皆與實録同據舊傳則潾死在江北也舊紀及實五月潾已為巢所殺七月巢乃過江其言潾所以死與舊紀睦州婺州宣州然後渡江潾死在江南是也録新紀傳潾死在江南也按潾既死巢又陷六月陳敬瑄至成都日上任按實録敬瑄除西川在三錦里耆舊傳云敬瑄九月二十五膺朝寄獲授藩條以六月八日到鎮上訖今從之月庚午又雲南事狀敬瑄與布燮以下牒云某謬李琢執傅文達李瑑赫連鐸奏破沙陀於蔚州降傅文達實録六月云國昌遣文達守蔚州七月云集等縛送李瑑按國昌時在蔚州何必令文達守之今從薛史等薛居正五代史記武皇令軍使傅文達起兵於蔚州髙文詔許南詔和親酉中書奏請令百官集議甲辰百官議定實録六月丙申陳敬瑄奏請遣使和蠻丁報豈能遽至今不取新傳先是南詔知蜀強故襲安南陷之壬子中書奏遣使按敬瑄此月八日上丙申乃十四日也奏皆厚髙駢乃議通和今從雲南事狀雲南事狀又曰中書奏會西川節度使陳敬瑄申和親議時盧携復輔政與豆盧瑑尋却歸朝廷自請改雲南王賜號南詔德宗從之至曾孫蒙玄宗册蒙歸義為雲南王其子閣羅鳯降於吐蕃其孫異牟陳敬瑄與雲南書牒或稱鶴拓或稱大封人雲南事狀不著豐祐杜悰奏以入朝人多減之後索質子漸為侮慢卷末載盧携奏草也撰人名似是七月黃巢圍天長髙駢不敢出兵有不附己者欲賊舊駢傳駢怨朝議駢駭然曰君言是也即令出軍有愛將吕用之者以左道媚縱橫河洛令朝延聳振則從而誅之大將畢師鐸説駢云云相公勳業髙矣妖賊未殄朝廷已有間言賊若蕩平則威望駢駢頗用其言用之懼師鐸等立功即奪己權從容謂駢曰駢深然之乃止諸將但握兵保境而已驚聽録朝廷議駢以震主功居不賞公安稅駕邪為公良畫莫若觀舋自求多福今大冦忽至入臣封巡未肯綿伏狼狐必能晦沉大衆但以文以武國之名將今此黃巢必喪於淮海也尋淮南表至云專今奉詔書責臣無備不合放回武勇又告城危致勞徴兵山東兵士屯駐揚州各思故鄉臣遂放去亦具聞奏非臣自成勝捷不落姦謀固護一方臣必能了但慮冦設深計支捂勞於往返臣今以寡擊衆然曰武經與賊交鋒已當數陳粗下明詔上委中書門下速與商量表至中書咸有異議遂京官軍邐迤過淮彼岸無敵即東道將士以至藩臣繫朝廷速淮也妖亂志曰廣明元年七月黃巢自採石北渡直抵天長國士庶浮謗日興云淮南與巢衷私通連自固城池放賊過犯關防之患悉願盡力死戰用之等慮其立功之後侵奪己時城內士客諸軍尚十餘萬皆良將徑兵議者慮狂冦有奔天時人事斷然可知令公既統強兵又居重地只得坐觀成權謂勃海曰黃巢起於羣盜遂至橫行所在雄藩望風瓦解竟不議出軍巢遂至北焉初巢冦廣陵也江東諸侯以勃海敗不可更與爭鋒若稍損威名則大事去矣勃海深以為然擒之及聞安然渡淮由是方鎮莫不解躰按駢宿將豈不知屯數道徑卒居將相重任巢江海一逋逃耳固可掉折箠而立功以間執讒慝之口若縱賊過淮乃適足實議者之言非賊過淮之後不可復制若怨朝議有不附己者則尤欲破賊入汝洛之後當晨夜追擊以爭功名豈得返坐守淮南數年所以消謗也借使駢實有意使賊震驚朝廷從而誅之則賊敗衄稍損威名夫大功既成則有不賞之懼豈有未戰下知逗留不出兵乎又舊傳吕用之云恐成功不賞妖亂志云恐安然北度其於威名獨無損乎雖用之淺謀無所不至駢自勝負豫憂威望震主乎駢為都統控扼江淮而擁兵縱賊使合疲弊之衆可以節鉞誘致淮南坐而取之不意巢初無降無參酌一至此邪蓋駢好驕矜大言自恃纍有戰功謂巢烏兵不多狼狽惴恐自保不暇故斂兵退縮任賊過淮非故欲心反為所欺張潾驍將一戰敗死巢奄濟采石諸軍北去見致京邑丘墟吕用之妖妄姦回致廣陵塗炭皆人所深疾故縱之實不能制也盧携暗於知人致中原覆沒駢先鋭後怯日黃巢傾陷京國轉牒諸軍據牒云屯軍淮甸牧馬潁陂則衆惡歸焉未必實然也又唐末見聞録廣明二年十二月五天補均平大將軍兼海內諸豪帥都統傳檄諸道其文與此似在淮南時非入長安後又續寶運録云王仙芝既叛目稱逞之士偽作此文託於仙芝黃巢以譏斥時病未必二人實略同末云願垂聽知謹告乾符二年正月三日此蓋當時不牒也有此檄劉漢宏請降鍇招之至是始歸降辛未漢宏奏請於濠州實録漢宏寇擾荆襄王鐸遣前濠州刺史崔分司蓋未分司時遣錯招之又戊辰漢宏除宿州云至是始到戈歸降優詔褒之按鐸奔襄陽漢宏始掠江陵叛去鐸尋聞其降戊辰已除官而辛未漢宏表方至也降是已降也辛未又云請於濠州歸降者朝廷十一月豆盧瑑請授黃巢天平節鉞豆盧瑑奏緣淮驚聽録曰宰臣過淮洛冦之計又徴兵不及須且誘之請降節旄授鄆州節南九驛便至泗州恐髙駢固守城壘不遮截大冦黃巢必若之患久矣昨與江西節制擁節而行攻劫荆南却奪其節但度候其至止討亦不難宰臣盧携言之不可奏以黃巢為國諸道而去尋汴州徐州兩道告急到京報黃巢過淮盧携託徴諸道驍勇把截泗州因此不發內使罷建雙旌乃發使臣使與之安可復奪此驚聽録不足信也疾不出按朝廷未嘗以江西節與巢借張承範等發京師上御章信門遣之令孜章信門新傳曰帝餞離禁闥是日所遣者承範等耳新傳云餞令孜誤也賚遺豐優按令孜雖為招討都統賜節賚物其實不上趣駱谷鄭畋謁於道次水驛乃下詔與牛顓楊師立續寶運録戊子帝至駱谷壻九日而詔云七日九誤為七也實録辛卯車駕次鳯翔鄭畋陳敬瑄云今月七日已次駱谷壻水驛按此月庚辰朔戊子興元按甲申上離長安辛卯始次鳯翔太緩丁酉已至興元候謁於路舊畋傳云候駕於斜谷新紀辛卯次鳯翔丁酉至而畋往見耳非鳯翔與斜谷也實録賊以數萬衆西追車駕太速又路出駱谷則不過鳯翔及斜谷蓋車駕涉鳯翔之境拒而還諸書皆無之今不取而不言追不及又不言為誰所黃巢妻曹氏為皇后為皇后今從新傳實録巢傳立妻曲氏王重榮殺巢使與王處存結盟都守河中降賊會王舊王處存傳曰時李天下藩鎮多受其偽命唯鄭畋守鳯翔鄭從讜守太原處存重榮斬偽使通使於處存乃同盟誓營於渭北時巢賊潛號鎮翻然改圖以出勤王之師按鐸中和二年始至於時未也王重榮首倡義舉俄而鄭畋破賊前鋒王鐸自行在至故諸李都不能拒稱臣於賊賊偽授重榮節度副使重榮以賊徴王重榮傳曰初重榮為河中馬步都虞候巢賊據長安蒲帥假公翌日都歸行在重榮知留後事乃斬賊使求援鄰藩比求無已欲拒之都曰吾兵微力寡絶之立見其患願以節鉞附者多因薦為副使一日忽謂都曰今公助賊陷一邦於不夢瑣言曰重榮始為牙將黃巢犯闕元戎李都奉偽畏重榮其偽使都無以對因以軍印授重榮而去及都至行在朝廷忠而又日加箕斂衆口紛紜然倐忽變生何以遏也遽命斬兆尹有慘酷之名時謂之垜疊及至翌日進軍校于庭謂曰又以前京兆尹竇潏間道至河中代都重榮迎之潏前為京為惡者必一兩人而已爾等可言之潏不知軍校皆重榮之天子命重臣作鎮將遏賊衝安可輕議斥逐令北門出乎且者非我而誰遂召潏之僕吏控馬及階請依李都前例乃云親黨也衆皆不對重榮乃屏肅佩劒歷階而上謂潏曰為惡辛亥朔重榮已作亂掠坊市辛酉以重榮為留後都為太子速去潏不敢仰視躍馬復由北門而出新傳取之按十一月何嘗奉偽亦未嘗聞以潏代都今不取少傅則都已去河中矣及黃巢犯闕都中和元年正月陳敬瑄杖殺內園小兒殺五十人尸新傳曰敬瑄一人笑云云巡者亂打執之敬瑄咄之曰今日且欲棒殺汝諸衢錦里耆舊傳曰有內園小兒三箇連手行繞行宫數內敬瑄語耳非實殺五十人也新傳誤三五十輩必不令錯按三五十輩者二月代北監軍陳景思薛居正五代史實録作景斯今從三月景思赦請李克用用軍屯蔚州克用因大掠鴈門以實録陳景思齎詔入達靼召李克千騎南赴京師友金即武皇之族父也中和元年二月友金北軍鎮薛居正五代史先是景思與李友金發沙陀諸部五代北徐圖利害四月友金旋軍鴈門瞿稹至代州半月之間軍至絳州將渡河刺史瞿稹謂景思曰巢賊方盛不如且還瞿稹李友金不能制友金謂景思云云景思然之促奏行在募兵三萬營於嵉縣之西其軍皆北邉五部之衆不間軍法五百騎齎詔召武皇於逹靻武皇即率達靼諸部萬人趍鴈天子乃以武皇為鴈門節度使仍令以本軍討賊李友金發克用來耳是嵗克用但攻掠太原又陷欣代二州明年十二門按景思請赦國昌父子而獨克用至者蓋國昌已老獨使同防禦使及陷欣代自稱留後朝廷再召之始除鴈門薛史月始自欣代留後除鴈門節度使蓋此際止赦其罪復為大度更大同節度為鴈門節度治代州此其證也誤也新表中和二年以河東欣代二州隸鴈門節宿州刺史拓跋思恭薛史避國諱耳按舊唐書實録皆歐陽修五代史作拓跋思敬意謂王建思敬本姓拓跋鄜夏節度使思恭保大節度使思孝之作思恭實録天復二年九月武定軍節度使李思敬以城降新唐書黨項傳曰思恭為定難節度使卒弟思諫代為節度弟也思孝致仕以思敬為保大留後遂升節度又徙武定軍則思恭思敬乃是兩人思敬後附李茂貞或賜國姓故更姓思孝為保大節度以老薦弟思敬為保大留後俄為節度然一人誤也李修合以為四月黃巢復入長安唐弘夫戰死弘夫敗在二年二舊紀傳新傳皆云在此年四月新紀日尤詳今從之月驚聽録唐年補録新紀實録皆五月己未髙駢出屯東塘東塘至九月六日歸府九十妖亂志曰自五月十二日出日乃一百一十三日非九十餘日也今從舊傳餘日禳雉雊之變也按五月十二日至九月六忠武軍八都等七人姓名其一人諸書不可見故也劉恕十國紀年上云八都而下止有王建六月李克用陷欣代却回收却欣代州太祖紀年録遇唐末見聞録六月三十日沙陀軍按欣代先屬河東中和二年始割隸鴈門今從見聞録實録大雨六月二十三日班師鴈門薛居正五代史與紀年録同七月鄭從讜斬論安却欣代州使司差教練使論安軍唐末見聞録六月三十日沙陀收等拔寨却回到府按當月內即三十日也一日之中不容有使王蟾髙辨回鶻吐蕃等軍於百井下寨守禦當月內論安上把起論安不脫靴衫毬場內處置族滅其家又差都頭溫爾許事必非也又曰至七月十四日相公排飯大將等於坐契苾尚書領兵馬却歸振武今從之漢臣將兵依前於百井下寨當月內九月成麟殺髙潯孟方立殺麟廣據潞州叛天井實録澤潞牙將劉州初髙潯援京師廣率師至陽平謀為亂不行還據潞州自關戍將孟方立帥戍卒攻廣殺之自稱留後仍移軍額於邢節度使髙潯為端州刺史中和三年實録又曰初孟方立殺稱留後用法嚴酷三軍畏之方立乘虛襲殺焉又曰貶昭義關戍將時黃巢犯關輔州郡易帥有同博奕先是沈詢髙湜髙潯自立薛居正五代史方立傳曰中和二年為澤州天井帥交代之際乘其無備率戍兵徑入潞州自稱留後新紀八相繼為昭義節度怠於軍政及有歸秦劉廣之亂方立見潞潯入于潞州九月己巳昭義軍戍將孟方立殺成麟自稱留月昭義軍節度使髙潯及黃巢戰于石橋敗績十將成麟殺月昭義軍亂逐節度使髙湜貶湜象州司戶柳玭傳云貶髙後方立傳惟以成麟為成鄰餘如新紀按乾符二年實録十逐湜擅據潞州也薛史孟方立傳亦云沈詢髙湜怠於軍政要尉三年十一月詔魏博韓簡云劉廣逐帥擅權云云是廣廣擅還據潞州是月潯天井關戍將孟方立攻廣殺之自稱致有歸秦劉廣之亂是廣亂在前也舊紀九月髙潯牙將劉見潞帥交代之際率兵入潞不言何帥交代若不逐帥何能據留後貶潯端州刺史此蓋舊紀誤實録因之薛史方立傳曰録此云殺廣明年又云殺潯自相違新紀傳皆云成麟殺潯州事無所因殊為踈略舊紀恐是誤以髙湜事為髙潯事實詳必有所出今從之方立斬麟月日事實頗十二月閔朂逐李裕從程匡袤唐補紀實録新傳作閔頊今二年正月王鐸為都都統統十二月率師三万至京畿舊紀中和元年七月鐸為都以鐸為都統十二月乙亥鐸屯盩厔續寶運録元年八月鐸屯於盩厔舊鐸傳亦在元年唐年補録元年十一月乙巳制五月出府九月却歸朝廷即以鐸都統諸道兵馬收復長安拜天下都統唐補紀中和元年四月髙駢率師駐泊東塘自諸道行營都都統髙駢罷都統據實録四月答髙駢詔罷都鐸為都統諸書年月不同如此新紀二年正月辛亥王鐸為意乃以鐸為京城四面諸道行營兵馬都統韋昭度領江淮統統當在此年今從實録新紀舊駢傳云僖宗知駢無赴難語詞不遜按駢罷都統依前為諸道鹽鐵轉運使五月方罷鹽鐵轉運使駢既失兵柄又落利權攘袂大詬纍上章論列潼關黃巢令人傳語云相公儒生且非我敵無汚我鋒刃自北夢瑣言曰王鐸初鎮荆南黃巢入冦望風而遁他日將兵為敗軍之將也按鐸自荆南喪師敗官未嘗將兵潼關皮光取敗亡也後到成都行朝拜諸道都統所以髙駢上表目之都都統新紀作都統實録初除及罷時皆為都統中間多云業見聞録為都統在此年二月亦誤又舊紀傳新傳鐸止為將為都統者甚多疑鐸為都都統是也都都統又西門思恭為都都監按時諸三月阡能為盜耆舊傳作懺能續寶運録作玕能實録張􅒷錦里耆舊傳作千能句延慶錦里注云姓纂無此蓋西南夷之種今從之新傳作阡能按北夢瑣言安仁土豪阡能六月羅渾擎等反為軍前四面都指揮使干能亦散於張􅒷耆舊傳曰二年六月補楊行遷九月千能渾擎胡僧與官軍大戰於乾溪官軍不利十二月諸處下寨官軍頻不利八月羅渾擎反十月句胡僧反又曰六月句胡僧反有四千餘人官軍與忓能戰於乾溪官軍大羅天子反衆二三千句延慶耆舊傳曰二年五月羅渾擎反千餘官軍與能戰乾溪大敗按張傳上云十月胡僧反下云敗是月羅夫子反聚衆三千人實録六月句胡僧反有衆二敗羌一年今從實録並附之六月九月胡僧與官軍戰自相違又阡能七月韓求反賊首千能邐迤漸侵入蜀州界今從句延慶張􅒷耆舊傳三年六月韓求反其邛州界內實録傳及南詔請降公主報以方議禮儀年九月三日雲南驃張􅒷耆舊傳中和元注郊迎布燮始相見揖副使云請不拜太師聞極怒朝廷告信差布燮楊竒肱等齎國信來通和迎公主太師借副使儀竟空還今從雲南事狀及實録以俟更議車服制數定續有旨命十月韓秀升屈行從斷峽江路月峽路賊韓秀升十張􅒷耆舊傳三年九月二十日發往峽路句延慶耆舊傳於中和二年七月韓求月峽路賊屈行從反陳太師差押衙莊二夢將兵二千人十押衙莊夢蝶押領十月癸丑發峽路收討韓秀升蓋因十月反下又云峽路韓秀升屈行從反川主選點兵士三千人差為亂敬瑄遣大將莊夢蝶以兵三千討之新傳曰涪州刺史討之而言耳實録取句傳而誤於七月下云韓秀升屈行從中今從句傳韓秀升等亂峽朱瑄權知天平留後平軍節度未周歲而遇害舊傳瑄實録曹有實繼其叔父全晸為天武遣牙將曹全晸率兵三千赴難關西瑄已為軍候會青州為青州王敬武牙卒中和初黃巢據長安詔徴天下兵王敬所殺崔君裕權知州事全晸知其兵寡襲殺君裕據有鄆州警急敬武召全晸還路由鄆州時鄆將薛崇為草賊王仙芝韓簡欲兼并曹鄆以兵濟河收鄆全晸出兵逆戰為魏軍所自稱留後以瑄有功署為濮州刺史留將牙軍光啓初魏博魏軍亂退去朝廷嘉之授以節鉞新傳與之同薛居正五代敗全晸死之瑄收合殘卒保州城韓簡攻圍半年不能拔會赴之以瑄隸焉賊敗出關全晸以本軍還鎮會鄆帥薛崇卒史瑄傳中和二年張濬徴兵於青州敬武遣將曹全晸率軍濮州刺史鄆州馬步軍都將光啓初魏博韓允中攻鄆全晸部將崔君預據城叛全晸攻之殺君預因為留後瑄以功授天平節度使按王仙芝死已久曹全晸久為節度使去嵗死為其所害瑄據城自固三軍推為留後允中敗朝廷以瑄為瑄作宣歐陽修五代史記注云今流俗以宣弟瑾於名加玉王敬武今嵗始得青州新舊傳薛史皆誤今從實録又新傳傳薛史實録者非也今從舊十一月李詳舊卒逐黃思鄴偽刺史黃思鄴推華隂實録李詳下牙隊兵斬鄴與黃巢俱死於虎狼谷實録誤也今從新黃巢傳鎮使王遇為首降河中王鐸承制除遇為刺史按黃髙仁厚討阡能軍戰即不利陳敬瑄乃遣仁厚討之十張􅒷耆舊傳中和三年冬干能轉盛官首級九日擒干能得羅天子首級十一月二十二日回戈自一月五日仁厚進發六日擒羅渾擎七日擒句胡僧得韓求左僕射授眉州刺史張􅒷書語雖俾淺或有抵捂然敘事甚城北門入三日大設五日議功髙公自檢校兵部尚書檢校厚梟五賊之首凱旋歸府冬十二月戊寅皇帝御大玄樓髙詳苟無此書則仁厚功業悉沈沒矣句延慶傳中和二年仁眉州刺史延慶不知據何書知干能敗在二年冬然要之仁仁厚與將校等於清逺橋朝見至後三日大設髙仁厚除授己亥朔無戊寅日必誤也實録二年十月草賊阡能於蜀州厚擒韓秀升在三年十月前則擒干能必更在前矣十二月十月癸丑發峽路收討韓秀升下因附之十月亦誤也實録敗官軍陳敬瑄遣髙仁厚討之實録見句傳敘討懺能事承士以仁厚為檢校工部尚書眉州防禦使亦因句傳而去其又曰十二月仁厚以阡能首來獻帝御大玄樓宣慰回戈將史為防禦耳今髙仁厚擒阡能既不知決在何年月故因實曰又此年十月戊辰升眉漢彭綿等州並為防禦使故改刺於此録附十二月李克用將兵至河中新太祖紀年録薛居正實録在明年正月今從史五代李克讓為僧所殺賊南山隱於佛寺夜為山僧所害紀太祖紀年録初克讓於潼關戰敗避修好捕害克讓之僧十餘人殺之巢令其將米重威齎重賂綱渾進通冒刃獲免歸黃巢賊素憚太祖聞其至也將託情史克讓傳曰乾符中以功授金吾將軍留宿衛初懿祖歸朝為詔因渾進通見太祖乃召諸將領其賂燔其偽詔以徇薛使王處存夜圍親仁坊捕克讓詰旦兵合克讓與十餘騎彎憲宗賜宅於親仁坊武皇之起雲中殺假文楚也天子詔巡讓自夏陽掠船而濟歸於鴈門按克讓於時猶在雲州云鴈弧躍馬突圍而出官軍數千人追之比至渭橋死者數百克國昌猶自請計克用朝廷必未誅其子蓋國昌振武不受代門誤也後唐懿祖紀年録曰其兄克恭克儉皆伏誅按是時宿衛黃巢犯闕僖宗幸蜀克讓時守潼關為賊所敗按國昌後克恭克儉始被誅也薛史又曰明年武皇昭雪克讓復入讓何從得入宿衛廣明元年國昌父子兵敗逃入達靼其年以乾符五年不受代朝廷發兵討之六年克用未嘗昭雪克朝廷所圍捕時逃入南山佛寺為僧所殺則不可知也今事冬黃巢陷長安克讓何嘗守潼關戰敗而死於佛寺或者為寺僧所殺而已既難明故但云為孟方立遷昭義軍於邢州自稱留後年正月以義實録中和四麟以中書舍人鄭昌圖權知昭義留後按成麟前已為孟方成行軍司馬鄭昌圖為中書舍人三月邢州軍亂殺其帥成李克修所據昌圖安得更往彼為留後又其年五月以右僕立所殺况不在邢州邢州乃方立所治也又於時潞州已為本官充大明宫留守舊王徽傳初潞州軍亂殺成麟以兵部射王徽同平章事充昭義節度使徽上表懇述非便乃復以一鎮上黨支郡唯澤州耳而軍中之人多附方立昌圖不能侍郎鄭昌圖權知昭義軍事時孟方立割據山東三州别為事澤潞邢洛磁觀察等使時鑾輅未還關東聚盜而河東李制宰相奏請以重臣鎮之乃授徽檢校尚書左僕射同平章鄭昌圖主留纍月將結深根孟方立專據三州轉成積舋招克用與孟方立爭澤潞以朝廷兵力必不能加上表訴之曰何於已失須觀勝負乃決安危伏乞聖慈博求廷議擇其可其外則潞人胥怨撫其內則邢將益疑禍方熾於既焚計奈使新孟方立傳曰方立攻成鄰斬之擅裂邢洛磁為鎮治邢付理在從長天子乃以昌圖鎮之以徽為諸道租庸供軍等領諸道行營都統以潞未定墨制假方立知邢州事方立不為府號昭義軍潞人請監軍使吳全勗知兵馬留後時王鐸昌圖知昭義留事欲遂為帥僖宗自用舊相王徽領節度時受因全勗以書請鐸願得儒臣守潞鐸使參謀中書舍人鄭廷未能制乃固讓昌圖昌圖治不三月輒去方立更表李殷天子在西河關中雲擾方立壇地而李克用窺潞州徽度朝審誨乞師求復昭義軍克用殺殷鋭遂并潞州表克修為留殷為刺史乃徙治龍岡會克用為河東節度使昭義監軍祁年也昌圖在潞不三月引去今徽以潞讓昌圖則徽除昭義後按王鐸以三年正月罷都統則昌圖知昭義留後必在二後遷軍額於邢州則不止割據三州若欲别為一鎮則應别必不在四年五月實録年月皆誤也方立若已自稱昭義留史不以書與王鐸更求儒臣就使求之鐸亦當以昌圖為潞立軍名必不與潞州並稱昭義若但以潞為支郡當自除刺既殺成麟以邢州鄉里欲徙鎮之故身往邢州而潞人不從州刺史不云知昭義軍事又不得以澤州為支郡也蓋方立示恭順託以中人不可為帥而請於王鐸乞除儒臣其意以故請全勗為留後方立以衆情未洽未敢自立故囚全勗外昌圖至潞欲行帥職而山東三州已為方立所制不受帥命儒臣易制欲外奉為帥而自專軍府之政漸謀代之也既而結根言在澤潞已久人心稍附己所不如也又云方立纍據獨澤州在南尚可號令耳故王徽表云昌圖主留纍月已深覦故積亹也又云招其外則潞人胥怨撫其內則邢將益疑三州轉成積舋謂昌圖欲行帥權而方立不率將職互相窺加惠於潞則邢將疑其圖己也又云須觀勝負乃決安危謂謂今邢潞已成舋隙已至彼欲加惠於邢則潞人怨其寵賊軍府授方立而去方立然後自稱留後徙軍額於邢州以潞昌圖能勝方立然後昭義乃安也昌圖在潞終不自安故以此其證也於是潞人怨而召沙陀當徽除節制之時克用猶為支郡表殷鋭為刺史故新傳徙治龍岡在殷鋭為刺史下使知留後方立既囚之疑其遂斥去祁審誨恐是鄭昌圖時未敢爭澤潞也吳全勗疑是方立初入潞府時監軍故王鐸方立傳云方立以邢為府以審誨知潞州事互説不同且既監軍太祖紀年録云方立虜審誨自稱留後薛居正五代史舊必是後來監軍方立以其未嘗異己故不疑之若嘗被囚虜審誨必不以知潞州方立表李殷鋭為刺史而審誨猶依成麟作亂被殺人皆知之記事者不詳考正或以先者為後虜必不復留此之不實昭然可知疑唐末昭義數逐帥劉廣傳云安文祐初為潞州牙門將光啓中軍校劉廣逐節度使後者為先差互不同故諸書多抵捂不合耳又薛史安崇阮刺史其後孟方立據邢洛攻上黨朝廷以文祐本潞人也授髙潯據其城僖宗詔文祐平之既殺劉廣召赴行在授邛州諸書皆無文祐為昭義節度使事況光啓中澤潞已為李克昭義節度使令討方立自蜀至澤州與方立戰敗歿於陳按與方立戰也其事恐虛今不取修所據文祐來當與克修戰不得資治通鑑考異卷第二十四
